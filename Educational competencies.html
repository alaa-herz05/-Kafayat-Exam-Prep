<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Educational competencies — الكفايات التربوية 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
 :root{
  --black:#030303;
  --navy:#0b0b0c;
  --deep:#111113;
  --mid:#18191b;
  --card:rgba(18,18,20,.82);
  --card2:rgba(30,30,34,.68);
  --border:rgba(210,214,220,.24);
  --accent:#d7dce2;
  --accent2:#f1f3f5;
  --text:#f2f4f6;
  --muted:#a7adb5;
  --green:#3effa0;
  --red:#ff6074;
  --gold:#ffd36a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Cairo,Arial,sans-serif;
  background:
    radial-gradient(circle at 15% 10%,rgba(210,214,220,.13),transparent 25%),
    radial-gradient(circle at 85% 5%,rgba(241,243,245,.08),transparent 28%),
    linear-gradient(135deg,#02050a 0%,#07111f 45%,#02050a 100%);
  color:var(--text);
  line-height:1.75;
  overflow-x:hidden;
}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55}
.top-nav{
  position:sticky;top:0;z-index:20;
  background:rgba(3,7,13,.9);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:12px 18px;
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
}
.top-nav a,.top-nav button{
  text-decoration:none;color:var(--text);
  border:1px solid var(--border);
  background:rgba(14,35,56,.65);
  padding:7px 15px;border-radius:10px;
  font-size:13px;font-weight:800;transition:.2s;
  cursor:pointer;font-family:Cairo;border-color:var(--border);
}
.top-nav a:hover,.top-nav a.active,.top-nav button:hover{
  color:#00131d;background:var(--accent);box-shadow:0 0 20px rgba(210,214,220,.35)
}
.hero{
  position:relative;z-index:1;text-align:center;
  padding:64px 20px 34px;border-bottom:1px solid var(--border);
  background:linear-gradient(160deg,rgba(3,7,13,.55),rgba(10,22,40,.85));
}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(210,214,220,.20),transparent 72%);pointer-events:none}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  border:1px solid var(--accent);color:var(--accent);
  font-size:11px;font-weight:900;letter-spacing:2px;
  padding:6px 20px;border-radius:30px;margin-bottom:16px;
  background:rgba(210,214,220,.07)
}
.dot{width:7px;height:7px;background:var(--accent);border-radius:50%;box-shadow:0 0 14px var(--accent);animation:pulse 1.8s infinite}
@keyframes pulse{50%{opacity:.35;transform:scale(1.6)}}
.hero h1{font-family:Syne,Cairo,sans-serif;font-size:clamp(2rem,5vw,3.8rem);font-weight:900;color:#fff;letter-spacing:-1px}
.hero h1 span{color:var(--accent);text-shadow:0 0 26px rgba(210,214,220,.38)}
.hero p{color:var(--muted);font-size:1rem;margin-top:8px}
.container{position:relative;z-index:1;max-width:1050px;margin:auto;padding:0 18px}
.score-card{
  margin:28px auto 0;background:var(--card);border:1px solid var(--border);
  border-radius:22px;padding:22px;backdrop-filter:blur(12px);
  box-shadow:0 20px 60px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.03);
  display:grid;grid-template-columns:auto 1fr;gap:22px;align-items:center;
}
.score-ring{position:relative;width:116px;height:116px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg);width:116px;height:116px}
.track{fill:none;stroke:rgba(210,214,220,.12);stroke-width:8}
.fill{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:.5s;stroke-dasharray:283;stroke-dashoffset:283}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-pct{font-family:Syne;font-size:1.55rem;font-weight:900}
.score-label{font-size:11px;color:var(--muted)}
.stats{display:grid;grid-template-columns:repeat(5,minmax(80px,1fr));gap:12px}
.stat{background:rgba(3,7,13,.34);border:1px solid rgba(210,214,220,.12);border-radius:14px;padding:13px;text-align:center}
.stat .num{font-family:Syne;font-size:1.65rem;font-weight:900;line-height:1}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:4px}
.correct{color:var(--green)} .wrong{color:var(--red)} .skip{color:var(--gold)} .total{color:var(--accent)} .answered{color:var(--accent2)}
.progress-bar{height:7px;background:rgba(210,214,220,.1);border-radius:100px;overflow:hidden;margin-top:16px}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:100px;transition:.45s}
.actions,.filters{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.btn,.filter-btn,select,input{
  font-family:Cairo,sans-serif;border-radius:11px;border:1px solid var(--border);
  background:rgba(14,35,56,.7);color:var(--text);padding:9px 16px;font-weight:800;outline:none;
}
.btn,.filter-btn{cursor:pointer;transition:.2s}
.btn-primary{background:var(--accent);color:#00131d;border-color:var(--accent)}
.btn:hover,.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);box-shadow:0 0 16px rgba(210,214,220,.15)}
.btn-primary:hover{color:#00131d;transform:translateY(-2px)}
.search{flex:1;min-width:220px}
.tools-card{
  margin:18px auto;background:rgba(10,22,40,.58);border:1px solid var(--border);
  border-radius:18px;padding:16px;backdrop-filter:blur(10px)
}
.q-card{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:22px;margin-bottom:16px;box-shadow:0 18px 50px rgba(0,0,0,.18);
  animation:fadeUp .35s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.q-card.good{border-color:rgba(62,255,160,.42);background:rgba(62,255,160,.045)}
.q-card.bad{border-color:rgba(255,96,116,.45);background:rgba(255,96,116,.045)}
.q-card.unavailable{border-color:rgba(255,211,106,.35);background:rgba(255,211,106,.035)}
.q-head{display:flex;gap:14px;align-items:flex-start;margin-bottom:15px}
.q-num{
  min-width:44px;height:44px;border-radius:13px;
  background:var(--accent);color:#00131d;font-family:Syne;font-weight:900;
  display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px rgba(210,214,220,.28)
}
.q-title{font-size:15px;font-weight:800;color:#fff;white-space:pre-line;text-align:right;flex:1}
.tag{display:inline-block;font-size:10px;color:var(--accent);border:1px solid rgba(210,214,220,.22);background:rgba(210,214,220,.07);padding:2px 9px;border-radius:7px;margin-bottom:7px;font-weight:900}
.options{display:grid;gap:9px}
.option{
  direction:rtl;text-align:right;display:flex;gap:12px;align-items:flex-start;
  padding:12px 14px;border-radius:13px;
  background:rgba(14,35,56,.54);border:1px solid rgba(210,214,220,.12);
  cursor:pointer;transition:.18s;color:var(--text);white-space:pre-line;
}
.option:hover:not(.disabled){background:rgba(210,214,220,.10);border-color:rgba(210,214,220,.42);transform:translateX(-4px)}
.option.disabled{cursor:default}
.letter{
  width:30px;height:30px;border-radius:9px;flex:0 0 30px;
  background:rgba(210,214,220,.10);border:1px solid rgba(210,214,220,.25);
  color:var(--accent);display:flex;align-items:center;justify-content:center;
  font-family:Syne;font-weight:900;direction:ltr
}
.option.correct-opt{background:rgba(62,255,160,.11)!important;border-color:rgba(62,255,160,.5)!important}
.option.correct-opt .letter{background:var(--green);color:#00131d}
.option.wrong-opt{background:rgba(255,96,116,.11)!important;border-color:rgba(255,96,116,.5)!important}
.option.wrong-opt .letter{background:var(--red);color:white}
.feedback{
  display:none;margin-top:13px;border-radius:14px;padding:13px 15px;
  font-size:13.5px;font-weight:800;border:1px solid var(--border);white-space:pre-line
}
.feedback.show{display:block;animation:fadeUp .25s ease}
.feedback.ok{background:rgba(62,255,160,.08);border-color:rgba(62,255,160,.32);color:var(--green)}
.feedback.no{background:rgba(255,96,116,.08);border-color:rgba(255,96,116,.32);color:var(--red)}
.feedback.warn{background:rgba(255,211,106,.08);border-color:rgba(255,211,106,.32);color:var(--gold)}

.explain-box{
  margin-top:10px;
  background:rgba(210,214,220,.075);
  border:1px solid rgba(210,214,220,.25);
  border-radius:12px;
  padding:11px 13px;
  color:var(--text);
  font-weight:700;
  line-height:1.8;
  white-space:pre-line;
}
.explain-title{
  color:var(--accent);
  font-weight:900;
  margin-bottom:4px;
  display:flex;
  gap:6px;
  align-items:center;
}
.correct-answer-line{
  margin-top:8px;
  color:var(--green);
  font-weight:900;
}

.pager{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin:26px 0 70px}
.page-info{color:var(--muted);font-weight:800;padding:0 12px}
.mini-score{
  position:fixed;bottom:18px;right:18px;z-index:30;background:rgba(3,7,13,.92);
  border:1px solid var(--border);border-radius:16px;padding:10px 14px;display:flex;gap:12px;
  backdrop-filter:blur(12px);font-size:13px;box-shadow:0 12px 35px rgba(0,0,0,.35)
}
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:50;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:.25s;padding:18px
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{max-width:500px;width:100%;background:var(--deep);border:1px solid var(--border);border-radius:26px;padding:30px;text-align:center;box-shadow:0 20px 80px rgba(0,0,0,.45)}
.grade{font-family:Syne;font-size:4rem;font-weight:900;color:var(--accent);margin:12px 0}
.empty{text-align:center;color:var(--muted);padding:50px 10px;font-weight:800}
@media(max-width:720px){
  .score-card{grid-template-columns:1fr;text-align:center;justify-items:center}
  .stats{grid-template-columns:repeat(2,1fr);width:100%}
  .q-head{flex-direction:column}
  .mini-score{left:12px;right:12px;justify-content:center}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<nav class="top-nav">
  <a href="index.html">🏠 Home</a>
  <a class="active" href="Educational competencies.html">🎓 Educational competencies</a>
  <button onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆️ أعلى الصفحة</button>
</nav>

<section class="hero">
  <div class="hero-badge"><span class="dot"></span> Interactive Educational Competencies Exam</div>
  <h1>الكفايات التربوية <span>التفاعلية</span></h1>
  <p>690 سؤال — اختر الإجابة وشاهد الصح والخطأ والسكور مباشرة</p>
</section>

<main class="container">
  <section class="score-card">
    <div class="score-ring">
      <svg viewBox="0 0 100 100"><circle class="track" cx="50" cy="50" r="45"/><circle class="fill" id="ringFill" cx="50" cy="50" r="45"/></svg>
      <div class="score-center"><div class="score-pct" id="scorePct">0%</div><div class="score-label">Score</div></div>
    </div>
    <div style="width:100%">
      <div class="stats">
        <div class="stat"><div class="num correct" id="countCorrect">0</div><div class="lbl">✅ صحيح</div></div>
        <div class="stat"><div class="num wrong" id="countWrong">0</div><div class="lbl">❌ خطأ</div></div>
        <div class="stat"><div class="num answered" id="countAnswered">0</div><div class="lbl">📝 مجاوب</div></div>
        <div class="stat"><div class="num skip" id="countSkip">0</div><div class="lbl">⏳ متبقي</div></div>
        <div class="stat"><div class="num total" id="countTotal">690</div><div class="lbl">📚 المجموع</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
      <div class="actions">
        <button class="btn btn-primary" onclick="showResults()">📊 النتيجة النهائية</button>
        <button class="btn" onclick="resetAll()">🔄 إعادة الامتحان</button>
        <button class="btn" onclick="shuffleQuestions()">🔀 تبديل ترتيب الأسئلة</button>
      </div>
    </div>
  </section>

  <section class="tools-card">
    <div class="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">الكل</button>
      <button class="filter-btn" data-filter="unanswered" onclick="setFilter('unanswered')">⏳ غير مجاوب</button>
      <button class="filter-btn" data-filter="correct" onclick="setFilter('correct')">✅ صحيح</button>
      <button class="filter-btn" data-filter="wrong" onclick="setFilter('wrong')">❌ أخطائي</button>
      <button class="filter-btn" data-filter="unavailable" onclick="setFilter('unavailable')">⚠️ غير مستخرج</button>
      <input class="search" id="searchInput" oninput="applyFilters()" placeholder="ابحث برقم السؤال أو كلمة من السؤال...">
      <select id="pageSize" onchange="changePageSize(this.value)">
        <option value="10">10 أسئلة</option>
        <option value="20" selected>20 سؤال</option>
        <option value="50">50 سؤال</option>
        <option value="100">100 سؤال</option>
      </select>
    </div>
  </section>

  <section id="questionsWrap"></section>
  <section class="pager">
    <button class="btn" onclick="prevPage()">السابق</button>
    <span class="page-info" id="pageInfo">صفحة 1</span>
    <button class="btn btn-primary" onclick="nextPage()">التالي</button>
  </section>
</main>

<div class="mini-score">
  <span>✅ <b class="correct" id="miniCorrect">0</b></span>
  <span>❌ <b class="wrong" id="miniWrong">0</b></span>
  <span>📊 <b id="miniPct">0%</b></span>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeResults(event)">
  <div class="modal">
    <h2>نتيجتك النهائية</h2>
    <div class="grade" id="gradeText">0%</div>
    <p id="resultMsg" style="color:var(--muted);font-weight:800"></p>
    <div class="stats" style="grid-template-columns:repeat(3,1fr);margin:18px 0">
      <div class="stat"><div class="num correct" id="modalCorrect">0</div><div class="lbl">صحيح</div></div>
      <div class="stat"><div class="num wrong" id="modalWrong">0</div><div class="lbl">خطأ</div></div>
      <div class="stat"><div class="num total" id="modalAnswered">0</div><div class="lbl">مجاوب</div></div>
    </div>
    <button class="btn btn-primary" onclick="document.getElementById('modalOverlay').classList.remove('show')">إغلاق</button>
  </div>
</div>

<script>
const QUESTIONS = [{"id":1,"question":"في حصة صفية، يالحظ المعلم أن مجموعة من الطالب تشتت انتباهها بسبب السؤال1: طالب معين. ما هو اإلجراء األنسب لمعالجة هذه الحالة؟","options":[{"letter":"A","text":"تدخالت متكررة من توجيه إنذار شفهي خاص للطالب على هامش الحصة لتصحيح السلوك دون إحراجه أمام اآلخرين."},{"letter":"B","text":"التحدث مع الطالب على انفراد لفهم أسباب سلوكه ومساعدته على تحسين تركيزه داخل الصف."},{"letter":"C","text":"توجيه إنذار شفهي مباشر للطالب ب حضور زمالئه لتنبيههم جميعا إلى أهمية التركيز دون استهداف الطالب فقط."},{"letter":"D","text":"تنسيق لقاء مع ولي أمر الطالب واإلدارة لمناقشة السلوك ووضع خطة تعديل مناسبة."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: التحدث مع الطالب على انفراد لفهم أسباب سلوكه ومساعدته على تحسين تركيزه داخل الصف.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":2,"question":"أثناء تخطيط المعلم لوحدة دراسية تهدف إلى تحفيز الطالب ع لى بناء المعرفة من خالل اكتشافهم الذاتي، أي من النظريات التالية يُعدُّ األنسب لتصميم أنشطة تعليمية تدعم هذا النهج؟","options":[{"letter":"A","text":"نظرية السلوكية التي تركز على تعزيز السلوكيات المرغوبة عبر التكرار والتعزيز لستيعاب لفهم و م العمليات الذهنية الداخلية لتسهيل اب) نظرية المعرفية التي تنظ لكتشاف عبر التجربة و ج) نظرية البنائية التي تشجع الطالب على بناء المعرفة ذاتيا لجتماعي التي تؤكد التعلم عبر المالحظة والتقليد ضمن بيئة تفاعلية نظرية التعلم د) نظرية البنائية هي األنسب ألنها تمكن الطالب من بناء المعرفة بنفسه"},{"letter":"B","text":"أ) نظرية السلوكية التي تركز على تعزيز السلوكيات المرغوبة عبر التكرار والتعزيز لستيعاب لفهم و م العمليات الذهنية الداخلية لتسهيل ا نظرية المعرفية التي تنظ لكتشاف عبر التجربة و ج) نظرية البنائية التي تشجع الطالب على بناء المعرفة ذاتيا لجتماعي التي تؤكد التعلم عبر المالحظة والتقليد ضمن بيئة تفاعلية نظرية التعلم د) نظرية البنائية هي األنسب ألنها تمكن الطالب من بناء المعرفة بنفسه"},{"letter":"C","text":"نظرية المعرفية التي تنظ لكتشاف عبر التجربة و نظرية البنائية التي تشجع الطالب على بناء المعرفة ذاتيا لجتماعي ال "},{"letter":"B","text":"امتحان جميع الطالب مرة أخرى بشكل فردي لضمان نزاهة التقييم، مع إبالغ اإلدارة بالواقعة ضمن تقرير شامل."},{"letter":"C","text":"التحقيق مع الطالب المتورطين وإبالغ اإلدارة مع اتخاذ إجراءات تصحيحية تراعي لمتحان."},{"letter":"D","text":"اهة العدالة والشفافية للحفاظ على نز إبالغ اإلدارة فورا مع اقتراح مراجعة نظام التقييم وإعادة تصميمه لتقليل فرص الغش ، مع إبالغ الطالب المعنيين بأهمية األمانة األكاديمية."}],"answer":"C","explanation":"الإجابة الصحيحة هي (ج) لأنها الأنسب للسياق المذكور في السؤال: التحقيق مع الطالب المتورطين وإبالغ اإلدارة مع اتخاذ إجراءات تصحيحية تراعي لمتحان.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":7,"question":"موظف في جهة حكومية الحظ أن بعض اإلجراءات اإلدارية المتبعة ال تتوافق السؤال7: بشكل تام مع قانون الخدمة المدنية الجديد، كيف يتصرف في هذه الحالة؟","options":[{"letter":"A","text":"يستشير زمالءه في العمل لجمع وجهات نظر م تعددة قبل اتخاذ أي إجراء، مع استمرار تطبيق اإلجراءات الحالية مؤقتا."},{"letter":"B","text":"يراجع نصوص القانون الجديد بدقة ليقارنها باإلجراءات المتبعة، ثم يقترح تعديال يعزز التوافق مع القانون ويعرضه على الجهات المختصة."},{"letter":"C","text":"حتى تصدر توج يهات واضحة من اإلدارة العليا يلتزم باإلجراءات اإلدارية المتبعة حاليا بشأن القانون الجديد."},{"letter":"D","text":"يجري بحثا في القانون الجديد مع تعديل اإلجراءات بشكل تدريجي بناءً على ما محدودا دون الرجوع للسلطات القانونية المتخصصة."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: يراجع نصوص القانون الجديد بدقة ليقارنها باإلجراءات المتبعة، ثم يقترح تعديال يعزز التوافق مع القانون ويعرضه على الجهات المختصة.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":8,"question":"في صف تعليمي يعاني م ن ضعف مشاركات الطالب، ما الاستراتيجية التدريسية األكثر فعالية لتعزيز اندماج الطالب وتحفيز تفاعلهم المستمر؟","options":[{"letter":"A","text":"تقييم درجات المشاركة كوسيلة لتحفيز الطالب على التفاعل الفوري داخل الصف."},{"letter":"B","text":"تصميم أنشطة تعليمية تعاونية ضمن مجموعات صغيرة تشجع المناقشة و "A","text":"تستقبل المراجعة بهدوء وتطلب من المدير توضيح النقاط المطروحة لتطوير أدائك."},{"letter":"B","text":"تعبر عن استعدادك لالستماع للنقد وتناقش مع المدير خطة مشتركة لتحسين مهاراتك ساليب عملك."},{"letter":"C","text":"وأ تطلب من المدير أمثلة محددة على المالحظات وتوضح وجهة نظرك مع األخذ بعين لعتبار مالحظاته."},{"letter":"D","text":"تشكر المدير على المراجعة وتراجع أسلوب عملك بناءً على تقييمك الذاتي مع طلب متابعة دورية لألداء."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تعبر عن استعدادك لالستماع للنقد وتناقش مع المدير خطة مشتركة لتحسين مهاراتك ساليب عملك.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":108,"question":"خالل إحدى الحصص الدراسية، يالحظ وجود طالب يعاني من ضعف في السؤال8: كيف تتصرف في هذه الحالة لتعزيز بيئة تعلمالتركيز ويشوش على زمالئه بشكل متكرر. فعّالة؟","options":[{"letter":"A","text":"تحاور الطالب بهدوء أمام الصف لتوضيح أهمية ديم الدعم والتوجيه المالئمين."},{"letter":"B","text":"تتحدث مع الطالب بشكل خاص لفهم أسبابه وتق تطلب من الطالب المشاركة في أنشطة صفية بسيطة مع مجموعات صغيرة للحد منج) التشويش."},{"letter":"C","text":"ب) تتحدث مع الطالب بشكل خاص لفهم أسبابه وتق تطلب من الطالب المشاركة في أنشطة صفية بسيطة مع مجموعات صغيرة للحد من التشويش."},{"letter":"D","text":"تناقش األمر مع أولياء األمور وتنسق معهم لتوفير دعم إضافي خارج المدرسة."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تتحدث مع الطالب بشكل خاص لفهم أسبابه وتق تطلب من الطالب المشاركة في أنشطة صفية بسيطة مع مجموعات صغيرة للحد منج) التشويش.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":109,"question":"عن فريق عمل، الحظت تراجعًا في األداء دون أسباب واضحة. السؤال9: كونك مسؤوال ما الخطوة األمثل لمعالجته بفعالية واحترافية؟","options":[{"letter":"A","text":"تنظيم لقاء لحصر مالحظات كل عضو حول التحديات التي تواجههم في تحقيق األداء المطلوب."},{"letter":"B","text":"عقد اجتماع تشاركي مع الفريق لتحليل األسباب الجذرية للتراجع واقتراح حلول مشتركة."},{"letter":"C","text":"تطبيق نظام تقييم دوري مكثف لمراقبة األداء وتحديد نقاط الضعف بدقة."},{"letter":"D","text":"مراجعة األهداف والمهام مع الفريق وتعديلها بشكل تدريجي لتتوافق مع واقع األداء الحالي."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: عقد اجتماع تشاركي مع الفريق لتحليل األسباب الجذرية للتراجع واقتراح حلول مشتركة.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":110,"question":"كمدرس، كيف يمكنك تطبيق مبادئ نظرية التعلم البنائية عند تدريس موضوع السؤال10: جديد لتحقيق أفضل تعلم لدى الطالب؟","options":[{"letter":"A","text":"تنظيم محاضرة تفاعلية تتيح للطالب طرح األسئلة ومناقشة األفكار ضمن إطار محدد."},{"letter":"B","text":"تشجيع الطالب على استكشاف المفاهيم بأنفسهم من خالل أنشطة تطبيقية ومشاريع"},{"letter":"C","text":"استخدام اختبارات قصيرة متكررة لتقييم فهم الطالب وتحفيزهم على المراجعة ة."},{"letter":"D","text":"المستمر تكرار عرض المفاهيم بمداخل وأساليب مختلفة لتعزيز التذكر والفهم العميق."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تشجيع الطالب على استكشاف المفاهيم بأنفسهم من خالل أنشطة تطبيقية ومشاريع. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":111,"question":"أثناء عملية تقييم نتائج الطالب، لوحظ تباين ملحوظ في الدرجات رغم تشابه السؤال11: فعلي. ما هو السبب األرجح لهذا التباين، وما هو اإلجراء األمثل لمعالجته؟","options":[{"letter":"A","text":"مستويات أدائهم ال احتمال وجود اختالفات دقيقة في تطبيق معايير التصحيح بين المقيمين، ويجب توحيد إرشادات التصحيح بشكل دقيق."},{"letter":"B","text":"تفاوت في معايير التقويم أو تصميم األسئلة، ويجب وضع معايير موحدة واضحة وشاملة لجميع الطالب."},{"letter":"C","text":"تغيرات طفيفة في بيئة الاختبار تؤثر على تركيز الطالب، ويجب ضمان ثبات ظروف لمتحان."},{"letter":"D","text":"اختالفات بسيطة في قدرات الطالب التي ال تبرر تعديل المعايير، ويستحسن إبقاء التقييم كما هو."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تفاوت في معايير التقويم أو تصميم األسئلة، ويجب وضع معايير موحدة واضحة وشاملة لجميع ال من ضعف على سيرالالتزام بالمواعيد مما يؤثر سلبا السؤال30: العمل. كيف تتصرف في هذه الحالة لتحقيق أفضل نتيجة؟","options":[{"letter":"A","text":"تناقش معه أسباب تأخيره بهدوء، وتوضح تأثير ذلك على الفريق، مع وض ع خطة الالتزام."},{"letter":"B","text":"مشتركة لتحسين تحذره رسمياالالتزام وإخبار اإلدارة في حال من التكرار، مع التأكيد على ضرورة استمرار المشكلة."},{"letter":"C","text":"تقلل من مهامه مؤقتا لتقليل تأثير التأخير، مع مراقبته بشكل دوري وتقديم التوجيه عند الحاجة."},{"letter":"D","text":"تتابع معه بشكل مستمر وتطلب منه ت وقيع تعهد ب الالتزام بالمواعيد دون الدخول في تفاصيل أسباب التأخير."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: تناقش معه أسباب تأخيره بهدوء، وتوضح تأثير ذلك على الفريق، مع وض ع خطة الالتزام.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":131,"question":"كيف يمكن للمعلم تقييم مهارات التفكير النقدي لدى الطالب بفعالية ضمن إطار السؤال31: تقييم الموضوعي؟","options":[{"letter":"A","text":"تعليمي يهدف إلى تنمية التحليل العميق وال استخدام أسئلة تستدعي استرجاع المعلومات مع توفير فرص للتفكير في األسباب والتداعيات."},{"letter":"B","text":"طرح أسئلة مفتوحة تشجع على التحليل والتفسير والتقييم المنطقي للحجج."},{"letter":"C","text":"تطبيق اختبارات زمنية تحفز على استرجاع المعلومات بسرعة موازية للتفكير."},{"letter":"D","text":"مراقبة الطالب من خالل مالحظة أداء السلوكيات المرتبطة بالتفكير النقدي في المواقف التعليمية."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: طرح أسئلة مفتوحة تشجع على التحليل والتفسير والتقييم المنطقي للحجج.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":132,"question":"أثناء اجتماع عمل الحظت وجود غموض في توزيع المهام مما يعرقل تحقيق السؤال32: ف، كيف تتصرف في هذه الحالة؟","options":[{"letter":"A","text":"الهد تطلب من المدير إعادة توزيع المهام بشكل واضح لضمان وضوح المسؤوليات."},{"letter":"B","text":"تقترح على الفريق عقد نقاش سريع لتوضيح المهام وتحديد المسؤوليات بشكل مشترك."},{"letter":"C","text":"تبادر بتوضيح مهامك الشخصية وتح  من الطالب.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":135,"question":"كيف السؤال35: موظف من قسم آخر يطلب منك تسريع تنفيذ مهمة ليست من اختصاصك. تتصرف؟","options":[{"letter":"A","text":"تدرس الطلب بعناية وتبلغ مديرك للحصول على توجيه، مع لحتفاظ بحق طلب توضيح األولويات قبل التنفيذ."},{"letter":"B","text":"تجنبا توافق على تنفيذ المهمة فورا ج) ترفض الطلب بصراحة لتفادي مخالفة اختصاصك وزيادة العبء الوظيفي."},{"letter":"C","text":"توافق على تنفيذ المهمة فورا ترفض الطلب بصراحة لتفادي مخالفة اختصاصك وزيادة العبء الوظيفي."},{"letter":"D","text":"تؤجل تنفيذ المهمة مؤقتا ألن تقييم الطلب مع إشراك اإلدارة يضمن اتخاذ قرار مدروس يحفظ"}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: تدرس الطلب بعناية وتبلغ مديرك للحصول على توجيه، مع لحتفاظ بحق طلب توضيح األولويات قبل التنفيذ.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":136,"question":"كيف يمكنك تقويم فعالية استخدام التقنية في التعليم داخل صفك لضمان تحسين السؤال36: مستمر وجودة التعلم؟","options":[{"letter":"A","text":"مالحظة تفاعل الطالب خالل الحصة فقط لتقييم فاعلية التقنية في الوقت الحقيقي."},{"letter":"B","text":"جمع بيانات متنوعة من الطالب ح ول تجربتهم، وتحليل نتائج تحصيلهم األكاديمي، مع مراجعة طبيعة استخدام التقنية."},{"letter":"C","text":"لعتماد على تقويم األداء الذاتي للمعلم وتحليل التغذية الراجعة من زمالء العمل حول استخدام التقنية."},{"letter":"D","text":"لنطباعات والتجار ب استبيان آراء الطالب والمعلمين عن التقنية مع التركيز على الشخصية."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: جمع بيانات متنوعة من الطالب ح ول تجربتهم، وتحليل نتائج تحصيلهم األكاديمي، مع مراجعة طبيعة استخدام التقنية.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":137,"question":"كيف تتابع األمر السؤال37: أحد الطالب يُظهر سلوكًا عدوانيًا تجاه زمالئه في المدرسة. بشكل يضمن تحسين سلوك الطالب وبيئة الصف بشكل مستدام؟","options":[{"letter":"A","text":"تعقد جلسة حوار فورية مع الطالب لتحديد أسباب السلوك وتُبلغه بعواقب مستمرة إن لسلوك العدواني."},{"letter":"B","text":"تكرر ا تتحدث معه بهدوء لفهم دوافع السلوك وتوجهه لتلقي دعم نفسي متخصص مع متابعة مستمرة."},{"letter":"C","text":"تشرك أولياء األمور في حوار شامل مع الطالب لتوحيد الجهود التربوية والنفسية إلصالح السلوك."},{"letter":"D","text":"تراقب السلوك عن قرب مع تثبيت اإلجراءات التأديبية بعد توثيق الح وادث، مع إدخال برامج توعية للصف."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تكرر ا تتحدث معه بهدوء لفهم دوافع السلوك وتوجهه لتلقي دعم نفسي متخصص مع متابعة مستمرة.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":138,"question":"في اجتماع لتحليل أداء الموظفين، ما هو أفضل األساليب لضمان تقي يم موضوعي وعادل؟","options":[{"letter":"A","text":"لعتبار كمعيار رئيسي للتقييم."},{"letter":"B","text":"أخذ انطباعات المدير المباشر بعين ج) جمع تقييمات من الزمالء والفرق المختلفة لتعزيز التوازن في التقييم."},{"letter":"C","text":"أخذ انطباعات المدير المباشر بعين جمع تقييمات من الزمالء والفرق المختلفة لتعزيز التوازن في التقييم."},{"letter":"D","text":"استخدام مالحظات األداء اليومية وا ألن وضع معايير أداء محددة وواضحة ومعتمدة من جميع األطراف"}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: لعتبار كمعيار رئيسي للتقييم.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":139,"question":"أثناء تنفيذ خطة استراتيجية، يثير فريق العمل اعتراضًا حول أولوية إحدى السؤال39: األهداف المحددة. كيف تتصرف في هذا الموقف لتحقيق أفضل نتائج تنفيذية وفريقية؟","options":[{"letter":"A","text":"تشرح مجددًا أسباب تحديد األولوية وتطالب الفريق بقبولها دون تعديل حفاظا على الجدول الزمني."},{"letter":"B","text":"تعقد جلسة نقاش تشاركية مع الفريق إلعادة تقييم األولويات بناءً على وجهات نظرهم وحقائق جديدة."},{"letter":"C","text":"تؤكد على األولوية المخططة وتطلب من الفريق الالتزام بها مع توضيح العواقب لمتثال."},{"letter":"D","text":"المحتملة لعدم ت ؤجل اتخاذ القرار النهائي حول األولوية لفترة قصيرة لتقييم ردود الفعل والمراجعة الذاتية للفريق."}],"answer":"B","explanation":  باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":201,"question":"،أثناء إدارة صفك، الحظت أن أحد الطالب يكرر مقاطعة الشرح بشكل متكرر السؤال1: كيف تتصرف في هذه الحالة لتحقيق بيئةى الزمالء ويعيق سير الدرس. مما يشوش عل تعليمية مثمرة؟","options":[{"letter":"A","text":"تستوقف الطالب بهدوء داخل الصف لتوضيح أثر سلوكه على اآلخرين وتدعوه بوضع خطة سلوكية مشتركة معه تهدئ الصف ثم تجري حوارا مع الطالب بشكل خاص لفهم دافع المقاطعة وتضع معه ب) اضحة للسلوك داخل الصف قواعد و توجه تحذيرا للطالب أمام الصف لتوضيح عدم قبول المقاطعة وتحثه على رسميا ج) الالتزام فورا تستدعي ولي أمر الطالب على وجه السرعة لتشاركهم القلق ولبحث الحلول المناسبةد) خارج الصف"},{"letter":"B","text":"خطة سلوكية مشتركة معه تهدئ الصف ثم تجري حوارا مع الطالب بشكل خاص لفهم دافع المقاطعة وتضع معه اضحة للسلوك داخل الصف قواعد و توجه تحذيرا للطالب أمام الصف لتوضيح عدم قبول المقاطعة وتحثه على رسميا ج) الالتزام فورا تستدعي ولي أمر الطالب على وجه السرعة لتشاركهم القلق ولبحث الحلول المناسبةد) خارج الصف"},{"letter":"C","text":"اضحة للسلوك داخل الصف قواعد و توجه تحذيرا للطالب أمام الصف لتوضيح عدم قبول المقاطعة وتحثه على رسميا الالتزام فورا تستدعي ولي أمر الطالب على وجه السرعة لتشاركهم القلق ولبحث الحلول المناسبةد) خارج الصف"},{"letter":"D","text":"الالتزام فورا تستدعي ولي أمر الطالب على وجه السرعة لتشاركهم القلق ولبحث الحلول المناسبة خارج الصف"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: خطة سلوكية مشتركة معه تهدئ الصف ثم تجري حوارا مع الطالب بشكل خاص لفهم دافع المقاطعة وتضع معه اضحة للسلوك داخل الصف قواعد و توجه تحذيرا للطالب أمام الصف لتوضيح عدم قبول المقاطعة وتحثه على رسميا ج) الالتزام فورا تستدعي ولي أمر الطالب على وجه السرعة لتشاركهم القلق ولبحث الحلول المناسبةد) خارج الصف. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":202,"question":"أثناء التخطيط في أهداف واضحالستراتيجي لمؤسستك التعليمية، الحظت تباينا السؤال2: األقسام المختلفة، كيف تتعامل مع هذا التحدي لضمان انسجام األهداف وفعالية التنفيذ؟","options":[{"letter":"A","text":"توحد األهداف عبر إصدار ا ج) تتحدث إلى الطالبة بعد انتهاء"},{"letter":"C","text":"إعالن الموقف أمام اآلخرين على أهمية النزاهة وتجنب أيلمتحان بهدوء وتستاذدها تتحدث إلى الطالبة بعد انتهاء"},{"letter":"D","text":"مخالفة مستقبال لمتحان التخاذ اإلجراءات النظامية دون مواجهتها بشكل مباشر تبلغ اإلدارة فورا بعد التحدث إلى الطالبة بعد لمتحان بهدوء وبطريقة ودية هو األسلوب"}],"answer":"C","explanation":"الإجابة الصحيحة هي (ج) لأنها الأنسب للسياق المذكور في السؤال: إعالن الموقف أمام اآلخرين على أهمية النزاهة وتجنب أيلمتحان بهدوء وتستاذدها تتحدث إلى الطالبة بعد انتهاء. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":207,"question":"في مواجهة حالة توتر تصاعدي في سلوك أحد الطالب داخل الفصل، مما يشكل السؤال7: لإلصابة، كيف تضمن سالمة الجميع بأفضل طريقة ممكنة؟","options":[{"letter":"A","text":"محتمالتهديدا تحافظ على هدوئك وتهدئ الطالب بهدوء مع وجود زمالئه وتطلب منه التحكم في حته من مكانه فورا تصرفاته دون إزا تهدئ الطالب ثم توجهه بلطف إلى المختصين داخل المدرسة، مع الحفاظ علىب) استمرارية الدرس بدون تأجيل تطلب من الطالب وتؤجل الدرس إلى وقت الحق بعد تأمين بيئة الفصللبتعاد مؤقتا ج) من أي احتمالية للخطر لنص ياع لطلبك فورا مع توجيه تنبيه صارم لباقي د) تتحدث مع الطالب بحزم وتطلب منه الطالب للحفاظ على النظام ألن التهدئة الهادئة داخل بيئة الفصل مع الطالب وطلب ضبط السلوك"},{"letter":"B","text":"حته من مكانه فورا تصرفاته دون إزا تهدئ الطالب ثم توجهه بلطف إلى المختصين داخل المدرسة، مع الحفاظ على استمرارية الدرس بدون تأجيل تطلب من الطالب وتؤجل الدرس إلى وقت الحق بعد تأمين بيئة الفصللبتعاد مؤقتا ج) من أي احتمالية للخطر لنص ياع لطلبك فورا مع توجيه تنبيه صارم لباقي د) تتحدث مع الطالب بحزم وتطلب منه الطالب للحفاظ على النظام ألن التهدئة الهادئة داخل بيئة الفصل مع الطالب وطلب ضبط السلوك"},{"letter":"C","text":"استمرارية الدرس بدون تأجيل تطلب من الطالب وتؤجل الدرس إلى وقت الحق بعد تأمين بيئة الفصللبتعاد مؤقتا من أي احتمالية للخطر لنص ياع لطلبك فورا مع توجيه تنبيه صارم لباقي د) تتحدث مع الطالب بحزم وتطلب منه الطالب للحفاظ على النظام ألن التهدئة الهادئة داخل بيئة الفصل مع الطالب وطلب ضبط السلوك"},{"letter":"D","text يرة إلعادة شحن تركيزد) الطالب"},{"letter":"C","text":"تدمج أنشطة قصيرة و متنوعة تحفز الطالب على المشاركة الفعالة وتجدد انتباهه خالل الدرس تقتصر على توجيه أسئلة متكررة للطالب بهدف إعادة تركيزه وتنشيط وعيه بالموضوع تُوصِ ل مالحظات إيجابية منتظمة وتوفر فترات استراحة قصيرة إلعادة شحن تركيزد) الطالب"},{"letter":"D","text":"تقتصر على توجيه أسئلة متكررة للطالب بهدف إعادة تركيزه وتنشيط وعيه بالموضوع تُوصِ ل مالحظات إيجابية منتظمة وتوفر فترات استراحة قصيرة إلعادة شحن تركيز الطالب"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تزيد من مدة شرحك وتعمق في التفاصيل لتغذية تركيز الطالب بالمعرفة بشكل مكثف تدمج أنشطة قصيرة و متنوعة تحفز الطالب على المشاركة الفعالة وتجدد انتباهه خالل الدرس ج) تقتصر على توجيه أسئلة متكررة للطالب بهدف إعادة تركيزه وتنشيط وعيه بالموضوع تُوصِ ل مالحظات إيجابية منتظمة وتوفر فترات استراحة قصيرة إلعادة شحن تركيزد) الطالب. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":210,"question":"أثناء اجتماع عمل تعليمي، يختلف زميل معك في الرأي بشأن طريقة تنفيذ خطةالسؤال 10: جديدة، كيف تتصرف؟","options":[{"letter":"A","text":"تشرح وجهة نظرك بوضوح وتطلب منه إعادة النظر في رأيه اعتمادا على مسؤولياتك الوظيفية إلى رأيه بعناية وتحاول الوصول إلى توافق يُعزز العمل الجماعي ويُسهم فيب) تستمع تحسين الخطة تقترح تجربة الجمع بين وجهتي النظر بشكل تجريبي قبل لعتماد النهائي على أي ج) منهما لتجاه األنسب لحسم الخالف تطلب من المدير حضور لجتماع إلبداء رأيه وتحديد د) لستماع بعناية والسعي للتوافق هو األسلوب األمثل لتعزيز التعاون"},{"letter":"B","text":"الوظيفية إلى رأيه بعناية وتحاول الوصول إلى توافق يُعزز العمل الجماعي ويُسهم في تستمع تحسين الخطة تقترح تجربة الجمع بين وجهتي النظر بشكل تجريبي قبل لعتماد النهائي على أي ج) منهما لتجاه األنسب لحسم الخالف تطلب من المدير حضور لجتماع إلبداء رأيه وتحديد د) لستماع بعناية والسعي للتوافق هو األسلوب األمثل لتعزيز التعاون"},{"letter":"C","text":"تستمع تحسين الخطة تقترح تجربة الجمع بين وجهتي النظر بشكل تجريبي قبل لعتماد النهائي على أي منهما لتجاه األنسب لحسم الخالف تطلب من المدير حضور لجتماع إلبداء رأيه وتحديد د) لستماع بعناية والسعي للتوافق هو األسلوب األمثل لتعزيز التعاون"},{"letter":"D","text":"منهما لتجاه األنسب لحسم الخالف تطلب من المدير حضور لجتماع إلبداء رأيه وتحديد لستماع بعناية والسعي للتوافق هو األسلوب األمثل لتعزيز التعاون"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: الوظيفية إلى رأيه بعناية وتحاول الوصول إلى توافق يُعزز العمل الجماعي ويُسهم في تستمع تحسين الخطة تقترح تجربة الجمع بين وجهتي النظر بشكل تجريبي قبل لعتماد النهائي على أي ج) منهما لتجاه األنسب لحسم الخالف تطلب من المدير حضور لجتماع إلبداء رأيه وتحديد د) لستماع بعناية والسعي للتوافق هو األسلوب األمثل لتعزيز التعاون. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":211,"question":"أثناء وضع خطة دراسية لفصل قادم تواجه تفاوت مستويات الطالب، كيف السؤال11: يمكنك توظيف التقويم التكويني بأفضل صورة؟","options":[{"letter":"A","text":"إجراء تقييمات موحدة دورية للطالب بعد كل وحدة تعليمية لتحديد مستوى التحصيل سية بناءً عليها."},{"letter":"B","text":"وضبط الخطة الدرا استخدام مجموعة متنوعة من أدوات التقويم التكويني بصورة مستمرة لتحليل تقدم كل طالب وضبط الخطة الدراسية بشكل ديناميكي يلبي التفاوت في األداء."},{"letter":"C","text":"لعتماد بشكل أساسي على نتائج التقويم النهائي مع مراجعة الخطة الدراسية في المرات ًالقادمة بناء على هذه النتائج."},{"letter":"D","text":"تطبيق خطة دراسية موحدة مع إجراء تقييم تقويمي دوري لتحديد مدى توافق األداء لت الحاجة الماسة."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: وضبط الخطة الدرا استخدام مجموعة متنوعة من أدوات التقويم التكويني بصورة مستمرة لتحليل تقدم كل طالب وضبط الخطة الدراسية بشكل ديناميكي يلبي التفاوت في األداء.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":212,"question":"تلقيت شكوى من زميل في العمل بشأن أسلوب تعاملك، كيف تتصرف حيال السؤال12: ذلك؟","options":[{"letter":"A","text":"تراجع موقفك وتوضح لزميلك سبب تصرفك بأسلوب هادئ، مع الحفاظ على موقفك المهني تلتقي بالزميل لتبادل وجهات النظر بهدوء، مع الالتزام بتحليل سلوكك بموضوعية ب) مشترك لتحقيق توافق ج) تشرح لإلدارة موقفك وتطلب تدخلها لتقييم األمر واتخاذ القرار المناسب تعتذر للزميل عن إذا تسبب سلوكك في أي إزعاج، مع محاولة تعديل أسلوبك فيد) المستقبل دون مناقشة التفاصيل حاليا ألن مراجعة السلوك بشكل موضوعي والتواصل المباشر الهادئ مع"},{"letter":"B","text":"المهني تلتقي بالزميل لتبادل وجهات النظر بهدوء، مع الالتزام بتحليل سلوكك بموضوعية مشترك لتحقيق توافق ج) تشرح لإلدارة موقفك وتطلب تدخلها لتقييم األمر واتخاذ القرار المناسب تعتذر للزميل عن إذا تسبب سلوكك في أي إزعاج، مع محاولة تعديل أسلوبك فيد) المستقبل دون مناقشة التفاصيل حاليا ألن مراجعة السلوك بشكل موضوعي والتواصل المباشر الهادئ مع"},{"letter":"C","text":"مشترك لتحقيق توافق تشرح لإلدارة موقفك وتطلب تدخلها لتقييم األمر واتخاذ القرار المناسب تعتذر للزميل عن إذا تسبب سلوكك في أي إزعاج، مع محاولة تعديل أسلوبك فيد) المستقبل دون مناقشة التفاصيل حاليا ألن مراجعة السلوك بشكل موضوعي والتواصل المباشر الهادئ مع"},{"letter":"D","text":"تشرح لإلدارة موقفك وتطلب تدخلها لتقييم األمر واتخاذ القرار المناسب تعتذر للزميل عن إذا تسبب سلوكك في أي إزعاج، مع محاولة تعديل أسلوبك في المستقبل دون مناقشة التفاصيل حاليا ألن مراجعة السلوك بشكل موضوعي والتواصل المباشر الهادئ مع"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: المهني تلتقي بالزميل لتبادل وجهات النظر بهدوء، مع الالتزام بتحليل سلوكك بموضوعية مشترك لتحقيق توافق ج) تشرح لإلدارة موقفك وتطلب تدخلها لتقييم األمر واتخاذ القرار المناسب تعتذر للزميل عن إذا تسبب سلوكك في أي إزعاج، مع محاولة تعديل أسلوبك فيد) المستقبل دون مناقشة التفاصيل حاليا ألن مراجعة السلوك بشكل موضوعي والتواصل المباشر الهادئ مع. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":213,"question":"عند تخطيطك لتطوير مهاراتك المهنية التعليمية بناءً على نظرية التعلم، ما هي السؤال13: أهم خطوة تعزز فعالية اكتساب هذه المهارات؟","options":[{"letter":"A","text":"الالتزام بتجربة استراتي جيات مختلفة دون وضع أهداف عامة لتعلم مهارات جديدة مع تقييم نقاط ضعفك بشكل مفصل تحديد أهداف تعليمية واضحة وواقعية مستندة إلى تحليل دقيق لنقاط ضعفك مع اختيارب) استراتيجيات تعليمية مستحدثة تتناسب معها لت التطوير والتركيز على استراتيجياتلعتماد على تقييم ذاتي بسيط لتحديد مج ج) التعلم المقبولة في مجال عملك فقط أثناء العمل مع تعديل أهداف تطوير المهاراتلستفادة من فرص التعلم المتاحة عفويا د) حسب الحاجة ألن تحديد أهداف تعليمية واضحة وواقعية مع تحليل دقيق لنقاط"},{"letter":"B","text":"وضع أهداف عامة لتعلم مهارات جديدة مع تقييم نقاط ضعفك بشكل مفصل تحديد أهداف تعليمية واضحة وواقعية مستندة إلى تحليل دقيق لنقاط ضعفك مع اختيار استراتيجيات تعليمية مستحدثة تتناسب معها لت التطوير والتركيز على استراتيجياتلعتماد على تقييم ذاتي بسيط لتحديد مج ج) التعلم المقبولة في مجال عملك فقط أثناء العمل مع تعديل أهداف تطوير المهاراتلستفادة من فرص التعلم المتاحة عفويا د) حسب الحاجة ألن تحديد أهداف تعليمية واضحة وواقعية مع تحليل دقيق لنقاط"},{"letter":"C","text":"استراتيجيات تعليمية مستحدثة تتناسب معها لت التطوير والتركيز على استراتيجياتلعتماد على تقييم ذاتي بسيط لتحديد مج التعلم المقبولة في مجال عملك فقط أثناء العمل مع تعديل أهداف تطوير المهاراتلستفادة من فرص التعلم المتاحة عفويا د) حسب الحاجة ألن تحديد أهداف تعليمية واضحة وواقعية مع تحليل دقيق لنقاط"},{"letter":"D","text":"التعلم المقبولة في مجال عملك فقط أثناء العمل مع تعديل أهداف تطوير المهاراتلستفادة من فرص التعلم المتاحة عفويا حسب الحاجة ألن تحديد أهداف تعليمية واضحة وواقعية مع تحليل دقيق لنقاط"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: وضع أهداف عامة لتعلم مهارات جديدة مع تقييم نقاط ضعفك بشكل مفصل تحديد أهداف تعليمية واضحة وواقعية مستندة إلى تحليل دقيق لنقاط ضعفك مع اختيار استراتيجيات تعليمية مستحدثة تتناسب معها لت التطوير والتركيز على استراتيجياتلعتماد على تقييم ذاتي بسيط لتحديد مج ج) التعلم المقبولة في مجال عملك فقط أثناء العمل مع تعديل أهداف تطوير المهاراتلستفادة من فرص التعلم المتاحة عفويا د) حسب الحاجة ألن تحديد أهداف تعليمية واضحة وواقعية مع تحليل دقيق لنقاط. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":214,"question":"غير مهني يؤثر سلباأثناء مراقبتك لطريقة تدريس أحد زمالئك، تالحظ أسلوبا السؤال14: كيف تتصرف حيال ذلك؟","options":[{"letter":"A","text":"حلوال تناقش الزميل بكل احترام خارج الفصل، مقترحا تقدم مالحظات بناءة للزميل بحس مهني ودعوة للمراجعة المشتركة والتطويرب) المتواصل."},{"letter":"B","text":"تناقش الزميل بكل احترام خارج الفصل، مقترحا تقدم مالحظات بناءة للزميل بحس مهني ودعوة للمراجعة المشتركة والتطوير المتواصل."},{"letter":"C","text":"ترفع األمر إلدارة المدرسة بعد توثيق المالحظة، لتتخذ اإلجراءات المناسبة."},{"letter":"D","text":"كر الزميل بأسلوب مهذب أمام الطالب بضرورة تذ"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تناقش الزميل بكل احترام خارج الفصل، مقترحا تقدم مالحظات بناءة للزميل بحس مهني ودعوة للمراجعة المشتركة والتطوير المتواصل.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":215,"question":"كيف يمكن إلدارة الصف الجيدة أن تقلل من المشاكل السلوكية بين الطالب السؤال15: بشكل فعّال ومستدام؟","options":[{"letter":"A","text":"الالتزام الكامل تطبيق القوانين بصرامة دون تقديم تفسيرات لضمان ب) وضع قواعد واضحة مشتركة مع الطالب، وتوظيف استراتيجيات وقائية تشمل تشجي ع المشاركة والمسؤولية الذاتية لنضباط ج) استخدام العقوبات الفورية بشكل متوازن مع التنبيه والتوعية لتعزيز منح الطالب حريّة التعبير ضمن حدود مرنة تسمح لهم بالتجريب والتعلم من أخطائهم د) ألن وضع قواعد واضحة بمشاركة الطالب يسهم في بناء بيئة صفية"},{"letter":"B","text":"تطبيق القوانين بصرامة دون تقديم تفسيرات لضمان وضع قواعد واضحة مشتركة مع الطالب، وتوظيف استراتيجيات وقائية تشمل تشجي ع المشاركة والمسؤولية الذاتية لنضباط ج) استخدام العقوبات الفورية بشكل متوازن مع التنبيه والتوعية لتعزيز منح الطالب حريّة التعبير ضمن حدود مرنة تسمح لهم بالتجريب والتعلم من أخطائهم د) ألن وضع قواعد واضحة بمشاركة الطالب يسهم في بناء بيئة صفية"},{"letter":"C","text":"وضع قواعد واضحة مشتركة مع الطالب، وتوظيف استراتيجيات وقائية تشمل تشجي ع المشاركة والمسؤولية الذاتية لنضباط استخدام العقوبات الفورية بشكل متوازن مع التنبيه والتوعية لتعزيز منح الطالب حريّة التعبير ضمن حدود مرنة تسمح لهم بالتجريب والتعلم من أخطائهم د) ألن وضع قواعد واضحة بمشاركة الطالب يسهم في بناء بيئة صفية"},{"letter":"D","text":"استخدام العقوبات الفورية بشكل متوازن مع التنبيه والتوعية لتعزيز منح الطالب حريّة التعبير ضمن حدود مرنة تسمح لهم بالتجريب والتعلم من أخطائهم ألن وضع قواعد واضحة بمشاركة الطالب يسهم في بناء بيئة صفية"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تطبيق القوانين بصرامة دون تقديم تفسيرات لضمان وضع قواعد واضحة مشتركة مع الطالب، وتوظيف استراتيجيات وقائية تشمل تشجي ع المشاركة والمسؤولية الذاتية لنضباط ج) استخدام العقوبات الفورية بشكل متوازن مع التنبيه والتوعية لتعزيز منح الطالب حريّة التعبير ضمن حدود مرنة تسمح لهم بالتجريب والتعلم من أخطائهم د) ألن وضع قواعد واضحة بمشاركة الطالب يسهم في بناء بيئة صفية. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":216,"question":"حين تالحظ ضعف مشاركة طالبك في النشاط الجماعي، كيف تستخدم مهاراتالس ؤال16: اتخاذ القرار لتحسين هذا الوضع بأفضل شكل مهني؟","options":[{"letter":"A","text":"تستمر بتنفيذ النشاط ذاته مع توجيه تشجيع لفظي مستمر لتحفيز الطالب على المشاركة تدريجيا تحللها بدقة، ثم تعدل النشاط،تجمع بيانات من الطالب حول أسباب ضعف المشاركة ب) ليصبح أكثر مالءمة وفاعلية للجميع تفرض نظام حوافز ممنهجة يختار فيها الطالب المشاركة الفعالة مقابل مكافآت محددةج) لتعزيز الدافعية لتعزيز التركيز والمشاركة الفردية تستبدل النشاط الجماعي بتمرين منفرد أكثر تحكماد) ألن جمع البيانات وتحليلها يمنح فهما لألسباب الحقيقية معمقا"},{"letter":"B","text":"تدريجيا تحللها بدقة، ثم تعدل النشاط،تجمع بيانات من الطالب حول أسباب ضعف المشاركة ليصبح أكثر مالءمة وفاعلية للجميع تفرض نظام حوافز ممنهجة يختار فيها الطالب المشاركة الفعالة مقابل مكافآت محددةج) لتعزيز الدافعية لتعزيز التركيز والمشاركة الفردية تستبدل النشاط الجماعي بتمرين منفرد أكثر تحكماد) ألن جمع البيانات وتحليلها يمنح فهما لألسباب الحقيقية معمقا"},{"letter":"C","text":"ليصبح أكثر مالءمة وفاعلية للجميع تفرض نظام حوافز ممنهجة يختار فيها الطالب المشاركة الفعالة مقابل مكافآت محددة لتعزيز الدافعية لتعزيز التركيز والمشاركة الفردية تستبدل النشاط الجماعي بتمرين منفرد أكثر تحكماد) ألن جمع البيانات وتحليلها يمنح فهما لألسباب الحقيقية معمقا"},{"letter":"D","text":"لتعزيز الدافعية لتعزي . باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":228,"question":"كيف يمكن للتخطيط لستراتيجي أن يساهم في تطوير أداء المؤسسة التعليمية السؤال28: بشكل فعّال ومستدام؟","options":[{"letter":"A","text":"بوضع أهداف واضحة ورؤية شاملة تستند إلى تحليل دقيق للموقف الحالي وتوجيه الموارد نحو تحسين األداء المستمر بالتركيز على تحديد أهداف عامة معتمدة بشكل أساسي على المبادرات الفردية دونب) مراجعة دورية للخطط باتباع خطط مستقبلية تعتمد على معايير خارجية وتجارب مؤسسات أخرى مع تعديلج) طفيف حسب الحاجة األمد دون تأجيلد) بتنفيذ الخطط المعتمدة من اإلدارة مع التركيز على تحقيق نتائج قصيرة المهام اليومية ألن التخطيط لستراتيجي األمثل يقوم على تحليل شامل ووضع"},{"letter":"B","text":"الموارد نحو تحسين األداء المستمر بالتركيز على تحديد أهداف عامة معتمدة بشكل أساسي على المبادرات الفردية دون مراجعة دورية للخطط باتباع خطط مستقبلية تعتمد على معايير خارجية وتجارب مؤسسات أخرى مع تعديلج) طفيف حسب الحاجة األمد دون تأجيلد) بتنفيذ الخطط المعتمدة من اإلدارة مع التركيز على تحقيق نتائج قصيرة المهام اليومية ألن التخطيط لستراتيجي األمثل يقوم على تحليل شامل ووضع"},{"letter":"C","text":"مراجعة دورية للخطط باتباع خطط مستقبلية تعتمد على معايير خارجية وتجارب مؤسسات أخرى مع تعديل طفيف حسب الحاجة األمد دون تأجيلد) بتنفيذ الخطط المعتمدة من اإلدارة مع التركيز على تحقيق نتائج قصيرة المهام اليومية ألن التخطيط لستراتيجي األمثل يقوم على تحليل شامل ووضع"},{"letter":"D","text":"طفيف حسب الحاجة األمد دون تأجيل بتنفيذ الخطط المعتمدة من اإلدارة مع التركيز على تحقيق نتائج قصيرة المهام اليومية ألن التخطيط لستراتيجي األمثل يقوم على تحليل شامل ووضع"}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: بوضع أهداف واضحة ورؤية شاملة تستند إلى تحليل دقيق للموقف الحالي وتوجيه الموارد نحو تحسين األداء المستمر بالتركيز على تحديد أهداف عامة معتمدة بشكل أساسي على المبادرات الفردية دونب) مراجعة دورية للخطط باتباع خطط مستقبلية تعتمد على معايير خارجية وتجارب مؤسسات أخرى مع تعديلج) طفيف حسب الحاجة األمد دون تأجيلد) بتنفيذ الخطط المعتمدة من اإلدارة مع التركيز على تحقيق نتائج قصيرة المهام اليو d":232,"question":"أثناء مواجهة طالب يظهر ترددا في التحدث داخل الفصل، كيف يمكنك تحفيزه السؤال32: باستخدام أساليب إدارة الصف بشكل فعّال ومهني؟","options":[{"letter":"A","text":"عن ضغط الظهور أمام الزمالء للتحدث في جو هادئ بعيدا خاصا تخصص له وقتا باشرة أمام الجميع لتعزيز ثقته بنفسه عبر المواجهة المب) تشجعه على التعبير فورا تديره بطرق غير مباشرة بتشجيعه خالل أنشطة جماعية دون تركيز لنتباه عليه بشكل ج) خاص تطلب منه المشاركة بشكل منتظم وتذكره بأهمية مساهمته كمحفز لتغييره تدريجيا د) ألن توفير بيئة داعمة وخالية من الضغط تساعد الطالب على التعبير"},{"letter":"B","text":"تخصص له وقتا باشرة أمام الجميع لتعزيز ثقته بنفسه عبر المواجهة الم تشجعه على التعبير فورا تديره بطرق غير مباشرة بتشجيعه خالل أنشطة جماعية دون تركيز لنتباه عليه بشكل ج) خاص تطلب منه المشاركة بشكل منتظم وتذكره بأهمية مساهمته كمحفز لتغييره تدريجيا د) ألن توفير بيئة داعمة وخالية من الضغط تساعد الطالب على التعبير"},{"letter":"C","text":"تشجعه على التعبير فورا تديره بطرق غير مباشرة بتشجيعه خالل أنشطة جماعية دون تركيز لنتباه عليه بشكل خاص تطلب منه المشاركة بشكل منتظم وتذكره بأهمية مساهمته كمحفز لتغييره تدريجيا د) ألن توفير بيئة داعمة وخالية من الضغط تساعد الطالب على التعبير"},{"letter":"D","text":"خاص تطلب منه المشاركة بشكل منتظم وتذكره بأهمية مساهمته كمحفز لتغييره تدريجيا ألن توفير بيئة داعمة وخالية من الضغط تساعد الطالب على التعبير"}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: عن ضغط الظهور أمام الزمالء للتحدث في جو هادئ بعيدا خاصا تخصص له وقتا باشرة أمام الجميع لتعزيز ثقته بنفسه عبر المواجهة المب) تشجعه على التعبير فورا تديره بطرق غير مباشرة بتشجيعه خالل أنشطة جماعية دون تركيز لنتباه عليه بشكل ج) خاص تطلب منه المشاركة بشكل منتظم وتذكره بأهمية مساهمته كمحفز لتغييره تدريجيا د) ألن توفير بيئة داعمة وخالية من الضغط تساعد الطالب على التعبير. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":233,"question":"لجتماعي على سلوك الطالب داخل الصف؟","options":[{"letter":"A","text":"السؤال33: كيف يؤثر تطبيق نظرية التعلم يتعزز التعلم من خالل المالحظ ة وتقليد السلوكيات اإليجابية للمعلم والزمالء، مما يرسخ المفاهيم ويُنمّي مهارات التواصل الجماعي."},{"letter":"B","text":"يرتكز التعلم على استذكار المعلومات ومناقشتها ضمن مجموعات تنمية المهارات لجتماعية."},{"letter":"C","text":"الفردية و يُستخدم تعزيز السلوك اإليجابي عبر المكافآت والتركيز على العوا قب التعليمية لتوجيه سلوك الطالب."},{"letter":"D","text":"يُعتمد على خلق بيئة هادئة مع تفعيل التفاعل المنظم، لتطوير ألن نظرية التعلم لجتماعي تؤكد أهمية المالحظة وتقليد النماذج"}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: السؤال33: كيف يؤثر تطبيق نظرية التعلم يتعزز التعلم من خالل المالحظ ة وتقليد السلوكيات اإليجابية للمعلم والزمالء، مما يرسخ المفاهيم ويُنمّي مهارات التواصل الجماعي.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":234,"question":"في حالة وجود خالف قانوني حول حقوق العاملين في مؤسستك، ما هو الدور السؤال34: األمثل الذي يتعين عليك القيام به كموظف؟","options":[{"letter":"A","text":"لطالع الدقيق على حقوقك والمطالبة بها ضمن القنوات الرسمية التي تضمن معالجة الخالف بشكل نظامي بالتنسيق مع اإلدارة."},{"letter":"B","text":"لمتثال للقرارات الصادرة دون السعي لف هملعتماد على التوجيهات اإلدارية فقط و الحقوق القانونية."},{"letter":"C","text":"محاولة حل الخالف شخصيا وبشكل مباشر مع األطراف المعنية دون الرجوع إلى اإلدارة أو القنوات الرسمية."},{"letter":"D","text":"التزام الصمت و أو تدخل جهاتلمتناع عن أي تحرك لحين انتهاء المشكلة تلقائيا أخرى."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: لطالع الدقيق على حقوقك والمطالبة بها ضمن القنوات الرسمية التي تضمن معالجة الخالف بشكل نظامي بالتنسيق مع اإلدارة.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":235,"question":"عند مالحظة انخفاض مستوى مهارات التواصل بين أعضاء فريق العمل، ما السؤال35: هو اإلجراء األمثل الذي يعزز التعاون ويطور األداء الجماعي بشكل مستدام؟","options":[{"letter":"A","text":"لستماع النشط والتفاعل البناء تنظيم ورش تدريبية تركز على مهارات التواصل الفعّال و ب) عقد جلسات نقاش منتظمة لتبادل وجهات النظر وحل النقاط الخالفية بشكل مباشر ج) إرسال تقارير دورية مكتوبة تشمل مالحظات حول التواصل وتوجيهات لتحسين األداء لنض باط والتعامل معد) تطبيق نظام تقييم دوري يتضمن مالحظات فورية تعزز المشكالت سريعا ألن تنظيم ورش تدريبية موجهة يتيح تنمية مهارات التواصل بشكل"},{"letter":"B","text":"تنظيم ورش تدريبية تركز على مهارات التواصل الفعّال و عقد جلسات نقاش منتظمة لتبادل وجهات النظر وحل النقاط الخالفية بشكل مباشر ج) إرسال تقارير دورية مكتوبة تشمل مالحظات حول التواصل وتوجيهات لتحسين األداء لنض باط والتعامل معد) تطبيق نظام تقييم دوري يتضمن مالحظات فورية تعزز المشكالت سريعا ألن تنظيم ورش تدريبية موجهة يتيح تنمية مهارات التواصل بشكل"},{"letter":"C","text":"عقد جلسات نقاش منتظمة لتبادل وجهات النظر وحل النقاط الخالفية بشكل مباشر إرسال تقارير دورية مكتوبة تشمل مالحظات حول التواصل وتوجيهات لتحسين األداء لنض باط والتعامل معد) تطبيق نظام تقييم دوري يتضمن مالحظات فورية تعزز المشكالت سريعا ألن تنظيم ورش تدريبية موجهة يتيح تنمية مهارات التواصل بشكل"},{"letter":"D","text":"إرسال تقارير دورية مكتوبة تشمل مالحظات حول التواصل وتوجيهات لتحسين األداء لنض باط والتعامل مع تطبيق نظام تقييم دوري يتضمن مالحظات فورية تعزز المشكالت سريعا ألن تنظيم ورش تدريبية موجهة يتيح تنمية مهارات التواصل بشكل"}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: لستماع النشط والتفاعل البناء تنظيم ورش تدريبية تركز على مهارات التواصل الفعّال و ب) عقد جلسات نقاش منتظمة لتبادل وجهات النظر وحل النقاط الخالفية بشكل مباشر ج) إرسال تقارير دورية مكتوبة تشمل مالحظات حول التواصل وتوجيهات لتحسين األداء لنض باط والتعامل معد) تطبيق نظام تقييم دوري يتضمن مالحظات فورية تعزز المشكالت سريعا ألن تنظيم ورش تدريبية موجهة يتيح تنمية مهارات التواصل بشكل. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":236,"question":"أثناء متابعة تقدم خطة تطوير مهنية، ما هي الطريقة األكثر مهنية وفاعلية لتقييم السؤال36: مدى تحقيق األهداف المنشودة؟","options":[{"letter":"A","text":"لعتماد على تقارير األداء الدورية وتحليل نتائجها بشكل حكيم رصد مؤشرات األداء المتنوعة بشكل دوري ومقارنتها باألهداف المحددة مسبقا مع ب) مراجعة النتائج بالفرق المعنية استشارة آراء المديرين المباشرين بشكل مستمر مع األخذ في لعتبار التقييم الذاتي ج) للموظفين متابعة تقارير التقدم وتقويم األداء باستخدام مؤشر واحد رئيسي مع إجراء مقابالتد) توضيحية ألن رصد مؤشرات أداء متعددة بشكل دوري ومقارنتها باألهداف"},{"letter":"B","text":"رصد مؤشرات األداء المتنوعة بشكل دوري ومقارنتها باألهداف المحددة مسبقا مع مراجعة النتائج بالفرق المعنية استشارة آراء المديرين المباشرين بشكل مستمر مع األخذ في لعتبار التقييم الذاتي ج) للموظفين متابعة تقارير التقدم وتقويم األداء باستخدام مؤشر واحد رئيسي مع إجراء مقابالتد) توضيحية ألن رصد مؤشرات أداء متعددة بشكل دوري ومقارنتها باألهداف"},{"letter":"C","text":"مراجعة النتائج بالفرق المعنية استشارة آراء المديرين المباشرين بشكل مستمر مع األخذ في لعتبار التقييم الذاتي للموظفين متابعة تقارير التقدم وتقويم األداء باستخدام مؤشر واحد رئيسي مع إجراء مقابالتد) توضيحية ألن رصد مؤشرات أداء متعددة بشكل دوري ومقارنتها باألهداف"},{"letter":"D","text":"للموظفين متابعة تقارير التقدم وتقويم األداء باستخدام مؤشر واحد رئيسي مع إجراء مقابالت توضيحية ألن رصد مؤشرات أداء متعددة بشكل دوري ومقارنتها باألهداف"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: رصد مؤشرات األداء المتنوعة بشكل دوري ومقارنتها باألهداف المحددة مسبقا مع مراجعة النتائج بالفرق المعنية استشارة آراء المديرين المباشرين بشكل مستمر مع األخذ في لعتبار التقييم الذاتي ج) للموظفين متابعة تقارير التقدم وتقويم األداء باستخدام مؤشر واحد رئيسي مع إجراء مقابالتد) توضيحية ألن رصد مؤشرات أداء متعددة بشكل دوري ومقارنتها باألهداف. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":237,"question":"كيف تتصرف عند تلقي مالحظات نقدية من زميلك بأسلوب غير الئق للوهلة السؤال37: األولى؟","options":[{"letter":"A","text":"لنجرار للصراع تحاول تهدئة الوضع بالرد بهدوء مع توضيح موقفك بشكل محترم دون تستمع بتمعن وتطلب توضيح المالحظات بأسلوب مهني ثم تفكر في أفضل وسيلةب) للتجاوب البناء تعبر عن استيائك بطريقة معتدلة مع طلب إعادة صياغة المالحظات بأسلوب أكثرج) وضوحا تؤجل الرد على المالحظات لحين مراجعتها بهدوء ثم تحدد الطريقة األنسب للتواصلد) الحقا لستماع بتمعن وطلب توضيح المالحظات بأسلوب مهني يتيح فهم"},{"letter":"B","text":"تحاول تهدئة الوضع بالرد بهدوء مع توضيح موقفك بشكل محترم دون تستمع بتمعن وتطلب توضيح المالحظات بأسلوب مهني ثم تفكر في أفضل وسيلة للتجاوب البناء تعبر عن استيائك بطريقة معتدلة مع طلب إعادة صياغة المالحظات بأسلوب أكثرج) وضوحا تؤجل الرد على المالحظات لحين مراجعتها بهدوء ثم تحدد الطريقة األنسب للتواصلد) الحقا لستماع بتمعن وطلب توضيح المالحظات بأسلوب مهني يتيح فهم"},{"letter":"C","text":"للتجاوب البناء تعبر عن استيائك بطريقة معتدلة مع طلب إعادة صياغة المالحظات بأسلوب أكثر وضوحا تؤجل الرد على المالحظات لحين مراجعتها بهدوء ثم تحدد الطريقة األنسب للتواصلد) الحقا لستماع بتمعن وطلب توضيح المالحظات بأسلوب مهني يتيح فهم"},{"letter":"D","text":"وضوحا تؤجل الرد على المالحظات لحين مراجعتها بهدوء ثم تحدد الطريقة األنسب للتواصل الحقا لستماع بتمعن وطلب توضيح المالحظات بأسلوب مهني يتيح فهم"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تحاول تهدئة الوضع بالرد بهدوء مع توضيح موقفك بشكل محترم دون تستمع بتمعن وتطلب توضيح المالحظات بأسلوب مهني ثم تفكر في أفضل وسيلة للتجاوب البناء تعبر عن استيائك بطريقة معتدلة مع طلب إعادة صياغة المالحظات بأسلوب أكثرج) وضوحا تؤجل الرد على المالحظات لحين مراجعتها بهدوء ثم تحدد الطريقة األنسب للتواصلد) الحقا لستماع بتمعن وطلب توضيح المالحظات بأسلوب مهني يتيح فهم. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":238,"question":"عند تصميم اختبار لقياس مهارات التفكير العليا لدى الطالب، أي نوع من السؤال38: ؟","options":[{"letter":"A","text":"األسئلة يُعد األنسب لتحقيق هذا الهدف بدقة وفاعلية أسئلة اختيار من متعدد تركز على استرجاع المعلومات وتثبيت المعرفة النظرية أسئلة تطبيقية تعتمد على حل المشكالت وتحليل الح لت المعقدة لتقييم التفكير النقدي ب) والتقويم ج) أسئلة تعتمد على تفسير نصوص أو مواقف عامة تتطلب فهمًا عامًا وتوليد أفكار جديدة د) أس ئلة تطلب من الطالب استنتاج اإلجابات بناءً على أدلة غير كاملة تحفز التفكير لستنتاجي"},{"letter":"B","text":"أسئلة اختيار من متعدد تركز على استرجاع المعلومات وتثبيت المعرفة النظرية أسئلة تطبيقية تعتمد على حل المشكالت وتحليل الح لت المعقدة لتقييم التفكير النقدي والتقويم ج) أسئلة تعتمد على تفسير نصوص أو مواقف عامة تتطلب فهمًا عامًا وتوليد أفكار جديدة د) أس ئلة تطلب من الطالب استنتاج اإلجابات بناءً على أدلة غير كاملة تحفز التفكير لستنتاجي"},{"letter":"C","text":"والتقويم أسئلة تعتمد على تفسير نصوص أو مواقف عامة تتطلب فهمًا عامًا وتوليد أفكار جديدة د) أس ئلة تطلب من الطالب استنتاج اإلجابات بناءً على أدلة غير كاملة تحفز التفكير لستنتاجي"},{"letter":"D","text":"أسئلة تعتمد على تفسير نصوص أو مواقف عامة تتطلب فهمًا عامًا وتوليد أفكار جديدة أس ئلة تطلب من الطالب استنتاج اإلجابات بناءً على أدلة غير كاملة تحفز التفكير لستنتاجي"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: أسئلة اختيار من متعدد تركز على استرجاع المعلومات وتثبيت المعرفة النظرية أسئلة تطبيقية تعتمد على حل المشكالت وتحليل الح لت المعقدة لتقييم التفكير النقدي والتقويم ج) أسئلة تعتمد على تفسير نصوص أو مواقف عامة تتطلب فهمًا عامًا وتوليد أفكار جديدة د) أس ئلة تطلب من الطالب استنتاج اإلجابات بناءً على أدلة غير كاملة تحفز التفكير لستنتاجي. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":239,"question":"كيف يمكن للمعلم أن يدير الصف بفعالية في ظل وجود طالب ذوي اضطرابات السؤال39: سلوكية؟","options":[{"letter":"A","text":"وضع خطط تعليمية فردية بالتعاون مع مختصين وتطبيق استراتيجيات إدارة سلوكية تراعي الفروق الشخصية فرض قواعد سلوكية واضحة مع تطبيق نظام نقاط لتشجيع السلوك اإليجابي ومعاقبةب) السلوك غير المرغوب فيه بشكل متدرج اعتماد أساليب تهدئة الصف والتعامل الحازم مع السلوكيات الخاطئة بالتوازي مع تقديمج) لجتماعي للطالب الدعم النفسي و عزل الطالب ذوي السلوكيات الصعبة مؤقتًا خالل الحصة وتنظيم جلسات تعديل سلوكيد) بالتنسيق مع فريق الدعم المدرسي"},{"letter":"B","text":"تراعي الفروق الشخصية فرض قواعد سلوكية واضحة مع تطبيق نظام نقاط لتشجيع السلوك اإليجابي ومعاقبة السلوك غير المرغوب فيه بشكل متدرج اعتماد أساليب تهدئة الصف والتعامل الحازم مع السلوكيات الخاطئة بالتوازي مع تقديمج) لجتماعي للطالب الدعم النفسي و عزل الطالب ذوي السلوكيات الصعبة مؤقتًا خالل الحصة وتنظيم جلسات تعديل سلوكيد) بالتنسيق مع فريق الدعم المدرسي"},{"letter":"C","text":"السلوك غير المرغوب فيه بشكل متدرج اعتماد أساليب تهدئة الصف والتعامل الحازم مع السلوكيات الخاطئة بالتوازي مع تقديم لجتماعي للطالب الدعم النفسي و عزل الطالب ذوي السلوكيات الصعبة مؤقتًا خالل الحصة وتنظيم جلسات تعديل سلوكيد) بالتنسيق مع فريق الدعم المدرسي"},{"letter":"D","text":"لجتماعي للطالب الدعم النفسي و عزل الطالب ذوي السلوكيات الصعبة مؤقتًا خالل الحصة وتنظيم جلسات تعديل سلوكي بالتنسيق مع فريق الدعم المدرسي"}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: وضع خطط تعليمية فردية بالتعاون مع مختصين وتطبيق استراتيجيات إدارة سلوكية تراعي الفروق الشخصية فرض قواعد سلوكية واضحة مع تطبيق نظام نقاط لتشجيع السلوك اإليجابي ومعاقبةب) السلوك غير المرغوب فيه بشكل متدرج اعتماد أساليب تهدئة الصف والتعامل الحازم مع السلوكيات الخاطئة بالتوازي مع تقديمج) لجتماعي للطالب الدعم النفسي و عزل الطالب ذوي السلوكيات الصعبة مؤقتًا خالل الحصة وتنظيم جلسات تعديل سلوكيد) بالتنسيق مع فريق الدعم المدرسي. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":240,"question":"عند إعداد خطة عمل بعد تحليل نتائج تقييم داخلي، ما الخطوة األهم لضمان السؤال40: تحقيق األهداف بأعلى فعالية؟","options":[{"letter":"A","text":"صياغة أهداف عامة مع توزيع مبدئي لألدوار بدون تحديد مواعيد تنفيذ دقيقة، مع اعتماد بعة دورية مرنة متا ،تحديد أهداف واضحة ومحددة مع توزيع دقيق لألدوار، وضع جداول زمنية مفصلةب) وتأسيس آليات متابعة ورصد مستمرة وفعالة وضع أهداف واضحة مع جداول زمنية محددة، لكن السماح بمرونة كبيرة في توزيعج) األدوار واألساليب التنفيذية بناءً على تقدير الفريق تطوير خطة عمل شاملة تشمل أهداف ومواعيد تنفيذ محددة، مع تكليف فريق متخصصد) من اإلدارة العليا بالمتابعة دون تدخل مستمر من الفريق التنفيذي ،ألنها تجمع بين وضوح األهداف، التنظيم الدقيق لتوزيع األدوار"},{"letter":"B","text":"بعة دورية مرنة متا ،تحديد أهداف واضحة ومحددة مع توزيع دقيق لألدوار، وضع جداول زمنية مفصلة وتأسيس آليات متابعة ورصد مستمرة وفعالة وضع أهداف واضحة مع جداول زمنية محددة، لكن السماح بمرونة كبيرة في توزيعج) األدوار واألساليب التنفيذية بناءً على تقدير الفريق تطوير خطة عمل شاملة تشمل أهداف ومواعيد تنفيذ محددة، مع تكليف فريق متخصصد) من اإلدارة العليا بالمتابعة دون تدخل مستمر من الفريق التنفيذي ،ألنها تجمع بين وضوح األهداف، التنظيم الدقيق لتوزيع األدوار"},{"letter":"C","text":"وتأسيس آليات متابعة ورصد مستمرة وفعالة وضع أهداف واضحة مع جداول زمنية محددة، لكن السماح بمرونة كبيرة في توزيع األدوار واألساليب التنفيذية بناءً على تقدير الفريق تطوير خطة عمل شاملة تشمل أهداف ومواعيد تنفيذ محددة، مع تكليف فريق متخصصد) من اإلدارة العليا بالمتابعة دون تدخل مستمر من الفريق التنفيذي ،ألنها تجمع بين وضوح األهداف، التنظيم الدقيق لتوزيع األدوار"},{"letter":"D","text":"األدوار واألساليب التنفيذية بناءً على تقدير الفريق تطوير خطة عمل شاملة تشمل أهداف ومواعيد تنفيذ محددة، مع تكليف فريق متخصص من اإلدارة العليا بالمتابعة دون تدخل مستمر من الفريق التنفيذي ،ألنها تجمع بين وضوح األهداف، التنظيم الدقيق لتوزيع األدوار"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: بعة دورية مرنة متا ،تحديد أهداف واضحة ومحددة مع توزيع دقيق لألدوار، وضع جداول زمنية مفصلة وتأسيس آليات متابعة ورصد مستمرة وفعالة وضع أهداف واضحة مع جداول زمنية محددة، لكن السماح بمرونة كبيرة في توزيعج) األدوار واألساليب التنفيذية بناءً على تقدير الفريق تطوير خطة عمل شاملة تشمل أهداف ومواعيد تنفيذ محددة، مع تكليف فريق متخصصد) من اإلدارة العليا بالمتابعة دون تدخل مستمر من الفريق التنفيذي ،ألنها تجمع بين وضوح األهداف، التنظيم الدقيق لتوزيع األدوار. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":241,"question":"مر؟","options":[{"letter":"A","text":"الالتزام بقواعد الصف بشكل مست السؤال41: كيف تتعامل مع طالب يرفض تفتح حوارا بناءً معه لفهم دوافع سلوكه وتحفزه على المشاركة في تعديل السلوك بطريقة تشاركية توضح له عواقب عدم الالتزام وتفرض عقوبات مناسبة بعد محاولة الحوار معه لضمان ب) تنفيذ القواعد ج) تعتمد على مراقبته وإعطائه تنبيهات لفظية متكررة قبل اللجوء إلى إج راءات أكثر الالتزام صرامة، مع محاولة تشجيعه على تفرض عليه عقوبات صارمة ومباشرة لضمان لمتثال الفوري لقواعد الصف دون د) تأجيل فتح حوار بناء وتحفيز الطالب على المشاركة في تعديل سلوكه يُعد"},{"letter":"B","text":"تشاركية توضح له عواقب عدم الالتزام وتفرض عقوبات مناسبة بعد محاولة الحوار معه لضمان تنفيذ القواعد ج) تعتمد على مراقبته وإعطائه تنبيهات لفظية متكررة قبل اللجوء إلى إج راءات أكثر الالتزام صرامة، مع محاولة تشجيعه على تفرض عليه عقوبات صارمة ومباشرة لضمان لمتثال الفوري لقواعد الصف دون د) تأجيل فتح حوار بناء وتحفيز الطالب على المشاركة في تعديل سلوكه يُعد"},{"letter":"C","text":"تنفيذ القواعد تعتمد على مراقبته وإعطائه تنبيهات لفظية متكررة قبل اللجوء إلى إج راءات أكثر الالتزام صرامة، مع محاولة تشجيعه على تفرض عليه عقوبات صارمة ومباشرة لضمان لمتثال الفوري لقواعد الصف دون د) تأجيل فتح حوار بناء وتحفيز الطالب على المشاركة في تعديل سلوكه يُعد"},{"letter":"D","text":"تعتمد على مراقبته وإعطائه تنبيهات لفظية متكررة قبل اللجوء إلى إج راءات أكثر الالتزام صرامة، مع محاولة تشجيعه على تفرض عليه عقوبات صارمة ومباشرة لضمان لمتثال الفوري لقواعد الصف دون تأجيل فتح حوار بناء وتحفيز الطالب على المشاركة في تعديل سلوكه يُعد"}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: الالتزام بقواعد الصف بشكل مست السؤال41: كيف تتعامل مع طالب يرفض تفتح حوارا بناءً معه لفهم دوافع سلوكه وتحفزه على المشاركة في تعديل السلوك بطريقة تشاركية توضح له عواقب عدم الالتزام وتفرض عقوبات مناسبة بعد محاولة الحوار معه لضمان ب) تنفيذ القواعد ج) تعتمد على مراقبته وإعطائه تنبيهات لفظية متكررة قبل اللجوء إلى إج راءات أكثر الالتزام صرامة، مع محاولة تشجيعه على تفرض عليه عقوبات صارمة ومباشرة لضمان لمتثال الفوري لقواعد الصف دون د) تأجيل فتح حوار بناء وتحفيز الطالب على المشاركة في تعديل سلوكه يُعد. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":242,"question":"لتحقيق مصداقية في التق ويم أثناء إعداد الاختبارات، ما هو اإلجراء األمثل الذي يجب اتخاذه؟","options":[{"letter":"A","text":"صياغة أسئلة تعكس بشكل دقيق مستوى المادة واألهداف التعليمية مع مراجعة موضوعية ووضوح الصياغة."},{"letter":"B","text":"اختيار أسئلة تغطي مستويات صعوبة متنوعة لضمان تمييز أداء الطالب بشكل شامل."},{"letter":"C","text":"مراجعة األسئلة ل ارة المختصة مع طلب متابعة الموضوع بحساسية واحترافية دورية وتطرح القضية بشكل عام في اجتماعات الفريق لتوعيةج) توثق السلوك في تقارير الجميع تتحدث مع الزميل المتأثرين وتشجعهم على مواجهة األمر بأنفسهم وطلب المساعدة عندد) الحاجة هذا الخيار األمثل ألنه يوازن بين جمع األدلة الموضوعية والحفاظ. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":245,"question":"،أثناء تدريس وحدة تعليمية تتطلب تطبيقات عملية لتعزيز اكتساب المهارات السؤال45: كيف توظف نظرية التعلم الواقعي بشكل أمثل لتحقيق الفهم العميق لدى الطالب؟","options":[{"letter":"A","text":"تعتمد على شر ح مسبق شامل نظري يدعم لستعداد للتطبيق، مع إعطاء الطالب فرصة"},{"letter":"B","text":"تدمج أنشطة تعليمية تركز على تنفيذ تجارب فعلية ومحاكاة دقيقة ضمن سياق العمل لتعزيز اكتساب المهارات والفهم."},{"letter":"C","text":"توكل للطالب مهام تطبيقية منزلية تتيح لهم تجربة مفاهيم ال وحدة خارج إطار الصف مع مراقبة تقدمهم بشكل دوري."},{"letter":"D","text":"تركز على تقييم تحصيلي كتابي مفصل يعكس مدى فهم الطالب لمفاهيم الوحدة مع توجيه نقاشات تطبيقية الحقة."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تدمج أنشطة تعليمية تركز على تنفيذ تجارب فعلية ومحاكاة دقيقة ضمن سياق العمل لتعزيز اكتساب المهارات والفهم.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":246,"question":"للمعلم؟","options":[{"letter":"A","text":"كيف يُسهم التقويم الذاتي بشكل أمثل في تطوير األداء المهني السؤال46: متابعة المعلم ألدائه بشكل مستمر، تحديد نقاط القوة والضعف، ووضع خطط تطوير فردية مستندة إلى هذا التقييم استقبال المعلم لمالحظات اإلدارة والزمالء والمراجعة الذاتية بشكل دوري لتعزيزب) األداء المهني"},{"letter":"B","text":"فردية مستندة إلى هذا التقييم استقبال المعلم لمالحظات اإلدارة والزمالء والمراجعة الذاتية بشكل دوري لتعزيز األداء المهني"},{"letter":"C","text":"يز جودة التعليم وتحسين األداء لعتماد على تقييم الطالب ومالحظاتهم كمرآة لتعز التركيز على أداء المهام التدريسية اليومية مع مراجعة ملخصة لألداء في نهاية كل فترةد) تعليمية ألن المتابعة المستمرة والتقييم الذاتي الدقيق يمكنان المعلم من تحديد"},{"letter":"D","text":"التركيز على أداء المهام التدريسية اليومية مع مراجعة ملخصة لألداء في نهاية كل فترة تعليمية ألن المتابعة المستمرة والتقييم الذاتي الدقيق يمكنان المعلم من تحديد"}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: كيف يُسهم التقويم الذاتي بشكل أمثل في تطوير األداء المهني السؤال46: متابعة المعلم ألدائه بشكل مستمر، تحديد نقاط القوة والضعف، ووضع خطط تطوير فردية مستندة إلى هذا التقييم استقبال المعلم لمالحظات اإلدارة والزمالء والمراجعة الذاتية بشكل دوري لتعزيزب) األداء المهني. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":247,"question":"عند تصميم برنامج تدريبي، ما هو النهج األنسب لضمان توافق الم حتوى مع احتياجات المتدربين بشكل فعّال ومستدام؟","options":[{"letter":"A","text":"إجراء تحليل شامل لاالاحتياجات يتضمن جمع بيانات من المتدربين وتحليل المتطلبات المعلنة والضمنية قبل بناء البرنامج ًاستناد تصميم البرنامج إلى استبيانات المتدربين فقط، مع تحديث المحتوى دوريًا بناءب) لفعلية على ردودهم ا اعتماد محتوى تدريبي موحد تم اعتماده سابقا مع مراجعات دورية لضمان تماشيه مع ج) تغيرات بيئة العمل والمتدربين"},{"letter":"B","text":"المعلنة والضمنية قبل بناء البرنامج ًاستناد تصميم البرنامج إلى استبيانات المتدربين فقط، مع تحديث المحتوى دوريًا بناء لفعلية على ردودهم ا اعتماد محتوى تدريبي موحد تم اعتماده سابقا مع مراجعات دورية لضمان تماشيه مع ج) تغيرات بيئة العمل والمتدربين"},{"letter":"C","text":"لفعلية على ردودهم ا اعتماد محتوى تدريبي موحد تم اعتماده سابقا مع مراجعات دورية لضمان تماشيه مع تغيرات بيئة العمل والمتدربين"},{"letter":"D","text":"التنسيق مع خبراء التدريب إلعداد محتوى يلبي توقعات المتدربين وكذلك يتوافق مع لعتماد المباشر على تحليالت دقيقة للمتط لبات األهداف التنظيمية دون ألن التحليل الشامل لاالاحتياجات الذي يشمل جمع معلومات دقيقة من"}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: إجراء تحليل شامل لاالاحتياجات يتضمن جمع بيانات من المتدربين وتحليل المتطلبات المعلنة والضمنية قبل بناء البرنامج ًاستناد تصميم البرنامج إلى استبيانات المتدربين فقط، مع تحديث المحتوى دوريًا بناء ن لفهم أسباب الشجار والعمل على حله بطريقة تربوية."},{"letter":"B","text":"تطبيق عقوبة مناسبة لكال الطالبين لتأكيد عدم التسامح مع السلوك العدواني داخل الصف."},{"letter":"C","text":"إبالغ أولياء األمور في أس تخصيص وقت الحق بعد الدرس لمناقشة الموقف مع الطالب و لستماع إلى وجهات د) نظرهم بهدوء."},{"letter":"D","text":"إبالغ أولياء األمور في أس تخصيص وقت الحق بعد الدرس لمناقشة الموقف مع الطالب و لستماع إلى وجهات نظرهم بهدوء."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: مع الموقف بما ي تهدئة الطالب فورا والتحدث معهم منفردين لفهم أسباب الشجار والعمل على حله بطريقة تربوية.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":269,"question":"بداية الفصل الدراسي، ما هي النصيحة األهم السؤال19: عند تصميم تقويم تشخيصي في لضمان فعالية استخدامه في توجيه العملية التعليمية؟","options":[{"letter":"A","text":"تضمين مجموعة من األسئلة تغطي مستويات صعوبة متنوعة لتقييم الفروق الفردية بدقة."},{"letter":"B","text":"التأكد من شمولية لت المحتوى التعليمي األساسية ذات الصلةالاختبار لجميع مج باألهداف التعليمية."},{"letter":"C","text":"التركيز على تصميم أسئلة تعكس مهارات الطالب السابقة لتعزيز الثقة وتحسين الدافعية."},{"letter":"D","text":"الاختبار لتكوين صورةلعتماد على مالحظة سلوك الطالب في الصف إلى جانب شاملة عن مستواهم."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: التأكد من شمولية لت المحتوى التعليمي األساسية ذات الصلةالاختبار لجميع مج باألهداف التعليمية.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":270,"question":"في حالة وجود تداخل بين مهام مسؤوليتك ووظيفة زميل آخر، كيف تتصرفالسؤ ال20: لضمان سير العمل بشكل فعّال واحترافي؟","options":[{"letter":"A","text":"التفاوض مع الزميل لتقاسم المهام وتقسيمها بشكل متوازن تحقيقا واضحب) توضيح األدوار والمسؤوليات مع الزميل ومع اإلدارة للوصول إلى توزيع ومحدد للمهام."},{"letter":"B","text":"أ) التفاوض مع الزميل لتقاسم المهام وتقسيمها بشكل متوازن تحقيقا واضح توضيح األدوار والمسؤوليات مع الزميل ومع اإلدارة للوصول إلى توزيع ومحدد للمهام."},{  وعلمي لتحقيق أفضل فهم السؤال36: مل لمستوى أدائه؟","options":[{"letter":"A","text":"شا لعتماد على مالحظات المشرفين األكاديميين مدعومة بتحليل نتائج طالبه في الاختبارات."},{"letter":"B","text":"دمج مالحظات المشرفين، تقييمات الطالب، وتحليل نمو أداء الطالب عبر فترات زمنية متعددة."},{"letter":"C","text":"لعتماد على تقييمات الطالب بشكل أساسي مع مراجعة نتائج الطالب د) استخدام انطباعك المهني الشخصي مبنيًا على مالحظات مباشرة ومناقشات مع المعلم."},{"letter":"D","text":"استخدام انطباعك المهني الشخصي مبنيًا على مالحظات مباشرة ومناقشات مع المعلم."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: دمج مالحظات المشرفين، تقييمات الطالب، وتحليل نمو أداء الطالب عبر فترات زمنية متعددة.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":307,"question":"أثناء إعداد التخطيط السنوي، ما هو النهج األنسب في ت عاملك مع التغيرات ورؤية المستقبل لضمان فعالية التنفيذ وتحقيق األهداف؟","options":[{"letter":"A","text":"اعتماد خطة سنوية محددة بدقة، مع إعادة تقييم بسيطة عند الضرورة."},{"letter":"B","text":"وضع خطة سنوية مرنة تسمح بالتعديل المستمر وفقا للمتغيرات الطارئة والرؤية المستقبلية المتطورة."},{"letter":"C","text":"ًتصميم خطة تعكس أساس ا قويًا من المعطيات السابقة مع مراجعة دورية للرؤية المستقبلية بشكل محدود."},{"letter":"D","text":"التركيز على المعطيات والتوقعات الحالية في التخطيط السنوي مع إمكانية تحديث الخطة في نهاية الفترة."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: وضع خطة سنوية مرنة تسمح بالتعديل المستمر وفقا للمتغيرات الطارئة والرؤية المستقبلية المتطورة.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":308,"question":"إ ذا قام موظف بإفشاء معلومات سرية تخص العمل، كيف تكون لستجابة األمثل من اإلدارة؟","options":[{"letter":"A","text":"إجراء محادثة فورية مع الموظف لتوضيح خطأ الفعل وتحذيره شفهيا مع توثيق المالحظات."},{"letter":"B","text":"فتح تحقيق رسمي حسب اللوائح الداخلية، واتباع اإلجراءات التأديبية المحددة للحفاظ المعلومات ومصداقية اإلدارة."},{"letter":"C","text":"على سرية ت لى تقديم األفكار بحرية، مع وضع مع ايير تقييم واضحة تكافئ األفكار المبدعة والمبتكرة.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":311,"question":"أثناء تقويم أداء موظف ذو خبرة طويلة تواجه تقييمًا سلبيًا ألدائه، كيف يجب أن السؤال41: تتعامل مع الموقف لتحقيق أفضل نتائج تطويرية ومهنية؟","options":[{"letter":"A","text":"تشرح له نقاط القصور بشكل مباشر مع التأكيد على ضرورة التغيير، مع تقديم مقترحات لتحسين األداء."},{"letter":"B","text":"تناقشه بموضوعية مع التركيز على نقاط التحسين وتقديم دعم مستمر لتحفي زه على التطور."},{"letter":"C","text":"تعطيه تقييمًا سلبيًا موثقا مع إشعاره بأن اإلدارة ستتابع الوضع بشكل رسمي دون تدخلك المباشر."},{"letter":"D","text":"تبرر التقييم السلبي بالخبرة السابقة مع التأكيد على أهمية المحافظة على احترامه موقعه الوظيفي."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تناقشه بموضوعية مع التركيز على نقاط التحسين وتقديم دعم مستمر لتحفي زه على التطور.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":312,"question":"في حال الحظت أن أحد المعلمين يستخدم أسلوبا ال يتناسب مع نوعية تعليميا السؤال42: الطالب في صفه، كيف تتصرف؟","options":[{"letter":"A","text":"تناقش المعلم مباشرةً لتحليل األسلوب المستخدم وتقديم اقتراحات تطويرية تناسب الطالب."},{"letter":"B","text":"تستعين بخبراء تربويين لتقييم الوضع وتقديم إرشادات مهنية مخصصة تالئم احتياجات الطالب."},{"letter":"C","text":"تقترح جلسة تدريبية جماعية لجميع المعلمين تركز على تنويع األساليب التعليمية بما يتوافق مع صيغ الطالب المختلفة."},{"letter":"D","text":"تتابع أداء المعلم لفترة محددة قبل اتخاذ أي إجراء لضمان دقة التقييم وعدم التسرع."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تستعين بخبراء تربويين لتقييم الوضع وتقديم إرشادات مهنية مخصصة تالئم احتياجات الطالب.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":313,"question":"تواجه تأخيرً ا في تنفيذ خطة مدرسية ناجمة عن ضعف تنسيق الفرق العاملة. كيف تعالج المشكلة بأفضل طريقة مهنية لضمان استعادة وتطوير التنسيق؟","options":[{"le ter":"A","text":"لحتفاظ بحقك في مخاطبة الجهات المختصة الحقا بتعليمات اإلدارة مع تلتزم مؤقتا تناقش اإلدارة بهدوء مع التأكيد على أهمية احترام النص القانوني لتحقيق لنضباط ب) المؤسسي توافق على تجاوز الساعات عند الحاجة مع توثيق ذلك والبحث عن حلول مستدامة الحقا ج) الالتزام بالقانون مع محاولة تأمين دعم جماعي لمنع التجاوزات تشرح للزمالء أهمية د) الالتزام القان وني"},{"letter":"B","text":"تناقش اإلدارة بهدوء مع التأكيد على أهمية احترام النص القانوني لتحقيق لنضباط المؤسسي توافق على تجاوز الساعات عند الحاجة مع توثيق ذلك والبحث عن حلول مستدامة الحقا ج) الالتزام بالقانون مع محاولة تأمين دعم جماعي لمنع التجاوزات تشرح للزمالء أهمية د) الالتزام القان وني"},{"letter":"C","text":"المؤسسي توافق على تجاوز الساعات عند الحاجة مع توثيق ذلك والبحث عن حلول مستدامة الحقا الالتزام بالقانون مع محاولة تأمين دعم جماعي لمنع التجاوزات تشرح للزمالء أهمية د) الالتزام القان وني"},{"letter":"D","text":"الالتزام بالقانون مع محاولة تأمين دعم جماعي لمنع التجاوزات تشرح للزمالء أهمية الالتزام القان وني"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تناقش اإلدارة بهدوء مع التأكيد على أهمية احترام النص القانوني لتحقيق لنضباط المؤسسي توافق على تجاوز الساعات عند الحاجة مع توثيق ذلك والبحث عن حلول مستدامة الحقا ج) الالتزام بالقانون مع محاولة تأمين دعم جماعي لمنع التجاوزات تشرح للزمالء أهمية د) الالتزام القان وني. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":341,"question":"أثناء التخطيط لدرس تعليمي ترغب في تعزيز تعلم التعاون بين الطالب وتحفيز السؤال21: مهارات العمل الجماعي بفعالية. أي طريقة تعتبر األنسب لتحقيق هذا الهدف؟","options":[{"letter":"A","text":"تقسيم الطالب إلى مجموعات صغيرة للعمل على مشروع مشترك مع تحديد أدوار ومسؤوليات واضحة لكل عضو في المجموعة بشكل فردي ثم يجتمعون لمشار كة نتائجهم ومناقشتها لتعزيزب) جعل الطالب يعملون أوال الفهم المشترك تكليف الطالب بمهام جماعية دون تحديد دقيق لألدوار، مع التشجيع على تبادل األفكارج) بشكل حر تنظيم األنشطة بحيث يعمل الطالب مع زمالئهم بصورة زوجية لتبادل المهام وتقاسمد) المسؤوليات بشكل مباشر اختيار تقسيم ال اإلجراءات التأديبية الرسمية بعد لستماع للطالب يوازن بين"},{"letter":"B","text":"تحادث الطالب بهدوء عقب انتهاء فوري تطبّق اإلجراءات التأديبية الرسمية بعد لستناد إلىلستماع إلى موقف الطالب و اللوائح المعمول بها توجه له إنذارالمتحان مع تسجيل المالحظة كتحذير أولي قبل اتخاذ أي خالل لفظيا ج) إجراء رسمي تناقش مع الطالب األسباب التي دفعته للغش وتعمل على تقديم دعم تربوي وتصحيحي لهد) قبل صدور أي عقوبة اتخاذ اإلجراءات التأديبية الرسمية بعد لستماع للطالب يوازن بين"},{"letter":"C","text":"اللوائح المعمول بها توجه له إنذارالمتحان مع تسجيل المالحظة كتحذير أولي قبل اتخاذ أي خالل لفظيا إجراء رسمي تناقش مع الطالب األسباب التي دفعته للغش وتعمل على تقديم دعم تربوي وتصحيحي لهد) قبل صدور أي عقوبة اتخاذ اإلجراءات التأديبية الرسمية بعد لستماع للطالب يوازن بين"},{"letter":"D","text":"إجراء رسمي تناقش مع الطالب األسباب التي دفعته للغش وتعمل على تقديم دعم تربوي وتصحيحي له قبل صدور أي عقوبة اتخاذ اإلجراءات التأديبية الرسمية بعد لستماع للطالب يوازن بين"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تحادث الطالب بهدوء عقب انتهاء فوري تطبّق اإلجراءات التأديبية الرسمية بعد لستناد إلىلستماع إلى موقف الطالب و اللوائح المعمول بها توجه له إنذارالمتحان مع تسجيل المالحظة كتحذير أولي قبل اتخاذ أي خالل لفظيا ج) إجراء رسمي تناقش مع الطالب األسباب التي دفعته للغش وتعمل على تقديم دعم تربوي وتصحيحي لهد) قبل صدور أي عقوبة اتخاذ اإلجراءات التأديبية الرسمية بعد لستماع للطالب يوازن بين. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":343,"question":"عند مواجهة نقص في الميزانية المخصصة ألنشطة التدريب، ما هو اإلجراء السؤال23: لستفادة القصوى من الموارد المتاحة؟","options":[{"letter":"A","text":"األمثل لتحقيق تقليص حجم األنشطة التدريبية مع الحفاظ على الجدول الزمني األصلي دون استبعاد أي نشاط إعادة جدولة األنشطة مع التركيز على ذات األولوية واختيار طرق تدريب أكثر كفاءةب) وتوفيرا الاحتياجات وأثر التدريب المتوقع ج) طلب تمويل إضافي مع تقديم خطة مفصلة تبين تنفيذ األنشطة التدريبية كما هو مقرر مع تعديل محتوى أو مدة بعض الجلسات لتقليلد) التكاليف"},{"letter":"B","text"
