ة"}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: تضع معايير محددة وواضحة للجوائز وتمنحها بناءً عليها بعد توضيحها للطالب ب) تمنح الجوائز بناءً على تقييمها الشخصي ألداء الطالب دون إعالن معايير مسبقة ج) توزع الجوائز بالتساوي بين الطالب لتجنب الشعور بعدم العدالة أو الظلم لتلك المعايير المجمعة تطلب من الطالب اقتراح معاييرهم للجوائز ثم تختار الفائزين وفقاد) وضع معايير واضحة ومعلنة للجوائز قبل التقييم يضمن العدالة. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":347,"question":"كيف السؤال27: الحظت أن أحد الزمالء يستخدم لغة غير مهنية في تواصله مع الطالب. تتصرف؟","options":[{"letter":"A","text":"تتحدث معه بشكل مباشر وباحترام لتوضيح أثر استخدام تلك اللغة على الطالب وبيئة التعلم ترفع األمر إلى اإلدارة بعد محاولة التحدث معه لضمان اتخاذ إجراء رسمي إذا استمرب) السلوك تناقش الموضوع مع الطالب بهدوء لتخفيف آثار اللغة وتحفيزهم على التركيز علىج) المحتوى يل لتقييم الحاجة للتدخل الحقا مع مراقبة سلوك الزم د) تتجاهل األمر مؤقتا الحوار المباشر والودي مع الزميل هو األكثر مهنية وفعالية لتحفيز"},{"letter":"B","text":"التعلم ترفع األمر إلى اإلدارة بعد محاولة التحدث معه لضمان اتخاذ إجراء رسمي إذا استمر السلوك تناقش الموضوع مع الطالب بهدوء لتخفيف آثار اللغة وتحفيزهم على التركيز علىج) المحتوى يل لتقييم الحاجة للتدخل الحقا مع مراقبة سلوك الزم د) تتجاهل األمر مؤقتا الحوار المباشر والودي مع الزميل هو األكثر مهنية وفعالية لتحفيز"},{"letter":"C","text":"السلوك تناقش الموضوع مع الطالب بهدوء لتخفيف آثار اللغة وتحفيزهم على التركيز على المحتوى يل لتقييم الحاجة للتدخل الحقا مع مراقبة سلوك الزم د) تتجاهل األمر مؤقتا الحوار المباشر والودي مع الزميل هو األكثر مهنية وفعالية لتحفيز"},{"letter":"D","text":"المحتوى يل لتقييم الحاجة للتدخل الحقا مع مراقبة سلوك الزم تتجاهل األمر مؤقتا الحوار المباشر والودي مع الزميل هو األكثر مهنية وفعالية لتحفيز"}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: تتحدث معه بشكل مباشر وباحترام لتوضيح أثر استخدام تلك اللغة على الطالب وبيئة التعلم ترفع األمر إلى اإلدارة بعد محاولة التحدث معه لضمان اتخاذ إجراء رسمي إذا استمرب) السلوك تناقش الموضوع مع الطالب بهدوء لتخفيف آثار اللغة وتحفيزهم على التركيز علىج) المحتوى يل لتقييم الحاجة للتدخل الحقا مع مراقبة سلوك الزم د) تتجاهل األمر مؤقتا الحوار المباشر والودي مع الزميل هو األكثر مهنية وفعالية لتحفيز. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":348,"question":"في حال نشوب خالف حول توزيع المهام بين أعضاء الفريق، كيف تُدير هذا السؤال28: النزاع لتحقيق أفضل نتيجة؟","options":[{"letter":"A","text":"مع الفريق لمناقشة وجهات النظر المختلفة والوصول إلى قرار تعقد اجتماعا مفتوحا مشترك يُرضي الجميع ويُعزز التعاون."},{"letter":"B","text":"توزع المهام بناءً على تقييمك الشخصي للمهارات والخبرات مع شرح مبررات التوزيع ألعضاء الفريق لضمان قبولهم."},{"letter":"C","text":"تشجع كل عضو على اختيار المهام التي يفضلها بنفسه، مع مراقبة دورية لضمان في األعباء والمسؤوليات."},{"letter":"D","text":"التوازن تعين مسؤوال لتولي تنظيم وتوزيع المهام حسب األولويات واألهداف دون تدخل محددا متعدد األطراف."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: مع الفريق لمناقشة وجهات النظر المختلفة والوصول إلى قرار تعقد اجتماعا مفتوحا مشترك يُرضي الجميع ويُعزز التعاون.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":349,"question":"أثناء تقويم مشروع تعليمي، الحظت أن بعض األهداف المحددة غير قابلة السؤال29: كيف تتصرف في هذه الحالة لضمان تقييمللتحقق بواقعية ضمن الموارد والوقت المتاح. وتحسين المشروع بشكل مهني؟","options":[{"letter":"A","text":"لتساق في التقييم تواصل العمل بالمعايير واألهداف األصلية دون تعديل لتفادي فقدان ب) تعدل صياغة األهداف لتتوافق مع اإلمكانيات المتاح ة مع الحفاظ على قابلية القياس والوضوح تركز التقييم على النتائج المحققة فعال مع إهمال األهداف غير القابلة للتحقق لتجنب ج) التحريف في التقرير إلعادة التخطيط الشامل بسبب عدم واقعية األهداف المبدئية تقترح إيقاف المشروع مؤقتاد)"},{"letter":"B","text":"تواصل العمل بالمعايير واألهداف األصلية دون تعديل لتفادي فقدان تعدل صياغة األهداف لتتوافق مع اإلمكانيات المتاح ة مع الحفاظ على قابلية القياس والوضوح تركز التقييم اخل الفصل مع إعطاء الحصص الرئيسية بطريقةد) تقليدية لجميع الطالب الدمج المدروس الستراتيجيات التعلم الذاتي ضمن التدريس"},{"letter":"C","text":"تدمج استراتيجيات التعلم الذاتي ضمن خطة التدر يس لتلبية احتياجات الطالب المتنوعة مع الحفاظ على هيكل الفصل تخصص أوقاتًا معينة خارج الحصة للطالب المفضلين للتعلم الذاتي دون تعديل أسلوب التدريس األساسي تفتح نشاطات اختيارية للتعلم الذاتي داخل الفصل مع إعطاء الحصص الرئيسية بطريقةد) تقليدية لجميع الطالب الدمج المدروس الستراتيجيات التعلم الذاتي ضمن التدريس"},{"letter":"D","text":"التدريس األساسي تفتح نشاطات اختيارية للتعلم الذاتي داخل الفصل مع إعطاء الحصص الرئيسية بطريقة تقليدية لجميع الطالب الدمج المدروس الستراتيجيات التعلم الذاتي ضمن التدريس"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تلتزم بأسلوب التدريس التقليدي لكافة الطالب حفاظ تدمج استراتيجيات التعلم الذاتي ضمن خطة التدر يس لتلبية احتياجات الطالب المتنوعة مع الحفاظ على هيكل الفصل تخصص أوقاتًا معينة خارج الحصة للطالب المفضلين للتعلم الذاتي دون تعديل أسلوبج) التدريس األساسي تفتح نشاطات اختيارية للتعلم الذاتي داخل الفصل مع إعطاء الحصص الرئيسية بطريقةد) تقليدية لجميع الطالب الدمج المدروس الستراتيجيات التعلم الذاتي ضمن التدريس. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":351,"question":"عند إعداد خطة لتطوير مهارات المعلمين، كيف تضمن مشاركة فعالة تحقق السؤال31: بين احتياجات المعلمين وأهداف المؤسسة؟","options":[{"letter":"A","text":"انسجاما الالتزام بأهداف المؤسسة دون تعديل جوهري تعتمد الخطة على استشارة المعلمين مع اهتماماتهم بشكل متوازن مع معايير التطوير المؤسسي تستطلع آراء المعلمين وتدمجب)"},{"letter":"B","text":"تعتمد الخطة على استشارة المعلمين مع اهتماماتهم بشكل متوازن مع معايير التطوير المؤسسي تستطلع آراء المعلمين وتدمج"},{"letter":"C","text":"تضع الخطة بناءً على التوجيهات اإلدارية مع إبالغ المعلمين بالمحتوى النهائي تعقد ورش عمل مشتركة بين اإلدارة والمعلمين بناءً على جدول زمني محدد مسبقا د) ألنها تمزج بين إشراك المعلمين في تحديد الاحتياجات والتوافق مع"},{"letter":"D","text":"ج) تضع الخطة بناءً على التوجيهات اإلدارية مع إبالغ المعلمين بالمحتوى النهائي تعقد ورش عمل مشتركة بين اإلدارة والمعلمين بناءً على جدول زمني محدد مسبقا ألنها تمزج بين إشراك المعلمين في تحديد الاحتياجات والتوافق مع"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تعتمد الخطة على استشارة المعلمين مع اهتماماتهم بشكل متوازن مع معايير التطوير المؤسسي تستطلع آراء المعلمين وتدمج. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":352,"question":"بين نتائج التقييم الكمي والتقييم النوعي. السؤ ال32: أثناء تقييم أداء الموظفين، الحظت تباينا كيف تصدر حكمك النهائي بشأن أداء الموظف بدقة وموضوعية؟","options":[{"letter":"A","text":"تعتمد على التقييم الكمي ألنه مبني على معايير قابلة للقياس والموضوعية بشكل أكبر ب) تدمج بين التقييم الكمي والنو عي إلعداد صورة شاملة ومتوازنة تعكس مختلف جوانب األداء تعطي األولوية للتقييم النوعي ألنه يعكس الجوانب السلوكية واإلنسانية التي قد ال تُقاسج) رقميا تستعين بفريق من الخبراء لمراجعة النزاعات بين التقييمين قبل اتخاذ القرار النهائي د)"},{"letter":"B","text":"تعتمد على التقييم الكمي ألنه مبني على معايير قابلة للقياس والموضوعية بشكل أكبر تدمج بين التقييم الكمي والنو عي إلعداد صورة شاملة ومتوازنة تعكس مختلف جوانب األداء تعطي األولوية للتقييم النوعي ألنه يعكس الجوانب السلوكية واإلنسانية التي قد ال تُقاسج) رقميا تستعين بفريق من الخبراء لمراجعة النزاعات بين التقييمين قبل اتخاذ القرار النهائي د)"},{"letter":"C","text":"تدمج بين التقييم الكمي والنو عي إلعداد صورة شاملة ومتوازنة تعكس مختلف جوانب األداء تعطي األولوية للتقييم النوعي ألنه يعكس الجوانب السلوكية واإلنسانية التي قد ال تُقاس رقميا تستعين بفريق من الخبراء لمراجعة النزاعات بين التقييمين قبل اتخاذ القرار النهائي د)"},{"letter":"D","text":"رقميا تستعين بفريق من الخبراء لمراجعة النزاعات بين التقييمين قبل اتخاذ القرار النهائي"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تعتمد على التقييم الكمي ألنه مبني على معايير قابلة للقياس والموضوعية بشكل أكبر تدمج بين التقييم الكمي والنو عي إلعداد صورة شاملة ومتوازنة تعكس مختلف جوانب األداء تعطي األولوية للت ذين يظهرون عدم تعاون واضح. الطالب؟","options":[{"letter":"A","text":"توجيه المعلمة إلى تعديل النموذج بشكل فردي ليتناسب مع استجابة الطالب دون إشراكهم ًمباشرة"},{"letter":"B","text":"لتوفير بيئة محفزة وتفاعلية تقديم دعم تدريبي متكامل للمعلمة والطالب معا ج) تحفيز الطالب على المشاركة من خالل توضيح أهمية النموذج ونتائجه لهم قبل تنفيذه تثبيت النظام التعليمي الجديد بشكل واضح وحازم مع متابعة دقيقة لسلوك الطالب د) الدعم التدريبي المتكامل الذي يشمل المعلمة والطالب يهيء بيئة"},{"letter":"C","text":"تقديم دعم تدريبي متكامل للمعلمة والطالب معا تحفيز الطالب على المشاركة من خالل توضيح أهمية النموذج ونتائجه لهم قبل تنفيذه تثبيت النظام التعليمي الجديد بشكل واضح وحازم مع متابعة دقيقة لسلوك الطالب د) الدعم التدريبي المتكامل الذي يشمل المعلمة والطالب يهيء بيئة"},{"letter":"D","text":"تحفيز الطالب على المشاركة من خالل توضيح أهمية النموذج ونتائجه لهم قبل تنفيذه تثبيت النظام التعليمي الجديد بشكل واضح وحازم مع متابعة دقيقة لسلوك الطالب الدعم التدريبي المتكامل الذي يشمل المعلمة والطالب يهيء بيئة"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: لتوفير بيئة محفزة وتفاعلية تقديم دعم تدريبي متكامل للمعلمة والطالب معا ج) تحفيز الطالب على المشاركة من خالل توضيح أهمية النموذج ونتائجه لهم قبل تنفيذه تثبيت النظام التعليمي الجديد بشكل واضح وحازم مع متابعة دقيقة لسلوك الطالب د) الدعم التدريبي المتكامل الذي يشمل المعلمة والطالب يهيء بيئة. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":357,"question":"أثناء تنظيم اجتماع للمعلمين، الحظت انحراف النقاش نحو مواضيع جانبية السؤال37: لجتماع. كيف تتصرف في هذه الحالة؟","options":[{"letter":"A","text":"تؤثر على سير تحفيز اإلبداع لستمرار في النقاش بحرية إلظهار حرية التعبير و تسمح لهم ب تعيد توجيه الحوار بلطف نحو األهداف الموضوعية لالجتماع مع الحفاظ على روحب) المشاركة لجتماع إلى مساره المحدد وإعادة لنحراف فوراج) تتدخل بشكل حازم لقطع تقترح تأجيل مناقشة المواضيع الجانبية إلى جلسة منفصلة الحقالجتماع دون تعطيل د) الحالي إعادة التوجيه بلطف توازن بين احترام حرية التعبير وضمان تحقيق"},{"letter":"B","text":"تسمح ل  الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تشجع المشاركين على التعبير بإعطاء وقت محدد لكل متدرب للتحدث حول الموضوع ت عتمد أساليب تدريبية تفاعلية وتمارين جماعية مصممة لتحفيز النقاش والمشاركة بفعالية ج) توجه أسئلة مباشرة لمجموعة مختارة من المشاركين لتحفيز بقية المجموعة على الرد تقدم ملخصات دورية وتغيير أساليب العرض لتجديد انتباه المشاركين وتشجيع المشاركة د) استخدام األساليب التفاعلية والتمارين الجماعية هو األنسب ألنه. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":370,"question":"في ضمان تنفيذ خطة استراتيجية بسبب مقاومة للتغيير من قبل تواجه تحديا السؤال50: بعض الموظفين، ما الخطوة األكثر فاعلية لضمان تقليل هذه المقاومة وتحقيق التنفيذ الناجح للخطة؟","options":[{"letter":"A","text":"تنظيم ورش عمل حوارية مع المعنيين لشرح تفاصيل الخطة و لستماع لمخاوفهم ومحاولة دمج مقترحاتهم ضمن الخطة ب) إشر اك المعنيين في تصميم مراحل التنفيذ مع تقديم حوافز تحفيزية مرتبطة بتحقيق أهداف التغيير تقديم توجيهات واضحة وصارمة بضرورة الالتزام بالخطة مع شرح الفوائد المرجوة ج) دون تغيير في الخطة األصلية تعجيل نشر الخطة مع تفعيل قنوات اتصال مستمرة لتوضيح أي استفسارات والرد علىد) المالحظات بشكل دوري"},{"letter":"B","text":"ومحاولة دمج مقترحاتهم ضمن الخطة إشر اك المعنيين في تصميم مراحل التنفيذ مع تقديم حوافز تحفيزية مرتبطة بتحقيق أهداف التغيير تقديم توجيهات واضحة وصارمة بضرورة الالتزام بالخطة مع شرح الفوائد المرجوة ج) دون تغيير في الخطة األصلية تعجيل نشر الخطة مع تفعيل قنوات اتصال مستمرة لتوضيح أي استفسارات والرد علىد) المالحظات بشكل دوري"},{"letter":"C","text":"إشر اك المعنيين في تصميم مراحل التنفيذ مع تقديم حوافز تحفيزية مرتبطة بتحقيق أهداف التغيير تقديم توجيهات واضحة وصارمة بضرورة الالتزام بالخطة مع شرح الفوائد المرجوة دون تغيير في الخطة األصلية تعجيل نشر الخطة مع تفعيل قنوات اتصال مستمرة لتوضيح أي استفسارات والرد علىد) المالحظات بشكل دوري"},{"letter":"D","text":"دون تغيير في الخطة األصلية تعجيل نشر الخطة مع تفعيل قنوات اتصال مستمرة لتوضيح أي استفسارات والرد على المالحظات بشكل دوري"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: ومحاولة دمج مقترحاتهم ضمن الخطة إشر اك المعنيين في تصميم مراحل التنفيذ مع تقديم حوافز تحفيزية مرتبطة بتحقيق أهداف التغيير تقديم توجيهات واضحة وصارمة بضرورة الالتزام بالخطة مع شرح الفوائد المرجوة ج) دون تغيير في الخطة األصلية تعجيل نشر الخطة مع تفعيل قنوات اتصال مستمرة لتوضيح أي استفسارات والرد علىد) المالحظات بشكل دوري. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":371,"question":"خالل حصة دراسية، يالحظ المعلم مجموعة من الطالب مشتتين ويناقشون السؤال1: ما هو اإلجراء األمثل إلدارة هذا الموقف وضمان استمراريةموضوعًا غير متعلق بالمادة. لنتباه والتركيز داخل الصف؟","options":[{"letter":"A","text":"توجيه سؤال مباشر للطالب المشتتين للربط بين موضوع النقاش والمادة الدراسية، مما يعيدهم للدرس بطريقة غير مباشرة."},{"letter":"B","text":"طلب انتباه الطالب بهدوء وتذكيرهم بأهمية الالتزام بالموضوع دون مقاطعة النقاش بشكل مباشر."},{"letter":"C","text":"توجيه سؤال مباشر للطالب المشتتين لتحفيزهم على العودة للدرس والتركيز على المادة بشكل فعال."},{"letter":"D","text":"إيقاف الدرس لفترة قصيرة لتوجيه نصيحة جماعية حول لنضباط وأهمية التركيز داخل الصف."}],"answer":"C","explanation":"الإجابة الصحيحة هي (ج) لأنها الأنسب للسياق المذكور في السؤال: توجيه سؤال مباشر للطالب المشتتين لتحفيزهم على العودة للدرس والتركيز على المادة بشكل فعال.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":372,"question":"كيف السؤال2: موظف جديد في المدرسة يعاني من صعوبة في تطبيق نظام التقويم الجديد. يمكن لمدير المدرسة دعمه بشكل أكثر فاعلية لتعزيز تطبيق النظام بشكل صحيح وعملي؟","options":[{"letter":"A","text":"تزويده بدليل تفصيلي مكتوب مع إشراكه في ورشة عمل تطبيقية مع زمالء ذوي خبرة يشجع الحوار العملي والتدريبب) المباشر."},{"letter":"B","text":"إشراكه في ورشة عمل تطبيقية مع زمالء ذوي خبرة يشجع الحوار العملي والتدريب المباشر."},{"letter":"C","text":"تكليف موظف متمرس للمتابعة المستمرة معه أثناء تطبيق النظام وتقديم تغذية راجعة دورية."},{"letter":"D","text":"تنظيم جلسة تقييم فردية مع الموظف لت حديد نقاط القوة والضعف وتقديم خطة تطوير شخصية."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: إشراكه في ورشة عمل تطبيقية مع زمالء ذوي خبرة يشجع الحوار العملي والتدريب المباشر.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":373,"question":"بعد فترة تقييم أداء، الحظ المدرس أن أحد الطالب يعاني من ضعف ملحوظ في مادة الرياضيات. ما اإلجراء األكثر مهنية وفعالية لدعم هذا الطالب؟","options":[{"letter":"A","text":"تكليف الطالب بحل تمارين إضافية بانتظام لتعزيز الفهم والتطبيق."},{"letter":"B","text":"تنظيم جلسات دعم فردية منتظمة مع مدرس مختص لمتابعة نقاط الضعف بشكل مباشر."},{"letter":"C","text":"تشجيع الطالب على المشاركة في مجموعات دراسة مشت ركة مع زمالئه لتعزيز التعلم التفاعلي."},{"letter":"D","text":"مراجعة خطة التدريس الخاصة بالفصل لضمان توفير استراتيجية تعلم مناسبة لجميع الطالب مع متابعة خاصة للطالب الذي يعاني."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تنظيم جلسات دعم فردية منتظمة مع مدرس مختص لمتابعة نقاط الضعف بشكل مباشر.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":374,"question":"كيف يمكنف بين موظفين حول توزيع المهام. السؤال4: في اجتماع مع الزمالء ظهر خال لقائد الفريق التعامل مع هذا الخالف بأفضل طريقة لتحقيق حل مستدام وفعّال؟","options":[{"letter":"A","text":"اتخاذ قرار فوري وتوجيه توزيع المهام بناءً على األولويات دون نقاش مفصل."},{"letter":"B","text":"عقد جلسة تفاهم منفتحة لمناقشة وجهات النظر المختلفة والسعي إليجاد ح ل يرضي جميع األطراف."},{"letter":"C","text":"استشارة كل طرف بشكل منفرد لجمع وجهات النظر ثم اتخاذ القرار، مع إبالغ الجميع الحقا."},{"letter":"D","text":"إعادة توزيع المهام مؤقتا للتعبير عن وجهات"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: عقد جلسة تفاهم منفتحة لمناقشة وجهات النظر المختلفة والسعي إليجاد ح ل يرضي جميع األطراف.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":375,"question":"أثناء التخطيط لستراتيجي للعام الدراسي، تبين أن أحد األهداف غير قابل السؤال5: ما هو القرار األكثر مهنية لضمان تحقيق الخطة بأفضل صورةللتحقيق بالموارد المتاحة. ممكنة؟","options":[{"letter":"A","text":"مع اإلمكانيات المتاح ة، مع الحفاظ على ومتوافقا إعادة صياغة الهدف ليصبح واقعيا أهميته."},{"letter":"B","text":"طلب تعزيز الموارد الالزمة لتحقيق الهدف دون تغيير نصه األصلي."},{"letter":"C","text":"تأجيل الهدف إلى فترة الحقة داخل العام الدراسي عند توفر موارد إضافية، مع إبقائه في الخطة."},{"letter":"D","text":"حذف الهدف من الخطة والتركيز على أهداف أخرى قابلة للتحقيق بالموارد الحالي إعادة صياغة الهدف بشكل واقعي يحافظ على أهميته ويُضمن من"}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: مع اإلمكانيات المتاح ة، مع الحفاظ على ومتوافقا إعادة صياغة الهدف ليصبح واقعيا أهميته.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":376,"question":"كيف يتصرفلمتحان. السؤال6: معلم يالحظ استخدام أحد الطالب لطرق غش ذكية في المعلم حسب أخالقيات المهنة لتح قيق أفضل توازن بين الحفاظ على العالقة التربوية وضمان النزاهة األكاديمية؟","options":[{"letter":"A","text":"مناقشة الطالب بشكل خاص لبيان خطورة الغش وتحفيزه على الالتزام بالنزاهة، مع إذا تكرر األمر."},{"letter":"B","text":"التنويه الحتمالية اتخاذ إجراءات رسمية الحقا والرسائل التربوية للجميع دون تسجيل مخالفة رسمية مباشرة لضمان ردع الطالب تأخير في اإلجراء."},{"letter":"C","text":"التحدث مع الطالب بحضور أحد الزمالء إلظهار جدية األمر مع حفظ كرامة الطالب في الوقت نفسه."},{"letter":"D","text":"توجيه إنذار شفهي للطالب أثناء لمتحان بهدف ضبط السلوك دون الدخول في مناقشات مطولة قد تؤثر على الجو العام."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: مناقشة الطالب بشكل خاص لبيان خطورة الغش وتحفيزه على الالتزام بالنزاهة، مع إذا تكرر األمر.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":377,"question":"ما السؤال7: موظف يواجه ضغط عمل شديد نتيجة تعدد المهام الموكلة إليه في نفس الوقت. هو النهج األنسب إلدارة وقته بفعالية؟","options":[{"letter":"A","text":"ترتيب المهام بحسب الزم ب) تحديد أولويات المهام بناءً على تأثيرها على األهداف المؤسسية والنتائج المتوقعة."},{"letter":"B","text":"أ) ترتيب المهام بحسب الزم تحديد أولويات المهام بناءً على تأثيرها على األهداف المؤسسية والنتائج المتوقعة."},{"letter":"C","text":"تفويض المهام التي يمكن لزمالئه تنفيذها مع الحفاظ على متابعة دقيقة."},{"letter":"D","text":"إلى ما بعد إتمام الم ل تأجيل تنفيذ المهام األقل استعج"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: أ) ترتيب المهام بحسب الزم تحديد أولويات المهام بناءً على تأثيرها على األهداف المؤسسية والنتائج المتوقعة.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":378,"question":"العليا. معلم يسعى لتعزيز دافعية طالبه نحو التعلم النشط وتنمية مهارات التفكير السؤال8: أي من نظريات التعلم التالية تُعتبر األكثر مالءمة لتصميم حصصه الدراسية في هذا السياق؟","options":[{"letter":"A","text":"النظرية السلوكية التي تعزز الدافعية عبر التكرار والمكافآت الخارجية المنظمة."},{"letter":"B","text":"النظرية البنائية التي تركز على مشاركة الطالب الفاعلة في بناء معرفته من خالل عل والتجربة."},{"letter":"C","text":"التفا النظرية اإلدراكية التي تهتم بتنظيم المعرفة والعمليات الذهنية الداخلية لتحسين الفهم."},{"letter":"D","text":"النظرية لجتماعية التي تؤكد التعلم التفاعلي من خالل التعاون وتبادل الخبرات ضمن المجموعة."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: النظرية البنائية التي تركز على مشاركة الطالب الفاعلة في بناء معرفته من خالل عل والتجربة.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":379,"question":"أثناء تقييم طالب الفصل، الحظ المعلم أن بعضهم يعتمد على تقنيات التدوين السؤال9: كيف يمكن تحسين نظام التقويم ليقلل من اعتماد الطالب على التدوينالمسبق لإلجابة. المسبق بشكل فعّال؟","options":[{"letter":"A","text":"زيادة عدد األسئلة التطبيقية مع الحفاظ على مستوى صعوبة عميقا."},{"letter":"B","text":"وتقييمااستبدال األسئلة الحفظية بأخرى تتطلب تحليال من التذكر السطحي."},{"letter":"C","text":"لستنتاج بدال دمج أسئلة تعتمد على الفهم و الاختبار بأسلوب شفهي أو مفتوح."},{"letter":"D","text":"تقليل فرص الرجوع إلى المذكرات عبر تنظيم بأسئلة تحليلية وتقييمية يُجبر الطالب على"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: وتقييمااستبدال األسئلة الحفظية بأخرى تتطلب تحليال من التذكر السطحي.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":380,"question":"موظف في المدرسة يعاني من تباين في وجهات النظر المهنية مع زميله، مما السؤال10: كيف يتصرف المدير بأكثر الطرق احترافية لحل هذهيؤدي إلى رفض التعاون بينهما. المشكلة؟","options":[{"letter":"A","text":"تنظيم اجتماع مباشر بين الموظفين لتبادل وجهات النظر تحت إشراف المدير."},{"letter":"B","text":"تشجيع ا ج) تقديم جلسات تدريبية مشتركة لتعزيز مهارات التواصل والعمل الجماعي بين الموظفين."},{"letter":"C","text":"ب) تشجيع ا تقديم جلسات تدريبية مشتركة لتعزيز مهارات التواصل والعمل الجماعي بين الموظفين."},{"letter":"D","text":"متابعة المشكالت بشكل دوري مع الموظفين بشكل فردي لتقييم مدى تقدم التعاون بينهم."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تشجيع ا ج) تقديم جلسات تدريبية مشتركة لتعزيز مهارات التواصل والعمل الجماعي بين الموظفين.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":381,"question":"تواجه إدارة المدرسة تراجعا في تحصيل الطالب رغم الجهود ملحوظا السؤال11: لستراتيجي األنسب لتشخيص المشكلة بدقة وتحسين النتائج؟","options":[{"letter":"A","text":"جمع بيانات شاملة من الطالب والمعلمين وأولياء األمور تتضمن استبيانات ومقابالتب) وتحليلها بشكل متكامل."},{"letter":"B","text":"جمع بيانات شاملة من الطالب والمعلمين وأولياء األمور تتضمن استبيانات ومقابالت وتحليلها بشكل متكامل."},{"letter":"C","text":"مراجعة وتقييم المناهج الدراسية بالتعاون مع المعنيين لتحديد مدى مالءمتها ألهداف التحصيل."},{"letter":"D","text":"تنظيم ورش عمل تدريبية للمعلمين لتعزيز مهاراتهم وتحسين أدائهم التدريسي."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: جمع بيانات شاملة من الطالب والمعلمين وأولياء األمور تتضمن استبيانات ومقابالت وتحليلها بشكل متكامل.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":382,"question":"السؤال 382 غير موجود بشكل واضح في النص المستخرج من الملف، لذلك تم وضعه كعنصر مرجعي للحف ,"text":"التوفيق بين القوانين والتقاليد السائدة بمشورة الزمال د) اعتماد المصلحة التنظيمية العامة كتوجيه أساسي في حالة التضارب بين القوانين."},{"letter":"D","text":"ج) التوفيق بين القوانين والتقاليد السائدة بمشورة الزمال اعتماد المصلحة التنظيمية العامة كتوجيه أساسي في حالة التضارب بين القوانين."}],"answer":"B","explanation":"الإجابة الصحيحة هي **(ب)** لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل.","unavailable":true},{"id":407,"question":"معلم يسعى لتعزيز التعلم النشط في فصوله الدراسية، وأراد اختيار استراتيجية السؤال37: أي من الخيارات التاليةيا. بين الطالب وتنمي مهارات التفكير العل كبيراتعليمية تحقق تفاعال يُعد األنسب لتحقيق هذا الهدف؟","options":[{"letter":"A","text":"تقديم المحاضرات بشكل تفاعلي مع طرح أسئلة تحفيزية بشكل منتظم."},{"letter":"B","text":"تنظيم مناقشات جماعية تحليلية مع تكليف الطالب بحل مشكالت تطبيقية."},{"letter":"C","text":"استخدام التدريبات الفردية المتدرجة مع مراجعات دورية لتعزيز الفهم."},{"letter":"D","text":"تشجيع الحفظ الفعّال و ألن تنظيم المناقشات الجماعية وتحفيز الطالب على حل المشكالت"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تنظيم مناقشات جماعية تحليلية مع تكليف الطالب بحل مشكالت تطبيقية.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":408,"question":"مدير يالحظ ضعف التواصل بين الكادر اإلداري ويرغب في تعزيز التواصل السؤال38: الفعّال بما يدعم األجواء المهنية ويرفع من جودة األداء. ما أفضل طريقة لتحقيق ذلك؟","options":[{"letter":"A","text":"إرسال تعليمات مكتوبة دورية تتضمن نقاط التواصل المطلوبة وتوقعات األداء."},{"letter":"B","text":"عقد اجتماعات دورية وجلسات تبادل آراء تشجع على الحوار المفتوح و لستماع المتبادل."},{"letter":"C","text":"إجراء تقييمات فردية دورية توضح نقاط القوة والضعف مع فرص تحسين التواصل."},{"letter":"D","text":"استخدام نظام مالحظات رسمية مع تحفيز الموظفين على تقديم مالحظاتهم بشكل دوري."}],"answer":"B","explanation": محتملة بغض النظر عن العوائدلعتماد على الخيار األكثر أمانا المتوقعة."},{"letter":"C","text":"اختيار الخيار األعلى ربحية مع قبول كامل للمخاطر المصاحبة، مستندا إلى الرغبة في تحقيق أقصى عائد."},{"letter":"D","text":"تأجيل اتخاذ القرار حتى تتوفر معلومات إضافية أو تتضح المعطيات بشكل أكثر."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: إجراء تقييم دقيق لمستوى تحمل المخاطر للمؤسسة مع تحليل السيناريوهات المحتملة الاستراتيجية.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":526,"question":"كيف يمكن لقائد فريق يواجه ضغطالبتكار بفعالية ضمن تحفيز شديدا زمنيا السؤال46: هذا اإلطار؟","options":[{"letter":"A","text":"تخصيص فترات محددة وقصيرة خالل جدول العمل تسمح باستكشاف األفكار الجديدة عن ضغط التنفيذ الفوري، مع تقديم تقييم إيجابي لجهود الفريق."},{"letter":"B","text":"بعيدا تشج يع الفريق باستمرار على توليد أفكار مبتكرة أثناء أوقات التنفيذ، مع التنويه بأهمية لبتكار حتى تحت ضغط الزمن."},{"letter":"C","text":"تحديد دور قيادي لفرد مختص أو مجموعة صغيرة لتطوير األفكار، مع تعزيز الدعم المعنوي لبقية الفريق للتركيز على التنفيذ."},{"letter":"D","text":"ضمن أوقات التنفيذ نفسها، مع تحفيز الفريق على تنظيم جلسات عصف ذهني مركزة تقديم األفكار دون تأخير الجدول الزمني للمشروع."}],"answer":"","explanation":"الإجابة الصحيحة هي **(أ)** لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل.","unavailable":true},{"id":527,"question":"في حالة حدوث تباطؤ ملحوظ في تنفيذ خطة طويلة األمد نتيجة عوامل خارجية السؤال47: مثل الذي ينبغي اتخاذه؟","options":[{"letter":"A","text":"غير متوقعة، ما هو اإلجراء األ تقييم خطة العمل الحالية وإجراء تعديالت مدروسة للتماشي مع المتغيرات مع الحفاظ على األهداف األساسية باستخدام أساليب بديلة."},{"letter":"B","text":"المحافظة على تنفيذ الخطة األصلية دون تعديل، مع زيادة الجهود لتجاوز المعوقات الحالية."},{"letter":"C","text":"ا إيقاف التنفيذ مؤقت إعادة صياغة الخطة بالكامل بناءً على المعطيات الجديدة مع تأجيل تنفيذ المرحلة التاليةد) حتى وضوح الرؤية."},{"letter":"D","text":"إيقاف التنفيذ مؤقت إعادة صياغة الخطة بالكامل بناءً على المعطيات الجديدة مع تأجيل تنفيذ المرحلة التالية حتى وضوح الرؤية."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: غير متوقعة، ما هو اإلجراء األ تقييم خطة العمل الحالية وإجراء تعديالت مدروسة للتماشي مع المتغيرات مع الحفاظ على األهداف األساسية باستخدام أساليب بديلة.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":528,"question":"بعد مرور سنة على بدء تنفيذ قيادة تحول مؤسسي، كيف تُقيّم نجاح هذا التحول السؤال48: بأكثر الطرق فعالية؟","options":[{"letter":"A","text":"قياس األداء من خالل مقارنة األهداف المعلنة بالنتائج الفعلية، مع استقصاء آراء ين والعمالء لضمان تقييم شامل وموضوعي."},{"letter":"B","text":"الموظف لعتماد على التقارير المالية وتحليل مؤشرات األداء التشغيلية فقط، باعتبارها تعكس لقتصادية للتحول."},{"letter":"C","text":"النتائج إجراء مسح آراء اإلدارة العليا و لستفادة من تقييم قيادات األقسام الرئيسية لتقدير مدى تقدم التحول."},{"letter":"D","text":"الت ركيز على لقاءات متابعة اإلنجاز مع فريق القيادة الرئيسية دون استقصاء شامل آلراء باقي األطراف المعنية."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: قياس األداء من خالل مقارنة األهداف المعلنة بالنتائج الفعلية، مع استقصاء آراء ين والعمالء لضمان تقييم شامل وموضوعي.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":529,"question":"أمامك السؤال49: أنت تدير مشروعًا متعدد المتغيرات يتسم بعدم اليقين والتغير المستمر. خياران في التخطيط: ال تخطيط التفصيلي الدقيق أو التخطيط المرن القابل للتعديل، مع أي خيار تختار لتحقيق أفضل توازن بين ضبط الجودةإمكانية تطبيق مزيج منهما. لستجابة للتغيرات، ولماذا؟","options":[{"letter":"A","text":"و التخطيط المرن فقط لما يتيح من قدرة مستمرة على التكيف مع المتغيرات غير المتوقعة."},{"letter":"B","text":"التخطيط التفصيلي الشامل أوال لتحديد كل خطوة بدقة ثم تعديله بشكل منهجي حسب المستجدات."},{"letter":"C","text":"ا."},{"letter":"D","text":"اعتماد تخطيط مرن مع نقاط مراجعة دورية لضبط التفاصيل دون تحديد مفرط مسبق - الجمع بين التخطيط التفصيلي في البداية وتعديل الخطة بشكل"}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: التخطيط التفصيلي الشامل أوال لتحديد كل خطوة بدقة ثم تعديله بشكل منهجي حسب المستجدات.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":530,"question":"عند اختيار أدوات التحليل لستراتيجي الستخدامها في مشروعك، ما هو السؤال50: تيار األداة األنسب؟","options":[{"letter":"A","text":"األساس األمثل الخ تقييم مالءمة األداة بناءً على طبيعة المشروع ونوعية المعلومات المتاحة ومدى توفر البيانات الدقيقة."},{"letter":"B","text":"اختيار األداة التي توفر تغطية شاملة لجميع جوانب المشروع رغم تفاوت دقتها."},{"letter":"C","text":"ل اختيار األداة التي تتوافق مع خبرات الفريق وقدراتهم على بين سهولة التطبيق وشمولية المعلومات المقدمة."},{"letter":"D","text":"لعتماد على األداة التي تحقق توازنا ألن اختيار األداة المبني على تقييم دقيق لطبيعة المشروع وموثوقية"}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: األساس األمثل الخ تقييم مالءمة األداة بناءً على طبيعة المشروع ونوعية المعلومات المتاحة ومدى توفر البيانات الدقيقة.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":531,"question":"مدير مشروع يواجه تأخيرات متك ررة في التسليم بسبب تعقيدات فنية غير متوقعة، كيف ينبغي أن يتصرف لضمان الوفاء بالمواعيد النهائية بأقل خسائر ممكنة؟","options":[{"letter":"A","text":"إعادة هيكلة الجدول الزمني للمهام مع تعزيز الرقابة اليومية على األداء لضمان اتباع الحاجة."},{"letter":"B","text":"الخطة بدقة، مع إمكانية زيادة ساعات العمل تدريجيا حسب إجراء تحليل معمق ألسباب التعقيدات الفنية، والتعاقد مع خبراء متخصصين لدعم الفريق الداخلي مع مراجعة مستمرة لتقدم الحلول التقنية."},{"letter":"C","text":"تقليل بعض متطلبات الجودة ضمن المواصفات المقبولة، مع توضيح ذلك للعميل وتوثيق نتيجة النهائية."},{"letter":"D","text":"التعديالت لتعجيل اإلنجاز دون المساس بال تنفيذ خطة مرحلية لتسليم أجزاء من المشروع في مواعيد فرعية محددة، مع تمديد الجدول الزمني العام للمرحلة النهائية، والتركيز على حل المشكالت التقنية تدريجيا."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: الخطة بدقة، مع إمكانية زيادة ساعات العمل تدريجيا حسب إجراء تحليل معمق ألسباب التعقيدات الفنية، والتعاقد مع خبراء متخصصين لدعم الفريق الداخلي مع مراجعة مستمرة لتقدم الحلول التقنية.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":532,"question":"في شركة تواجه مقاومة ملحوظة من الموظفين عند تنفيذ تغيير تنظيمي، ما هو السؤال2: اإلجراء األكثر فعالية إلدارة هذه الحالة مع الحفاظ على التعاون وتعزيز تقبل التغيير؟","options":[{"letter":"A","text":"عقد جلسات حوار مفتوح مع الموظفين لفهم مخاوفهم ودمج اقتراحاتهم في خطة التغيير بشكل تدريجي."},{"letter":"B","text":"تزويد الموظفين بمعلومات تفصيلية عن أهداف التغيير وأسباب ضرورته مع فتح قنوات لتلقي المالحظات والرد عليها بانتظام."},{"letter":"C","text":"تطبيق التغيير تدريجيا مع توفير دعم نفسي وتدريبي لتسهيل انتقال الموظفين وتشجيع المشاركة الفاعلة."},{"letter":"D","text":"المعنيين ومكافأتهم على تبني مبادرات التغيير تعزيز التغيير من خالل تحفيز الموظفين الالتزام بها."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: عقد جلسات حوار مفتوح مع الموظفين لفهم مخاوفهم ودمج اقتراحاتهم في خطة التغيير بشكل تدريجي.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":533,"question":"في ظ ل أزمة مالية مفاجئة تؤثر على موارد الشركة بشكل حاد، ما هو اإلجراء األكثر استراتيجية لضمان استمرارية العمل دون اإلضرار بالبنية التنظيمية أو الموارد األساسية؟","options":[{"letter":"A","text":"تقليل النفقات التشغيلية بشكل تدريجي مع إعادة تقييم مشاريع الشركة لتقليص غير الضروري منها."},{"letter":"B","text":"الس عي للحصول على تمويل خارجي مشروط مع تحليل دقيق لتأثيراته المالية الالتزامات المستقبلية."},{"letter":"C","text":"و إعادة هيكلة األدوار والمهام داخل الفرق الحالية لتحقيق أفضل استغالل للموارد البشرية دون تسريح."},{"letter":"D","text":"وضع خطة لتخفيض مؤقت في الرواتب مع الحفاظ على العدد الكلي للموظفين لتخفيف الضغوط المالية."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: الس عي للحصول على تمويل خارجي مشروط مع تحليل دقيق لتأثيراته المالية الالتزامات المستقبلية.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":534,"question":"،قائد فريق يواجه توترا بين أعضاء الفريق يؤثر على األداء الجماعي وتعارضا السؤال4: كلة؟","options":[{"letter":"A","text":"ما هو األسلوب األنسب واألكثر فعالية لحل المش عقد اجتماع فوري مع األعضاء المتنازعين لتبادل وجهات النظر وتحديد نقاط الخالف وإعادة تحديد األدوار مع التأكيد على احترام مبادئ الفريق."},{"letter":"B","text":"تنظيم ورشة عمل تفاعلية تركز على تعزيز التواصل والتفاهم بين أعضاء الفريق مع تطوير قواعد واضحة للتعاون المشترك."},{"letter":"C","text":"تطبيق إجراءات وساطة داخلية بحيادية تامة لحل النزاعات بين األعضاء، ورفع توصيات للقائد التخاذ القرارات المناسبة."},{"letter":"D","text":"تعزيز اإلشراف المباشر من القائد على أعضاء الفريق المتنازعين لضبط سلوكهم الالتزام بمهامهم بما يعزز اإلنتاجية."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تنظيم ورشة عمل تفاعلية تركز على تعزيز التواصل والتفاهم بين أعضاء الفريق مع تطوير قواعد واضحة للتعاون المشترك.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":535,"question":"أثناء عملية ابتكار منتج جديد، ما هو النهج األمثل لضمان تحقيق اإلبداع والجودة السؤال5: في آن واحد ضمن فريق العمل؟","options":[{"letter":"A","text":"اعتماد إجراءات منظمة ومجربة مع فتح مجا ب) إنشاء بيئة تشجع على التجربة والخطأ مع توفير دعم متكامل للموارد واألفراد."},{"letter":"B","text":"أ) اعتماد إجراءات منظمة ومجربة مع فتح مجا إنشاء بيئة تشجع على التجربة والخطأ مع توفير دعم متكامل للموارد واألفراد."},{"letter":"C","text":"تحفيز الفريق الداخلي على لبتكار مع استشارة مستمرة لخبراء خارجيين دون التبعية الكاملة لهم."},{"letter":"D","text":"وضع خطة تسويقية أولية بالتوازي مع تطوير األف كار لبتكارية مع مراقبة الجودة منذ البداية."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: أ) اعتماد إجراءات منظمة ومجربة مع فتح مجا إنشاء بيئة تشجع على التجربة والخطأ مع توفير دعم متكامل للموارد واألفراد.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":536,"question":"عند اتخاذ قرار تحت ضغط زمني شديد ومعلومات غير مكتملة، أي من النهج السؤال6: التالية يعتبر األكثر منطقية وفعالية في تحقيق النتائج المثلى؟","options":[{"letter":"A","text":"ل ،عتماد على الحدس والخبرة السابقة التخاذ قرار سريع دون انتظار معلومات إضافية مع تقبل المخاطر المحتملة."},{"letter":"B","text":"محاولة جمع أكبر قدر ممكن من المعلومات قبل اتخاذ القرار، حتى لو أدى ذلك إلى تأخير التنفيذ."},{"letter":"C","text":"لت الرئيسية المتاحة واختيار الخيار الذي يقل ل المخاطر المحتملة بأكبر قدرلحتم تقييم ممكن، مع مراعاة حدود الوقت."},{"letter":"D","text":"تفويض اتخاذ القرار إلى أحد أعضاء الفريق األكثر اطالعا لتقليل العبء والحرص على مشاركة المسؤولية."}],"answer":"C","explanation":"الإجابة الصحيحة هي (ج) لأنها الأنسب للسياق المذكور في السؤال: لت الرئيسية المتاحة واختيار الخيار الذي يقل ل المخاطر المحتملة بأكبر قدرلحتم تقييم ممكن، مع مراعاة حدود الوقت.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":537,"question":"مدير شركة يرغب بوضع خطة استراتيجية لمدة خمس سنوات. ما ه ي الخطوة األولى األكثر فعالية لضمان خطة متكاملة وواقعية؟","options":[{"letter":"A","text":"تحديد األهداف العامة بناءً على رؤى اإلدارة العليا بدون تحليل معمق للسوق."},{"letter":"B","text":"دقيق يتناول نقاط القوة والضعف والفرص والتهديدات الداخلية إجراء تحليلSWOT"},{"letter":"C","text":"دراسة خطط المنافسين وأفضل ممارسا ت الصناعة كمرجعية مباشرة لتحديد التوجه لستراتيجي."},{"letter":"D","text":"جمع آراء الموظفين وأصحاب المصلحة لتشكيل رؤية أولية قبل تحليل البيانات الخارجية والداخلية."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: دقيق يتناول نقاط القوة والضعف والفرص والتهديدات الداخلية إجراء تحليلSWOT. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":538,"question":"فريق عمل تم تكليفه بإدارة تغيير تكنولوجي في المؤسسة، لكن بعض أعضائه السؤال8: ّيظهرون مقاومة غير معلنة تؤثر على تقدم العمل، كيف يمكن التعامل مع ذلك بطريقة فع .. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":547,"question":"عند إعداد خطة مواجهة المخاطر لمشروع جديد، ما أفضل طريقة لتحسين دقة السؤال17: تقييم المخاطر وتأثيرها على سير المشروع؟","options":[{"letter":"A","text":"لعتماد على خبرة المدير مع مراجعة دورية من الف استخدام أدوات نمذجة المخاطر وبرامج المحاكاة المتقدمة التي تدمج بيانات متعددةب) المصادر."},{"letter":"B","text":"استخدام أدوات نمذجة المخاطر وبرامج المحاكاة المتقدمة التي تدمج بيانات متعددة المصادر."},{"letter":"C","text":"التركيز على تحليل المخاطر ذات لحتمالية العالية واألثر الكبير، مع مراقبة المخاطر بشكل تكميلي."},{"letter":"D","text":"األقل تأثيرا وضع الخطة بناءً على توقعات الس وق الحالية مدعومة بتحليل سيناريوهات بديلة للمستقبل."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: استخدام أدوات نمذجة المخاطر وبرامج المحاكاة المتقدمة التي تدمج بيانات متعددة المصادر.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":548,"question":"،أثناء اجتماع حاسم، يتعرض القائد لضغط لتعجيل اتخاذ قرار غير مدروس السؤال18: كيف عليه التصرف؟","options":[{"letter":"A","text":"سريعا اتخاذ القرار ب) طلب تأجيل القرار لجمع مزيد من المعلومات وتحليل النتائج بدقة."},{"letter":"B","text":"طلب تأجيل القرار لجمع مزيد من المعلومات وتحليل النتائج بدقة."},{"letter":"C","text":"تفويض القرار إلى فريق مختص مع توجيه واضح لضمان سرعة اإلنجاز."},{"letter":"D","text":"الموافقة على القرار مع تحديد مراحل تقييم الحقة لتعديل المسار حسب الحاجة."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: طلب تأجيل القرار لجمع مزيد من المعلومات وتحليل النتائج بدقة.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":549,"question":"في حالة تعطل مفاجئ في نظام اإلنتاج الرئيسي، ما هو اإلجراء األكثر مهنية السؤال19: لضمان استمرارية العمل مع تقليل األضرار؟","options":[{"letter":"A","text":"إيقاف اإلنتاج فورا لحين إصالح النظام بشكل كامل لضمان جودة المنتج وسالمة العمليات."},{"letter":"B","text":"تفعيل خطة الطوارئ لتشغيل أنظمة بديلة مؤقتة تضمن استمرار  على التكيف والمرونة في التعامل مع المتغيرات مع األخذ لعتبار النتائج المحققة."},{"letter":"D","text":"في تقييم مدى التزام الموظف باإلجراءات والسياسات الداخلية كأساس لتقدير أدائه في ظل التغيرات."}],"answer":"C","explanation":"الإجابة الصحيحة هي (ج) لأنها الأنسب للسياق المذكور في السؤال: التر كيز على قدرة الموظف على التكيف والمرونة في التعامل مع المتغيرات مع األخذ لعتبار النتائج المحققة.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":656,"question":"في موقف قيادي يتطلب اتخاذ قرا ر مهم، بينما تكون المعلومات المتاحة متضاربة وغير مكتملة، كيف تتصرف لضمان أفضل نتيجة مهنية وعملية؟","options":[{"letter":"A","text":"لعتماد على تحليل سريع للبيانات المتاحة مع استشارة فورية لبعض الزمالء ذوي الخبرة لتقليل الوقت قبل القرار."},{"letter":"B","text":"تجميع أكبر قدر ممكن من المعلومات مع محاولة دم ج وجهات نظر الفريق، وتأجيل القرار حتى تكون الصورة أوضح."},{"letter":"C","text":"اتخاذ القرار استنادًا إلى الخبرات السابقة والحدس المهني، مع إبقاء قنوات التواصل ا."},{"letter":"D","text":"مفتوحة لمراجعة القرار الحق استشارة فريق الخبراء بشكل رسمي لمناقشة رؤية متعددة األبعاد، ثم إصدار قرار مدعوم بتحليل متكامل."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: لعتماد على تحليل سريع للبيانات المتاحة مع استشارة فورية لبعض الزمالء ذوي الخبرة لتقليل الوقت قبل القرار.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":657,"question":"كيف يمكن لقائد تربوي أن يعزز ثقافة أخالقية إيجابية في فريقه دون لعتماد السؤال7: صارمة؟","options":[{"letter":"A","text":"فقط على فرض قواعد العمل على تقديم نفسه كقدوة نموذجية من خالل الالتزام المستمر بالقيم األخالقية والسلوك المهني."},{"letter":"B","text":"وضع أطر واضحة للسلوك األخالقي مع متابعة تطبيقها بإشراف مباشر لتعزيز لنضباط الذاتي."},{"letter":"C","text":"تحفيز الفريق على المشاركة في ورش عمل تفاعلية تهدف لتعميق فهم ا لقيم والمبادئ األخالقية."},{"letter":"D","text":"تشجيع حوار مستمر ونقاشات منتظمة بين أعضاء الفريق حول تحديات مواقف العمل األخالقية."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: فقط على فرض قواعد العمل على تقديم نفسه كقدوة نموذجية من خالل الالتزام المستمر بالقيم األخالقية والسلوك المهني.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":658,"question":"كيف تدير مشروعًا متعدد الفرق يعاني من تعقيد متزايد نتيجة اختالف ثقافات السؤال8: العمل بين الفرق لضمان تحقيق األهداف بكفاءة وتناغم؟","options":[{"letter":"A","text":"تطبيق إطار موحد لثقافة العمل يتضمن سياسات واضحة وإجراءات تنفيذية موحدة تعزز لنسجام بين الفرق."},{"letter":"B","text":"تكليف كل قائد فريق بإدارة ثقافة فريقه داخليًا مع تقديم الدعم فقط عند الحاجة دون فرض سياسات مركزية."},{"letter":"C","text":"تنظيم ورش عمل تفاعلية دورية تجمع فرق العمل بهدف تعزيز الفهم المتبادل وبناء ثقافة عمل مشتركة تدريجيا."},{"letter":"D","text":"تعيين وسيط إداري مختص لحل النزاعات الثقافية بين الفرق بشكل فوري، مع ضمان متابعة تطبيق الحلول بشكل مستمر."}],"answer":"C","explanation":"الإجابة الصحيحة هي (ج) لأنها الأنسب للسياق المذكور في السؤال: تنظيم ورش عمل تفاعلية دورية تجمع فرق العمل بهدف تعزيز الفهم المتبادل وبناء ثقافة عمل مشتركة تدريجيا.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":659,"question":"في مؤسسة تواجه ميزانية محدودة مخصصة للتطوير المهني، أي من السؤال9: لستثمار على تنمية مهاراتلستراتيجيات التالية يُعتبر األكثر فعالية في تعظيم أثر الموظفين؟","options":[{"letter":"A","text":"التركيز على تقديم دورات تدريبية دا خلية مختارة بدقة تركز على المهارات الفنية لحترافية المرتبطة مباشرة بمهام العمل."},{"letter":"B","text":"األساسية و تشجيع التعلم الذاتي من خالل توفير مصادر تعليمية مجانية ومبادرات ورش عمل داخلية تديرها األقسام المختلفة."},{"letter":"C","text":"دعم مشاركة الموظفين في برامج تدريبية خارجية ذات جودة ع الية، مع تقديم مساهمات مالية جزئية للتكاليف لتخفيف العبء على الموظف."},{"letter":"D","text":"تعديل جداول العمل والمشاريع لفتح فترات زمنية مخصصة للتدريب الداخلي والخارجي دون زيادة في الميزانية اإلجمالية."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: التركيز على تقديم دورات تدريبية دا خل ف المطلوب بالكامل.","unavailable":true},{"id":662,"question":"في مدرستك، الحظت تصاعد نزاعات متكررة بين الطالب بشأن توزيع الفرص السؤال2: التفاعل وضمانفي األنشطة الالمنهجية. كمدير، كيف تتعامل مع هذا الوضع لتحسين بيئة عدالة الفرص؟","options":[{"letter":"A","text":"تعقد اجتماعا مع الطالب المتنازعين الستكشاف أسباب النزاع، وتشجع على حوار بناء يُمكن من خالله التوصل إلى حلول توافقية قائمة على مبادئ اإلنصاف."},{"letter":"B","text":"تضع إطارا لتوزيع الفرص يعتمد على معايير محددة كاألداء األكاديمي ومشفرا واضحا لهتمامات الشخصية، وتشرح ذلك للطالب لتفادي اللبس والنزاعات."},{"letter":"C","text":"و تطبق سياسة توزيع الفرص بالتساوي بين جميع الطالب، مع توفير دعم إضافي للطالب األقل مشاركة لتعزيز دمجهم وتشجيعهم."},{"letter":"D","text":"تكلف المعلمين بوضع معايير اختيار خاصة بأنشطتهم، مع متابعة دورية من اإلدارة مان التزامهم بالعدالة وعدم التحيز."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: تعقد اجتماعا مع الطالب المتنازعين الستكشاف أسباب النزاع، وتشجع على حوار بناء يُمكن من خالله التوصل إلى حلول توافقية قائمة على مبادئ اإلنصاف.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":663,"question":"أثناء تقييم أداء مشروع يمتد لمدة طويلة، الحظت أن النتائج النهائية أقل من السؤال3: كيف تقيّم األداء بموضوعية في ظل هذهالمتوقع رغم الجهود الكبيرة والموارد المستخدمة. الظروف المعقدة؟","options":[{"letter":"A","text":"تجري مقابالت مع أعضاء الفريق لتحديد العقبات التي واجهتهم، مع تحليل مؤشرات األداء الكمية والنوعية بشكل متكامل."},{"letter":"B","text":"تركز على المخرجات الكمية كالمؤشرات واألرقام وحدها لتحديد مدى تحقيق األهداف."},{"letter":"C","text":"تعطى وزنًا متساويًا للجهود المبذولة والنتائج المحققة بغض النظر عن الفارق بينهما."},{"letter":"D","text":"يُستكمل المشروع بالكامل ثم تقارن النتائج المتوقعة تؤجل تقييم األداء النهائي حتى بالنتائج المحققة."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: تجري مقابالت مع أعضاء الفريق لتحديد العقبات التي واجهتهم، مع تحليل مؤشرات األداء الكمية والنوعية بشكل متكامل.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":664,"question":"أنت مدير في مؤسسة شبه حكومية تواجه قرارا يتعلق بمنح عقد غامضا أخالقيا السؤال4: كيفلمورد تعرف عنه تقارير فساد مالي محلي، وتوجد ضغوط سياسية إلتمام العقد سريعا. تتخذ القرار؟","options":[{"letter":"A","text":"ترفض التعامل مع المورد حفاظا على القيم األخالقية للمؤسسة رغم الضغوط السياسية ن بدائل أخرى."},{"letter":"B","text":"وتبحث ع تواصل التفاوض مع المورد مع وضع آليات رقابة صارمة وشروط تعاقدية تضمن الشفافية والمسائلة."},{"letter":"C","text":"تؤجل اتخاذ القرار لتقييم الوضع القانوني وأثره على سمعة المؤسسة بالتنسيق مع الجهات الرقابية المختصة."},{"letter":"D","text":"تمنح العقد للمورد مع التزامه بتقديم تقارير ما لية دورية ومراجعة داخلية لضمان الالتزام بالمعايير األخالقية."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: ترفض التعامل مع المورد حفاظا على القيم األخالقية للمؤسسة رغم الضغوط السياسية ن بدائل أخرى.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":665,"question":"قائد فريقك أظهر مقاومة واضحة للتغييرات التي تهدف إلى تعزيز لبتكار السؤال5: قيادة تحويلية تسعى لتحسين األداء التنظيمي؟","options":[{"letter":"A","text":"تستمع إلى مخاوفه بعناية وتدمج نقاطه البناءة في خطة التغيير لتعزيز شعوره بالمشاركة والمسؤولية."},{"letter":"B","text":"توضح له أهداف التغيير بصورة حازمة مع توفير الدعم المطلوب دون التنازل عن شكل دوري."},{"letter":"C","text":"الرؤية، مع متابعة أثر التغيير على أدائه ب ،تشركه في جلسات حوارية لتعزيز فهمه للتغيير وتحفزه على تبني المبادرات الجديدة مع تحديد أهداف واضحة تقيّم التقدم بشكل منتظم."},{"letter":"D","text":"تتيح له فترة زمنية محددة للتكيف مع التغيير مع مراقبة أدائه، دون ضغط مباشر، مما يد."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: تستمع إلى مخاوفه بعناية وتدمج نقاطه البناءة في خطة التغيير لتعزيز شعوره بالمشاركة والمسؤولية.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":666,"question":"في إطار خطة استراتيجية طويلة األمد لمؤسستك، تثار معارضة داخلية بشأن السؤال6: لستثمار في تقنيات جديدة يُنظر إليها من قبل بعض األعضاء كمخاطر محتملة تهدد لستقرار المالي. كيف تتعامل مع هذه المعارضة؟","options":[{"letter":"A","text":"تقدم تحاليل مفصلة توضح الفوائد المحتملة والمخاطر المحتملة مع مقارنات واقعية لتطمين األطراف المعنية وتسهيل اتخاذ القرار."},{"letter":"B","text":"تلتزم بتنفيذ لبتكار وأهميته المستقبلية، مع متابعة دقيقةلستثمار بعد مناقشة مبادئ لألداء لضبط المسار إذا اقتضى األمر."},{"letter":"C","text":"تقترح تأجيل القرار حتى تتوفر دراسات محلية وتقييمات تجريبية إضافية تثبت جدوى"},{"letter":"D","text":"التقنية تفتح حوارا، مع إمكانية تعديل مع الفريق المعارض إلعادة تقييم الخطة تكامليا موسعا بعض بنودها بناءً على المالحظات والمخاوف المؤيدة."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: تقدم تحاليل مفصلة توضح الفوائد المحتملة والمخاطر المحتملة مع مقارنات واقعية لتطمين األطراف المعنية وتسهيل اتخاذ القرار.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":667,"question":"أثناء إدارة صراع معقد بين قسمين في المنظمة، يتبادل كل قسم لتهامات بسوء السؤال7: ما أفضل استراتيجية إلدارة هذا الصراع وضمان تحقيقالتفاهم والتقليل من جهود اآلخر. تعاون فعّال ومستدام؟","options":[{"letter":"A","text":"عقد جلسة وساطة مشتركة تركز على استكشاف مصالح الطرفين وإعادة صياغة وجهات لتهامات المباشرة."},{"letter":"B","text":"عن النظر بعيدا على تقييم محايد ًتعيين وسيط خارجي متخصص إلدارة الحوار وتقديم توصيات بناء لألسباب الجوهرية للصراع."},{"letter":"C","text":"تشجيع الطرفين على التباحث المباشر تحت إشراف المدير لتقليل لحتكاك وبناء تفاهم تدريجي قائم على الحوار المفتوح."},{"letter":"D","text":"توجيه الطرفين للتركيز على مهامهم العملية مؤقتا مع إقامة ورش عمل لتطوير مهارات األقسام الحقا."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: عقد جلسة وساطة مشتركة تركز على استكشاف مصالح الطرفين وإعادة صياغة وجهات لتهامات المباشرة.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":668,"question":"أحد معلمي المدرسة يستخدم أساليب تقييم تقليدية ال تعكس قدرات الطالب السؤال8: اإلبداعية. كيف يمكنك تقويم أدائه بشكل م بني على التفكير الناقد لتحسين جودة التقييمات لبتكار لدى الطالب؟","options":[{"letter":"A","text":"وتعزيز جمع بيانات تغذية راجعة من الطالب والزمالء بشأن أساليب التقييم المستخدمة، وتحليلها لتحديد نقاط التحسين بدقة."},{"letter":"B","text":"مقارنة نتائج اختبارات الطالب التي يقوم بها مع نتائج المدارس األخرى ذا ت األداء"},{"letter":"C","text":"تقديم توصيات عملية بعد مراجعة أساليب التقييم الحالية، ثم متابعة تطبيق هذه التوصيات بشكل دوري مع المعلم قبل اتخاذ أي خطوات إجرائية."},{"letter":"D","text":"نقل مسؤولية التقييم إلى معلم آخر أكثر خبرة في أساليب التقييم الحديث ة لضمان تحسين نتائج الطالب بشكل فوري."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: وتعزيز جمع بيانات تغذية راجعة من الطالب والزمالء بشأن أساليب التقييم المستخدمة، وتحليلها لتحديد نقاط التحسين بدقة.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":669,"question":"في بيئة عمل تتسم بزيادة الضغوط التنظيمية، يظهر أحد الموظفين عالمات السؤال9: كيف تتخذ القرار األمثل لدعم الموظف على أدائه المهني. واضحة لإلرهاق تؤثر سلبا وضمان استمرارية األداء الفعّال للفريق؟","options":[{"letter":"A","text":"تعقد جلسة استماع خاصة معه لتحليل وضعه الشخصي والمُهني، ثم تُعيد توزيع عبء العمل بشكل يتناسب مع قدراته الحالية مع متابعته دوريا."},{"letter":"B","text":"تشجع ه على تعزيز جهوده وتحمل الضغوط مؤقتا، مع تقديم تحفيزات تشجيعية للفريق بأكمله للحفاظ على األداء في هذه المرحلة الحرجة."},{"letter":"C","text":"تنقل بعض مهامه إلى زمالئه بشكل مؤقت مع تقديم توضيح شفاف للفرق في الالتزام الكامل."},{"letter":"D","text":"المسؤوليات وتحديثات دورية لضمان نفسي وجلسات ترفيهية لجميع الموظفين بشكل شامل، مع متابعة تنظم ورش عمل دعم لت اإلرهاق."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: تعقد جلسة استماع خاصة معه لتحليل وضعه الشخصي والمُهني، ثم تُعيد توزيع عبء العمل بشكل يتناسب مع قدراته الحالية مع متابعته دوريا.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":670,"question":"تواجه منظمتك قرارا يتطلب تخصيص استثمار كبير بين تطوير استراتيجيا السؤال10: قدرات الموظفين أو تحديث البنية التحتية التقنية. أي الخيارين تختا ر لتحقيق أفضل توازن لستدامة والفعالية التنظيمية؟","options":[{"letter":"A","text":"بين لستثمار األساسي في تطوير قدرات الموظفين ألن بناء المهارات يعزز مرونة المنظمة"},{"letter":"B","text":"التركيز على تحديث البنية التحتية التقنية باعتبارها عنصر األساس الذي يدعم تح سين اإلنتاجية وتطوير الخدمات بشكل مستدام."},{"letter":"C","text":"توزيع الموارد بشكل أفضلي على تطوير قدرات الموظفين مع دعم محدود لتحديث البنية التحتية لضمان مسايرة التطورات التقنية دون التضحية بالمهارات."},{"letter":"D","text":"للبيئة الداخلية وال خارجية لتحديدلستثمار لحين إجراء تحليل أكثر تفصيال تأجيل قرار األولويات المتغيرة بدقة."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: بين لستثمار األساسي في تطوير قدرات الموظفين ألن بناء المهارات يعزز مرونة المنظمة. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":671,"question":"أنت مدير مشروع في مؤسسة تعليمية تواجه مقاومة غير معلنة من بعض السؤال1: بالرغم من أن البيانات األولية تؤكد فاعليةأعضاء الفريق تجاه استخدام تقنية تعليمية حديثة. كيف تتصرّف إلدارةالتقنية، إال أن األجواء السلبية قد تضع تنفيذ المشروع في خطر. هذه هذه المقاومة بشكل فعّال ومهني؟","options":[{"letter":"A","text":"تعقد جلسات حوارية تفاعلية بالفريق توضح فيها مزايا التقنية وتفتح المجال للنقاش المباشر لبناء الثقة والتفاهم."},{"letter":"B","text":"الفريق بعمق، مدعومة بتقارير مفصلة لتحليل جذور توزّع استبيانات سرية لتحليل آراء المقاومة بدقة."},{"letter":"C","text":"تستعين بخبير إداري مختص إلدارة التغيير، يقوم بتحليل الموقف موضوعيا ويساعد في تصميم حلول مدروسة."},{"letter":"D","text":"تبدأ بتنفيذ التقنية بشكل تجريبي في أجزاء محددة من المشروع، مع إشراك المتشككين مهم في التغيير."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: تعقد جلسات حوارية تفاعلية بالفريق توضح فيها مزايا التقنية وتفتح المجال للنقاش المباشر لبناء الثقة والتفاهم.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":672,"question":"كقائد لفريق في منظمة غير ربحية تواجه تقليصا في الميزانية، كيف يمكنك كبيرا السؤال2: لبتكار رغم الموارد المحدودة؟","options":[{"letter":"A","text":"تحفيز الفريق للحفاظ على األداء و تعزز ثقافة الشفافية في توزيع الموارد وتحدد المسؤوليات بوضوح مع تشجيع المشاركة الفعّالة في صنع القرار."},{"letter":"B","text":"لل مكافآت المعنوية والمادية بناءً على األداء، مع التركيز على تحفيز محدودا تضع نظاما النتائج وتقليل التكاليف."},{"letter":"C","text":"تركز على تقوية الروح المعنوية للفريق من خالل تنظيم فعاليات تنمية ذات تكاليف لرتباط الشخصي."},{"letter":"D","text":"منخفضة تعزز التعاون و داخل حدود عامة، مع التكيفلبتكار بحرية تامة تمنح الفريق صالحية التجريب و السريع مع األخطاء دون عقوبات صارمة."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: تحفيز الفريق للحفاظ على األداء و تعزز ثقافة الشفافية في توزيع الموارد وتحدد المسؤوليات بوضوح مع تشجيع المشاركة الفعّالة في صنع القرار.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":673,"question":"أنت مسؤول تخطيط استراتيجي في شركة تكنولوجية تواجه سرعة تغيرات السؤال3: كيف تبني خطة استراتيجية طويلة األمد تخدمالسوق وعدم وضوح التوجهات المستقبلية. مصلحة الشركة؟","options":[{"letter":"A","text":"تضع رؤية استراتيجية مرنة تركز على تعزيز قدرات التكيف و لبتكار لضمان استمرارية األداء رغم عدم وضوح المستقبل."},{"letter":"B","text":"تعتمد على تحليالت السوق الحالية لتحديد أولويات ثابتة تضمن ثبات األداء وتجنب المخاطرة."},{"letter":"C","text":"تجمع رؤى متعددة من كافة اإلدارات لتكوين خطة متوازنة ترتكز على توافق وجهات النظر مع بعض المرونة في التنفيذ."},{"letter":"D","text":"تركز على تطوير المنتجات الحالية وتحسينها لل حفاظ على المنافسة دون تحمّل مخاطر لتجاهات غير الواضحة للسوق."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: تضع رؤية استراتيجية مرنة تركز على تعزيز قدرات التكيف و لبتكار لضمان استمرارية األداء رغم عدم وضوح المستقبل.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":674,"question":"في مؤسسة تعليمية تواج ه حالة غامضة تتعلق بسلوك عضو هيئة تدريس مع طلبة، كيف تتخذ قرارا يتميز بأعلى معايير األخالقية والمهنية لضمان عدالة وشفافية المعالجة؟","options":[{"letter":"A","text":"إجراء تحقيق شامل مع جميع األطراف المعنية مع الحفاظ على السرية والنزاهة قبل اتخاذ أي إجراء."},{"letter":"B","text":"إصدار توجيهات واضحة تعزز السلوك األخالقي وتطبيق إجراءات مؤقتة بعد تقييم مبدئي، مع التخطيط لتحقيق موسع الحق."},{"letter":"C","text":"تنظيم ورش تدريبية تأهيلية للسلوك المهني األخالقي لجميع أعضاء الهيئة التدريسية مع مراقبة التطبيق المستمر دون تأجيل التحقيق."},{"letter":"D","text":"إنشاء آلية إبالغ آمنة وسرية للطلبة مع دعم نف سي مستمر، وتفعيل تحقيق فوري بعد تلقي البالغ دون تأخير."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: إجراء تحقيق شامل مع جميع األطراف المعنية مع الحفاظ على السرية والنزاهة قبل اتخاذ أي إجراء.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":675,"question":"أنت قائد في بيئة عمل متعددة الثقافات ويحدث صراع بين أفراد الفريق بسبب السؤال5: اختالفات في طرق التواصل والعمل. ما هو أنسب نهج إلد ارة هذا الصراع بشكل فعّال ومستدام؟","options":[{"letter":"A","text":"تنظيم جلسات حوار بنّاءة تركز على تبادل وجهات النظر الثقافية وابتكار حلول مشتركة توافقية."},{"letter":"B","text":"وضع وتنفيذ تعليمات عمل موحدة تشمل قواعد تواصل وسلوك واضحة لجميع األعضاء بغض النظر عن خلفياتهم الثقافية."},{"letter":"C","text":"لستعانة بمستشار ث قافي لتقييم طبيعة الصراع وتقديم ورش عمل تدريبية مخصصة بالفريق."},{"letter":"D","text":"تشجيع األعضاء على التفاوض الذاتي بين بعضهم ضمن إطار محدد، مع التدخل فقط عند تصعيد الخالفات."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: تنظيم جلسات حوار بنّاءة تركز على تبادل وجهات النظر الثقافية وابتكار حلول مشتركة توافقية.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":676,"question":"في موقف تتطلب فيه مؤسستك لبتكار مع توفر محدود للموارد، كيف تختار السؤال6: لبتكار األكثر فاعلية لضمان تحقيق نتائج ملموسة ومستدامة؟","options":[{"letter":"A","text":"استراتيجية تبدأ بتنفيذ مشاريع صغيرة قابلة للتطوير بسرعة تُمكن من استغالل الموارد بشكل داعم لالبتكار المستمر."},{"letter":"B","text":"تُعيد توجيه الموارد نحو تحسين العمليات الداخلية أوال بهدف تقليل الهدر وزيادة الكفاءة لبتكار."},{"letter":"C","text":"قبل استثمار موارد إضافية في تقيم شراكات مدروسة مع جهات خارجية لتبادل الموارد وال معارف، مع إدارة دقيقة الالتزامات الناتجة."},{"letter":"D","text":"للمخاطر و تخصص حصة ثابتة من الموارد لالبتكار بغض النظر عن الضغوط المالية، مع توقع تأثير مؤقت على جوانب أخرى من الميزانية."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: استراتيجية تبدأ بتنفيذ مشاريع صغيرة قابلة للتطوير بسرعة تُمكن من استغالل الموارد بشكل داعم لالبتكار المستمر.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":677,"question":"أنت مسؤول تقييم أداء موظفين في بيئة عمل تمر بفترة عدم استقرار مؤقت مثل السؤال7: إعادة هيكلة. كيف تخصص معايير التقييم لتحقيق تقييم دقيق وموضوعي؟","options":[{"letter":"A","text":"دمج شركات أو تعتمد بشكل رئيسي على مؤشرات األداء المعروفة مع تعديل النتائج نسبيا لتقلبات وفقا الظروف الخارجية غير المستقرة."},{"letter":"B","text":"تركز على التقييم الذاتي المفصل للموظفين مع جمع مالحظات متعددة من المديرين والزمالء لتفسير تحديات بيئة العمل المتغيرة."},{"letter":"C","text":"تدمج تقييم األداء الفردي مع تقييم نتائج الفريق الجماعية بشكل متوازن لتعكس التفاعل لضطراب."},{"letter":"D","text":"بين الجهود الفردية والجماعية خالل فترة تعتمد على تقييمات أكثر مرونة ومؤقتة بناءً على المخرجات الحالية بدل األهداف ، مع متابعة مستمرة لضبط المعايير حسب تطور الوضع."}],"answer":"C","explanation":"الإجابة الصحيحة هي (ج) لأنها الأنسب للسياق المذكور في السؤال: تدمج تقييم األداء الفردي مع تقييم نتائج الفريق الجماعية بشكل متوازن لتعكس التفاعل لضطراب.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":678,"question":"الشئون اإلدارية، تكتشف وجود تعارض محتمل في المصالح بين السؤال8: بصفتك قائد ما هي أفضل خطوة عمليةعضو مجلس اإلدارة وبعض المشاريع التي تُدار في المؤسسة. تتبعها للتعامل مع الموقف؟","options":[{"letter":"A","text":"تخطر الهيئة التنفيذية فورا مع تقديم تقرير موثق يتضمن األدلة والمالحظات المتعلقة بالنزاع."},{"letter":"B","text":"تن اقش األمر بشكل خاص مع عضو مجلس اإلدارة المتعلق لتوضيح المالبسات قبل اتخاذ أي إجراء رسمي."},{"letter":"C","text":"تجمع كافة البيانات المتعلقة بالموقف، توثقها بدقة، وتقرر رفع األمر رسميا بعد دراسة متأنية مع مستشار قانوني."},{"letter":"D","text":"تبدأ بمراجعة السياسات واإلجراءات المتعلقة بتضارب المص الح لضمان تحديثها ومعالجتها في المستقبل قبل اتخاذ إجراءات حالية."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: تخطر الهيئة التنفيذية فورا مع تقديم تقرير موثق يتضمن األدلة والمالحظات المتعلقة بالنزاع.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":679,"question":"في مدرسة تواجه ضعف معدل تحصيل علمي لدى مجموعة من الطالب ذوي السؤال9: الخلفيات المتنوعة، كيف يمكنك تحقيق توازن دقيق بين الحاجة إلى تقييم يعكس األداء الحقيقي واحترام الفروق الفردية في أساليب التعلم؟","options":[{"letter":"A","text":"تعتمد أدوات تقييم موحدة مع توفير دعم تعويضي مكثف للطالب الذين يظهرون ضعفا بعد التقييم."},{"letter":"B","text":"تصمم مجموعة متنوعة من أدوات التقييم البديلة المعدلة لتتناسب مع أنماط التعلم المختلفة للطالب."},{"letter":"C","text":"التقييم الختامي، مع تعديل معايير التقييم بناءً على تقدم تدمج التقييم التكويني المستمر مع كل طالب."},{"letter":"D","text":"تعتمد على معايير تقييم معيارية فردية تركز على التقدم المكتسب لكل طالب دون مقارنة جماعية، مع استخدام أدوات تقييم متنوعة بدرجة محدودة."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تصمم مجموعة متنوعة من أدوات التقييم البديلة المعدلة لتتناسب مع أنماط التعلم المختلفة للطالب.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":680,"question":"إلنجاز مشرو ع معقد، والحظت أن أحد زمنيا السؤال10: أنت قائد فريق تواجه ضغطا كيف تتخذ القرارأعضائك األساسيين يعاني من ضغوط العمل مما يؤثر على جودة أدائه. األمثل لحل الموقف؟","options":[{"letter":"A","text":"تفتح حوارا أو مع العضو لبحث أسبابه وتقديم الدعم المتناسب سواء كان نفسيا فرديا تدريبيا."},{"letter":"B","text":"تعيد تنظيم توزيع المهام بين الفريق للحفا ظ على اإلنتاجية مع تقليل الضغط على العضو المتأثر."},{"letter":"C","text":"تطلب من العضو الالتزام بمعايير جودة مشددة مع متابعة أداء مستمرة لضمان تحقيق النتائج المطلوبة."},{"letter":"D","text":"تعتمد على تقييم األداء السابق لتحديد مدى مالءمة استمرار العضو في المشروع وتعديل دوره بناءً على ذلك."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: تفتح حوارا أو مع العضو لبحث أسبابه وتقديم الدعم المتناسب سواء كان نفسيا فرديا تدريبيا.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":681,"question":"في مؤسسة تعليمية تعاني من تكرار النزاعات بين أعضاء هيئة التدريس بسبب السؤال1: تدخالت إدارية متكررة، كيف ينبغي لقائد المدر سة الذي يتبع أسلوب القيادة التحويلية التعامل مع هذه الحالة لتحقيق بيئة عمل إيجابية ومستدامة؟","options":[{"letter":"A","text":"تنظيم ورش عمل تشاركية تجمع جميع األطراف لبلورة رؤية مشتركة ترتكز على القيم والمبادئ التي تحفز التعاون والثقة."},{"letter":"B","text":"عقد جلسات حوار مفتوحة ومنتظمة مع كافة أعضاء الهيئة لتبادل وجهات النظر بفعالية والعمل على صياغة آليات توافقية لحل النزاعات."},{"letter":"C","text":"تفويض مجموعة من القياديين داخل الهيئة لتقييم أسباب النزاعات واقتراح خطة عمل مشتركة تعتمد على التشاور المستمر مع الجميع دون فرض قرارات إدارية."},{"letter":"D","text":"تنفيذ برامج تطوير مهني تركز ع لى تعزيز مهارات التواصل وحل النزاعات الفردي مع متابعة دورية لتقييم تأثيرها على البيئة العمل."}],"answer":"","explanation":"الإجابة الصحيحة هي **(ب)** لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل.","unavailable":true},{"id":682,"question":"شركة صغيرة تواجه قيودالبتكار في تصميم مالية شديدة، ويُطلب من مديرها السؤال2: ما هو النهج األكثر فعالية لضمانمنتج جديد بتكلفة أدنى مع الحفاظ على جودة تنافسية. روف؟","options":[{"letter":"A","text":"لبتكار ضمن هذه الظنجاح رفع قدرات الفريق الداخلي بتدريب متخصص الستغالل الموارد المتاحة بالكامل وتطوير نموذج أولي متكامل دون اللجوء إلى الخارج."},{"letter":"B","text":"الشراكة مع جهة خارجية ذات خبرة في تقنيات تصنيع منخفضة التكلفة، مع مشاركة لقيود المالية."},{"letter":"C","text":"لبتكار وامرنة في األرباح المستقبلية؛ مما يوازن بين تبني نهج مبسط في تصميم المنتج يقلل من الميزات غير األساسية ويوجه لستثمار إلى لتقليل التكاليف مع المحافظة على جودة معقولة."},{"letter":"D","text":"تحسين تقنيات التصنيع داخليا تأجيل البدء بإطالق المنتج لحين تأمين تمويل إضافي يسمح بتطوير منتج متكامل داخليا لبتكار دون مجازفة مالية عالية."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: الشراكة مع جهة خارجية ذات خبرة في تقنيات تصنيع منخفضة التكلفة، مع مشاركة لقيود المالية.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":683,"question":"في سياق تقييم أداء موظفين يعملون عن بعد في بيئة عمل غير محددة وخالية من السؤال3: الرقابة المباشرة، ما هو األسلوب األكثر موثوقية وفعالية لتحفيز اإلنتاجية بشكل مستدام وقياس األداء بدقة؟","options":[{"letter":"A","text":"والنتائج النهائية كأساس رئيسي لتقييم مستوىلعتماد على مؤشرات األداء الكمية اإلنجاز الفردي."},{"letter":"B","text":"درجة متكامل يتضمن آراء العمالء، الزمالء، والمشرفين، مع استخدام تقييم360 الالتزام بالمهام."},{"letter":"C","text":"التركيز على جودة التواصل و إجراء مراجعات أداء دورية تعتمد على التقييم الذاتي المدعوم بمحاضر اجتماعات الاحتياجات التطويرية."},{"letter":"D","text":"منتظمة لمناقشة تقدم العمل و وضع نظام رقابة ذاتية صارم يشمل تقارير يومية مفصلة من الموظفين مع متابعات دورية من اإلدارة بدون تدخل مباشر."}],"answer":"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: درجة متكامل يتضمن آراء العمالء، الزمالء، والمشرفين، مع استخدام تقييم360 الالتزام بالمهام.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":684,"question":"تواجه م نظمة غير ربحية موقفا عندما يُعرض عليها تمويل من جهة معقدا أخالقيا ذات سجل مشكوك فيه في حقوق اإلنسان، كيف يجب على اإلدارة التصرف لضمان توازن دقيق بين المبادئ األخالقية ومصالح المنظمة؟", :"B","explanation":"الإجابة الصحيحة هي (ب) لأنها الأنسب للسياق المذكور في السؤال: تنظيم سلسلة دورات توعية ثقافية مستمرة تهدف إلى بناء فهم عميق وقيم احترام متبادل بين أفراد الفرق.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."},{"id":690,"question":"موظف الحظ شبهات تالعب مالي غير واضحة في قسم المالية، لكنه يفتقد أدلة السؤال10: ما الخطوة األكثر مهنيةقوية، وينطوي اإلبالغ المبكر على مخاطر كبيرة لمسيرته المهنية. وأخالقية التي ينبغي عليه اتخاذها في هذا الموقف؟","options":[{"letter":"A","text":"توثيق المالحظات بدقة ومواصلة الرصد لجمع أدلة إضاف ا على شفافية اإلجراءات."},{"letter":"B","text":"رفع المالحظات غير المكتملة مباشرة إلى اإلدارة العليا حفاظ مناقشة المالحظات بشكل خاص مع زميل موثوق في القسم ذاته للتحقق المشترك قبل أيج) تحرك رسمي."},{"letter":"C","text":"ب) رفع المالحظات غير المكتملة مباشرة إلى اإلدارة العليا حفاظ مناقشة المالحظات بشكل خاص مع زميل موثوق في القسم ذاته للتحقق المشترك قبل أي تحرك رسمي."},{"letter":"D","text":"ا على أمن الوظيفة وتفادي اإلضرار بالسمعة المهنية حتى تتضح التزام الصمت حفاظ األمور بشكل قاطع."}],"answer":"A","explanation":"الإجابة الصحيحة هي (أ) لأنها الأنسب للسياق المذكور في السؤال: توثيق المالحظات بدقة ومواصلة الرصد لجمع أدلة إضاف ا على شفافية اإلجراءات.. باقي الخيارات أقل دقة أو لا تعالج جوهر الموقف المطلوب."}];
const TOTAL = QUESTIONS.length;
let answers = JSON.parse(localStorage.getItem('educational_competencies_answers_v1') || '{}');
let filtered = [...QUESTIONS];
let currentPage = 1;
let pageSize = 20;
let currentFilter = 'all';

const arabicLetter = {A:'أ',B:'ب',C:'ج',D:'د'};

function saveAnswers(){ localStorage.setItem('educational_competencies_answers_v1', JSON.stringify(answers)); }

function getState(q){
  const a = answers[q.id];
  if(!a) return 'unanswered';
  if(q.unavailable || !q.answer) return 'unavailable';
  return a.correct ? 'correct' : 'wrong';
}

function answerQuestion(id, selected){
  const q = QUESTIONS.find(x=>x.id===id);
  if(!q || q.unavailable || !q.answer) return;
  const correct = selected === q.answer;
  answers[id] = {selected, correct};
  saveAnswers();
  updateScore();
  renderQuestions();
}

function updateScore(){
  let correct=0, wrong=0, answered=0;
  for(const q of QUESTIONS){
    const a=answers[q.id];
    if(a){ answered++; if(a.correct) correct++; else wrong++; }
  }
  const pct = answered ? Math.round((correct/answered)*100) : 0;
  const remaining = TOTAL - answered;
  document.getElementById('countCorrect').textContent=correct;
  document.getElementById('countWrong').textContent=wrong;
  document.getElementById('countAnswered').textContent=answered;
  document.getElementById('countSkip').textContent=remaining;
  document.getElementById('countTotal').textContent=TOTAL;
  document.getElementById('scorePct').textContent=pct+'%';
  document.getElementById('miniCorrect').textContent=correct;
  document.getElementById('miniWrong').textContent=wrong;
  document.getElementById('miniPct').textContent=pct+'%';
  document.getElementById('progFill').style.width=(answered/TOTAL*100)+'%';
  document.getElementById('ringFill').style.strokeDashoffset=283-(283*pct/100);
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function renderQuestions(){
  const wrap=document.getElementById('questionsWrap');
  const start=(currentPage-1)*pageSize;
  const pageItems=filtered.slice(start,start+pageSize);
  if(pageItems.length===0){
    wrap.innerHTML='<div class="empty">لا توجد أسئلة مطابقة للبحث أو الفلتر الحالي.</div>';
  } else {
    wrap.innerHTML=pageItems.map(q=>renderCard(q)).join('');
  }
  const pages=Math.max(1, Math.ceil(filtered.length/pageSize));
  document.getElementById('pageInfo').textContent=`صفحة ${currentPage} من ${pages} — المعروض ${filtered.length} سؤال`;
}

function renderCard(q){
  const a=answers[q.id];
  const state=getState(q);
  const cls = q.unavailable ? 'unavailable' : (state==='correct'?'good':state==='wrong'?'bad':'');
  let feedback='';
  const correctLabel = arabicLetter[q.answer] || q.answer;
  const selectedLabel = a ? (arabicLetter[a.selected] || a.selected) : '';
  const correctOption = (q.options || []).find(o => o.letter === q.answer);
  const correctText = correctOption ? correctOption.text : '';
  const explanationText = q.explanation || (correctText ? `لأن هذا الخيار يطابق المطلوب في السؤال: ${correctText}` : 'هذا هو الخيار المطابق لمفتاح الإجابة.');

  if(q.unavailable || !q.answer){
    feedback = `<div class="feedback warn show">
      ⚠️ هذا السؤال لم يتم استخراج نصه أو إجابته بشكل كامل من الملف، لذلك تم عرضه كعنصر مرجعي فقط.
      <div class="explain-box">
        <div class="explain-title">💡 ليش؟</div>
        ${escapeHtml(explanationText)}
      </div>
    </div>`;
  } else if(a){
    if(a.correct){
      feedback = `<div class="feedback ok show">
        ✅ إجابة صحيحة
        <div class="correct-answer-line">الإجابة الصحيحة: ${correctLabel}</div>
        <div class="explain-box">
          <div class="explain-title">💡 ليش الإجابة صحيحة؟</div>
          ${escapeHtml(explanationText)}
        </div>
      </div>`;
    } else {
      feedback = `<div class="feedback no show">
        ❌ إجابة خاطئة — إجابتك: ${selectedLabel}
        <div class="correct-answer-line">الإجابة الصحيحة: ${correctLabel}</div>
        <div class="explain-box">
          <div class="explain-title">💡 ليش الإجابة الصحيحة هي ${correctLabel}؟</div>
          ${escapeHtml(explanationText)}
        </div>
      </div>`;
    }
  }
  const opts = q.options && q.options.length ? q.options : [{letter:'A',text:'غير متوفر'},{letter:'B',text:'غير متوفر'},{letter:'C',text:'غير متوفر'},{letter:'D',text:'غير متوفر'}];
  return `<article class="q-card ${cls}" id="q-${q.id}">
    <div class="q-head">
      <div class="q-num">${q.id}</div>
      <div style="flex:1">
        <div class="tag">Educational Competencies Question</div>
        <div class="q-title">${escapeHtml(q.question)}</div>
      </div>
    </div>
    <div class="options">
      ${opts.map(o=>{
        let oc='';
        if(a || q.unavailable || !q.answer){
          oc+=' disabled';
          if(q.answer && o.letter===q.answer) oc+=' correct-opt';
          if(a && o.letter===a.selected && !a.correct) oc+=' wrong-opt';
        }
        return `<div class="option${oc}" onclick="answerQuestion(${q.id}, '${o.letter}')">
          <span class="letter">${arabicLetter[o.letter] || o.letter}</span>
          <span>${escapeHtml(o.text)}</span>
        </div>`;
      }).join('')}
    </div>
    ${feedback}
  </article>`;
}

function applyFilters(){
  const term=document.getElementById('searchInput').value.trim().toLowerCase();
  filtered = QUESTIONS.filter(q=>{
    const st=getState(q);
    let pass = currentFilter==='all' || st===currentFilter || (currentFilter==='unavailable' && q.unavailable);
    if(!pass) return false;
    if(!term) return true;
    return String(q.id).includes(term) || (q.question||'').toLowerCase().includes(term) || (q.options||[]).some(o=>(o.text||'').toLowerCase().includes(term));
  });
  currentPage=1;
  renderQuestions();
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active', b.dataset.filter===f));
  applyFilters();
}

function changePageSize(v){ pageSize=parseInt(v,10)||20; currentPage=1; renderQuestions(); }
function nextPage(){ const pages=Math.max(1,Math.ceil(filtered.length/pageSize)); if(currentPage<pages){currentPage++;renderQuestions();window.scrollTo({top:document.querySelector('.tools-card').offsetTop-70,behavior:'smooth'})} }
function prevPage(){ if(currentPage>1){currentPage--;renderQuestions();window.scrollTo({top:document.querySelector('.tools-card').offsetTop-70,behavior:'smooth'})} }

function resetAll(){
  if(confirm('هل تريد حذف كل الإجابات والبدء من جديد؟')){
    answers={}; saveAnswers(); updateScore(); applyFilters();
  }
}

function shuffleQuestions(){
  for(let i=QUESTIONS.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [QUESTIONS[i],QUESTIONS[j]]=[QUESTIONS[j],QUESTIONS[i]]; }
  applyFilters();
}

function showResults(){
  let correct=0, wrong=0, answered=0;
  for(const q of QUESTIONS){ const a=answers[q.id]; if(a){answered++; if(a.correct)correct++; else wrong++;} }
  const pct=answered?Math.round(correct/answered*100):0;
  document.getElementById('gradeText').textContent=pct+'%';
  document.getElementById('modalCorrect').textContent=correct;
  document.getElementById('modalWrong').textContent=wrong;
  document.getElementById('modalAnswered').textContent=answered;
  document.getElementById('resultMsg').textContent = answered===0 ? 'ابدأ بحل الأسئلة أولاً.' : (pct>=85?'ممتاز جدًا 🔥':pct>=70?'جيد جدًا، كمل مراجعة 💪':pct>=50?'مقبول، ركز على الأخطاء 📘':'تحتاج مراجعة أكثر، ابدأ بأخطائك ❌');
  document.getElementById('modalOverlay').classList.add('show');
}
function closeResults(e){ if(e.target.id==='modalOverlay') e.target.classList.remove('show'); }

// Canvas background
const c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');let particles=[];
function resize(){c.width=innerWidth;c.height=innerHeight;particles=Array.from({length:55},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+0.5,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25}));}
addEventListener('resize',resize);resize();
function anim(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle='rgba(210,214,220,.55)';
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>c.width)p.vx*=-1;if(p.y<0||p.y>c.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
  ctx.strokeStyle='rgba(210,214,220,.08)';
  for(let i=0;i<particles.length;i++)for(let j=i+1;j<particles.length;j++){let a=particles[i],b=particles[j],d=Math.hypot(a.x-b.x,a.y-b.y);if(d<120){ctx.globalAlpha=1-d/120;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.globalAlpha=1;}}
  requestAnimationFrame(anim);
} anim();

updateScore();
applyFilters();
</script>
