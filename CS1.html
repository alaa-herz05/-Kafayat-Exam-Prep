<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CS1 - امتحان الحاسوب التفاعلي</title><link rel="stylesheet" href="style.css"></head><body><div class="wrap"><section class="hero"><h1>💻 CS1 - امتحان الحاسوب التفاعلي</h1><p>بنك أسئلة الحاسوب التنافسي 2026 — تصحيح فوري، سكور، شرح مبسط، وحفظ تلقائي للتقدم.</p><div class="progress"><div class="bar" id="bar"></div></div></section><section class="stats"><div class="stat"><b id="total">0</b><span>عدد الأسئلة</span></div><div class="stat"><b id="score">0</b><span>السكور</span></div><div class="stat"><b id="correct">0</b><span>صح</span></div><div class="stat"><b id="wrong">0</b><span>غلط</span></div></section><div class="toolbar"><input id="search" placeholder="ابحث داخل الأسئلة أو الخيارات..."><select id="filter"><option value="all">كل الأسئلة</option><option value="new">غير محلول</option><option value="ok">إجابات صحيحة</option><option value="no">إجابات خاطئة</option></select><select id="mode"><option value="ordered">بالترتيب</option><option value="random">عشوائي</option></select><button id="reset">تصفير التقدم</button></div><main class="layout"><aside class="side"><div class="pill">قائمة الأسئلة</div><div class="grid" id="nav"></div></aside><section class="card"><div class="meta"><span id="counter"></span><span id="status"></span></div><div class="question" id="question"></div><div id="options"></div><div class="feedback" id="feedback"></div><div class="actions"><button class="secondary" id="prev">السابق</button><button class="btn" id="next">التالي</button></div></section></main></div><script src="questions.js"></script><script>
const state=JSON.parse(localStorage.getItem('cs1_state')||'{}');let order=[...QUESTIONS.keys()];let current=0;const el=id=>document.getElementById(id);function save(){localStorage.setItem('cs1_state',JSON.stringify(state));updateStats();renderNav()}function updateStats(){let ok=0,no=0;QUESTIONS.forEach(q=>{if(state[q.id]?.correct)ok++;else if(state[q.id])no++});el('total').textContent=QUESTIONS.length;el('score').textContent=ok+' / '+QUESTIONS.length;el('correct').textContent=ok;el('wrong').textContent=no;el('bar').style.width=Math.round(((ok+no)/QUESTIONS.length)*100)+'%'}function filtered(){let s=el('search').value.trim().toLowerCase(),f=el('filter').value;let arr=QUESTIONS.map((q,i)=>i).filter(i=>{let q=QUESTIONS[i],st=state[q.id];let txt=(q.question+' '+q.options.map(o=>o.text).join(' ')).toLowerCase();if(s&&!txt.includes(s))return false;if(f==='new'&&st)return false;if(f==='ok'&&!st?.correct)return false;if(f==='no'&&(!st||st.correct))return false;return true});if(el('mode').value==='random')arr.sort(()=>Math.random()-.5);return arr.length?arr:[0]}function renderNav(){let arr=filtered();order=arr;if(!order.includes(current))current=order[0];el('nav').innerHTML=order.map(i=>{let q=QUESTIONS[i],st=state[q.id];let cls='qnum '+(i===current?'active ':'')+(st?(st.correct?'ok':'no'):'');return `<button class="${cls}" onclick="go(${i})">${q.id}</button>`}).join('')}function go(i){current=i;render()}function render(){let q=QUESTIONS[current],st=state[q.id];el('counter').textContent=`السؤال ${q.id} من ${QUESTIONS.length}`;el('status').textContent=st?(st.correct?'✅ مجاب صح':'❌ مجاب غلط'):'غير مجاب';el('question').textContent=q.question;el('options').innerHTML=q.options.map(o=>`<button class="option" data-label="${o.label}"><b>${o.label})</b> ${o.text}</button>`).join('');document.querySelectorAll('.option').forEach(btn=>btn.onclick=()=>answer(btn.dataset.label));showFeedback();renderNav();updateStats()}function answer(label){let q=QUESTIONS[current];let correct=q.answer&&label===q.answer;state[q.id]={choice:label,correct};save();showFeedback()}function showFeedback(){let q=QUESTIONS[current],st=state[q.id],fb=el('feedback');document.querySelectorAll('.option').forEach(btn=>{btn.classList.remove('correct','wrong');if(st){if(btn.dataset.label===q.answer)btn.classList.add('correct');if(btn.dataset.label===st.choice&&st.choice!==q.answer)btn.classList.add('wrong')}});if(!st){fb.className='feedback';fb.innerHTML='';return}let ok=st.correct;fb.className='feedback show '+(ok?'good':'bad');fb.innerHTML=`<b>${ok?'✅ إجابة صحيحة':'❌ إجابة خاطئة'}</b><br>إجابتك: (${st.choice}) ${q.answer?` — الإجابة الصحيحة: (${q.answer})`:''}<hr style="border-color:#263244"><div>${q.explanation}</div>`}el('next').onclick=()=>{let idx=order.indexOf(current);current=order[(idx+1)%order.length];render()};el('prev').onclick=()=>{let idx=order.indexOf(current);current=order[(idx-1+order.length)%order.length];render()};['search','filter','mode'].forEach(id=>el(id).oninput=()=>{renderNav();render()});el('reset').onclick=()=>{if(confirm('تأكيد تصفير كل الإجابات؟')){localStorage.removeItem('cs1_state');Object.keys(state).forEach(k=>delete state[k]);render()}};renderNav();render();
</script></body></html>
