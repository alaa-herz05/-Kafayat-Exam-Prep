ل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":635,"q":"في بيئة عمل تقليدية متشددة، ما هي أنسب الاستراتيجية لتعزيز التفكير الإلبداعي بشكل فعّال ومستدام؟","o":{"أ":"ا طر زمنية محددة للتجريب مع توفير دعم معنوي لتخفيف رهبة الفشل. وضع أ سبية في اختيار أساليب الإلنجاز.","ب":"فرض معايير إبداعية واضحة مع منح حرية ن لبتكار ضمن حدود محددة مع تعزيز المراجعة الجماعية المستمرة.","ج":"تشجيع الفرق على الالتزام بإجراءات االعمل المعتادة مع السماح بمرونة ضئيلة في بعض الممارسات.","د":"تعزيز طر زمنية للتجريب مع توفير دعم معنوي يُمكن الألفراد من تحديد أ"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":636,"q":"أنت مدير فريق وتواجه مجموعة من القرارات المتزامنة ذات درجات تأثير متفاوتة، كيف توزع وقتك وتركيزك لتحقيق أفضل النتائج للفريق؟","o":{"أ":"نتائج الفريق، مع تخصيص الوقت الألكبر للقرارات التي تؤثر بشكل مباشر وكبير على متابعة القرارات الألقل تأثيرً ا بعد ذلك. توزيع الوقت و لهتمام بشكل متساوٍ بين جميع القرارات لضمان عدم إهمال أي جانب","ب":"مهما كان حجمه.","ج":"تفويض القرارات الألقل تأثيرً ا فورًا للمرؤوسين، مع التركيز الكامل على القرارات ذات التأثير العالي.","د":"ال تركيز أوال على القرارات الطارئة بغض النظر عن حجم تأثيرها، ثم التعامل مع القرارات الألخرى حسب توفر الوقت. لأن تخصيص الوقت و لهتمام الألكبر للقرارات ذات التأثير المباشر"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":637,"q":"في ظل تغير أولوية العمالء بشكل سريع ومستمر، كيف تضمن أن تظل المؤسسة مرنة وذات قدرة تنافسية عالية؟","o":{"أ":"وضع آليات تقييم دورية مع تعديل الخطط التنفيذية بناءً على نتائج المراجعة. بناء أنظمة مراجعة مستمرة مع تكييف سريع للمنتجات والخدمات حسب المتغيرات","ب":"السوقية. وقعات السوق السابقة مع تحديثها بشكل دوري لتوجيه الخطط المستقبلية.الاعتماد على ت","ج":"ترسيخ إجراءات تشغيل قياسية ثابتة مع استثارة فرص التحسين عند ظهور مؤشرات","د":"هامة فقط. ا المرونة الحقيقية تتطلب أنظمة مراجعة مستمرة وتكييفًا سريعًا"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":638,"q":"ما هو الدور الألساسي للتقييم النق دي في التخطيط الاستراتيجي لضمان تحقيق الألهداف المؤسسية بكفاءة وفعالية؟","o":{"أ":"مراجعة الألفكار والخطط لضمان الجدية والواقعية في التنفيذ مع التركيز على سرعة اتخاذ القرار.","ب":"التأكد من جدوى وقابلية تنفيذ الألفكار والخطط بما يتماشى مع موارد المؤسسة وأهدافها المدى. الطويلة","ج":"تقييم الألفكار من حيث تأثيرها المالي والتشغيلي فقط لضمان استدامة المشروع. إشراك جميع أصحاب المصلحة في مراجعة الألفكار بهدف الوصول إلى توافق جماعي","د":"قبل اتخاذ القرار النهائي. الاستراتيجي يهدف إلى الت أكد من جدوى ب- التقييم النقدي في التخطيط"},"a":"ب","e":"الإجابة الصحيحة هي: التأكد من جدوى وقابلية تنفيذ الألفكار والخطط بما يتماشى مع موارد المؤسسة وأهدافها المدى. الطويلة. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":639,"q":"أحد أعضاء الفريق يمتلك مهارات عالية لكنه يمتنع باستمرار عن المشاركة في اجتماعات الفريق. ما هو التصرف الألمثل في هذه الحالة؟","o":{"أ":"الحضور الدائم. تحفيزه عبر إشراكه ثقيا في القرارات المهمة دون إجباره على لمتناع وتحفيزه على المشاركة الفاعلة. لفهم أسباب","ب":"التحدث معه شخصيا تذكيره بضرورة الحضور باعتباره جزءا من التزامه الوظيفي والتأكيد على أهمية","ج":"الاجتماعات. الاجتماعات. لتقليل تأثير غيابه عن ل","د":"اللجوء إلى إشراكه في مهام فردية أكثر انعز التواصل المباشر والفهم العميق لألسباب يفتحان باب الحلول"},"a":"ب","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":640,"q":"كيف تتعامل مع مخاطر عدم اليقين في مشروع تطوير تقنية جديدة لضمان تحقيق أفضل نتائج بأقل تأثير سلبي؟","o":{"أ":"تقييم المخاطر بشكل دوري وتحسين خطط الطوارئ بناءً على المستجدات.","ب":"تحليل المخاطر بعمق ووضع خطط طوارئ متنوعة وشاملة قبل بدء التنفيذ. تأجيل بعض مراحل المشروع حتى تتضح مدى تأثير المخاطر وتحديد الاستراتيجيات","ج":"المناسبة.","د":"توزيع الموارد بشكل مرن مع بقاء خطط بديلة جاهزة لتعديل المسار عند ظهور مخاطر حقيقية."},"a":"ب","e":"لأن التحليل العميق ووضع خطط طوارئ متنوعة وشاملة قبل لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":641,"q":"أنت مدير مشروع في مؤسسة تعليمية تعان ي من نقص حاد في الميزانية، في حين يقترح أحد أعضاء الفريق تقليصيزداد طلب المعلمين والطلاب على موارد تعليمية حديثة. بعض البرامج الألقل تأثيرً ا إلعادة توجيه الموارد نحو التكنولوجيا التعليمية، بينما يقترح كيفل على تمويل خارجي. عضو آخر الحفاظ على البرامج الحالية مع السعي الجاد للحصو تتعا","o":{"أ":"التكنولوجيا التعليمية بشكل مركز وواضح. النهجين من خالل الحفاظ على البرامج القوية مع تكثيف البحث عن تمويل","ب":"تحاول دمج خارجي، مع وضع خطة متابعة دقيقة لتنفيذ كال المسارين. ،تكلف لجنة متخصصة بسرعة مراجعة أثر كل برنامج باستخدام معايير موضوعية","ج":"الانتهاء من التقييم، مع المحافظة على الت واصل المستمر معوتأجيل أي قرار جوهري حتى الفريق. تتخذ قرارك المبني على خبرتك الشخصية وقراءة سريعة للموقف، مع اعتماد واحد من","د":"لقتراحين لتجنب فقدان الوقت وللحفاظ على سرعة التنفيذ. لأن تشكيل لجنة متخصصة تُطبّق منهجية تقييم دقيقة وموضوعية"},"a":"ج","e":"الإجابة الصحيحة هي: الانتهاء من التقييم، مع المحافظة على الت واصل المستمر معوتأجيل أي قرار جوهري حتى الفريق. تتخذ قرارك المبني على خبرتك الشخصية وقراءة سريعة للموقف، مع اعتماد واحد من. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":642,"q":"في شركة متوسطة تواجه منافسة شديدة، وأنت قائد فريق التطوير تسعى لدمج كبيرالديك فكرة لتطوير منتج جديد تتطلب استثمارالبتكار رغم محدودية الموارد المتاحة. الاستراتيجي الألمثل في هذه الحالة؟","o":{"أ":"في مدى نجاحه. ما هو القرار وتحمل غموضا توجيه جميع الموارد الحالية نحو تحسين المنتج الحالي باستثمارات صغيرة لتحسين الألداء وتقليل المخاطر. تخصيص نسبة محددة من الموارد للبحث والتطوير في المنتج الجديد مع تنفيذ خطة","ب":"مع بيانات أولية.اختبار تجريبية منخفضة التكلفة لج السعي للحصول على تمويل كامل للمشروع الجديد بناءً على بحوث سوق أولية وتحليل","ج":"مفصل للتكلفة والعائد. تأجيل خطوات التطوير الجديدة حتى استقرار الوضع المالي وإجراء دراسات سوقية","د":"معمقة لتقليل عدم اليقين. لأن تخصيص جزء من الموارد لبحث وتطوير المنتج الجديد مع"},"a":"ب","e":"الإجابة الصحيحة هي: مع بيانات أولية.اختبار تجريبية منخفضة التكلفة لج السعي للحصول على تمويل كامل للمشروع الجديد بناءً على بحوث سوق أولية وتحليل. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":643,"q":"أثناء تقييم أداء فريقك في بيئة عمل عن بُعد غير تقليدية، تلاحظ تفاوتًا في عادالكيف تُجري تقييمالإلنتاجية ناجمًا عن عوامل شخصية وظروف بيئية مختلفة. يراعي هذه التفاصيل ويُحفز الألداء؟","o":{"أ":"وموضوعيا ا، معالاعتماد على مقارنة نتائج الألداء الفردي المحققة مقارنة بالألهداف المحددة مسبق تبار.لعتعديل طفيف ألخذ الظروف الشخصية في إجراء مقابالت تفصيلية مع كل عضو في الفريق لجمع معلومات نوعية، مع استخدام","ب":"مقاييس كمية مرنة تأخذ الحيثيات البيئية في الحسبان. تبني نظام تقييم يجمع بين التقييم الذاتي، والتغذية الراجعة المتبادلة بين الزمالء، وتحليل","ج":"نتائج الألداء بشكل موضوعي. الاعتماد بشكل حصري على البيانات الكمية الدقيقة دون تعديل، لضمان النزاهة","د":"والحيادية في التقييم بغض النظر عن الظروف الشخصية. التقييم الذاتي، التغذية لأن هذا الخيار يدمج بين المقاربات المختلفة("},"a":"ج","e":"الإجابة الصحيحة هي: نتائج الألداء بشكل موضوعي. الاعتماد بشكل حصري على البيانات الكمية الدقيقة دون تعديل، لضمان النزاهة. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":645,"q":"أنت قائد في منظمة غير ربحية تواجه تحديا في وضع خطة استراتيجية طويلة الألمد وسط بيئة متغيرة وسريعة التطور. كيف تصوغ الخطة؟","o":{"أ":"وضع خطة استراتيجية تغطي خمس سنوات تتضمن أهدافا واضحة، مع تحديثات دورية","ب":"تبني خطة تركز على أهداف مرنة ومتدرجة مستمرة تسمح بتكييف السياسات حسب الظروف المتغيرة. تصميم خطة قصيرة الألمد مدتها سنة واحدة مع تحديد رؤى عامة بعيدة المدى، تُحدَّث","ج":"لستقرار والمرونة. بناءً على المراجعات الدورية لتحقيق التوازن بين ا","د":"دمج رؤى مختلفة من فرق الع مل لوضع خطة استراتيجية شاملة وثابتة مع جدول مراجعات محدد لضمان توافق الخطة مع التغيرات البيئية. يجمع بين وضع أهداف واضحة ضمن إطار زمني لأن الخيار("},"a":"أ","e":"الإجابة الصحيحة هي: وضع خطة استراتيجية تغطي خمس سنوات تتضمن أهدافا واضحة، مع تحديثات دورية. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":647,"q":"بينما تقود فريقا من الطالب عن التعليم متزايدا في مدرسة تواجه عزوفا تعليميا الإللكتروني، يقترح أحد المعلمين تغييرا في أسلوب التدريس الإللكتروني مع تقدير جذريا لقتراح؟","o":{"أ":"عامل مع هذا التكاليف والمخاطر المحتملة. ما هو الألسلوب الأكثر مهنية وفعالية للت لبتكار ودفع التغيير بسرعة في فريق االعمل.","ب":"لتعزيز اعتماد التغيير فورا تنفيذ التغيير تدريجيا في فصل تجريبي مع مراقبة دقيقة للنتائج وتأثيرها على الطالب ا والمعلمين.","ج":"إجراء دراسة جدوى شاملة تشمل تقييم آراء الطالب والمعلمين والجوا نب المالية والفنية قبل اتخاذ قرار نهائي. تحسين الألدوات والتدريب على الألساليب الحالية لتحسين جودة التعليم الإللكتروني دون","د":"تغييرات جذرية في الوقت الحالي. لأن إجراء دراسة جدوى شاملة يمكن القيادة من اتخاذ قرار مستنير"},"a":"ج","e":"الإجابة الصحيحة هي: إجراء دراسة جدوى شاملة تشمل تقييم آراء الطالب والمعلمين والجوا نب المالية والفنية قبل اتخاذ قرار نهائي. تحسين الألدوات والتدريب على الألساليب الحالية لتحسين جودة التعليم الإللكتروني دون. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":648,"q":"في مؤسسة حكومية شهدت تراجعا في مؤشرات الألداء نتيجة ظروف ملحوظا ،طارئة مفاجئة، يُطلب منك تقييم الألداء وفق معايير غير تقليدية تتناسب مع الوضع الراهن ما الألسلوب الألمثل لتحقيق تقييم موضوعي وشامل؟","o":{"أ":"الحالية لتتماشى حصريا مع الظروف الطارئة التي أثرت على تعديل مؤشرات الألداء الألداء. اعتماد تحليل جودة شامل يجمع بين مؤشرات كمية ونوعية مع الألخذ في لعتبار تأثير","ب":"الظروف الطارئة بشكل متوازن. لستمرار في استخدام مؤشرات الألداء القياسية السابقة كمقياس أساسي مع إضافة","ج":"ملاحظة تفسيرية عن الظروف الطارئة. تأجيل عملية تقييم الألداء حتى عودة الظروف إلى طبيعتها لضمان مقارنة الألداء بمعايير","د":"ثابتة. لأن اعتماد تحليل جودة شامل يجمع بين مؤشرات كمية ونوعية مع"},"a":"ب","e":"الإجابة الصحيحة هي: الظروف الطارئة بشكل متوازن. لستمرار في استخدام مؤشرات الألداء القياسية السابقة كمقياس أساسي مع إضافة. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":649,"q":"أنت قائد فريق في بيئة عمل مبتكرة، ويعبر أحد الألعضاء عن مخاوفه من سالمة فكرة جديدة وتأثيرها المحتمل على العمالء، كيف تتعامل مع هذا لعتراض بما يضمن لبتكار والمسؤولية؟","o":{"أ":"التوازن بين تد عو العضو إلى مناقشة موسعة لمخاوفه، وتحفزه على تقديم اقتراحات بديلة قبل اتخاذ أي قرار نهائي. ا تؤجل تطبيق الفكرة مباشرةً إلى حين إجراء اختبارات تجريبية في بيئة محكومة تقيّم","ب":"تأثيرها بدقة. تشجع الفريق على التصويت الجماعي التخاذ قرار سريع بشأن الموافقة أو ،الرفض","ج":"لتجنب إطالة الجدال. تستعرض يعزز موقفلعتراض بشكل منفرد مع العضو المعترض، ثم تقدم توضيحا","د":"الفكرة ويطلب متابعة التنفيذ بحذر. لأن التعامل المباشر مع مخاوف العضو وتشجيعه على اقتراح بدائل"},"a":"أ","e":"الإجابة الصحيحة هي: التوازن بين تد عو العضو إلى مناقشة موسعة لمخاوفه، وتحفزه على تقديم اقتراحات بديلة قبل اتخاذ أي قرار نهائي. ا تؤجل تطبيق الفكرة مباشرةً إلى حين إجراء اختبارات تجريبية في بيئة محكومة تقيّم. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":650,"q":"بصفتك مديرا في مؤسسة تعليمية تواجه تحديات أخالقية بشأن قبول منح دراسية لطالب مع شروط قد تؤثر على استقاللية البرامج الألكاديمية، كيف تتصرف لتحقيق لستقاللية الألكاديمية؟","o":{"أ":"لستفادة من المنح والحفاظ على التوازن الألمثل بين قبول المنح المشروطة مع محاولة تعديل الشروط داخليا لضمان الحد من تأثيرها على البرامج الألكاديمية. لستقاللية الألكاديمية دون المساومة. على","ب":"رفض المنح المشروطة بالكامل حفاظا قبول المنح بعد التفاوض الفعّال مع الجهات المانحة إللغاء أو تعديل الشروط التي تمس","ج":"يُعد الأكثر م هنية وأخالقية، حيث يسعى إلى حماية","د":"لستقالل الألكاديمي. لأن الخيار("},"a":"ج","e":"الإجابة الصحيحة هي: يُعد الأكثر م هنية وأخالقية، حيث يسعى إلى حماية. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":651,"q":"أنت مدير مشروع في مؤسسة تعليمية تواجه انخفاضًا في أ داء فريق االعمل بسبب كيف تتعامل مع هذه الألزمة لضمانتوترات داخلية وصراعات غير معلنة بين الألعضاء. استمرارية الإلنتاجية مع الحفاظ على بيئة عمل صحية؟","o":{"أ":"ا عقد اجتماعات فردية مع أعضاء الفريق لفهم دوافعهم ووجهات نظرهم، ثم عقد اجتماع الخالفات. جماعي لتعزيز الحوار المفتوح وحل تنظيم جلسات حوارية جماعية باستخدام تقنيات الوساطة لحل الصراعات وتعزيز الثقة","ب":"بين الألعضاء، دون تفصيل الألدوار قبل ذلك. إعادة توزيع المهام بين أعضاء الفريق بناءً على تحليل سلوكهم وتفاعالتهم، مع عقد","ج":"اجتماعات متابعة دورية لمراقبة الألثر. تطبيق قواعد وإجراءات تنظيمية واضحة للسلوك، مع توضيح عواقب المخالفات، إلى","د":"جانب توفير فرص للتعبير عن المشكالت بشكل رسمي. لأن عقد اجتماعات فردية أوال يسمح بفهم عميق وشخصي لمشاكل"},"a":"أ","e":"الإجابة الصحيحة هي: ا عقد اجتماعات فردية مع أعضاء الفريق لفهم دوافعهم ووجهات نظرهم، ثم عقد اجتماع الخالفات. جماعي لتعزيز الحوار المفتوح وحل تنظيم جلسات حوارية جماعية باستخدام تقنيات الوساطة لحل الصراعات وتعزيز الثقة. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":652,"q":"مالبتكار ضمن فريقه. ويرغب في تعزيز ل بموارد محدودة جدا قائد قسم يعم لبتكار في ظل هذه الظروف؟","o":{"أ":"أنسب طريقة لتحفيز الفريق لتحقيق أعلى مستويات وضع أهداف ابتكارية واضحة وقابلة للقياس، مع مراجعة دورية لضبط الألولويات وتقليل المشاريع غير المجدية. المستمر مع توفير دعم معنوي ونفسي، مع قبول احتمالية الفشل","ب":"تشجيع ثقافة التجريب كجزء من التعلم.","ج":"توجيه الموارد بشكل أساسي نحو المشاريع التي أظهرت نتائج مبدئية واعدة لتقليل المخاطر وتحقيق أثر ملموس.","د":"تحسين االعمليات الحالية لتعزيز الكفاءة التشغيلية قبل توجيه الموارد لمحاولة ا بتكار حلول جديدة قد تكون مكلفة. لأن تشجيع ثقافة التجريب مع الدعم المعنوي المستمر يخلق بيئة"},"a":"ب","e":"الإجابة الصحيحة هي: تشجيع ثقافة التجريب كجزء من التعلم.. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":653,"q":"أنت مدير مؤسسة وتلاحظ وجود تقارير تشير إلى احتمال حدوث خلل أخالقي ية وفاعلية لمعالجة هذه القضية؟","o":{"أ":"في قسم حساس. ما هو الإجراء الأكثر مهن تبدأ بإجراء تحقيق داخلي سري بدقة وحياد لجمع الألدلة وتحليل الوضع قبل اتخاذ أي إجراءات أخرى. مع مدير القسم المباشر لمناقشة التقارير وتقييم المعلومات قبل رفع الألمر.","ب":"تعقد اجتماعا إلى لجنة أخالقيات المؤسسة مع تزويدهم بكل البيانات المتاحة تحيل القضية فورا","ج":"وانتظار توجيهاتهم التنفيذية.","د":"تعلن بدء تحقيق رسمي أمام الموظفين لتعزيز الشفافية والشفاء في بيئة االعمل منذ البداية. لأن إجراء تحقيق داخلي سري يحفظ نزاهة االعملية ويمنع التأثير"},"a":"أ","e":"الإجابة الصحيحة هي: في قسم حساس. ما هو الإجراء الأكثر مهن تبدأ بإجراء تحقيق داخلي سري بدقة وحياد لجمع الألدلة وتحليل الوضع قبل اتخاذ أي إجراءات أخرى. مع مدير القسم المباشر لمناقشة التقارير وتقييم المعلومات قبل رفع الألمر.. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":654,"q":"في بيئة تعليمية تواجه تغييرات تكنولوجية سريعة ومتالحقة على مدى خ مس سنوات، كيف تخطط استراتيجيًا لتأهيل المعلمين بشكل مستدام وفعال للتعامل مع هذه التحديات؟","o":{"أ":"اعتماد برامج تدريب دورية محدثة توافق كل تطور تقني جديد يتم رصده خالل هذه الفترة. تكوين فريق داخلي متخصص يتولى رصد التقنيات الحديثة ويقدم ورش عمل موجهة","ب":"ا.فور ظهوره تصميم خطة تطوير مهني فردية تستند إلى تقييم دوري شامل لمهارات كل معلم وتحليل","ج":"احتياجاته.","د":"تعزيز ثقافة التعلم الذاتي عبر توفير مصادر إلكترونية معتمدة ودعم الموجهين لتحفيز لستقاللية التعليمية."},"a":"ج","e":"الإجابة الصحيحة هي: احتياجاته.. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":655,"q":"أنت تقيم أداء موظف يعمل في بيئة عمل متغيرة ومليئة بعدم اليقين، كيف تقيس أدائه بدقة لتحقيق تقييم عادل وموضوعي؟","o":{"أ":"الاعتماد على تقييم النتائج والإلنجازات الكمية التي حققها الموظف بغض النظر عن ظروف التغير.","ب":"دمج تقييم الألداء الذاتي مع تقارير الزمالء والمديرين لتكوين صورة شاملة عن أدائه.","ج":"التر كيز على قدرة الموظف على التكيف والمرونة في التعامل مع المتغيرات مع الألخذ لعتبار النتائج المحققة.في تقييم مدى التزام الموظف بالإجراءات والسياسات الداخلية كأساس لتقدير أدائه في ظل","د":"التغيرات."},"a":"ج","e":"الإجابة الصحيحة هي: التر كيز على قدرة الموظف على التكيف والمرونة في التعامل مع المتغيرات مع الألخذ لعتبار النتائج المحققة.في تقييم مدى التزام الموظف بالإجراءات والسياسات الداخلية كأساس لتقدير أدائه في ظل. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":656,"q":"في موقف قيادي يتطلب اتخاذ قرا ر مهم، بينما تكون المعلومات المتاحة متضاربة وغير مكتملة، كيف تتصرف لضمان أفضل نتيجة مهنية وعملية؟","o":{"أ":"الاعتماد على تحليل سريع للبيانات المتاحة مع استشارة فورية لبعض الزمالء ذوي الخبرة لتقليل الوقت قبل القرار.","ب":"تجميع أكبر قدر ممكن من المعلومات مع محاولة دم ج وجهات نظر الفريق، وتأجيل القرار حتى تكون الصورة أوضح. اتخاذ القرار استنادًا إلى الخبرات السابقة والحدس المهني، مع إبقاء قنوات التواصل","ج":"ا.مفتوحة لمراجعة القرار الحق استشارة فريق الخبراء بشكل رسمي لمناقشة رؤية متعددة الألبعاد، ثم إصدار قرار","د":"مدعوم بتحليل متكامل. جماعي لأن اتخاذ قرار قيادي في وقت المعلومات المتضاربة والمحدودة"},"a":"أ","e":"الإجابة الصحيحة هي: الاعتماد على تحليل سريع للبيانات المتاحة مع استشارة فورية لبعض الزمالء ذوي الخبرة لتقليل الوقت قبل القرار.. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":657,"q":"كيف يمكن لقائد تربوي أن يعزز ثقافة أخالقية إيجابية في فريقه دون الاعتماد صارمة؟","o":{"أ":"فقط على فرض قواعد االعمل على تقديمنفسه كقدوة نموذجية من خالل الالتزام المستمر بالقيم الألخالقية والسلوك المهني.","ب":"وضع أطر واضحة للسلوك الألخالقي مع متابعة تطبيقها بإشراف مباشر لتعزيز لنضباط الذاتي.","ج":"تحفيز الفريق على المشاركة في ورش عمل تفاعلية تهدف لتعميق فهم ا لقيم والمبادئ الألخالقية. تشجيع حوار مستمر ونقاشات منتظمة بين أعضاء الفريق حول تحديات مواقف االعمل","د":"الألخالقية. لأن تقديم القائد نفسه قدوة حقيقية بالسلوك الألخالقي يعزز ثقافة"},"a":"أ","e":"الإجابة الصحيحة هي: فقط على فرض قواعد االعمل على تقديمنفسه كقدوة نموذجية من خالل الالتزام المستمر بالقيم الألخالقية والسلوك المهني.. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":659,"q":"في مؤسسة تواجه ميزانية محدودة مخصصة للتطوير المهني، أي من لستثمار على تنمية مهاراتالاستراتيجيات التالية يُعتبر الأكثر فعالية في تعظيم أثر الموظفين؟","o":{"أ":"التركيز على تقديم دورات تدريبية دا خلية مختارة بدقة تركز على المهارات الفنية لحترافية المرتبطة مباشرة بمهام االعمل.الألساسية و تشجيع التعلم الذاتي من خالل توفير مصادر تعليمية مجانية ومبادرات ورش عمل","ب":"داخلية تديرها الألقسام المختلفة.","ج":"دعم مشاركة الموظفين في برامج تدريبية خارجية ذات جودة ع الية، مع تقديم مساهمات مالية جزئية للتكاليف لتخفيف العبء على الموظف. تعديل جداول االعمل والمشاريع لفتح فترات زمنية مخصصة للتدريب الداخلي والخارجي","د":"دون زيادة في الميزانية الإلجمالية."},"a":"أ","e":"الإجابة الصحيحة هي: التركيز على تقديم دورات تدريبية دا خلية مختارة بدقة تركز على المهارات الفنية لحترافية المرتبطة مباشرة بمهام االعمل.الألساسية و تشجيع التعلم الذاتي من خالل توفير مصادر تعليمية مجانية ومبادرات ورش عمل. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":660,"q":"أنت مدير في مؤسسة تعليمية وتواجه حالة تضارب مصالح أخالقي معقدة بين موظفين. ما هو الإجراء الألمثل إلدارة هذا الموقف بشكل احترافي وأخالقي؟","o":{"أ":"تنظيم جلسة حوار مفت وح مع الألطراف المعنية بهدف التوصل إلى تفاهم متبادل وحل ودي. لستعانة بمستشار داخلي مختص في الألخالقيات إلجراء تقييم دقيق وتقديم توصيات","ب":"ملموسة. إحالة القضية لفريق رقابي مستقل داخل المؤسسة لضمان الشفافية واتخاذ الإجراءات","ج":"المناسبة. من خالل التعامل السري مع النزاع وتوثيق الإجراءات داخليًا دون","د":"حماية سمعة المؤسسة إفشاء التفاصيل. لأن فتح حوار مفتوح هو الإجراء الألمثل الذي يعزز الشفافية ويحفز"},"a":"أ","e":"الإجابة الصحيحة هي: تنظيم جلسة حوار مفت وح مع الألطراف المعنية بهدف التوصل إلى تفاهم متبادل وحل ودي. لستعانة بمستشار داخلي مختص في الألخالقيات إلجراء تقييم دقيق وتقديم توصيات. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":661,"q":"كقائد فريق في شركة تكنولوجية صغيرة تعاني من نقصٍ حاد في الموارد المالية كيف تتصرف كبيرا. م بدئيا والتقنية، طرحت فكرة ابتكار منتج جديد يتطلب استثمارا لضمان تقدم المشروع مع تقليل مخاطره بأفضل طريقة ممكنة؟","o":{"أ":"تبدأ بتطوير نموذج أولي مبسط قابل لالاختبار مع مجموعة محدودة من العمالء لجمع الالتزام باستثمارات كبيرة.بيانات ميدانية قبل جدوى مفصلة توضح الإلمكانات من المستثمرين بناءً على دراسة إضافيا","ب":"تطلب تمويال والمخاطر المحتملة للمنتج. تعيد تقييم متطلبات المشروع وتحدد نطاقا لتقليص التكلفة مع الحفاظ على أقل تطلبا","ج":"جودة مقبولة خالل مرحلة التطوير. تؤجل المشروع مؤقتا مع تعزيز المشاريع الحالية الألقل مخاطرة للحفاظ على استقرار","د":"الموارد وتركيز الفريق. تطوير نموذج أولي مبسط وقابل لالاختبار مع مجموعة مستهدفة"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":662,"q":"في مدرستك، لاحظت تصاعد نزاعات متكررة بين الطالب بشأن توزيع الفرص التفاعل وضمانفي اللأنشطة الالمنهجية. كمدير، كيف تتعامل مع هذا الوضع لتحسين بيئة عدالة الفرص؟","o":{"أ":"تعقد اجتماعا مع الطالب المتنازعين الاستكشاف أسباب النزاع، وتشجع على حوار بناء يُمكن من خالله التوصل إلى حلول توافقية قائمة على مبادئ الإلنصاف. تضع إطارا لتوزيع الفرص يعتمد على معايير محددة كالألداء الألكاديمي ومشفرا واضحا","ب":"لهتمامات الشخصية، وتشرح ذلك للطالب لتفادي اللبس والنزاعات.و تطبق سياسة توزيع الفرص بالتساوي بين جميع الطالب، مع توفير دعم إضافي للطالب","ج":"الألقل مشاركة لتعزيز دمجهم وتشجيعهم. ا تكلف المعلمين بوضع معايير اختيار خاصة بأنشطتهم، مع متابعة دورية من الإدارة","د":"مان التزامهم بالعدالة وعدم التحيز. لض لأن عقد اجتماع حواري مع الطالب المتنازعين الاستكشاف الألسباب"},"a":"أ","e":"الإجابة الصحيحة هي: تعقد اجتماعا مع الطالب المتنازعين الاستكشاف أسباب النزاع، وتشجع على حوار بناء يُمكن من خالله التوصل إلى حلول توافقية قائمة على مبادئ الإلنصاف. تضع إطارا لتوزيع الفرص يعتمد على معايير محددة كالألداء الألكاديمي ومشفرا واضحا. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":663,"q":"أثناء تقييم أداء مشروع يمتد لمدة طويلة، لاحظت أن النتائج النهائية أقل من كيف تقيّم الألداء بموضوعية في ظل هذهالمتوقع رغم الجهود الكبيرة والموارد المستخدمة. الظروف المعقدة؟","o":{"أ":"تجري مقابالت مع أعضاء الفريق لتحديد العقبات التي واجهتهم، مع تحليل مؤشرات الألداء الكمية والنوعية بشكل متكامل.","ب":"تركز على المخرجات الكمية كالمؤشرات والألرقام وحدها لتحديد مدى تحقيق الألهداف.","ج":"تعطى وزنًا متساويًا للجهود المبذولة والنتائج المحققة بغض النظر عن الفارق بينهما. يُستكمل المشروع بالكامل ثم تقارن النتائج المتوقعة","د":"تؤجل تقييم الألداء النهائي حتى بالنتائج المحققة. لأن هذا الخيار يجمع بين تقييم المشكلة من خالل تحليل شامل يشمل"},"a":"أ","e":"الإجابة الصحيحة هي: تجري مقابالت مع أعضاء الفريق لتحديد العقبات التي واجهتهم، مع تحليل مؤشرات الألداء الكمية والنوعية بشكل متكامل.. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":664,"q":"أنت مدير في مؤسسة شبه حكومية تواجه قرارا يتعلق بمنح عقد غامضا أخالقيا كيفلمورد تعرف عنه تقارير فساد مالي محلي، وتوجد ضغوط سياسية إلتمام العقد سريعا. تتخذ القرار؟","o":{"أ":"ترفض التعامل مع المورد حفاظا على القيم الألخالقية للمؤسسة رغم الضغوط السياسية ن بدائل أخرى.وتبحث ع تواصل التفاوض مع المورد مع وضع آليات رقابة صارمة وشروط تعاقدية تضمن","ب":"الشفافية والمسائلة.","ج":"تؤجل اتخاذ القرار لتقييم الوضع القانوني وأثره على سمعة المؤسسة بالتنسيق مع الجهات الرقابية المختصة. ا","د":"تمنح العقد للمورد مع التزامه بتقديم تقارير ما لية دورية ومراجعة داخلية لضمان الالتزام بالمعايير الألخالقية. لأن رفض التعامل مع مورد معروف بالفساد هو القرار الأكثر اتساقا"},"a":"أ","e":"الإجابة الصحيحة هي: ترفض التعامل مع المورد حفاظا على القيم الألخالقية للمؤسسة رغم الضغوط السياسية ن بدائل أخرى.وتبحث ع تواصل التفاوض مع المورد مع وضع آليات رقابة صارمة وشروط تعاقدية تضمن. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":665,"q":"قائد فريقك أظهر مقاومة واضحة للتغييرات التي تهدف إلى تعزيز لبتكار قيادة تحويلية تسعى لتحسين الألداء التنظيمي؟","o":{"أ":"كيف تتعامل مع مقاومته في إطارالداخلي. تستمع إلى مخاوفه بعناية وتدمج نقاطه البناءة في خطة التغيير لتعزيز شعوره بالمشاركة والمسؤولية. توضح له أهداف التغيير بصورة حازمة مع توفير الدعم المطلوب دون التنازل عن","ب":"شكل دوري.الرؤية، مع متابعة أثر التغيير على أدائه ب ،تشركه في جلسات حوارية لتعزيز فهمه للتغيير وتحفزه على تبني المبادرات الجديدة","ج":"مع تحديد أهداف واضحة تقيّم التقدم بشكل منتظم. تتيح له فترة زمنية محددة للتكيف مع التغيير مع مراقبة أدائه، دون ضغط مباشر، مما","د":"يد. يمنحه فرصة إلثبات نفسه ضمن السياق الجد لأن لستماع الفعّال ودمج المواقف البناءة يعزز من مشاركته"},"a":"أ","e":"الإجابة الصحيحة هي: كيف تتعامل مع مقاومته في إطارالداخلي. تستمع إلى مخاوفه بعناية وتدمج نقاطه البناءة في خطة التغيير لتعزيز شعوره بالمشاركة والمسؤولية. توضح له أهداف التغيير بصورة حازمة مع توفير الدعم المطلوب دون التنازل عن. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":666,"q":"في إطار خطة استراتيجية طويلة الألمد لمؤسستك، تثار معارضة داخلية بشأن لستثمار في تقنيات جديدة يُنظر إليها من قبل بعض الألعضاء كمخاطر محتملة تهدد لستقرار المالي. كيف تتعامل مع هذه المعارضة؟","o":{"أ":"تقدم تحاليل مفصلة توضح الفوائد المحتملة والمخاطر المحتملة مع مقارنات واقعية لتطمين الألطراف المعنية وتسهيل اتخاذ القرار. تلتزم بتنفيذ لبتكار وأهميته المستقبلية، مع متابعة دقيقةلستثمار بعد مناقشة مبادئ","ب":"لألداء لضبط المسار إذا اقتضى الألمر. تقترح تأجيل القرار حتى تتوفر دراسات محلية وتقييمات تجريبية إضافية تثبت جدوى","ج":"ا قبل التعهد بها. التقنية تفتح حوارا، مع إمكانية تعديل مع الفريق المعارض إلعادة تقييم الخطة تكامليا موسعا","د":"بعض بنودها بناءً على الملاحظات والمخاوف المؤيدة. لأن تقديم تحاليل مفصلة وشفافة يمثل الخطوة الأكثر مهنية وفعالية"},"a":"أ","e":"الإجابة الصحيحة هي: تقدم تحاليل مفصلة توضح الفوائد المحتملة والمخاطر المحتملة مع مقارنات واقعية لتطمين الألطراف المعنية وتسهيل اتخاذ القرار. تلتزم بتنفيذ لبتكار وأهميته المستقبلية، مع متابعة دقيقةلستثمار بعد مناقشة مبادئ. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":667,"q":"أثناء إدارة صراع معقد بين قسمين في المنظمة، يتبادل كل قسم لتهامات بسوء ما أفضل استراتيجية إلدارة هذا الصراع وضمان تحقيقالتفاهم والتقليل من جهود الآلخر. تعاون فعّال ومستدام؟","o":{"أ":"عقد جلسة وساطة مشتركة تركز على استكشاف مصالح الطرفين وإعادة صياغة وجهات لتهامات المباشرة. عن النظر بعيدا على تقييم محايد ًتعيين وسيط خارجي متخصص إلدارة الحوار وتقديم توصيات بناء","ب":"لألسباب الجوهرية للصراع. تشجيع الطرفين على التباحث المباشر تحت إشراف المدير لتقليل لحتكاك وبناء تفاهم","ج":"تدريجي قائم على الحوار المفتوح. توجيه الطرفين للتركيز على مهامهم االعملية مؤقتا مع إقامة ورش عمل لتطوير مهارات","د":"الألقسام الحقا. التواصل بين لأنها تتيح بيئة آمنة يستكشف فيها الطرفان مصالحهما الحقيقية بعيدًا"},"a":"أ","e":"الإجابة الصحيحة هي: عقد جلسة وساطة مشتركة تركز على استكشاف مصالح الطرفين وإعادة صياغة وجهات لتهامات المباشرة. عن النظر بعيدا على تقييم محايد ًتعيين وسيط خارجي متخصص إلدارة الحوار وتقديم توصيات بناء. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":668,"q":"أحد معلمي المدرسة يستخدم أساليب تقييم تقليدية ال تعكس قدرات الطالب الإلبداعية. كيف يمكنك تقويم أدائه بشكل م بني على التفكير الناقد لتحسين جودة التقييمات لبتكار لدى الطالب؟","o":{"أ":"وتعزيز جمع بيانات تغذية راجعة من الطالب والزمالء بشأن أساليب التقييم المستخدمة، وتحليلها لتحديد نقاط التحسين بدقة.","ب":"مقارنة نتائج اختبارات الطالب التي يقوم بها مع نتائج المدارس الألخرى ذا ت الألداء ا المشابه ألخذ صورة نسبية عن فعالية التقييم. تقديم توصيات عملية بعد مراجعة أساليب التقييم الحالية، ثم متابعة تطبيق هذه ال","ج":"بشكل دوري مع المعلم قبل اتخاذ أي خطوات إجرائية.","د":"نقل مسؤولية التقييم إلى معلم آخر أكثر خبرة في أساليب التقييم الحديث ة لضمان تحسين نتائج الطالب بشكل فوري. لأن جمع بيانات متعددة من مصادر مختلفة وتحليلها يعكس تفكيرا"},"a":"أ","e":"الإجابة الصحيحة هي: وتعزيز جمع بيانات تغذية راجعة من الطالب والزمالء بشأن أساليب التقييم المستخدمة، وتحليلها لتحديد نقاط التحسين بدقة.. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":669,"q":"في بيئة عمل تتسم بزيادة الضغوط التنظيمية، يظهر أحد الموظفين عالمات كيف تتخذ القرار الألمثل لدعم الموظف على أدائه المهني. واضحة لإلرهاق تؤثر سلبا وضمان استمرارية الألداء الفعّال للفريق؟","o":{"أ":"تعقد جلسة استماع خاصة معه لتحليل وضعه الشخصي والمُهني، ثم تُعيد توزيع عبء االعمل بشكل يتناسب مع قدراته الحالية مع متابعته دوريا.","ب":"تشجع ه على تعزيز جهوده وتحمل الضغوط مؤقتا، مع تقديم تحفيزات تشجيعية للفريق بأكمله للحفاظ على الألداء في هذه المرحلة الحرجة. تنقل بعض مهامه إلى زملائه بشكل مؤقت مع تقديم توضيح شفاف للفرق في","ج":"الالتزام الكامل.المسؤوليات وتحديثات دورية لضمان نفسي وجلسات ترفيهية لجميع الموظفين بشكل شامل، مع متابعة","د":"تنظم ورش عمل دعم لت الإلرهاق. فردية الحقة لتقييم أثرها على ح لأن الخيار أ يضمن توازنالهتمام الفردي الدقيق للموظف بين"},"a":"أ","e":"الإجابة الصحيحة هي: تعقد جلسة استماع خاصة معه لتحليل وضعه الشخصي والمُهني، ثم تُعيد توزيع عبء االعمل بشكل يتناسب مع قدراته الحالية مع متابعته دوريا.. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":670,"q":"تواجه منظمتك قرارا يتطلب تخصيص استثمار كبير بين تطوير استراتيجيا قدرات الموظفين أو تحديث البنية التحتية التقنية. أي الخيارين تختا ر لتحقيق أفضل توازن لستدامة والفعالية التنظيمية؟","o":{"أ":"بين لستثمار الألساسي في تطوير قدرات الموظفين لأن بناء المهارات يعزز مرونة المنظمة ا في التعامل مع التغيرات التقنية المستمرة.","ب":"التركيز على تحديث البنية التحتية التقنية باعتبارها عنصر الألساس الذي يدعم تح سين الإلنتاجية وتطوير الخدمات بشكل مستدام. توزيع الموارد بشكل أفضلي على تطوير قدرات الموظفين مع دعم محدود لتحديث البنية","ج":"التحتية لضمان مسايرة التطورات التقنية دون التضحية بالمهارات. للبيئة الداخلية وال خارجية لتحديدلستثمار لحين إجراء تحليل أكثر تفصيال","د":"تأجيل قرار الألولويات المتغيرة بدقة. لستثمار في تطوير قدرات الموظفين هو الألمثل لأن المهارات"},"a":"أ","e":"الإجابة الصحيحة هي: بين لستثمار الألساسي في تطوير قدرات الموظفين لأن بناء المهارات يعزز مرونة المنظمة ا في التعامل مع التغيرات التقنية المستمرة.. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":671,"q":"أنت مدير مشروع في مؤسسة تعليمية تواجه مقاومة غير معلنة من بعض بالرغم من أن البيانات الألولية تؤكد فاعليةأعضاء الفريق تجاه استخدام تقنية تعليمية حديثة. كيف تتصرّف إلدارةالتقنية، إال أن الألجواء السلبية قد تضع تنفيذ المشروع في خطر. هذه هذه المقاومة بشكل فعّال ومهني؟","o":{"أ":"تعقد جلسات حوارية تفاعلية بالفريق توضح فيها مزايا التقنية المباشر لبناء الثقة والتفاهم. الفريق بعمق، مدعومة بتقارير مفصلة لتحليل جذور","ب":"توزّع استبيانات سرية لتحليل آراء المقاومة بدقة. تستعين بخبير إداري مختص إلدارة التغيير، يقوم بتحليل الموقف موضوعيا ويساعد في","ج":"تصميم حلول مدروسة. تبدأ بتنفيذ التقنية بشكل تجريبي في أجزاء محددة من المشروع، مع إشراك المتشككين","د":"مهم في التغيير. لتحكتدريجيا عقد الجلسات الحوارية المباشرة يسمح بالتواصل المفتوح وبناء الثقة"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":672,"q":"كقائد لفريق في منظمة غير ربحية تواجه تقليصا في الميزانية، كيف يمكنك كبيرا لبتكار رغم الموارد المحدودة؟","o":{"أ":"تحفيز الفريق للحفاظ على الألداء و تعزز ثقافة الشفافية في توزيع الموارد وتحدد المسؤوليات بوضوح مع تشجيع المشاركة الفعّالة في صنع القرار. لل مكافآت المعنوية والمادية بناءً على الألداء، مع التركيز على تحفيز محدودًا","ب":"تضع نظاما النتائج وتقليل التكاليف. تركز على تقوية الروح المعنوية للفريق من خالل تنظيم فعاليات تنمية ذات تكاليف","ج":"لرتباط الشخصي.منخفضة تعزز التعاون و داخل حدود عامة، مع التكيفلبتكار بحرية تامة","د":"تمنح الفريق صالحية التجريب و السريع مع الألخطاء دون عقوبات صارمة. لأن تعزيز الشفافية وتحديد المسؤوليات بوضوح مع تشجيع المشاركة"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":673,"q":"أنت مسؤول تخطيط استراتيجي في شركة تكنولوجية تواجه سرعة تغيرات كيف تبني خطة استراتيجية طويلة الألمد تخدمالسوق وعدم وضوح التوجهات المستقبلية. مصلحة الشركة؟","o":{"أ":"تضع رؤية استراتيجية مرنة تركز على تعزيز قدرات التكيف و لبتكار لضمان استمرارية الألداء رغم عدم وضوح المستقبل. تعتمد على تحليالت السوق الحالية لتحديد أولويات ثابتة تضمن ثبات الألداء وتجنب","ب":"المخاطرة. تجمع رؤى متعددة من كافة الإلدارات لتكوين خطة متوازنة ترتكز على توافق وجهات","ج":"النظر مع بعض المرونة في التنفيذ.","د":"تركز على تطوير المنتجات الحالية وتحسينها لل حفاظ على المنافسة دون تحمّل مخاطر لتجاهات غير الواضحة للسوق. كبيرة في لأن صياغة رؤية استراتيجية مرنة تعزز نلبتكار والتكيف تُمك"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":674,"q":"في مؤسسة تعليمية تواج ه حالة غامضة تتعلق بسلوك عضو هيئة تدريس مع طلبة، كيف تتخذ قرارا يتميز بأعلى معايير الألخالقية والمهنية لضمان عدالة وشفافية المعالجة؟","o":{"أ":"إجراء تحقيق شامل مع جميع الألطراف المعنية مع الحفاظ على السرية والنزاهة قبل اتخاذ أي إجراء. إصدار توجيهات واضحة تعزز السلوك الألخالقي وتطبيق إجراءات مؤقتة بعد تقييم","ب":"مبدئي، مع التخطيط لتحقيق موسع الحق. تنظيم ورش تدريبية تأهيلية للسلوك المهني الألخالقي لجميع أعضاء الهيئة التدريسية مع","ج":"مراقبة التطبيق المستمر دون تأجيل التحقيق.","د":"إنشاء آلية إبالغ آمنة وسرية للطلبة مع دعمنف سي مستمر، وتفعيل تحقيق فوري بعد تلقي البالغ دون تأخير. التحقيق الشامل والمحايد مع الحفاظ على السرية والنزاهة هو الخطوة"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":675,"q":"أنت قائد في بيئة عمل متعددة الثقافات ويحدث صراع بين أفراد الفريق بسبب اختالفات في طرق التواصل واالعمل. ما هو أنسب نهج إلد ارة هذا الصراع بشكل فعّال ومستدام؟","o":{"أ":"تنظيم جلسات حوار بنّاءة تركز على تبادل وجهات النظر الثقافية وابتكار حلول مشتركة توافقية. وضع وتنفيذ تعليمات عمل موحدة تشمل قواعد تواصل وسلوك واضحة لجميع","ب":"الألعضاء بغض النظر عن خلفياتهم الثقافية. لستعانة بمستشار ث قافي لتقييم طبيعة الصراع وتقديم ورش عمل تدريبية مخصصة","ج":"بالفريق. تشجيع الألعضاء على التفاوض الذاتي بين بعضهم ضمن إطار محدد، مع التدخل فقط","د":"عند تصعيد الخالفات. تنظيم جلسات حوار بنّاءة يعزز من التفاهم المتبادل ويبني حلوال"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":676,"q":"في موقف تتطلب فيه مؤسستك لبتكار مع توفر محدود للموارد، كيف تختار لبتكار الأكثر فاعلية لضمان تحقيق نتائج ملموسة ومستدامة؟","o":{"أ":"استراتيجية تبدأ بتنفيذ مشاريع صغيرة قابلة للتطوير بسرعة تُمكن من استغالل الموارد بشكل داعم لالبتكار المستمر. تُعيد توجيه الموارد نحو تحسين االعمليات الداخلية أوال بهدف تقليل الهدر وزيادة الكفاءة","ب":"لبتكار.قبل استثمار موارد إضافية في","ج":"تقيم شراكات مدروسة مع جهات خارجية لتبادل الموارد وال معارف، مع إدارة دقيقة الالتزامات الناتجة.للمخاطر و تخصص حصة ثابتة من الموارد لالبتكار بغض النظر عن الضغوط المالية، مع توقع","د":"تأثير مؤقت على جوانب أخرى من الميزانية. تبني مشاريع صغيرة قابلة للتطوير بسرعة يُعَد الخيار الأكثر توازنا"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":677,"q":"أنت مسؤول تقييم أداء موظفين في بيئة عمل تمر بفترة عدم استقرار مؤقت مثل إعادة هيكلة. كيف تخصص معايير التقييم لتحقيق تقييم دقيق وموضوعي؟","o":{"أ":"دمج شركات أو تعتمد بشكل رئيسي على مؤشرات الألداء المعروفة مع تعديل النتائج نسبيا لتقلبات وفقا الظروف الخارجية غير المستقرة. تركز على التقييم الذاتي المفصل للموظفين مع جمع ملاحظات متعددة من المديرين","ب":"والزمالء لتفسير تحديات بيئة االعمل المتغيرة. تدمج تقييم الألداء الفردي مع تقييمنتائج الفريق الجماعية بشكل متوازن لتعكس التفاعل","ج":"لضطراب.بين الجهود الفردية والجماعية خالل فترة تعتمد على تقييمات أكثر مرونة ومؤقتة بناءً على المخرجات الحالية بدل الألهداف","د":"مع متابعة مستمرة لضبط المعايير حسب تطور الوضع. المحددة مسبقا دمج تقييم الألداء الفردي مع تقييم الفريق يحقق توازنا بين مهما"},"a":"ج","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":678,"q":"الشئون الإلدارية، تكتشف وجود تعارض محتمل في المصالح بين بصفتك قائد ما هي أفضل خطوة عمليةعضو مجلس الإدارة وبعض المشاريع التي تُدار في المؤسسة. تتبعها للتعامل مع الموقف؟","o":{"أ":"تخطر الهيئة التنفيذية فورا مع تقديم تقرير موثق يتضمن الألدلة والملاحظات المتعلقة بالنزاع.","ب":"تن اقش الألمر بشكل خاص مع عضو مجلس الإدارة المتعلق لتوضيح المالبسات قبل اتخاذ أي إجراء رسمي.","ج":"تجمع كافة البيانات المتعلقة بالموقف، توثقها بدقة، وتقرر رفع الألمر رسميا بعد دراسة متأنية مع مستشار قانوني.","د":"تبدأ بمراجعة السياسات والإجراءات المتعلقة بتضارب المص الح لضمان تحديثها ومعالجتها في المستقبل قبل اتخاذ إجراءات حالية. إخطار الهيئة التنفيذية فورا مع تقديم تقرير موثق هو الخطوة الأكثر"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":679,"q":"في مدرسة تواجه ضعف معدل تحصيل علمي لدى مجموعة من الطالب ذوي الخلفيات المتنوعة، كيف يمكنك تحقيق توازن دقيق بين الحاجة إلى تقييم يعكس الألداء الحقيقي واحترام الفروق الفردية في أساليب التعلم؟","o":{"أ":"تعتمد أدوات تقييم موحدة مع توفير دعم تعويضي مكثف للطالب الذين يظهرون ضعفا بعد التقييم. تصمم مجموعة متنوعة من أدوات التقييم البديلة المعدلة لتتناسب مع أنماط التعلم","ب":"المختلفة للطالب. التقييم الختامي، مع تعديل معايير التقييم بناءً على تقدم","ج":"تدمج التقييم التكويني المستمر مع كل طالب. تعتمد على معايير تقييم معيارية فردية تركز على التقدم المكتسب لكل طالب دون مقارنة","د":"جماعية، مع استخدام أدوات تقييم متنوعة بدرجة محدودة."},"a":"ب","e":"لأن تصميم أدوات تقييم بديلة متع ددة ومخصصة لأنماط التعلم لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":681,"q":"في مؤسسة تعليمية تعاني من تكرار النزاعات بين أعضاء هيئة التدريس بسبب تدخلات إدارية متكررة، كيف ينبغي لقائد المدر سة الذي يتبع أسلوب القيادة التحويلية التعامل مع هذه الحالة لتحقيق بيئة عمل إيجابية ومستدامة؟","o":{"أ":"تنظيم ورش عمل تشاركية تجمع جميع الألطراف لبلورة رؤية مشتركة ترتكز على القيم والمبادئ التي تحفز التعاون والثقة. عقد جلسات حوار مفتوحة ومنتظمة مع كافة أعضاء الهيئة لتبادل وجهات النظر بفعالية","ب":"واالعمل على صياغة آليات توافقية لحل النزاعات. تفويض مجموعة من القياديين داخل الهيئة لتقييم أسباب النزاعات واقتراح خطة عمل","ج":"مشتركة تعتمد على التشاور المستمر مع الجميع دون فرض قرارات ا الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":690,"q":"موظف لاحظ شبهات تالعب مالي غير واضحة في قسم المالية، لكنه يفتقد أدلة ما الخطوة الأكثر مهنيةقوية، وينطوي الإلبالغ المبكر على مخاطر كبيرة لمسيرته المهنية. وأخالقية التي ينبغي عليه اتخاذها في هذا الموقف؟","o":{"أ":"ية قبل التقدم بالإلبالغ الرسمي. توثيق الملاحظات بدقة ومواصلة الرصد لجمع أدلة إضاف ا على شفافية الإجراءات.","ب":"رفع الملاحظات غير المكتملة مباشرة إلى الإدارة العليا حفاظ مناقشة الملاحظات بشكل خاص مع زميل موثوق في القسم ذاته للتحقق المشترك قبل أي","ج":"تحرك رسمي. ا على أمن الوظيفة وتفادي الإلضرار بالسمعة المهنية حتى تتضح التزام الصمت حفاظ","د":"الألمور بشكل قاطع. توثيق الملاحظات ومواصلة جمع الألدلة يعزز من مصداقية الإلبالغ"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."}];
let questions=[...QUESTIONS_DATA], filtered=[...questions], idx=0, filter='all';
const letters=['أ','ب','ج','د'];
const state=JSON.parse(localStorage.getItem('edu_comp_state_v2')||'{}');
function save(){localStorage.setItem('edu_comp_state_v2',JSON.stringify(state));}
function answeredCount(){return Object.keys(state).length}
function scoreCount(){return Object.values(state).filter(x=>x.correct).length}
function buildSide(){side.innerHTML='';questions.forEach((q,i)=>{let b=document.createElement('button');b.className='dot';b.textContent=i+1;b.onclick=()=>{filtered=[q];idx=0;render()};b.dataset.n=q.n;side.appendChild(b)})}
function applyFilters(){let s=search.value.trim().toLowerCase();filtered=questions.filter(q=>{let st=state[q.n];let ok=filter==='all'||(filter==='unanswered'&&!st)||(filter==='correct'&&st?.correct)||(filter==='wrong'&&st&&!st.correct);let hay=(q.q+' '+Object.values(q.o).join(' ')).toLowerCase();return ok&&(!s||hay.includes(s));});idx=0;render();}
function setFilter(f){filter=f;document.querySelectorAll('.ctrl').forEach(x=>x.classList.remove('active'));document.getElementById('f-'+f)?.classList.add('active');applyFilters();}
function render(){card.style.display=filtered.length?'block':'none';empty.classList.toggle('show',!filtered.length);final.classList.remove('show');if(!filtered.length){updateTop();return}let q=filtered[idx];qno.textContent=idx+1+' / '+filtered.length;orig.textContent='(#'+q.n+')';qtext.textContent=q.q;opts.innerHTML='';letters.forEach(l=>{let d=document.createElement('div');d.className='opt';d.onclick=()=>choose(l);d.innerHTML=`<div class="letter">${l}</div><div class="otxt">${q.o[l]||'—'}</div>`;opts.appendChild(d);});showState();updateTop();}
function showState(){let q=filtered[idx], st=state[q.n];document.querySelectorAll('.opt').forEach((el,i)=>{let l=letters[i];el.classList.remove('chosen','correct','wrong','disabled');if(st){el.classList.add('disabled');if(l===q.a)el.classList.add('correct');if(l===st.choice&&l!==q.a)el.classList.add('wrong');}});fb.className='feedback';fb.innerHTML='';if(st){fb.classList.add('show',st.correct?'good':'no');fb.innerHTML=`<div class="fb-title">${st.correct?'✅ إجابة صحيحة':'❌ إجابة خاطئة'}</div><div>الإجابة الصحيحة: <b>${q.a} - ${q.o[q.a]}</b></div><div class="explain">${q.e}</div>`;}}
function choose(l){let q=filtered[idx];if(state[q.n])return;state[q.n]={choice:l,correct:l===q.a};save();showState();updateTop();}
function updateTop(){let total=questions.length, ans=answeredCount(), sc=scoreCount();score.textContent=sc;answered.textContent=ans;let cur=filtered.length?idx+1:0;ptext.textContent=`السؤال ${cur} من ${filtered.length} | إجمالي الأسئلة: ${total}`;let pct=total?Math.round(ans/total*100):0;ppct.textContent=pct+'%';progressFill.style.width=pct+'%';document.querySelectorAll('.dot').forEach((b,i)=>{let q=questions[i],st=state[q.n];b.className='dot'+(filtered[idx]?.n===q.n?' current':'')+(st?(st.correct?' ok':' bad'):'');});if(ans===total)finish();}
function move(n){if(!filtered.length)return;idx=Math.max(0,Math.min(filtered.length-1,idx+n));render();}
function randomQ(){if(!filtered.length)return;idx=Math.floor(Math.random()*filtered.length);render();}
function shuffleQuestions(){questions.sort(()=>Math.random()-0.5);applyFilters();buildSide();render();}
function resetAll(){if(confirm('هل تريد حذف جميع الإجابات والبدء من جديد؟')){for(let k in state)delete state[k];save();filter='all';search.value='';questions=[...QUESTIONS_DATA];filtered=[...questions];idx=0;buildSide();render();}}
function finish(){let total=questions.length, sc=scoreCount(), wrong=total-sc, pct=Math.round(sc/total*100);card.style.display='none';empty.classList.remove('show');final.classList.add('show');fpct.textContent=pct+'%';fc.textContent=sc;fw.textContent=wrong;ft.textContent=total;}
buildSide();render();
</script>
