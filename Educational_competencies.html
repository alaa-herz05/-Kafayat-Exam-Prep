
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار الكفايات التربوية 2026</title>
<style>
:root{--bg:#0f0f0f;--surface:#181818;--card:#222;--card2:#1d1d1d;--border:#343434;--text:#eee;--muted:#9a9a9a;--dim:#686868;--accent:#c0a060;--accent2:#e3c17c;--accent-bg:rgba(192,160,96,.13);--ok:#4f9d5d;--okbg:rgba(79,157,93,.14);--bad:#c45656;--badbg:rgba(196,86,86,.13);--blue:#74a7d8;--r:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.75;min-height:100vh}
.header{position:sticky;top:0;z-index:20;background:rgba(24,24,24,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:18px 26px;display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center}
.title{font-size:20px;font-weight:800;color:var(--accent2)}.sub{color:var(--muted);font-size:12px;margin-top:2px}
.top-nav{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}.top-nav a{color:var(--accent2);text-decoration:none;padding:9px 16px;border:1px solid rgba(192,160,96,.35);border-radius:12px;background:rgba(255,255,255,.035);font-weight:700;transition:.2s}.top-nav a:hover{background:var(--accent-bg);box-shadow:0 0 14px rgba(192,160,96,.22)}.top-nav a.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111;border-color:var(--accent2)}
.score{justify-self:end;background:var(--card);border:1px solid var(--border);border-radius:999px;padding:8px 18px;color:var(--muted);white-space:nowrap}.score b{color:var(--accent2);font-size:18px}
.progress-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 26px}.progress-info{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;margin-bottom:7px}.bar{height:5px;background:#2b2b2b;border-radius:10px;overflow:hidden}#progressFill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.3s}
.controls{display:flex;gap:10px;flex-wrap:wrap;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 26px}.search{flex:1;min-width:230px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);outline:none;font-family:inherit}.search:focus{border-color:var(--accent)}.ctrl{background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--muted);padding:8px 14px;cursor:pointer;font-family:inherit}.ctrl:hover,.ctrl.active{color:var(--accent2);border-color:var(--accent);background:var(--accent-bg)}
.layout{display:grid;grid-template-columns:270px 1fr}.sidebar{position:sticky;top:150px;height:calc(100vh - 150px);overflow:auto;background:var(--surface);border-left:1px solid var(--border);padding:14px 10px}.side-title{color:var(--dim);font-size:11px;padding:0 6px 10px;border-bottom:1px solid var(--border);margin-bottom:10px}.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}.dot{aspect-ratio:1;border:1px solid var(--border);background:var(--card);color:var(--dim);border-radius:7px;cursor:pointer;font-size:10px}.dot:hover,.dot.current{border-color:var(--accent);color:var(--accent2);background:var(--accent-bg)}.dot.ok{border-color:var(--ok);color:var(--ok);background:var(--okbg)}.dot.bad{border-color:var(--bad);color:var(--bad);background:var(--badbg)}.dot.hide{display:none}
.main{max-width:920px;padding:34px 42px}.qmeta{color:var(--dim);font-size:12px;margin-bottom:10px}.qmeta em{color:var(--accent2);font-style:normal;font-weight:800}.qtext{background:var(--card);border:1px solid var(--border);border-right:4px solid var(--accent);border-radius:var(--r);padding:20px 24px;margin-bottom:22px;font-size:18px;font-weight:650}.options{display:flex;flex-direction:column;gap:11px;margin-bottom:18px}.opt{display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px 18px;cursor:pointer;transition:.18s}.opt:hover:not(.disabled){border-color:var(--accent);background:var(--accent-bg)}.opt.disabled{cursor:default}.letter{width:31px;height:31px;min-width:31px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#2b2b2b;border:1px solid #444;color:var(--muted);font-weight:800}.otxt{flex:1}.opt.chosen{border-color:var(--blue);background:rgba(116,167,216,.11)}.opt.chosen .letter{background:rgba(116,167,216,.2);border-color:var(--blue);color:#b7d6f4}.opt.correct{border-color:var(--ok)!important;background:var(--okbg)!important}.opt.correct .letter{background:var(--ok);border-color:var(--ok);color:white}.opt.wrong{border-color:var(--bad)!important;background:var(--badbg)!important}.opt.wrong .letter{background:var(--bad);border-color:var(--bad);color:white}
.feedback{display:none;border-radius:var(--r);padding:15px 18px;margin:18px 0;border:1px solid}.feedback.show{display:block}.feedback.good{background:var(--okbg);border-color:var(--ok)}.feedback.no{background:var(--badbg);border-color:var(--bad)}.fb-title{font-weight:800;margin-bottom:8px}.good .fb-title{color:#79c987}.no .fb-title{color:#eb8585}.explain{color:#d0d0d0;border-top:1px solid rgba(255,255,255,.08);padding-top:10px;font-size:14px}
.btns{display:flex;gap:10px;margin-top:18px}.btn{border:0;border-radius:10px;padding:10px 22px;font-family:inherit;font-weight:800;cursor:pointer}.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111}.secondary{background:var(--card);border:1px solid var(--border);color:var(--muted)}.secondary:hover{border-color:var(--accent);color:var(--accent2)}.spacer{margin-right:auto}
.final,.empty{display:none;text-align:center;padding:60px 20px}.final.show,.empty.show{display:block}.circle{width:155px;height:155px;border-radius:50%;border:4px solid var(--accent);display:flex;align-items:center;justify-content:center;flex-direction:column;margin:0 auto 22px;background:var(--accent-bg)}.pct{font-size:44px;font-weight:900;color:var(--accent2)}.stats{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:25px 0}.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 28px;min-width:130px}.stat b{display:block;font-size:28px}.stat span{color:var(--muted);font-size:12px}
@media(max-width:850px){.header{grid-template-columns:1fr;justify-items:center;text-align:center}.score{justify-self:center}.layout{grid-template-columns:1fr}.sidebar{display:none}.main{padding:22px 15px}.qtext{font-size:16px;padding:16px}.controls{padding:10px}.btns{flex-wrap:wrap}}
</style>
</head>
<body>
<header class="header">
  <div><div class="title">📚 اختبار الكفايات التربوية 2026</div><div class="sub">إعداد أ. حسين الشلول</div></div>
  <nav class="top-nav"><a href="index.html">🏠 Home</a><a class="active" href="Educational_competencies.html">🎓 Educational Competencies</a></nav>
  <div class="score">النتيجة: <b id="score">0</b> / <b id="answered">0</b></div>
</header>
<section class="progress-wrap"><div class="progress-info"><span id="ptext"></span><span id="ppct">0%</span></div><div class="bar"><div id="progressFill"></div></div></section>
<section class="controls">
  <input id="search" class="search" placeholder="🔍 ابحث في الأسئلة أو الخيارات..." oninput="applyFilters()">
  <button class="ctrl active" id="f-all" onclick="setFilter('all')">الكل</button>
  <button class="ctrl" id="f-unanswered" onclick="setFilter('unanswered')">لم يُجب</button>
  <button class="ctrl" id="f-correct" onclick="setFilter('correct')">✓ صحيح</button>
  <button class="ctrl" id="f-wrong" onclick="setFilter('wrong')">✗ خطأ</button>
  <button class="ctrl" onclick="shuffleQuestions()">🔀 ترتيب عشوائي</button>
  <button class="ctrl" onclick="resetAll()">↺ بدء من جديد</button>
</section>
<div class="layout">
  <aside class="sidebar"><div class="side-title">تصفح الأسئلة</div><div class="grid" id="side"></div></aside>
  <main class="main">
    <section id="card">
      <div class="qmeta">سؤال رقم <em id="qno"></em> <span id="orig"></span></div>
      <div class="qtext" id="qtext"></div>
      <div class="options" id="opts"></div>
      <div class="feedback" id="fb"></div>
      <div class="btns"><button class="btn secondary" onclick="move(-1)">→ السابق</button><button class="btn primary" onclick="move(1)">التالي ←</button><button class="btn secondary spacer" onclick="randomQ()">سؤال عشوائي 🎲</button></div>
    </section>
    <section class="empty" id="empty">🔍<br>لا توجد أسئلة تطابق البحث.</section>
    <section class="final" id="final"><div class="circle"><div class="pct" id="fpct"></div><span>النتيجة</span></div><h2>🎓 انتهى الاختبار</h2><div class="stats"><div class="stat"><b id="fc"></b><span>صحيح</span></div><div class="stat"><b id="fw"></b><span>خطأ</span></div><div class="stat"><b id="ft"></b><span>المجموع</span></div></div><button class="btn primary" onclick="resetAll()">إعادة الاختبار</button> <button class="btn secondary" onclick="setFilter('wrong')">مراجعة الأخطاء</button></section>
  </main>
</div>
<script>
const QUESTIONS_DATA = [{"n":1,"q":"في حصة صفية، يلاحظ المعلم أن مجموعة من الطلاب تشتت انتباهها بسبب طالب معين. ما هو الإجراء الأنسب لمعالجة هذه الحالة؟","o":{"أ":"تدخلات متكررة من توجيه إنذار شفهي خاص للطالب على هامش الحصة لتصحيح السلوك دون إحراجه أمام الآخرين.","ب":"التحدث مع الطلاب على انفراد لفهم أسباب سلوكه ومساعدته على تحسين تركيزه داخل الصف.","ج":"توجيه إنذار شفهي مباشر للطالب بحضور زملائه لتنبيههم جميعا إلى أهمية التركيز دون استهداف الطالب فقط.","د":"تنسيق لقاء مع ولي أمر الطالب والإدارة لمناقشة السلوك ووضع خطة تعديل مناسبة. لأن التواصل الفردي مع الطالب يساعد على استكشاف أسباب"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":2,"q":"أثناء تخطيط المعلم لوحدة دراسية تهدف إلى تحفيز الطلاب على بناء المعرفة من خالل اكتشافهم الذاتي، أي من النظريات التالية يُعدُّ الأنسب لتصميم أنشطة تعليمية تدعم هذا النهج؟","o":{"أ":"نظرية السلوكية التي تركز على تعزيز السلوكيات المرغوبة عبر التكرار والتعزيز لستيعاب لفهم و م االعمليات الذهنية الداخلية لتسهيل ا","ب":"نظرية المعرفية التي تنظ لكتشاف عبر التجربة و","ج":"نظرية البنائية التي تشجع الطلاب على بناء المعرفة ذاتيا الاجتماعي التي تؤكد التعلم عبر الملاحظة والتقليد ضمن بيئة تفاعلية نظرية التعلم","د":"نظرية البنائية هي الأنسب لأنها تمكن الطالب من بناء المعرفة بنفسه"},"a":"ج","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":3,"q":"موظف في قسم يعنى بحل نزاعات الموظفين واجه خالفا بين زميلين حول توزيع المهام. ما الخطوة الأكثر مهنية وفاعلية للتعامل مع هذا الوضع؟","o":{"أ":"عقد اجتماع مشترك مع الطرفين للاستماع إلى وجهات نظرهما واالعمل على التوصل إلى حل وسط يرضيهما. إصدار قرار إداري بتوزيع المهام بشكل محدد على كل طرف استنادًا إلى تقييم","ب":"موضوعي للمهام والمسؤوليات. تشجيع كل طرف على تقديم مخاوفه بشكل مكتوب ثم مراجعة تلك الملاحظات بشكل","ج":"اتخاذ قرار نهائي. منفصل قبل رفع الألمر إلى الإدارة العليا مع توصية باتخاذ الإجراء المالئم دون التوسع في المرحلة","د":"الحالية بسماع وجهات نظر الألطراف. لأن عقد اجتماع مشترك مع الطرفين يتيح فرصة للحوار المفتوح"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":4,"q":"ملحوظا بين نتائج الاختبار في أثناء تقييم تحصيل الطالب، لاحظ المعلم تفاوتا التحريري وأداء الطالب في اللأنشطة الصفية، مما أثار تساؤله حول دقة التقييمات الحالية. ما القرار الأكثر مهنية وفعالية لضمان تقييم متوازن وشامل؟","o":{"أ":"الاختبارات التحريرية كونها تقيس المعرفة الموضوعية على نتائج الاعتماد أساسا بموضوعية أعلى. مراجعة وتعديل أدوات التقويم المستخدمة، لضمان تكامل وتوازن بين الاختبارات","ب":"التحريرية واللأنشطة الصفية وتحديثها إذا تطلب الألمر.","ج":"تعزيز وزن تقييم اللأنشطة الصفية مع تقليل الاختبارات التحريرية لتعزيزالاعتماد على التقييم االعملي والتفاعلي.","د":"إجراء اختبار تكميل ي موحد لجميع الطالب لتعويض الفوارق في الألدوات الحالية وضمان مقارنة عادلة. لأن مراجعة وتحديث أدوات التقويم يحقق التكامل بين أدوات القياس"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":5,"q":"في إطار التخطيط الاستراتيجي إلدارة مدرسة، كيف يمكن تحقيق مشاركة مثلى الالتزام ويحقق النجاح؟","o":{"أ":"التدريسي في وضع أهداف المدرسة بما يعزز وفعالة من الكادر مشاركة الكادر التدريسي عبر جلسات تشاركية منظمة تجمع أفكار جميع المعلمين وتدمجها في صياغة الألهداف. طرح مسودة الألهداف على المعلمين لالاستشارة وأخذ ملاحظاتهم بعد إعدادها مبدئيا من","ب":"الإدارة. اختيار مجموعة محدودة من المعلمين ذوي الخبرة للمشاركة في صياغة الألهداف تمهيدا","ج":"لعرضها على الباقين.","د":"لستعانة بخبير خارجي لتنظيم ورش عمل مع المعلمين وتوجيههمنحو وضع أهداف متوافقة مع المعايير التربوية."},"a":"أ","e":"هذا الخيار هو الأكثر فاعلية لأن ه يضمن مشاركة شاملة لجميع لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":6,"q":"معلم يلاحظ تورط مجموعة من الطالب في الغش خالل الامتحان، ويرغب في اتخاذ قرار أخالقي مهني يعالج المشكلة بما يحفظ نزاهة االعملية التعليمية ويوفر بيئة تعليمية عادلة، فما الخطوة الألصح؟","o":{"أ":"توثيق واقعة الغش والتحدث مع الطالب المعنيين بشكل خ اص إلعطائهم فرصة للتوضيح قبل إبالغ الإدارة. امتحان جميع الطالب مرة أخرى بشكل فردي لضمان نزاهة التقييم، مع إبالغ الإدارة","ب":"بالواقعة ضمن تقرير شامل. التحقيق مع الطالب المتورطين وإبالغ الإدارة مع اتخاذ إجراءات تصحيحية تراعي","ج":"الامتحان.اهة العدالة والشفافية للحفاظ على نز إبالغ الإدارة فورا مع اقتراح مراجعة نظام التقييم وإعادة تصميمه لتقليل فرص الغش","د":"مع إبالغ الطالب المعنيين بأهمية الألمانة الألكاديمية. مستقبال لأن التحقيق المباشر مع الطالب المتورطين مع إبالغ الإدارة واتخاذ"},"a":"ج","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":7,"q":"موظف في جهة حكومية لاحظ أن بعض الإجراءات الإلدارية المتبعة ال تتوافق بشكل تام مع قانون الخدمة المدنية الجديد، كيف يتصرف في هذه الحالة؟","o":{"أ":"يستشير زمالءه في االعمل لجمع وجهات نظر م تعددة قبل اتخاذ أي إجراء، مع استمرار تطبيق الإجراءات الحالية مؤقتا. يراجع نصوص القانون الجديد بدقة ليقارنها بالإجراءات المتبعة، ثم يقترح تعديال يعزز","ب":"التوافق مع القانون ويعرضه على الجهات المختصة. حتى تصدر توج يهات واضحة من الإدارة العليا","ج":"يلتزم بالإجراءات الإلدارية المتبعة حاليا بشأن القانون الجديد. يجري بحثا في القانون الجديد مع تعديل الإجراءات بشكل تدريجي بناءً على ما محدودًا","د":"دون الرجوع للسلطات القانونية المتخصصة.يراه مناسبا لأن مراجعة القانون بدقة ثم اقتراح تعديالت تتوافق مع المستجدات"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":8,"q":"في صف تعليمي يعاني من ضعف مشاركات الطالب، ما الاستراتيجية التدريسية الأكثر فعالية لتعزيز اندماج الطالب وتحفيز تفاعلهم المستمر؟","o":{"أ":"تقييم درجات المشاركة كوسيلة لتحفيز الطلاب على التفاعل الفوري داخل الصف. تصميم أنشطة تعليمية تعاونية ضمن مجموعات صغيرة تشجع المناقشة والتفاعل","ب":"مشترك.","ج":"ال تنظيم جلسات نقاش مفتوحة بدون توجيه مباشر لتعزيز حرية التعبير والمبادرة الذاتية بين الطالب.","د":"تقديم محاضرات مركزة تتخللها أسئلة تحفزية لتحفيز التفكير والمشاركة خالل الدرس. لأن تصميم أنشطة تعاونية ضمن مجموعات صغيرة يضمن بيئة"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":9,"q":"مدير قسم يواجه نزاعا قائمًا بين فريقين حول توزيع الألدوار، ويرغب في إدارة الألزمة بأفضل طريقة تحقق التوافق وتعزز الألداء الجماعي. ما النهج الأنسب لتبنيه؟","o":{"أ":"على تقييم سريع للوضع دون إشراك الألطراف، لضمان سرعة الحل اتخاذ قرار مبني واستمرار االعمل.","ب":"ا قيادة جلسة تفاوض منظمة تشجع الألطراف على التعبير عن مواقفهم والوصول إلى حل وسط يراعي مصالح الجميع.","ج":"توجيه الفريقين للتركيز على الألهداف المشتركة وتأجيل حل النزاع، لتجنب تعطيل االعمل في المدى القصير. تعديل هيكلة الفريقين أو نقل أعضاء بينهما لتخفيف التوتر وتحسين بيئة االعمل دون","د":"الدخول في نقاشات مطولة. التفاوض المنظم يسمح بإشراك جميع الألطراف و لستماع"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":10,"q":"معلم يسعى لتطبيق نظرية التعلم المعرفية لتحسين جودة التدريس، ما أنسب الممارسات التي تحقق ذلك؟","o":{"أ":"تقديم المعلومات بشكل متسلسل مع التركيز على تكرار المحتوى لتعزيز الحفظ.","ب":"استخدام استراتيجيات متقدمة لتنظيم المعلومات وربطها بمفاهيم سابقة لت  مختلفين، كيف يتصرف بحرفية لضمان تنفيذ االعمل بشكل سليم وفعّال؟","o":{"أ":"ثم يبلغ أحد المديرين عن أي تضارب الحقا.يبدأ بتنفيذ التعليمات التي تلقاها أوال فات وتنسيق التعليمات قبل البدء بالتنفيذ.لختال","ب":"يتواصل مع كال المديرين لتوضيح يختار تنفيذ التعليمات التي يرَ أنها الأكثر مالءمة للظرف الحالي بناءً على خبرته","ج":"الشخصية. يؤجل بدء االعمل إلى حين اتخاذ قرار رسمي من الإدارة العليا بشأن التعليمات","د":"المتضاربة. ا التواصل المباشر مع المديرين لتوضيح وتنسيق التعليمات يضمن"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":28,"q":"في حالة ملاحظة خرق أخالقي من أحد الزمالء في بيئة االعمل، ما الإجراء المهني الأنسب للتعامل مع الموقف؟","o":{"أ":"التحدث مباشرةً مع االزميل بحضور طرف ثالث موثوق، مع توثيق الملاحظة وعدم ق.تصعيد الألمر إال إذا استمر الخر","ب":"مناقشة االزميل بشكل خاص وتنبيه الإدارة بشكل رسمي إذا لم يتوقف عن الخرق. دون التواصل مع االزميل لتفادي التوتر وضمان شفافية الإجراءات.","ج":"إبالغ الإدارة فورا تقديم الشكوى للجهات المختصة داخل المنظمة مع توثيق كامل للخرق، مع الحد من","د":"االزميل حتى البت في الألمر. التعامل المباشر مع ا لأن التواصل المباشر والخاص مع االزميل يعزز فرص التصحيح"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":29,"q":"معلمة تخطط لتطبيق التقويم البنائي في صفها، ما الممارسة الأكثر فاعليةا لسؤال29: لتحقيق أهداف هذا النوع من التقويم؟","o":{"أ":"تطبيق اختبارات متنوعة بشكل مستمر لتحديد مستوى الطالب دون الاعتماد فقط على النتائج النهائية. توفير فرص منتظمة للطالب لتقييم أدائهم بأنفسهم ومناقشة النتائج مع المعلمة لتعديل","ب":"استراتيجيات التعلم. الاعتماد على ملاحظات المعلمة فقط لتقديم تغذية راجعة دورية دون إشراك الطالب في","ج":"عملية التقييم. استخدام تقويم مرحلي معتمد على نتائج متراكمة تشمل اختبارات وملاحظات، لكن بدون","د":"ذاتي للطالب. التركيز على تقييم توفير فرص منتظمة لتقييم الطالب لأنفسهم ومناقشة النتائج مع"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":30,"q":"موظف يرغب في تطوير خطة عمل لتحسين جودة الخدمة في منشأة معينة، ما ائج؟","o":{"أ":"الاستراتيجي لتحقيق أفضل النتهي الخطوة الألولى الألمثل في عملية التخطيط تحليل المشكلة الحالية بدقة مع تحديد أسبابها وجذورها.","ب":"جمع بيانات عامة حول الخدمة ورضا العمالء دون الخوض في التفاصيل الدقيقة للمشكلة.","ج":"مراجعة وتحليل الخطط والحلول السابقة المعتمدة في تحسين جودة الخدمة. االعمل بناءً على رؤيتها وخبرتها.","د":"استشارة الإدارة العليا مباشرة لوضع خطة ا تحليل المشكلة بدقة مع تحديد أسبابها وجذورها هو الخطوة الألهم"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":31,"q":"مدير صف يلاحظ تصرفات عدائية من أحد الطالب تجاه زملائه، فما هي أفضل طريقة مهنية للتعامل مع هذا السلوك بما يحقق فهم الألسباب واالعمل على تعديل ل فعّال؟","o":{"أ":"السلوك بشك االعمل على فرض عقوبات مؤقتة مثل الحرمان من المشاركة في النشاطات، لتقليل فرص العدوانية بشكل فوري. فتح حوار مع الطالب لفهم الدوافع وراء السلوك العدائي، والتعاون معه لوضع خطة","ب":"تعديل سلوكي مناسبة. إشراك أولياء الألمور بشكل مباشر وإبالغهم بسلوك الطالب مع التنسيق لتطبيق إجراءات","ج":"تأديبية منزلية. مراقبة السلوك لفترة محددة دون تدخل مباشر، لتقييم مدى تكرار العدوانية وتأثيرها قبل","د":"اتخاذ إجراءات تصعيدية. التواصل المباشر مع الطالب لفهم أسباب السلوك العدائي واالعمل"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":32,"q":"في إطار التعلم النشط، ما النهج الأكثر فعالية الذي يتبناه المعلم لتعزيز مهارات التحليل لدى الطالب؟","o":{"أ":"ت بشكل عام. طرح أسئلة مفتوحة تحث الطلاب على تفسير المعلوما","ب":"تقديم دراسات حالة تطلب من الطالب تقييم البيانات واستخالص النتائج المنطقية.","ج":"تنظيم مناقشات صفية تركز على مقارنة وجهات النظر المختلفة حول موضوع معين.","د":"تكليف الطالب بكتابة تقارير تحليلية تعكس فهمهم للمحتوى الدراسي. ب- تقدي م دراسات الحالة يتطلب من الطالب تطبيق مهارات تحليلية"},"a":"ب","e":"الإجابة الصحيحة هي: تقديم دراسات حالة تطلب من الطالب تقييم البيانات واستخالص النتائج المنطقية.. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":33,"q":"موظف يشعر بأن تقييم مديره له غير عادل، فما هو السلوك المهني الألمثل للتعامل مع هذا الموقف؟","o":{"أ":"مناقشة التقييم مع المدير على انفراد وطلب توضيح المعايير، مع التركيز على تحسين الألداء. طلب لقاء رسمي مع المدير لمراجعة التقييم بهدوء والتفاهم على نتائج محددة بشكل","ب":"موضوعي.","ج":"تقديم ملاحظات ومستندات للمدير عبر البريد الإللكتروني للمطالبة بإعادة النظر في التقييم.","د":"التواصل مع إدارة الموارد البشرية بعد محاولة النقاش مع المدير إليجاد حل وسط. طلب لقاء رسمي مع المدير ومناقشة التقييم بهدوء هو أكثر الألساليب"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":34,"q":"معلم يسعى لتوظيف مبدأ التحفيز الداخلي في تعلم طالبه، أي من الإجراءات التالية يُعد الأكثر فعالية في تعزيز دافعهم الذاتي؟","o":{"أ":"يحدد مكافآت تشجيعية مرتبطة بتحقيق تقدم معين. ية.","ب":"يربط محتوى التعلم بأهداف الطالب وتوقعاته الفرد الالتزام والمشاركة من خالل توقعات مهنية واضحة.","ج":"يوضح أهمية","د":"يمنح الطالب حرية اختيار أساليب التعلم ضمن إطار محدد. ا ربط التعلم بأهداف وتوقعات الطالب الشخصية يعزز الدافع الداخلي"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":35,"q":"متع ددة ضمن إطار زمني ضيق ولن يستطيع إكمالها جميعا موظف يواجه مهاما ضمن المواعيد المحددة، كيف يتصرف لتحقيق أفضل نتائج دون الإلضرار بسير االعمل؟","o":{"أ":"يقبل جميع المهام ويبدأ باالعمل عليها كلها بشكل متزامن، مع محاولة إنجازها حسب لنطباعية لديه.الألولوية يحدد الألولويات بدقة ويجري تواصال مع المسؤولين للتفاوض على مواعيد تسليم بعض","ب":"","ج":"دون طلب تغيير في المواعيد.","د":"يوزع بعض المهام على زملائه بناءً على توافرهم دون استئذان الإدارة ، مع متابعة تنفيذها لضمان جودة االعمل. هو الألمثل لأنه يجمع بين التنظيم الدقيق وتواصل فعال الخيار("},"a":"ب","e":"الإجابة الصحيحة هي: . لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":36,"q":"مدير مدرسة يرغب في تقييم أداء المعلمين بشكل شامل ودقيق، ما المنهجية الأنسب لتحقيق ذلك؟","o":{"أ":"الاعتماد على تقييم المدير بالإلضافة إلى نتائج اختبارات الطالب لتحليل أداء المعلم. استخدام تقييم متعدد المصادر يشمل الملاحظة الذاتية، تقييم ال ،مدير، آراء الزمالء ونتائج تحصيل الطالب.","ب":"إجراء تقييم قائم على ملاحظة المدير المستمرة والدورية مع استشارات دورية محدودّة","ج":"من الزمالء.","د":"جمع تقييمات الزمالء والوكيلة مع استخدام استبيانات موجهة لتحصيل انطباعات شاملة عن الألداء. ا"},"a":"ب","e":"لأن التق ،ييم متعدد المصادر الذي يجمع بين الذاتية، تقييم الإدارة لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":38,"q":"معلم يرغب في تقديم تغذية راجعة فعالة لطالبه بعد نشاط تعليمي، أيّ أشكال لتحفيز التعلم المستمر وتحسين الألداء؟","o":{"أ":"التغذية التالية هي الأكثر مهنية وفعالية تقديم تغذية راجعة متوازنة تركز على نقاط القوة وتحدد بدقة مج لت التحسين مع اقتراحات عملية. تقديم تغذية راجعة إيجابية في الألساس مع إشارات خفيفة إلى الجوانب التي يمكن","ب":"تطويرها لتعزيز الثقة. مركزة على الألخطاء والملاحظات التصحيحية لتجنب تكرارها","ج":"تقديم تغذية راجعة نقدية مستقبال.","د":"تقديم تغذية راجعة مختصرة ومركزة على أهمنقطتين فقط لتوفير الوقت وزيادة التركيز. التغذية الراجعة المتوازنة التي توازن بين تعزيز نقاط القوة وتحديد"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":39,"q":"لكنه يشعر بالتردد إزاء تبليغ الإدارة عنها، ما موظف يكتشف مخالفة قانونية التصرف المهني الأكثر مالءمة في هذا الموقف؟","o":{"أ":"إبالغ الإدارة مباشرة مع تقديم أدلة موضوعية تحمي الخصوصية. ا","ب":"مناقشة المخالفة مع زمالء موثوقين لطلب المشورة قبل الإلبالغ. ع المحافظة على السرية.","ج":"رفع الموضوع إلى جهة مختصة داخل المنظمة م","د":"انتظار لتقييم تداعيات المخالفة قبل اتخاذ قرار بالإلبالغ. الإلبالغ المباشر مع تقديم أدلة واضحة وموضوعية يعزز المساءلة"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":40,"q":"معلم يستخدم التخطيط الاستراتيجي في التعليم، كيف يحدد مؤشرات قياس النجاح لضمان دقة وفعالية التقييم؟","o":{"أ":"على قابليتها للتحقيق أو اعتماد مؤشرات كمية قابلة للقياس بشكل صارم دون التركيز صلتها بالسياق. تراعي تحديد مؤشرات ذكية(محددة، قابلة للقياس، قابلة للتحقيق، ذات صلة، زمنية)","ب":"الخصوصية السياقية لألهداف التعليمية. اختيار مؤشرات معيارية معترف بها عموميا حتى وإن لم تتناسب بشكل كامل مع السياق","ج":"التعليمي المحدد. استخدام مزيج من المؤشرات الكمية والنوعية مع الاعتمادالانتباه للتنفيذ االعملي وعدم","د":"فقط على المعايير النظرية. لأن مؤشرات ذكية تراعي عدة عوامل حيوية مثل التحديد والقياس"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":41,"q":"مدير في مؤسسة يسعى لتعزيز جودة التواصل بين أقسامها المتعددة، ما الوسيلة لك بشكل فعّال ومستدام؟","o":{"أ":"الأنسب لتحقيق ذ تنظيم إرسال تقارير دورية ونشرات إلكترونية موحدة لجميع الألقسام.","ب":"عقد اجتماعات منتظمة بين قادة الألقسام لمناقشة التحديات والفرص المشتركة.","ج":"تشجيع تبادل المعلومات عبر منصات تواصل داخلي مفتوحة مع تحديثات منتظمة. غير رسمية بين الموظفين لتعزيز تبادل الألفكار والملاحظات بشكل","د":"إنشاء قنوات اتصال طبيعي. تنظيم إرسال تقارير دورية ونشرات إلكترونية موحدة يضمن"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":42,"q":"بعض الطالب يقدمون أعذارا غير صادقة بشأن أداء لاحظت معلمة أن واجباتهم المنزلية، فما أسلوبها التربوي الألمثل للتعامل مع هذه الظاهرة؟","o":{"أ":"مناقشة الطالب بشكل فردي لتوضيح أهمية الصدق وتحفيزهم على تحسين سلوكهم.","ب":"فتح حوار جماعي صريح الاستكشاف الألسباب وبناء بيئة ثقة تدعم الصراح ة والمسؤولية.","ج":"إبالغ أولياء الألمور عن السلوك مع تقديم توصيات بالمتابعة والدعم الجماعي. تطبيق نظام تحفيزي واضح يعاقب الكذب بشكل معتدل دون الإلضرار بالعالقة بين","د":"المعلمة والطالب. فتح حوار جماعي صريح يعد الخيار الألمثل لأنه يركز على معالجة"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":43,"q":"موظف في جهة حكومية يواجه عبئا ويتوجب عليه تحسين الألداء متزايدا إداريا لتحقيق ذلك؟","o":{"أ":"بشكل مستدام وفعال، ما الاستراتيجية الأنسب زيادة ساعات االعمل اليومية مع التركيز على إنجاز المهام المتراكمة.","ب":"تبني أساليب عمل تكنولوجية وأتمتة بعض الإجراءات الروتينية.","ج":"إعادة ترتيب الألولويات وتأجيل بعض المهام غير العاجلة إلى فترة الحقة. الالتزام.","د":"توزيع بعض الألعباء الإلدارية على الزمالء مع التنسيق المستمر لضمان تبني أساليب االعمل التكنولوجية وأتمتة الإجراءات يعتبر الحل"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":44,"q":"مدرس يخطط ألداء تقييم يهدف إلى قياس تطبيقات معرفية متقدمة ضمن محتوى الدرس، ما نوع الألسئلة الأنسب لتحقيق هذا الهدف؟","o":{"أ":"أسئلة اختيار من متعدد تحتوي على عناصر تفسير وتحليل وتركيب.","ب":"أسئلة اختيار من متعدد تركز على استدعاء المعلومات مع بعض التفسير. 18 الألستاذ حسين إبراهيم الشلول دوسية الكفايات التربوية للجواب. موجزًا أو شرحا","ج":"أسئلة صواب وخطأ تتطلب تبريرا","د":"أسئلة ملء الفراغ تتطلب استكمال معلومات ذات مستوى تحليلي. الاختيار من متعدد التي تضم عناصر تفسير وتحليل وتركيب أسئلة"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":46,"q":"معلم يسعى لتعزيز مهارات التفكير الإلبداعي لدى طلابه خالل الحصة، أي الألساليب التالية يُعتبر الأنسب لتحقيق ذلك؟","o":{"أ":"تقديم معايير وضوابط واضحة ثم دعوة الطالب لتوليد أفكار متعددة ضمنها.","ب":"تشجيع الطلاب على طرح أفكار بديلة وتجريبها بحرية مع تقويم مستمر. ر أمثلة تحفيزية.","ج":"توجيه الطالب بشكل مباشر نحو حلول مبتكرة محددة مع توفي","د":"تحفيز الطلاب على مناقشة الألفكار المقترحة مع التركيز على تصحيح الألخطاء فورً ا. لأنها توفر بيئة حرة تسمح بالتجريب و لبتكار مع دعم التقويم، مما"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":47,"q":"مدير قسم يرغب في توزيع المهام بين أعضاء الفريق بشكل عادل وفعّال، ما لتحقيق هذا الهدف؟","o":{"أ":"هو المعيار الأكثر مالءمة توزيع المهام بناءً على كمية االعمل الحالي لكل موظف لضمان عدم التكدس.","ب":"توزيع المهام وفق تقييم مهارات وخبرات كل موظف لتحقيق التوازن والجودة. ا","ج":"توزيع المهام بحسب أسبقية الموظفين في القسم لتحقيق العدالة الزمنية. الالتزام.","د":"توزيع المهام مع مراعاة رغبات الموظفين لتعزيز الدافعية و توزيع المهام على أساس مهارات وخبرات الموظفين يضمن التنفيذ"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":48,"q":"معلمة تسعى إلى تفعيل التقويم الذاتي مع طالبها بطريقة تحقق أعلى درجات ل أمثل؟","o":{"أ":"الفعالية والدقة، كيف يمكنها دعم تطبيقه بشك تقديم إرشادات واضحة، وتعليم الطالب مهارات التقييم الذاتي الموضوعي، ومتابعة نتائجهم وتعزيزها باستمرار. تشجيع الطلاب على إجراء التقويم الذاتي بشكل مستقل، مع مراجعة المعلمة للنتائج","ب":"الانحرافات الجوهرية. فقط لتصحيح الحقا متكرر ة للتقويم الذاتي مع تقديم تغذية راجعة شفهية لتحسين مهاراتهم","ج":"منح الطالب فرصا بة مسبقة.دون فرض إرشادات مصل استخدامنتائج التقويم الذاتي في تقدير درجات الطالب، مع إرشادهم بشكل عام حول","د":"أهميته دون التركيز على التدريب التفصيلي. ،وتعليم مهارات التقييم الموضوعي"},"a":"أ","e":"لأن توفير إرشادات واضحة لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":49,"q":"موظف في إدارة عامة لاحظ تزايد الشكاوى بشأن بطء الإجراءات، ما الخطوةالسؤا ل49: الأكثر فاعلية لتحسين جودة الخدمة؟","o":{"أ":"لنضباط.الالتزام بالإجراءات الحالية بصرامة لضمان إعادة تدريب الموظفين على ات.","ب":"مراجعة وتبسيط االعمليات وتعديلها بما يقلل الزمن المستغرق في الإجراء","ج":"زيادة عدد الموظفين لدعم االعمليات القائمة دون تعديلها.","د":"تطوير نظام متابعة إلكتروني لتحسين مراقبة سير الإجراءات وتقليل التأخير. مراجعة وتبسيط االعمليات تعد الخيار الألمثل لأنها تعالج جوهر"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":50,"q":"يلاحظ معلم تكرار غياب عدد من الطالب دون انتظام، فما الخيار الأكثر فاعلية لمعالجة هذه المشكلة بشكل مهني ومستدام؟","o":{"أ":"الغ الإدارة التخاذ إجراءات إشرافية دون تواصل مباشر مع الطالب أو أولياء الألمور. إب","ب":"التواصل المباشر مع الطالب وأولياء أمورهم لفهم دوافع الغياب وتقديم الدعم المناسب. تعديل أساليب التدريس لجذب الطالب وتقليل أسباب الغياب دون التركيز على التواصل","ج":"معهم. ق نظام مكافآت على الحضور المنتظم لتعزيز الدافعية لالنتظام في الحضور.","د":"تطبي التواصل المباشر مع الطالب وأولياء الألمور يسمح بفهم الألسباب"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":51,"q":"في صف تعليمي، لاحظ المعلم تراجعًا ملحوظا في انتباه الطالب خالل شرح وزيادة تركيزهم بفعالية؟","o":{"أ":"ما الخطوة الأنسب لتحسين تفاعل الطالبدرس جديد. توظيف أساليب شرح مكثفة مع التركيز على التكرار لتعزيز الفهم.","ب":"تضمين أسئلة تحفيزية ونقاشات تفاعلية تدمج الطالب في عملية التعلم.","ج":"تشجيع الطلاب على تدوين الملاحظات بشكل مستمر لمساعدتهم على التركيز.","د":"تبني فترات راحة قصيرة متكررة تسمح للطالب بإعادة تنظيم أفكارهم. استخدام أسئلة تحفيزية ومناقشات تفاعلية هو الخيار الألمثل لأنه"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":52,"q":"كموظف في قسم الموارد البشرية، تستقبل شكوى من موظف ضد زميله بسبب ما هي أفضل خطوة أولى يمكن اتخاذها لمعالجة الشكوى بشكل مهنيسلوك غير الئق. وفعّال؟","o":{"أ":"ترتيب لقاء منفصل مع الموظف المشتكي للاستماع إلى ملاحظاته وتوثيقها بدقة.","ب":"طلب تقرير مكتوب مفصل من كال الموظفين قبل اتخاذ أي خطوات. بوجود شكوى ضده للاستماع إلى وجهة نظره.","ج":"إبالغ االزميل محل الشكوى فورا جراءات الالزمة.","د":"إحالة الشكوى مباشرة إلى مشرف القسم التخاذ الإل ا يُعد ترتيب لقاء منفصل مع الموظف المشتكي للاستماع المباشر إلى"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":53,"q":"أثناء إعداد خطة تدريسية حديثة تهدف إلى تعزيز التعلم الفعّال، ما الخيار الألمثل الاجتماعية الحد وازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":63,"q":"معلمة تواجه طلبات متكررة من طالبها للحصول على إعفاءات من الواجبات. كيف تتصرف؟","o":{"أ":"لنضباط.لت طارئة موثقة للحفاظ على تضع قاعدة عامة تمنع الإلعفاءات إال في ح تضع سياسة واضحة ومتوازنة تتيح الإلعفاءات وفق معايير محددة تراعي الظروف","ب":"الشخصية دون التهاون.","ج":"تستجيب لكل طلب بناءً على تقدير شخصي للحالة، مع محاولة تجنب النزاعات. تُصدر تعليمات بإحالة جميع طلبات الإلعفاء ألولياء الألمور مع تشجيع التنسيق المباشر","د":"معهم. لنضب اط وإظهار المرونة الالزمة"},"a":"ب","e":"لأنها تُوازن بين الحفاظ على لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":64,"q":"في صف يضم طالبًا متباينين في مستويات الفهم، كيف يمكن للمعلم أن يتعامل مع هذا التنوع لتحقيق أفضل نتائج تعلمية للجميع؟","o":{"أ":"تدريس المادة باستخدامنفس الألساليب لجميع الطالب مع توفير دعم إضافي للطالب الضعفاء حسب الحاجة. تطبيق استراتيجيات تدريس متنوعة تراعي الفروق الفردية وتتكيف مع احتياجات كل","ب":"طالب بشكل نظامي.","ج":"تقسيم الطالب إلى مجموعات حسب مستوياتهم وتقديم تعليم موجه لكل مجموعة بشكل مستقل.","د":"التركيز على تحفيز الطالب المتفوقين إلثراء الصف، مع تقديم توجيه عام لآلخرين. ا لأن تطبيق استراتيجيات تدريس متباينة ومنهجية تأخذ الفروق"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":65,"q":"كيف ينبغي أن يؤثر على دقة التقارير في نظام االعمل. موظف اكتشف خلال يتصرف في هذه الحالة لضمان معالجة المشكلة بأفضل طريقة مهنية وأخالقية؟","o":{"أ":"إبالغ المشرف ين بالمشكلة فورا دون اقتراح حلول، ليكون المسؤولون هم من يتخذون القرار.","ب":"إبالغ المشرفين مع تقديم اقتراحات عملية لتحسين النظام وحل المشكلة. ا.","ج":"تعديل التقارير يدويًا مؤقتًا لتصحيح الخلل، مع إبالغ المشرفين الحق لى آرائهم قبل إبالغ المشرفين. للحصول ع","د":"مناقشة المشكلة مع الزمالء أوال لأن الإلبالغ الفوري مع تقديم حلول عملية يعكس مسؤولية مهنية"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":66,"q":"ما من الطالب يعانون من ضعف الدافعية. معلمة في صفها أن عددا لاحظت الاستراتيجية الأكثر فاعلية لتحفيزهم على التعلم؟","o":{"أ":"تشجيع الحوار مع الطالب حول تطبيقات المحتوى في حياتهم اليومية وربط الدروس بتجاربهم الشخصية. اء أو المشاركة الصفية.","ب":"تقديم مكافآت مادية أو معنوية عند تحقيق تحسن في الألد تعديل طريقة عرض المادة لتكون أكثر تفاعلية مع استخدام أمثلة واقعية وربطها","ج":"باهتمامات الطالب.","د":"تخصيص وقت إضافي للطالب الضعفاء لتعزيز فهمهم مع التركيز على جوانب تطبيقية في المحتوى الدراسي."},"a":"أ","e":"لأن تشجيع الحوار ورب ط المادة بتجارب الطالب الشخصية يعزز لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":67,"q":"في إطار التقويم الرامي إلى تقييم مهارات التفكير العليا لدى الطالب، أي نوع الامتحان يُعد الأكثر مالءمة لتحقيق هذا الهدف بفاعلية؟","o":{"أ":"من أسئلة ا أسئلة اختيار من متعدد تتطلب تفسير المعلومات واستنباط النتائج.","ب":"فاهيم متعددة.لت معقدة وربط م أسئلة قائمة على تحليل ح","ج":"أسئلة تعتمد على استرجاع التفاصيل الدقيقة والمعرفة الحفظية.","د":"أسئلة تعزز التلخيص والربط بين الألفكار الرئيسية في نصوص مختارة. الألسئلة التي تعتمد على تحليل ح لت معقدة وربط مفاهيم متعددة"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":68,"q":"كيف يمكنهمهني. موظف يتلقى تعليقات نقدية من زميل في االعمل بأسلوب غير التصرف للحفاظ على المهنية وتحقيق تواصل فعّال؟","o":{"أ":"الرد على االزميل بأسلوب مهذب مع توضيح عدم لًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":71,"q":"موظف يواجه موقفًا يتطلب اتخاذ قرار سريع بين خيارين متكافئين تقنيًا، ما هو الألسلوب الألمثل للتعامل مع الموقف لضمان اتخاذ قرار مهني وفعّال؟","o":{"أ":"اختيار الخيار الذي يتناغم بشكل أكبر مع القيم والمبادئ التنظيمية المتبناة. تقدير الخبير الأكثر خبرة داخل الفريق دون استشارة إضافية. الاعتماد على","ب":"استشارة فريق االعمل سريعًا ألخذ رأي الألغلبية والدفع باتجاه الخيار الأكثر قبوال.","ج":"تأجيل القرار لوقت الحق لجمع مزيد من المعلومات أو تقييم الخيارين بشكل أعمق.","د":""},"a":"أ","e":"لأن اختيار الخي ار المتناغم مع القيم التنظيمية يضمن انسجام القرار لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":72,"q":"في إدارة الصف، يلاحظ المعلم تكرار مقاطعة أحد الطالب له مع قلة تركيزه أثناء الحصة. كيف يمكن للمعلم التعامل مع هذا السلوك بأكثر الطرق فعالية؟","o":{"أ":"توجيه إنذار له أمام زملائه لتوضيح خطورة السلوك وتنبيهه علنًا. 29 الألستاذ حسين إبراهيم الشلول دوسية الكفايات التربوية فع سلوكه وتقديم الدعم المناسب.","ب":"التحدث معه بشكل خاص وهادئ لفهم دوا","ج":"تقليل تفاعل المعلم مع السلوك بتجاهله والتركيز على الطالب الآخرين.","د":"إبالغ أولياء الألمور فورً ا وطلب تدخلهم في فرض العقوبات المناسبة. التحدث مع الطالب بشكل خاص وهادئ يسمح بفهم الألسباب الكامنة"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":75,"q":"معلمة ترغب في تطبيق استراتيجيات التعلم النشط في صف يضم طالبًا من كيف ينبغي أن تتعامل مع هذا التنوع لضمان فعالية التعلم ومشاركةخلفيات ثقافية متنوعة. الجميع؟","o":{"أ":"استخدام استراتيجيات تعلمنشط تعتمد على أساليب متعددة لكنها ال تركز بشكل خاص على التنوع الثقافي. تعليمية تراعي الفروقات الثقافية وتحث على التعاون والتفاعل بين","ب":"تصميم أنشطة الطالب. تعزيز الوعي الثقاف أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":98,"q":"معلمة تواجه تحدياالاحتياجات الخاصة ضمن صفها في دمج طفل من ذوي رف؟","o":{"أ":"وترغب في تحقيق أفضل بيئة تعلمية له. كيف ينبغي أن تتص تعديل اللأنشطة التعليمية بما يتناسب مع احتياجات الطفل مع إشراكه في المجموعة","ب":"توفير بيئة تعليمية داعمة تراعي الفروق الفردية للطفل وتدعم مشاركته الفعالة","ج":"معاملة الطفل كما يُعامل بقية الطالب مع مراقبة احتياجاته دون تعديل خاص تشجيع الطفل على تحمل مسؤولياته كاملة ضمن نشاطات الصف مع تقديم الدعم الحد","د":"الألدنى لأنها تحقق تهيئة بيئة تعليمية شاملة تدعم الفروق الفردية بشكل فعال"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":99,"q":"موظف يلاحظ تكرار تأخر بعض الزمالء عن مواعيد االعمل مما يؤثر على أداء الفريق وجودة النتائج. ما أنسب تصرف له نحو هذا الوضع؟","o":{"أ":"الالتزام. التحدث مع الزمالء بشكل خاص وباحترام لمحاولة فهم أسباب التأخير وتشجيع الالتزام.لنضباط في الفريق أمام الجميع لتحفيز","ب":"التذكير الجماعي بسياسات الحضور و رفع الموضوع إلى الإدارة مع توثيق ح ا بتوصيات للمراجعة دونلت التأخير مرفق","ج":"تدخل مباشر. مؤقتًا كرد فعل لتراجع الألداء الجماعي وانتظار تحسّن الوضع. تقليل مساهماته الشخصية","د":"الحوار الخاص والودي يتيح فهم الألسباب الحقيقية للتقصير ويشجع"},"a":"أ","e":"الإجابة الصحيحة هي: الالتزام. التحدث مع الزمالء بشكل خاص وباحترام لمحاولة فهم أسباب التأخير وتشجيع الالتزام.لنضباط في الفريق أمام الجميع لتحفيز. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":100,"q":"ما الفائدة الألهم معلمة تخطط الستخدام تقويم تكويني مستمر أثناء عمليّة التعلم. التقويم في دعم تعلم الطالب؟","o":{"أ":"من هذا النوع من متابعة تقدم الطالب باستمرار وتعديل استراتيجيات التدريس بناءً على نتائج التقويم.","ب":"جمع معلومات دورية عن أداء الطالب لتحديد نقاط الضعف وإعطاء تغذية راجعة بناءة. ل الفجوات.","ج":"استخدامنتائج التقويم لتوقع الألداء في التقييمات الختامية وتحلي تقديم اختبارات قصيرة ومتكررة لتعزيز التركيز وتحفيز الطلاب على المراجعة","د":"المستمرة. لأن التقويم التكويني المستمر يهدف بالألساس إلى مراقبة تقدم الطالب"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":101,"q":"أثناء حصتك الدراسية، لاحظت أن مجموعة من الطالب تنشغل بالدردشة وتبادل زهم ويعيق سير الدرس. كيف تتصرف؟","o":{"أ":"الرسائل عبر الهاتف المحمول، مما يؤثر على تركي تطلب منهم إيقاف استخدام الهواتف فورا وتوضح لهم أن التكرار سيؤدي إلى خصمنقاط من درجات السلوك. تشرح لهم أهمية الانتباه وأثر التشتيت على جودة التعلم، وتقترح وضع قواعد الستخدام","ب":"الهاتف خالل فترات محددة داخل الحصة. ا لهم فترة قصيرة الستخدام الهاتف بشكل مسؤول أثناء الدرس، مع توجيههم","ج":"تخصص الستخدامه في أنشطة تعليمية محددة تهدف لتعزيز التعلم. تحث الطلاب على تنظيم أنفسهم بأنفسهم للتحكم في استخدام الهواتف دون تدخل مباشر","د":"منك، مع تشجيعهم على احترام أوقات التعلم. لأن وضع قواعد واضحة مدعومة بشرح ألهمية الانتباه يعزز"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":102,"q":"أنت موظف في شركة حكومية، وطلب منك زميل تنفيذ مهام تتعارض جزئيا مع نطاق مسؤولياتك الرسمية. كيف تتصرف للحفاظ على المهنية والتعاون الفعّال؟","o":{"أ":"توافق على تنفيذ المهام المطلوب منك من االزميل لتجنب التوتر بينكما، مع توثيق طلبه للرجوع إليه الحقا. تشرح لاالزميل حدود مهامك مستندا إلى قانون الخدمة المدنية، وتقترح توزيع المهام","ب":"بحيث ال يتعارض ذلك مع مسؤولياتك الألساسية. تناقش مع االزميل الحاجة إلى تنفيذ المهام بخطوة تفاهمية ،مبنية على الالتزام الوظيفي","ج":"مع إشعار مديرك بشكل غير رسمي. ترفض تنفيذ المهام التي ال تقع ضمن اختصاصك، مع إبقاء باب الحوار مفتوحا لتوضيح","د":"الالتزامات والمسؤوليات المشتركة. لأن التوضيح المبني على القانون مع اقتراح حلول عملية يُحافظ"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":103,"q":"في اجتماع فريق االعمل، لاحظت تصاعد خالف بين عضوين بشأن توزيع ما هي أفضل خطوة تتخذها لضمان إدارة الخالفالمهام، مما أثر سلبًا على إنتاجية الفريق. بفعالية وتعزيز التعاون؟","o":{"أ":"تفتح حوارًا مباشرً ا مع الطرفين لتبادل وجهات النظر، مع توجيه النقاش نحو إيجاد حل وسط يرتضيه الجميع. تستمع بهدوء للطرفين دون التدخل الفوري، متيحًا لهم فرصة تنظيم أفكارهم بهدف","ب":"التوصل لحل ذاتي. تقترح تأجيل النقاش إلى وقت الحق بعد جمع المزيد من المعلومات والآلراء، ثم تعيد","ج":"توزيع المهام بناءً على رؤية أشمل. ا","د":"تطلب من المدير الإلداري التدخل فورًا التخاذ قرا ر حاسم يضع حدًا للنزاع ويعيد سير االعمل بشكل سريع. لأن إدارة حوار موجه يتيح للطرفين التعبير بصدق وبناء على ذلك"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":104,"q":"أثناء إعداد خطة تعليمية للفصل الدراسي، تواجه ضعف تحفيز الطالب ومعدالت متابعة منخفضة. ما الإجراء الألمثل لتحسين الوضع؟","o":{"أ":"الاختبارات المتكررة. تعزيز المحتوى التعليمي مع إضافة أنشطة تحفيزية تعتمد على إدماج أساليب التعلم النشط مع تطبيق استراتيجيات تحفيزية متنوعة تركز على مشاركة","ب":"الطالب وتفاعلهم.","ج":"التركيز على التقويم المستمر مع تطوير محتوى يراعي مستويات التحصيل المختلفة للطالب.","د":"تشجيع الطلاب على تشكيل مجموعات دراسية ذاتية التنظيم لتعزيز التعلم التعا وني والتحفيز الذاتي. يعد إدماج أساليب التعلم النشط مع استراتيجيات التحفيز المتنوعة"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":105,"q":"أنت معلم جديد تواجه مقاومة من زميل قديم عند اقتراح طرق تدريس حديثة. كيف تتعامل مع الموقف لتحقيق أقصى تعاون ممكن؟","o":{"أ":"تحاول استقطابه عبر عرض مزايا الطريقة الجديدة مع فتح باب النقاش لتبادل الآلراء لهتمامات.و لس تجابة لبعض ملاحظاته لتقليل","ب":"تواصل تنفيذ طرقك الحديثة بأسلوب متدرج، مع لحتكاك. تقيم اجتماعا بمشاركة الإدارة لعرض التحديات وطلب دعم إداري لتبني الطرق رسميا","ج":"الجديدة. تعتمد الحوار المفتوح لفهم مخاوفه وتحليلها وتقديم الألدلة االعملية التي تبين مدى فعالية","د":"الألسلوب الحديث. د- أل ن الحوار المفتوح المبني على فهم المخاوف وتقديم الألدلة المدعمة"},"a":"د","e":"الإجابة الصحيحة هي: الألسلوب الحديث. د- أل ن الحوار المفتوح المبني على فهم المخاوف وتقديم الألدلة المدعمة. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":106,"q":"أثناء تقييم مشروع طالبي، لاحظت أن مجموعة اعتمدت على مصادر معلومات غير موثوقة بشكل واضح. كيف تتصرف؟","o":{"أ":"تعطي المجموعة درجة منخفضة وترفق ملاحظة رسمية توضح ضعف المصادر دون طلب إعادة االعمل. تشرح للمجموعة أهمية استخدام مصادر موثوقة وتقترح عليهم تحسين المراجع مع منح","ب":"فرصة إلعادة تقديم المشروع. تُدخل التعديالت الضرورية على التقييم بناءً على مراجعتك للمصادر دون إشراك","ج":"الطالب في هذه المراجعة. تقبل المشروع كما هو مع ملاحظة شفوية تحذر فيها الطالب من الاعتماد على مصادر","د":"غير موثوقة في المستقبل. لأنها تتبنى نهجا يشجع على التعلم والتصحيح من ومهنيا تربويا"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":107,"q":"أنت موظف وتلقت منك مراجعة إدارية تنتقد أسلوب عملك بشكل غير مباشر. كيف ترد؟","o":{"أ":"تستقبل المراجعة بهدوء وتطلب من المدير توضيح النقاط المطروحة لتطوير أدائك. تعبر عن استعدادك للاستماع للنقد وتناقش مع المدير خطة مشتركة لتحسين مهاراتك","ب":"ساليب عملك. وأ تطلب من المدير أمثلة محددة على الملاحظات وتوضح وجهة نظرك مع الألخذ بعين","ج":"لعتبار ملاحظاته. تشكر المدير على المراجعة وتراجع أسلوب عملك بناءً على تقييمك الذاتي مع طلب","د":"متابعة دورية لألداء. لستعداد للنقد ومناق شة خطة مشتركة يعكس نضجا ب- التعبير عن"},"a":"ب","e":"الإجابة الصحيحة هي: ساليب عملك. وأ تطلب من المدير أمثلة محددة على الملاحظات وتوضح وجهة نظرك مع الألخذ بعين. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":108,"q":"خالل إحدى الحصص الدراسية، يلاحظ وجود طالب يعاني من ضعف في كيف تتصرف في هذه الحالة لتعزيز بيئة تعلمالتركيز ويشوش على زملائه بشكل متكرر. فعّالة؟","o":{"أ":"الانتباه وتشجيعه على تحسين سلوكه. تحاور الطالب بهدوء أمام الصف لتوضيح أهمية ديم الدعم والتوجيه المالئمين.","ب":"تتحدث مع الطالب بشكل خاص لفهم أسبابه وتق تطلب من الطالب المشاركة في أنشطة صفية بسيطة مع مجموعات صغيرة للحد من","ج":"التشويش.","د":"تناقش الألمر مع أولياء الألمور وتنسق معهم لتوفير دعم إضافي خارج المدرسة."},"a":"ب","e":"لأن التعامل الخاص المبني على التفاهم يسمح بتحديد ا ألسباب لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":109,"q":"عن فريق عمل، لاحظت تراجعًا في الألداء دون أسباب واضحة. كونك مسؤوال ما الخطوة الألمثل لمعالجته بفعالية واحترافية؟","o":{"أ":"تنظيم لقاء لحصر ملاحظات كل عضو حول التحديات التي تواجههم في تحقيق الألداء المطلوب.","ب":"عقد اجتماع تشاركي مع الفريق لتحليل الألسباب الجذرية للتراجع واقتراح حلول مشتركة.","ج":"تطبيق نظام تقييم دوري مكثف لمراقبة الألداء وتحديد نقاط الضعف بدقة. مراجعة الألهداف والمهام مع الفريق وتعديلها بشكل تدريجي لتتوافق مع واقع الألداء","د":"الحالي. لأن عقد اجتماع تشاركي يتيح فهمًا عميقا لألسباب الحقيقية ويسمح"},"a":"ب","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":110,"q":"كمدرس، كيف يمكنك تطبيق مبادئ نظرية التعلم البنائية عند تدريس موضوع جديد لتحقيق أفضل تعلم لدى الطالب؟","o":{"أ":"تنظيم محاضرة تفاعلية تتيح للطالب طرح الألسئلة ومناقشة الألفكار ضمن إطار محدد. تشجيع الطلاب على استكشاف المفاهيم بأنفسهم من خالل أنشطة تطبيقية ومشاريع","ب":"ا تعاونية.","ج":"استخدام اختبارات قصيرة متكررة لتقييم فهم الطالب وتحفيزهم على المراجعة ة.المستمر","د":"تكرار عرض المفاهيم بمداخل وأساليب مختلفة لتعزيز التذكر والفهم العميق. لأن التعلم البنائي يعتمد بشكل أساسي على بناء المعرفة من خالل"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":111,"q":"أثناء عملية تقييمنتائج الطالب، لوحظ تباين ملحوظ في الدرجات رغم تشابه فعلي. ما هو السبب الألرجح لهذا التباين، وما هو الإجراء الألمثل لمعالجته؟","o":{"أ":"مستويات أدائهم ال احتمال وجود اختالفات دقيقة في تطبيق معايير التصحيح بين المقيمين، ويجب توحيد إرشادات التصحيح بشكل دقيق. تفاوت في معايير التقويم أو تصميم الألسئلة، ويجب وضع معايير موحدة واضحة","ب":"وشاملة لجميع الطالب. تغيرات طفيفة في بيئة الاختبار تؤثر على تركيز الطالب، ويجب ضمان ثبات ظروف","ج":"الامتحان.","د":"اختالفات بسيطة في قدرات الطالب التي ال تبرر تعديل المعايير، ويستحسن إبقاء التقييم كما هو."},"a":"ب","e":"لأن توحيد معايير التقويم وتصميم الألسئلة ب شكل موحد وشامل لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":112,"q":"أثناء إعداد استراتيجية تطوير مهني للمعلمين، ما الجانب الألهم الذي يجب التركيز عليه لتحقيق أقصى فاعلية في تدريبهم؟","o":{"أ":"اف العامة للمؤسسة التعليمية. مواءمة محتوى التدريب مع الألهد الاحتياجات االعملية الفعلية للمعلمين في الصفوف الدراسية.","ب":"توافق محتوى التدريب مع من المواضيع الحديثة للتطوير. واسعا","ج":"تصميم البرنامج التدريبي بحيث يغطي عددا لتربوي.لستعانة بمدربين ذوي خبرة طويلة وسمعة علمية مرموقة في المجال ا","د":"لأن التركيز على احتياجات المعلمين الفعلية في الصف يضمن"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":113,"q":"عند مواجهة تهديد لفظي من طالب تجاه زميله داخل الفصل، ما هو الإجراء الألمثل الذي يتوجب عليك اتخاذه؟","o":{"أ":"فتح حوار فوري بين الطالبين بحضور إدارة المدرسة لضمان معالجة المشكلة بشكل مباشر ومنهجي. عزل الطالبين مؤقتًا ثم استدعاء الإدارة لإلشراف على تسوية النزاع بعد جمع","ب":"المعلومات الالزمة. لب من كل طالب كتابة إفادته حول الحادث وإحالة التقارير إلى الإدارة للبت في الألمر.","ج":"ط تهدئة الوضع مبدئيًا بتجاهل التهديد اللفظي مؤقتًا مع متابعة سلوك الطالبين عن كثب","د":"ا دون تصعيد فوري. الحق يتيح فرصة"},"a":"أ","e":"لأن التدخل المباشر بفتح حوار فوري وبحضور الإدارة لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":114,"q":"موظف في قسمك يقدم تقارير تحتوي على معلومات غير دقيقة تؤثر على توجهات الإدارة، كيف تتصرف إزاء هذه المشكلة لضمان جودة االعمل والحفاظ على بيئة مهنية إيجابية؟","o":{"أ":"تناقش الألمر معه بشكل مباشر وبناء، مع تقديم الدعم لتطوير مهاراته وتحسين جودة التقارير. لضمان اتخاذ إجراءات تصحيحية سريعة.","ب":"تُبلغ الإدارة العليا بالموضوع فورا تطلب من الموظف إعادة إعداد التقارير تحت إشراف مباشر لتالفي الألخطاء مستقبال.","ج":"ت أخرى. للموظف وتحدد مهلة لتحسين الألداء قبل اتخاذ إجراءا رسميا","د":"تُصدر تنبيها لأن الحوار المباشر والدعم المهني يركزان على تحسين الألداء بشكل"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":115,"q":"أثناء تطبيق اختبار تحصيلي، لاحظت حالة غش جماعي بين الطالب، ما القرار الألمثل؟","o":{"أ":"ورا.الاختبار بعد توجيه إنذار شفهي للطالب المخالفين دون إبالغ الإدارة ف تواصل تطبيق وتُبلغ الجهات المختصة لتوثيق الحادث والبدء في التحقيق.الاختبار مؤقتا","ب":"توقف لمتابعة التحقيقات والإجراءات النظامية. وتبلغ الإدارة فورا","ج":"تضبط حالة الغش رسميا الاختبار مع تقديم تقرير مفصل لإلدارة بعد انتهائه، مع اقتراح إجراء إعادة اختبار","د":"تُكمل بتدابير احترازية. مصحوبا لأن ضبط الغش بتوثيق رسمي وإبالغ الإدارة بشكل فوري يسمح"},"a":"ج","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":116,"q":"كمعلم يسعى لتعزيز بيئة تعليمية تحترم التنوع الثقافي للطالب، أي من الإجراءات التالية يُعتبر الأكثر فاعلية في تحقيق هذا الهدف؟","o":{"أ":"تبني استراتيجيات تدريس تشمل أغلب الثقافات الممثلة في الصف مع التركيز على القواسم المشتركة بينها.","ب":"دمج أنشطة تعليمية تُبرز وتحتفي بالتراث الثقافي المتنوع للطالب وتشجع الحوار المفتوح حوله. لق تضاء لربط","ج":"تقديم المحتوى العلمي بطريقة موضوعية مع ذكر الخلفيات الثقافية عند المادة بالواقع الطالبي. تحديد سياسات صفية واضحة تُشجع على احترام لختالفات الثقافية مع عدم التركيز","د":"المفرط على الفروقات لتجنب التوترات. لأن دمج أنشطة تعزز التعددية الثقافية وتحتفي بها بشكل صريح يعد"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":117,"q":"في سياق التخطيط الاستراتيجي لقسمك، يطلب منك رئيسك التركيز على تحقيق ما هو أفضل رد فعل بناء على ممارساتنتائج قصيرة المدى فقط لتعزيز الألداء الفوري. الإدارة الفعالة والتخطيط المستدام؟","o":{"أ":"ا تلتزم بتحقيق النتائج قصيرة المدى ك ما طلب ذلك، مع تأجيل النظر في الألهداف طويلة المدى الحقا.","ب":"توضح أهمية الدمج بين الألهداف قصيرة وطويلة المدى لتحقيق نتائج مستدامة ومتكاملة يمثل","ج":"ة إلى النتائج القصيرة لتجنب الفجوة.خفيف توافق مبدئيا على التركيز على النتائج قصيرة المدى، مع توثيق أهمية الألهداف طويلة","د":"المدى في تقاريرك الداخلية دون مناقشتها صراحة مع الرئيس. ، إذ يع كسلستجابة الأكثر مهنية وتوازنا لأن الخيار("},"a":"ب","e":"الإجابة الصحيحة هي: توضح أهمية الدمج بين الألهداف قصيرة وطويلة المدى لتحقيق نتائج مستدامة ومتكاملة يمثل. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":118,"q":"أثناء تعامالتك مع زميل يظهر عليه ضغوط نفسية تؤثر على سلوكه في االعمل ما هو الإجراء الألمثل الذي ينبغي عليك اتخاذه لتعزيز بيئة االعمل ودعم زميلك بشكل مهني؟","o":{"أ":"مع تشجيعه على البحث عن دعم مهني متخصص. لستماع لتفهم مشكلته ومساندته ا على سير االعمل.الاعتماد على الصبر وتحمل تصرفاته بدون تدخل مباشر حفاظ","ب":"إبالغ الإدارة عن سلوكه مع اقتراح توفير دعمنفسي له تحت إشراف مختصين.","ج":"","د":"تقليل تفاعالتك معه لتجنب تصاعد التوتر بينكما والتركيز على مهامك فقط. لأن لستماع الفعّال مع تقديم الدعم الودي وتشجيعه على طلب"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":120,"q":"كيف يمكن للمعلم أن يستخدم مبدأ التعلم بالمشاريع لتعزيز مهارات التفكير العليا عند الطالب؟","o":{"أ":"يحدد المعلم موضوع المشروع ويوجه الطالب خالل جميع مراحله مع التركيز على حل المشكالت وتقييم النتائج بشكل جماعي.","ب":"يوجه الطالب لتحديد المشكلة، التخطيط، ال تنفيذ، ثم التقييم الجماعي، مع تشجيع النقاش والتحليل النقدي في كل مرحلة. يعطي المشروع مع خطوات محددة مسبقا ويطلب من الطالب تنفيذها دون تعديل، مع","ج":"تقديم تقييم فردي شامل لكل طالب.","د":"يشجع الطلاب على إدارة المشروع بأنفسهم بشكل مستقل مع مراجعة دورية من المعل م دون تدخل مباشر في التخطيط أو التنفيذ. لأن توجيه الطالب خالل جميع مراحل المشروع مع تشجيع النقاش"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":121,"q":"أثناء مناقشة جماعية، لاحظت انحياز رأي فريق معين دون لستماع لوجهات نظر باقي الألعضاء. كيف تتصرف؟","o":{"أ":"تتيح للف ريق المنحاز لستمرار في عرض وجهات نظرهم مع توجيه غير مباشر لتشجيع الآخرين على المشاركة الحقا. تشجع جميع الألعضاء على التعبير عن آرائهم وتحرص على تطبيق قواعد الحوار","ب":"العادل لضمان شمولية النقاش. قديم آرائهم بشكل متوازن. ثم تدعو الجميع إلعادة تلنحياز مؤقتا","ج":"تتدخل بلباقة لوقف تترك المجال للفريق المنحاز ليكمل نقاشه وتتابع الحقا مع الألعضاء الذين لم يحصلوا","د":"على فرصة للتعبير. لأنه الخيار الأكثر مهنية وفعالية في ضمان مشاركة عادلة وشاملة"},"a":"ب","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":122,"q":"ل متكرر، مما يؤثر على سير الدرس. طالب يكرر التأخر عن الحصص بشك كيف تتعامل مع هذا الموقف بطريقة مهنية تحقق أفضل أثر إيجابي؟","o":{"أ":"تبللستمرار في تطبيق الإجراءاتغ ولي أمر الطالب فورً ا مع تقديم تقرير رسمي، مع النظامية. مع الطالب لفهم أسباب تأخره، وتبحث معه عن حلول مناسبة تدعم","ب":"تفتح حوارًا مباشرا تحسنه. تفرض عليه عقوبات موجهة داخل الصف كالتقليل من مشاركته مؤقتًا، لضبط السلوك","ج":"دون الحاجة للتصعيد. تعتمد على متابعة السلوك متكررا وتحليل نمطه قبل اتخاذ أي إجراء، لتجنب الردود","د":"السريعة التي قد ال تكون فعالة."},"a":"ب","e":"لأن فتح حو ار مباشر مع الطالب لفهم الألسباب واالعمل معه على لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":123,"q":"كموظف تعمل ضمن فريق واحد، لاحظت أن زميلك ال يلتزم بشكل منتظمالسؤا ل23: كيف تتصرف بأفضلبالمنهجيات المتفق عليها مما يؤدي إلى تأخير في إنجاز المهام. طريقة مهنية لضمان فعالية االعمل الجماعي؟","o":{"أ":"الالتزام على الفريق وتحفزه على التقيّد بالمنهجيات تناقش معه بهدوء لتوضيح أثر عدم المتفق عليها. الالتزام بالمنهجية.","ب":"تبلغ قائد الفريق أو المشرف مباشرةً لتولي الألمر وضمان","ج":"تقوم بتنفيذ المهام التي لم ينفذها زميلك بنفسك لتفادي التأخر في تسليم االعمل دون مناقشة. واضح. تحد من تواصلك وتعاونك معه مؤقتا حتى يلتزم بالمنهجيات بشكل","د":"لأن المناقشة الهادئة والمباشرة تعزز فهم االزميل ألهمية الالتزام"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":124,"q":"في سياق صياغة قواعد الصف لضمان لنضباط بناءً على نظرية التعلم ز السلوك المرغوب؟","o":{"أ":"السلوكي، أي من الألساليب التالية يعد الأكثر فعالية لتعزي ا لهتمام بالتعزيز الإليجابي.","ب":"التركيز على تقديم عقوبات فورية عند المخالفات دون الالتزام بالقواعد لتعزيز السلوك المرغوب. تكريم الطالب بانتظام على","ج":"ضبط قواعد الصف بوضوح مع تقديم تحذيرات قبل اتخاذ إجراءات تأديبية. وتعزيزات متوازن يعتمد على تقييم سلوك الطالب بدقة. تطبيق نظام عقوبات","د":"لأن التعزيز الإليجابي المستمر يعزز السلوك المرغوب بفعالية أكبر"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":125,"q":"أثناء تقييم خطط فردية لتنمية المهارات، لاحظت تكرار نقص مهارات تنظيم موظف لتحسين هذه المهارة بشكل فعال ومستدام؟","o":{"أ":"الوقت لدى أحد الموظفين. كيف تدعم ال تشجعه على تعديل جدول أعماله بنفسه وتجربة أساليب تنظيم وقت جديدة.","ب":"توفر له تدريبات وورش عمل متخصصة في إدارة الوقت وفعالية الإلنتاجية. ا زمنية واضحة.","ج":"تناقش معه أهمية تنظيم الوقت بشكل فردي وتحدد له أهداف","د":"تطلب من الموظف استخدام أدوات وتقنيات رقمية إلدارة الوقت التي يعتمدها الفريق. لأن توفير تدريبات وورش عمل متخصصة يزوّ د الموظف بالمعرفة"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":126,"q":"في حالة وجود سوء تفاهم بينك وبين زميل حول مهام مشتركة، كيف تضمن تجاوز المشكلة بأكثر الطرق فاعلية ومهنية؟","o":{"أ":"هات النظر وتوضيح المسؤوليات المشتركة بشكل مباشر. تعقد اجتماعًا وديًا لتبادل وج ترسل بريدًا إلكترونيًا تتضمن نقاط الخالف وتطلب من االزميل توضيح مواقفه كتابيًا","ب":"لتوثيق الحوار.","ج":"تناقش الموضوع بشكل غير رسمي خالل استراحة االعمل لتفادي تصعيد الألمور الرسمية.","د":"تطلب من المدير تعديل توزيع ال مهام لتفادي الخالف دون الحاجة لمناقشة مباشرة مع االزميل. لأن عقد اجتماع ودي مباشر يتيح فرصة لفهم وجهات النظر بشكل"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":127,"q":"كيفا لسؤال27: علمت أن زميلك يستخدم بيانات خاصة باالعمل بطريقة غير أخالقية. تتصرف؟","o":{"أ":"تناقش الألمر معه بشكل خاص وتحثه على تصحيح السلوك مع تحذيره الحتمالية الإلبالغ ّإذا استمر. على معايير النزاهة المهنية والمؤسسية. حفاظا","ب":"تبلغ الإدارة المختصة مباشرة فورا ق استخدامه غير الألخالقي للبيانات ثم تناقش الألمر معه قبل اتخاذ أي إجراء رسمي.","ج":"توث","د":"تتجنّب المواجهة المباشرة وترصد تصرفاته قبل تقرير الإلبالغ لضمان الألدلة الكافية. لأن الإلبالغ الفوري لإلدارة المختصة يتوافق مع قواعد النزاهة"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":128,"q":"أثناء صياغة خطة استراتيجية لقسمك، تواجه تعارضًا في الألولويات بين أعضاء الفريق. كيف تعالج الألمر؟","o":{"أ":"تحدد الألولويات بناءً على تقييمك الشخصي لما يخدم أهداف القسم، مع توضيح مبرراتك للفريق. تستخدم أسلوب التفاوض الجماعي إليجاد توافق يلبي أكبر عدد ممكن من احتياجات","ب":"الفاعلة. الفريق ويضمن المشاركة تقترح تأجيل قرار تحديد الألولويات إلى حين جمع مزيد من البيانات أو آراء إضافية من","ج":"الفريق. تعتمد على تصويت الفريق مع إعطاء وزن إضافي لرأي القادة الأكثر خبرة لضمان","د":"اختيار الألولويات الأكثر نفعًا."},"a":"ب","e":"لأن التفاوض الجماعي يعزز مشار كة الجميع ويوازن بين المصالح لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":129,"q":"عند انتهاء الحصة، يطلب منك أحد الطالب مراجعة درجاته لأنه يشك بوجود خطأ في تقييمه. كيف تتصرف في هذه الحالة بشكل مهني وأمثل؟","o":{"أ":"ا تشرح للطالب أن الدرجات تم تأكيدها وال يمكن تعديلها بعد الانتهاء، مع توجيهه لطلب سمية من الإدارة.مراجعة ر","ب":"تراجع الدرجات معه بهدوء وتوضح له معايير التصحيح التي اتبعتها دون تأجيل. تطلب من الطالب إعادة تقديم طلبه كتابيا حتى تتمكن من دراسة الموقف بدقة والتواصل","ج":"معه الحقا. تؤجل المراجعة لتوقيت الحق بدون تحديد موعد واضح، كي ال تتسبب في تعطيل سير","د":"الحصة. لأن مراجعة الدرجات مع الطالب فورا وشرح معايير التصحيح"},"a":"ب","e":"الإجابة الصحيحة هي: تراجع الدرجات معه بهدوء وتوضح له معايير التصحيح التي اتبعتها دون تأجيل. تطلب من الطالب إعادة تقديم طلبه كتابيا حتى تتمكن من دراسة الموقف بدقة والتواصل. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":130,"q":"موظف جديد يعاني من ضعف على سيرالالتزام بالمواعيد مما يؤثر سلبا االعمل. كيف تتصرف في هذه الحالة لتحقيق أفضل نتيجة؟","o":{"أ":"تناقش معه أسباب تأخيره بهدوء، وتوضح تأثير ذلك على الفريق، مع وض ع خطة الالتزام.مشتركة لتحسين تحذره رسميالالتزام وإخبار الإدارة في حال من التكرار، مع التأكيد على ضرورة","ب":"استمرار المشكلة.","ج":"تقلل من مهامه مؤقتا لتقليل تأثير التأخير، مع مراقبته بشكل دوري وتقديم التوجيه عند الحاجة.","د":"تتابع معه بشكل مستمر وتطلب منه ت وقيع تعهد ب الالتزام بالمواعيد دون الدخول في تفاصيل أسباب التأخير. لأن المناقشة الهادئة التي توضح التأثير مع وضع خطة مشتركة تعزز"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":131,"q":"كيف يمكن للمعلم تقييم مهارات التفكير النقدي لدى الطالب بفعالية ضمن إطار تقييم الموضوعي؟","o":{"أ":"تعليمي يهدف إلى تنمية التحليل العميق وال استخدام أسئلة تستدعي استرجاع المعلومات مع توفير فرص للتفكير في الألسباب والتداعيات.","ب":"طرح أسئلة مفتوحة تشجع على التحليل والتفسير والتقييم المنطقي للحجج.","ج":"تطبيق اختبارات زمنية تحفز على استرجاع المعلومات بسرعة موازية للتفكير. ا مراقبة الطالب من خالل ملاحظة أداء السلوكيات المرتبطة بالتفكير النقدي في المواقف","د":"التعليمية. لأن الألسئلة المفتوحة التي تشجع على التحليل والتفسير والتقييم"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":132,"q":"أثناء اجتماع عمل لاحظت وجود غموض في توزيع المهام مما يعرقل تحقيق ف، كيف تتصرف في هذه الحالة؟","o":{"أ":"الهد تطلب من المدير إعادة توزيع المهام بشكل واضح لضمان وضوح المسؤوليات.","ب":"تقترح على الفريق عقد نقاش سريع لتوضيح المهام وتحديد المسؤوليات بشكل مشترك. تبادر بتوضيح مهامك الشخصية وتحفز زمالءك على توضيح مهامهم لضبط سير","ج":"االعمل. تابع أداء مهامك بدقة مع توثيق ملاحظاتك عنها لحين توضيح المهام من جهة القيادة.","د":"ت لأن الإلشراك التفاعلي للفريق في توضيح المهام يعزز وضوح"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":133,"q":"طالب يطلب منك تمديد موعد تسليم مشروع بسبب ظروف شخصية تستدعي النظر. كيف تتصرف؟","o":{"أ":"ا على مواعيد التسليم التي وُ ضعت لجميع الطالب. ترفض التمديد حفاظ","ب":"تستمع له بع متوازناناية، تقيّم مدى جدية الحالة وتأثيرها على أدائه، ثم تتخذ قرارا لنضباط.يراعي الإلنصاف و","ج":"تمنحه التمديد فورً ا دون شروط، مراعاةً لظروفه الشخصية.","د":"توجهه إلى الجهات الإلدارية المختصة للنظر في طلبه وفق اللوائح المعمول بها. لأن هذا الخيار يجمع بين التعاطف والموضوعية، حيث تستمع إلى"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":134,"q":"أثناء تدريس صف يضم طالبًا ذوي مستويات معرفية مختلفة، كيف تضمن مشاركة فعّالة ومستدامة لجميع الطالب في اللأنشطة التعليمية؟","o":{"أ":"تقدمنشاطا موحدًا يركز على المحتوى الألساسي الذي يمكن لجميع الطالب التعامل معه بغض النظر عن مستواهم.","ب":"تصمم أنشطة متعددة المستويات تراعي الفروق الفردية وتحقق تحديًا مناسبًا لكل مجموعة من الطالب.","ج":"تسمح للطالب المتفوقين باالعمل بشكل مستقل، فيما تقدم لل طالب الآخرين أنشطة مبسطة تضمن مشاركتهم. تعتمد على تقسيم الصف إلى مجموعات متجانسة بحسب المستوى، مع تقديم مهام مختلفة","د":"تناسب كل مجموعة. لأن تصميم أنشطة متعددة المستويات يراعي الفروق الفردية ويحفز"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":135,"q":"كيف موظف من قسم آخر يطلب منك تسريع تنفيذ مهمة ليست من اختصاصك. تتصرف؟","o":{"أ":"تدرس الطلب بعناية وتبلغ مديرك للحصول على توجيه، مع لحتفاظ بحق طلب توضيح الألولويات قبل التنفيذ. ألي تأخير، مع إخطار المدير بعد البدء. تجنبا","ب":"توافق على تنفيذ المهمة فورا","ج":"ترفض الطلب بصراحة لتفادي مخالفة اختصاصك وزيادة العبء الوظيفي. إلى حين مراجعة التنسيق مع الإدارة والألقسام المعنية.","د":"تؤجل تنفيذ المهمة مؤقتا لأن تقييم الطلب مع إشراك الإدارة يضمن اتخاذ قرار مدروس يحفظ"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":136,"q":"كيف يمكنك تقويم فعالية استخدام التقنية في التعليم داخل صفك لضمان تحسين مستمر وجودة التعلم؟","o":{"أ":"ملاحظة تفاعل الطالب خالل الحصة فقط لتقييم فاعلية التقنية في الوقت الحقيقي.","ب":"جمع بيانات متنوعة من الطالب ح ول تجربتهم، وتحليل نتائج تحصيلهم الألكاديمي، مع مراجعة طبيعة استخدام التقنية. ا الاعتماد على تقويم الألداء الذاتي للمعلم وتحليل التغذية الراجعة من زمالء االعمل حول","ج":"استخدام التقنية. لنطباعات والتجار ب","د":"استبيان آراء الطالب والمعلمين عن التقنية مع التركيز على الشخصية. لأن جمع بيانات متنوعة تشمل تجارب الطالب ونتائج تحصيلهم"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":137,"q":"كيف تتابع الألمر أحد الطالب يُظهر سلوكًا عدوانيًا تجاه زملائه في المدرسة. بشكل يضمن تحسين سلوك الطالب وبيئة الصف بشكل مستدام؟","o":{"أ":"تعقد جلسة حوار فورية مع الطالب لتحديد أسباب السلوك وتُبلغه بعواقب مستمرة إن لسلوك العدواني.تكرر ا تتحدث معه بهدوء لفهم دوافع السلوك وتوجهه لتلقي دعمنفسي متخصص مع متابعة","ب":"مستمرة.","ج":"تشرك أولياء الألمور في حوار شامل مع الطالب لتوحيد الجهود التربوية والنفسية إلصالح السلوك.","د":"تراقب السلوك عن قرب مع تثبيت الإجراءات التأديبية بعد توثيق الح وادث، مع إدخال برامج توعية للصف. لأن التحدث الهادئ لفهم دوافع السلوك مع الدعم النفسي المتخصص"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":138,"q":"في اجتماع لتحليل أداء الموظفين، ما هو أفضل الألساليب لضمان تقي يم موضوعي وعادل؟","o":{"أ":"الاعتماد على معايير أداء محددة وواضحة يصادق عليها جميع الألطراف. لعتبار كمعيار رئيسي للتقييم.","ب":"أخذ انطباعات المدير المباشر بعين","ج":"جمع تقييمات من الزمالء والفرق المختلفة لتعزيز التوازن في التقييم. لنتائج المباشرة كأساس للتقييم.","د":"استخدام ملاحظات الألداء اليومية وا لأن وضع معايير أداء محددة وواضحة ومعتمدة من جميع الألطراف"},"a":"أ","e":"الإجابة الصحيحة هي: الاعتماد على معايير أداء محددة وواضحة يصادق عليها جميع الألطراف. لعتبار كمعيار رئيسي للتقييم.. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":139,"q":"أثناء تنفيذ خطة استراتيجية، يثير فريق االعمل اعتراضًا حول أولوية إحدى الألهداف المحددة. كيف تتصرف في هذا الموقف لتحقيق أفضل نتائج تنفيذية وفريقية؟","o":{"أ":"تشرح مجددًا أسباب تحديد الألولوية وتطالب الفريق بقبولها دون تعديل حفاظا على الجدول الزمني. تعقد جلسة نقاش تشاركية مع الفريق إلعادة تقييم الألولويات بناءً على وجهات نظرهم","ب":"وحقائق جديدة.","ج":"تؤكد على الألولوية المخططة وتطلب من الفريق الالتزام بها مع توضيح العواقب لمتثال.المحتملة لعدم","د":"ت ؤجل اتخاذ القرار النهائي حول الألولوية لفترة قصيرة لتقييم ردود الفعل والمراجعة الذاتية للفريق. لأن عقد جلسة نقاش تشاركية يعزز الفهم المشترك، ويعزز التزام"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":140,"q":"في موقف عملي، لاحظت أن زميال يتعامل مع معلومات العمالء بطريقة قد تنتهك خصوصيتهم. كيف تتصرف؟","o":{"أ":"تتحدث معه بشكل خاص لتوضيح المخاطر وتحفيزه على تصحيح السلوك. على إجراءات المؤسسة.","ب":"ترفع الألمر مباشرة إلى الإدارة المختصة حفاظا","ج":"تناقش الموضوع معه في وجود شخص ثالث كوسيط للتأكيد على أهمية الخصوصية.","د":"توثق الموقف وتنتظر تطورات إضافية قبل اتخاذ أي خطوة رسمية. التواصل الشخصي المباشر يتيح فرصة تصحيح السلوك بسرعة"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":141,"q":"كيف تساعد طالبك على تطوير مهارات حل المشكالت بأكثر فاعلية؟","o":{"أ":"مع تشجيعهم على مناقشتها وتحليلها. توضح لهم الحلول النموذجية مفصلة","ب":"تقدم لهم مشكالت واقعية مع توجيه الدعم لتعزيز التفكير النقدي الجماعي المستقل. ا تطبيقية المتنوعة مع تحفيز الحوار بين الطالب لتبادل الحلول.","ج":"تعتمد على التمارين ال من حفظ النتائج فقط.","د":"تنظم اختبارات تقيّم استيعاب الطالب لطرق الحل بدال لأن تقديم مشكالت واقعية مع دعم التفكير الذاتي والجماعي يعزز"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":142,"q":"أنت مسؤول عن إعداد خطة عمل سنوية لقسمك، كيف تضمن توافقها الألمثل مع أهداف المؤسسة العليا؟","o":{"أ":"تطابق أهداف الخطة مع توقعات الإدارة المباشرة دون مراجعة الاستراتيجيات العليا بشكل رسمي.","ب":"تراجع استراتيجيات المؤسسة العليا بشكل شامل، وتدمجها بمشاركة جميع المعنيين ذوي العالقة في صياغة الخطة.","ج":"تصمم الخطة ب الاعتماد على أهداف القسم مع تعديل طفيف بناءً على فهم شخصي لالاستراتيجيات العليا.","د":"تستخدم خطة العام السابق كنموذج، مع تحديثات طفيفة تراعي التغيرات الطارئة فقط. لأن مراجعة الاستراتيجيات العليا بشكل شامل ودمجها بمشاركة"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":144,"q":"أثناء تدريس مادة معقدة، كيف تستخدم تقنيات التقويم لتسه يل فهم الطالب وتحسين أدائهم التعليمي؟","o":{"أ":"تعتمد على اختبارات نهاية الوحدة لتقييم مدى استيعاب الطالب للمفاهيم، مع تقديم الانتهاء.ملاحظات عامة بعد تعتمد تقويمات مستمرة متنوعة تشمل الواجبات، المناقشات، و الاختبارات القصيرة، مع","ب":"توفير تغذية راجعة فورية لتوجيه التعلم. تركز على تقييم الطالب من خالل أنشطة تقويم ذاتية وتقييم زمالء، مع تقارير دورية","ج":"تعكس تقدمهم.","د":"تستخدم تقويمات تشخيصية قبل البدء في الدرس وبعد كل وحدة، مع تحليل النتائج لتعديل استراتيجيات التدريس."},"a":"ب","e":"لأن التقويمات المستمرة الم تنوعة مع التغذية الراجعة الفورية تتيح لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":145,"q":"في حالة نشوب خالف بين زميلين في فريقك، كيف تُحدد دورك كقائد في إدارة اع؟","o":{"أ":"هذا النز لنحياز ألحد منهم. يراعي مصلحة الفريق دون تستمع لكل طرف بعناية ثم تقدم حال","ب":"تتدخل بفعالية إليجاد حل وسط يرضي جميع الألطراف مباشرة.","ج":"تسمح للطرفين بمحاولة حل خالفهما بأنفسهم مع تقديم دعم استشاري عند الحاجة. لم يتم التوصل التفاق خالل فترة زمنية محددة. ترفع الموضوع إلى الإدارة العليا إذا","د":"لأن لستماع المنصف لكل طرف مع السعي لتقديم حل يوازن بين"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":146,"q":"كيف تعزز أخالقيات المهنة في بيئة االعمل بشكل فعال ومستدام؟","o":{"أ":"بتطبيق نظام مراقبة صارم ومعاقبة المخالفين بشكل فوري. الإليجابي.","ب":"بتوفير تدريبات توعوية دورية ومكافأة السلوك الألخالقي لنتهاكات بالتدرج وفق خطورتها.","ج":"بوضع قواعد أخالقية واضحة والتعامل مع 60 الألستاذ حسين إبراهيم الشلول دوسية الكفايات التربوية بتشجيع بيئة عمل شفافة تتيح للموظفين التعبير عن مخاوفهم ومحاسبة الجميع على","د":"السلوك المهني. لأن توفير التدريبات المستمرة والمكافآت على السلوك الألخالقي"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":147,"q":"ما هوناء تدريسك، يرفض طالب المشاركة في النشاط بسبب عدم ثقته بنفسه. أث الإجراء الألمثل لمساعدته على المشاركة بشكل فعّال؟","o":{"أ":"تشجيعه بلطف على المشاركة من خالل طرح أسئلة بسيطة تعزز ثقته تدريجيا. عبير.","ب":"طلب مشاركته مع مجموعة زملائه لتخفيف الضغط الشخصي وتشجيعه على الت","ج":"منح وقت إضافي له للتأمل والتفكير قبل المشاركة دون الضغط عليه مباشرة. تقديم تغذية راجعة إيجابية عند مشاركته لتعزيز ثقته مستقبال.","د":"لأن التشجيع المباشر من خالل أسئلة بسيطة ومدروسة يهدف إلى بناء"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":148,"q":"كيف تتصرف إذا اكتشفت أنك أخطأت في تقييم طالب بعد اعتماد الدرجة؟","o":{"أ":"توضح الخطأ للطالب وتصحح التقييم دون الحاجة للمراجعة مع الإدارة.","ب":"تعتذر للطالب وتصحح التقييم مع توضيح شفاف، مع إعالم الإدارة بما حدث. الإدارة قبل اتخاذ أي إجراء مع الطالب. تناقش الخطأ أوال مع","ج":"وال تخبر الطالب مباشرة لتجنب إرباكه.","د":"تصحح الخطأ داخليا لأن الشفافية المباشرة مع الطالب و لعتراف بالخطأ مع إعالم"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا
