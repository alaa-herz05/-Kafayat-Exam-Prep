تحقق الهدف المطلوب بالكامل."},{"n":149,"q":"أثناء تواصلك مع أحد أولياء الألمور الذي أبدى استعج للحصول على نتائجل طفله، كيف تتعامل مع الموقف بأفضل طريقة مهنية وأخالقية؟","o":{"أ":"توضح له بدقة إجراءات التقويم والفترة الزمنية الالزمة إلصدار النتائج، مع التأكيد على أهمية دقة البيانات. ا تقدم له ملخصا للنتائج مع التنويه أنها غير نهائية وقابلة للتعديل بعد انتهاء موعد أوليا","ب":"التحليل الرسمي. لحاجته للنتائج وتحاول تسريع الإجراءات بما يسمح به ا لنظام دون المساس","ج":"تبدي تفهما بالجودة. تؤجل الرد عليه مؤقتالالتزام بالجدول الزمني الرسمي لضمان مع تبرير ضرورة","د":"العدالة والمصداقية. لأن التوضيح المهني الشفاف إلجراءات التقويم والوقت الالزم يبني"},"a":"أ","e":"الإجابة الصحيحة هي: توضح له بدقة إجراءات التقويم والفترة الزمنية الالزمة إلصدار النتائج، مع التأكيد على أهمية دقة البيانات. ا تقدم له ملخصا للنتائج مع التنويه أنها غير نهائية وقابلة للتعديل بعد انتهاء موعد أوليا. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":150,"q":"عندما تخطط الجتماع فريقك الدوري، كيف تضمن فعاليته القصوى؟","o":{"أ":"تضع جدول أعمال محددًا وتخصص وقتًا مناسبًا لكل بند مع إشراك الفريق في صياغته.","ب":"لجتماع بدون جدول رسمي لكن تحرص على إدارة الوقت ومتابعة النقاط المهمة. تبدأ","ج":"تحضر محضر اجتماع سابق وتناقش المهام بدون تحديد أوقات دقيقة لكل نقطة.","د":"تعد قائمة نقاط رئيسية وترصد وقتًا كليًا لالجتماع مع مرونة في توزيع الوقت بين النقاط. لأن وضع جدول أعمال محدد مع تخصيص الوقت لكل بند وإشراك"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":151,"q":"أثناء تدريس موضوع جديد، لاحظت تشتت انتباه عدد كبير من الطالب وارتفاع كيف تتصرف لتحقيق بيئةمستوى الضوضاء داخل الصف، مما يؤثر على سير الدرس. تعليمية فعالة ومستقرة؟","o":{"أ":"لن ضباط وتضع قواعد واضحة للسلوك داخل الصف، ثم تستأنف تذكر الطالب بأهمية الدرس مباشرة. تقسم الطالب إلى مجموعات صغيرة لتنفيذ نشاط تطبيقي مرتبط بالموضوع، مما","ب":"يشغلهم بشكل إيجابي ويخفض الضوضاء. توجّه نداءً هادئالانتباه وتطلب من الطالب تحديد مصادر التشتت مع تشجيعهم لجلب","ج":"الالتزام بالهدوء قبل متابعة الدرس. على توقف الدرس مؤقتالنضباط وتطلب من الطالب الوقوف بهدوء لفترة قصيرة الستعادة","د":"ثم تستكمل التدريس الحقا. تقسيم الطالب إلى مجموعات صغيرة للنشاط التطبيقي يشغلهم"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":152,"q":"مدير المدرسة طلب منك إعداد خطة لتحسين أداء طالب متوسط المستوى في مادة الرياضيات. ما هي الخطوة الأكثر مهنية وفاعلية للبدء بها من بين الخيارات التالية؟","o":{"أ":"تنظيم دروس تقوية إضافية موجهة للطالب بعد ساعات الدوام لتعزيز الفهم. فصل لتحديد نقاط الضعف بدقة قبل وضع خطة التدخل.","ب":"إجراء تقويم تشخيصي م تنظيم جلسات دعم جماعية تعتمد على حل تمارين متقدمة لتحفيز الطالب وتحسين","ج":"مهاراتهم.","د":"تحفيز الطالب عبر تقديم مكافآت تشجيعية بناء على تحسن درجاتهم خالل الفترة القادمة. التقويم التشخيصي يوفر أساسا لفهمنقاط الضعف دقيقا علميا"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":153,"q":"أثناء اجتماع مع زميل تشعر بأنه يقلل من جهودك المهنية أمام الزمالء، كيف تتصرف بطريقة تعكس المهنية والفعالية في حل المشكلة دون تصعيد الخالف؟","o":{"أ":"لجتماع لتوضح موقفك دون تأجيل.ه مباشرة وبوضوح أثناء ترد علي لجتماع لتبادل وجهات النظر بهدوء.","ب":"تطلب منه التحدث معك بشكل خاص بعد لجتماع وتركز في أداء عملك على نحو أفضل.","ج":"تتجاهل تعليقاته خالل تك المهنية. لجتماع لتوضيح موقفك ودعم صور","د":"تعبر عن استيائك لفريق االعمل بعد طلب الحديث بشكل خاص بعد لجتماع يتيح فرصة لحوار هادئ"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":154,"q":"لاحظت أن أحد الطالب يعاني من ضعف متكرر في أداء الواجبات المنزلية رغم يم الدعم، ما هو الإجراء الألمثل للتعامل مع هذا الوضع؟","o":{"أ":"تقد لستفسار منه بشكل مباشر داخل الصف عن أسباب ضعف أدائه وتحفيزه. ا","ب":"التواصل مع ولي أمره لمعرفة ظروفه ودعم التعاون بين المدرسة والألسرة.","ج":"تكليفه بمهام إضافية ومسؤوليات صفية لتحفيز مشاركته وانضباطه. قديم استشارة توجيهية فردية لمساعدة الطلاب على تنظيم وقته وتحسين أدائه.","د":"ت التواصل مع ولي الألمر يتيح فهم أسباب المشكلة بشكل أعمق ويخلق"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":155,"q":"أثناء تطبيق اختبار نقدي للبناء المعرفي، لاحظت أن بعض الألسئلة تركز فقط على الحفظ والتذكر، ماذا تفعل؟","o":{"أ":"الاختبار أسئلة تقيس مها رات التحليل والتركيب لتوازن تدمج في الجزء القادم من مستويات التفكير. الاختبار.","ب":"تحافظ على الألسئلة الحفظية الحالية لأن تعديلها قد يؤثر على موثوقية نتائج ترفق تعليمات للطالب تبرز أهمية التفكير النقدي لتوجيههم تجاه التعامل العميق مع","ج":"المحتوى. تفسر نتائج الألسئلة الحفظية ضمن سياقها التعليمي وتعزز تقييم مهارات التفكير العليا في","د":"تقاريرك. لأن تطوير أسئلة تقيس مهارات التفكير العليا يعزز من جودة التقييم"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":156,"q":"موظف تقدم بطلب إجازة مفاجئة بسبب ظرف عائلي طارئ في نظام الخدمة المدنية. كيف تتعامل مع طلبه بأكثر الطرق مهنية وفعالية؟","o":{"أ":"تمنحه الإلجازة إذا استوفت الشروط النظامية. تفحص أسباب الطلب بعناية ثم تطلب من الموظف تقديم طلب رسمي وانتظار الموافقة مع مراجعة الحالة الطارئة. لإلجراءات النظامية.","ب":"للظرف العائلي مع تسجيل الطلب الحقا احتراما","ج":"تمنح الإلجازة فورا ح بعد التحقق من صحة الطلب.","د":"تطلب من الموظف توثيق الظرف العائلي وتطبيق اللوائ فحص الألسباب بعناية ثم منح الإلجازة وفق الشروط النظامية يوازن"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":157,"q":"تواجه نزاعًا بين زميلين في قسمك ناجمًا عن تضارب في فهم أدوار االعمل كيف تتصرف؟","o":{"أ":"تجتمع مع كل منهما بشكل منفرد للاستماع إلى وجهات نظرهما ثم توضح الألدوار المتداخلة بناءً على ذلك.","ب":"تعقد جلسة وساطة مشتركة تجمع االزميلين لتوضيح الألدوار وحل الخالف بشكل تعاوني. ليل التداخل.","ج":"تخصص مهام محددة لكل منهما مع إشراكهما في صياغة تقسيم الألدوار لتق ترفع الألمر إلى الإدارة العليا بعد محاولة التفاهم مع كل منهما بشكل فردي إذا استمر","د":"النزاع. لأن الوساطة المشتركة تتيح توضيح الألدوار بصيغة شفافة ومتفق"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":158,"q":"عند التخطيط الاستراتيجي للعام الدراسي، وجدت تعارضًا بين الموارد المتاحة 8: السؤال والألهداف الموضوعة في الخطة، كيف تتصرف لتحقيق أقصى فاعلية؟","o":{"أ":"تراجع الألهداف بشكل دقيق لتتناسب مع الموارد المتاحة مع الحفاظ على معايير الجودة الألساسية.","ب":"تحاول تأمين موارد إضافية مع تعديل طفيف ومبرر في الألهداف لتقليل الفجوة.","ج":"تلتزم بالألهداف الألصلية مع محاولة تحسين كفاءة الموارد دون تعديل الألهداف.","د":"تعيد صياغة الخطة كليًا مع تقييم شامل للموارد والألهداف قبل التنفيذ."},"a":"أ","e":"لأن تعديل الألهداف بدقة يتناسب مع الموارد المتا حة مع المحافظة لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":159,"q":"أثناء تدريس نظرية تعلم جديدة، تلاحظ أن بعض الطالب يظهرون مقاومة لنطواء، كيف تحفزهم على المشاركة الفعالة؟","o":{"أ":"ويميلون إلى الصمت و تعزز المحاضرة بإضافة المزيد من الألمثلة التفصيلية لتوضيح تطبيقات النظرية. والتطبيقية. تفتتح نقاشًا مباشرًا يربط النظرية بخبراتهم الشخصية","ب":"تطلب منهم إعداد تقرير كتابي يعكس فهمهم للنظرية مع عرض مختصر في الحصة","ج":"ا التالية.","د":"تخصص وقتًا فرديًا لتقديم الدعم وتوضيح أي مفاهيم غير واضحة لكل طالب على حدة. فتح نقاش مباشر يرتكز على ربط النظرية بالتجارب الشخصية"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":160,"q":"موظف جديد في قسمك يعاني من تردد متكرر في تنفيذ مهامه ويطلب مساعدتك بشكل مستمر، كيف تدير الموقف بأفضل طريقة تعزز كفاءته واستقالليته؟","o":{"أ":"لمهام له بشكل متكرر حتى يتمكن من تنفيذها بشكل مستقل. تقوم بإعادة شرح ا","ب":"تعقد له جلسة تدريبية مركزة توضح فيها المهارات المطلوبة وتشجعه على المبادرة. من مهامه إلى زميل أكثر خبرة لتخفيف الضغط عليه تدريجيا.تحيل جزءا","ج":"وتحفيزه على التحسن. تفرض عليه متابعة دقيقة وتقارير يومية لمتابعة تقدمه","د":"لأن التدريب المركز يزوّد الموظف الجديد بالمعرفة والمهارات"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":161,"q":"في صف دراسي، تواجه طالبًا يظهر سلوكا يؤثر على جو متكررا عدائيا لنضباط ويوفر فرص الدعم الفعّال له؟","o":{"أ":"الصف العام، كيف تتعامل مع الموقف بما يحقق الدوام في الصف لمناقشة السلوك بشكل خاص وبناء خطة تعديل تطلب منه البقاء بعد مناسبة.","ب":"تتحدث معه بهدوء خارج الصف فور حدوث السلوك لفهم دوافعه واحتياجاته. تشاركه القواعد والنتائج المحتملة لسلوكه أثناء الحصة أمام زملائه مع توجيه تلميحات","ج":"داعمة. اءً مع ولي أمره لبحث الحلول البديلة.","د":"تسجّل ملاحظات السلوك وترتب لق التحدث بهدوء خارج الصف فور حدوث السلوك يسمح بفهم"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":162,"q":"ما هو القرار12: خالل تقييم أداء معلمي المدرسة، لاحظت تفاوتًا كبيرً ا في الألداء. السؤال الألمثل لتحسين الألداء بشكل مستدام ومهني؟","o":{"أ":"تقديم تغذية راجعة عامة لجميع المعلمين لتشجيعهم على تطوير مهاراتهم. على حدة. تصميم برامج تطوير مهني مخصصة تعالج نقاط القوة والضعف لكل معلم","ب":"تنظيم ورش عمل جماعية تركز على المهارات الألساسية التي تحتاج تطويرً ا في أغلب","ج":"المعلمين.","د":"عقد لقاءات فردية دورية مع المعلمين ذوي الألداء المتفاوت لمتابعة تقدمهم بشكل خاص. تصميم برامج تطوير مهني مخصصة لكل معلم هو القرار الألمثل"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":163,"q":"موظف يطلب ترقية رغم عدم توفر فرص حاليا، كيف تتعامل مع طلبه بما الالتزام؟","o":{"أ":"يعكس مهنية الإدارة ويحفز تشرح له بوضوح نظام الترقيات والمعايير المعتمدة، مع التأكيد على المتابعة لتطور فرص الترقية مستقبال. لحاجته وترشح له فرص تطوير مهني قد تساهم في تأهيله لترقية مستقبلية.","ب":"تبدي تفهما تعبر عن رفضك للطلب مع توضيح أن الألوضاع الحالية ال تسمح بالترقيات، مع","ج":"التشجيع على الصبر.","د":"تعده بأن طلبه سيكون محل اعتبار بمجرد توافر الفرص، دو ن التفاصيل أو الالتزامات الواضحة. ،الشرح الواضح والمنهجي للسياسات وبناء توقعات واقعية يعزز الثقة"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":164,"q":"أثناء اجتماع عمل، لاحظت تكرار المقاطعة وعدم لستماع الفعّال من أحد على جو االعمل؟","o":{"أ":"الزمالء، كيف تتصرف لتعزيز التواصل الفعّال دون التأثير سلبا لستماع الجيد لتجنب التكرار وعدم التركيز. تطرح ملاحظة عامة أمام الفريق عن أهمية لجتماع.","ب":"تناقشه بشكل خاص وهادئ لتوضيح تفسير سلوك المقاطعة وأثره على سير الانتباه بشكل مباشر.لجتماع وتحفزه على","ج":"تعبر عن استيائك بلطف خالل الاجتماعات. ابعة االزميل بما يضمن تحسين أدائه في","د":"تطلب من المدير تفهّم الوضع ومت ا مناقشة االزميل بشكل خاص تحفظ كرامته وتعزز فهمه للسلوك"},"a":"ب","e":"الإجابة الصحيحة هي: تناقشه بشكل خاص وهادئ لتوضيح تفسير سلوك المقاطعة وأثره على سير الانتباه بشكل مباشر.لجتماع وتحفزه على. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":165,"q":"ٍبعد إجراء تقييم تحصيلي للطالب، تبين أن غالبية الألسئلة لم تغطِ بشكل كاف فعالية التقييم وصدق نتائجه؟","o":{"أ":"النقاط الألساسية للمقرر، فما هو الإجراء الألمثل لضمان إعادة تصميم أسئلة التقييم مع تحليل دقيق لنتائج الطالب لتحقيق تغطية شاملة للنقاط الألساسية. مراجعة التقييم الحالي مع إجراء تعديل طفيف في ترتيب الألسئلة وتحليل النتائج بشكل","ب":"جزئي. فة دون تغيير أسئلة التقييم الألساسي.","ج":"اعتماد تقييم تكميلي يعتمد على طرق صياغة مختل توسيع فترة الاختبار للطالب مع إعادة تطبيق نفس الألسئلة دون تعديل لضمان تغطية","د":"أفضل. إعادة تصميم أسئلة التقييم وتحليل النتائج بدقة هو الإجراء الألمثل لأنه"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":166,"q":"طالب شكا لك من ظلم زميله في تقسيم الألدوار داخل مشروع جماعي، كيف امل مع الشكوى بما يحافظ على العدالة ويعزز روح الفريق؟","o":{"أ":"تتع تستمع للشكوى وتحث الطالب المتضرر على محاولة حل المشكلة بشكل شخصي مع زميله أوال.","ب":"تعقد جلسة حوارية مع جميع أعضاء الفريق لمراجعة توزيع الألدوار وتعديلها بما يرضي الجميع بشكل عام.","ج":"تنقل الشكوى إلى ا لمشرف للمساعدة في حل النزاع مع اقتراح تعديل الألدوار بناءً على تقييم الفريق. تتابع الموضوع بشكل غير رسمي من خالل التحدث مع الطالب المتهم وتحفيزه على","د":"التعاون وإعادة النظر في تقسيم الألدوار. ب- عقد جلسة حوارية مع الفريق يتيح بيئة شفافة و حوارا يعزز مباشرا"},"a":"أ","e":"الإجابة الصحيحة هي: تتع تستمع للشكوى وتحث الطالب المتضرر على محاولة حل المشكلة بشكل شخصي مع زميله أوال.. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":168,"q":"أثناء تدريس نظرية التعلم البنائي، يبدِي بعض الطالب ارتباكا في استيعاب يز فهمهم؟","o":{"أ":"المفهوم، كيف تُفضّل أن تتصرف لتعز تُعيد شرح النظرية بأسلوب مختلف مع تدعيمها بأمثلة تطبيقية واضحة وملموسة.","ب":"تشجع الطلاب على مناقشة المفهوم فيما بينهم وتبادل الألفكار دون شرح إضافي من جانبك.","ج":"توكل مهمة شرح المفهوم للطالب المتفوقين ليشركوا زمالءهم في االعملية التعليمية. ل من تفصيل الشرح وتُوجّه تركيز الدرس نحو المفاهيم الألساسية الأكثر وضوحا.","د":"تُقل إعادة الشرح بأسلوب مختلف مدعوم بأمثلة تطبيقية هي الطريقة"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":169,"q":"تواجه موظفًا يعاني من تراجع في أدائه رغم التنبيهات السابقة، كيف تتعامل مع لتحقيق أفضل النتائج؟","o":{"أ":"المشكلة بطريقة مهنية تناقش معه أسباب التراجع بشكل مباشر، وتحدد معه خطة تحسين زمنية قابلة للقياس ا والمتابعة. تطبق عليه إجراءات تأديبية تدريجية مع توثيق للتقارير لضمان جدية التعامل مع","ب":"المشكلة. تعقد اجتماعًا مع الموظف لمراجعة الألداء بشكل شامل، وتشجعه على التعبير عن","ج":"مشاكله، ثم تتابع تنفيذ الحلول بشكل دوري. تلفت نظر الموظف إلى تأثير تقصيره على الفريق وتحفزه عبر إظهار أهمية دوره، مع","د":"متابعة تحسنه بشكل منتظم. لأن الحوار المباشر وتحديد خطة تحسين واضحة وقابلة للقياس"},"a":"أ","e":"الإجابة الصحيحة هي: المشكلة بطريقة مهنية تناقش معه أسباب التراجع بشكل مباشر، وتحدد معه خطة تحسين زمنية قابلة للقياس ا والمتابعة. تطبق عليه إجراءات تأديبية تدريجية مع توثيق للتقارير لضمان جدية التعامل مع. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":170,"q":"المدرس يرغب في دمج تقنيات التقييم البديل في صفه لكنه غير متأكد منال سؤال20: أفضل منهجية لذلك، ماذا تنصحه؟","o":{"أ":"يبدأ بتطبيق تقنيات التقييم البديل بشكل فوري وشامل لتحقيق التجديد الكامل في الممارسات التعليمية. مع التخطيط ال مسبق والتقييم المستمر لضمان التكيف","ب":"يدمج تقنيات التقييم البديل تدريجيا والتحسين المستهدف. يجرب تقنيات التقييم البديل بشكل متقطع وبعيدا عن التخطيط المسبق لتيسير االعملية","ج":"بشكل عفوي. يدمج تقنيات التقييم البديل فقط في بعض الفصول الدراسية متجاهال التخطيط العام","د":"لضمان عدم تعطيل جداول التدريس. الدمج التدريجي مع التخطيط المسبق والتقييم المستمر هو الألسلوب"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":171,"q":"في حالة ورود شكوى من أحد الطالب ضد أحد المعلمين، كيف تتعامل معها لحترافية والمهنية؟","o":{"أ":"بأعلى درجات ن مصادر متعددة.","ب":"تستمع للطالب بعناية وتؤجل أي إجراء حتى تجمع معلومات إضافية م تستمع للطالب وتتحقق من الشكوى مباشرة وبطريقة موضوعية، مع ضمان حماية حقوق جميع الألطراف.","ج":"تتواصل فورًا مع المعلم المعني للاستماع إلى وجهة نظره قبل اتخاذ أي موقف. ا توضح للطالب أهمية تسجيل شكواه رسميًا ثم تراجع الألمر مع الإدارة المختصة التخاذ","د":"القرار المناسب. هذا الخيار هو الأكثر مهنية لأنه يضمن التوازن بين لستماع"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":172,"q":"تتلقى تعليمات من الإدارة بزيادة انضباط الطالب، لكن الطرق المتبعة تؤثر كيف تتصرف في هذه الحالة لضمان تحقيقسلبًا على الجو التعليمي وتشوش بيئة التعلم. ورة ممكنة؟","o":{"أ":"الألهداف بأفضل ص تنفذ التعليمات بدقة مع مراقبة مستمرة لآلثار السلبية ومحاولة التقليل منها. تناقش مع الإدارة بشكل بناء لتعديل الألساليب بما يتناسب مع طبيعة الطالب ويحفز بيئة","ب":"تعليمية إيجابية. لستمرار في التنفيذ كما تضع ملاحظاتك ووجهات نظرك في تقرير رسمي لإلدارة، مع","ج":"هو مطلوب. تتبع أسلوبك الخاص في إدارة ا المبادئ العامة، مع إبالغ الإدارة الحقلنضباط مراعيا","د":"بنتائج هذا الألسلوب. هذا الخيار يمثل نهجا يعترف بأهمية التعليمات مع متوازنا مهنيا"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":173,"q":"أثناء إعداد خطة االعمل السنوية، لاحظت وجود فجوة في الكفاءات الألساسية تطويرية؟","o":{"أ":"لدى فريق االعمل، فما الخطوة الأنسب لمعالجتها حسب أفضل ممارسات الإدارة ال إعادة توزيع المهام بحيث يتولى كل موظف مسؤوليات ضمن مستوى كفاءته الحالي.","ب":"تنظيم دورات تدريبية مستمرة ومتخصصة لتطوير مهارات الفريق بشكل منهجي. استقطاب موظفين جدد ذوي كفاءات عالية لتعويض النقص الحالي فورا.","ج":"لتتوافق مع القدرات الحالية للفريق دون تغييرات تدريبية. تعديل أهداف الخطة السنوية","د":"تنظيم دورات تدريبية مستمرة ومتخصصة هو الحل الألمثل لأنه"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":174,"q":"زميلك في المشروع الم شترك يلتزم بنسبة متقطعة بالمواعيد المتفق عليها، مما يسبب بعض التأخير في سير االعمل. كيف تتعامل مع هذا الوضع لتحقيق أفضل نتائج؟","o":{"أ":"تناقش معه الألسباب وراء التأخير وتطلب منه الالتزام بشكل صارم بالمواعيد دون مرونة.","ب":"معه لفهم أسباب التأخير والتوصل إلى حلول مشتركة تالئم الطرفين وتدعم تفتح حوارا الإلنجاز الجماعي. الالتزام.","ج":"ترفع الألمر لإلدارة لتدخلها المباشر وتحديد الإجراءات الالزمة لضمان تتولى االعمل بشكل مستقل إلنجاز المهام الالزمة بسرعة، مع تجنب إثارة خالفات قد تؤثر","د":"على أجواء الفريق. ب- ف تح الحوار لفهم الألسباب ووضع حلول مشتركة يعزز التعاون"},"a":"ب","e":"الإجابة الصحيحة هي: معه لفهم أسباب التأخير والتوصل إلى حلول مشتركة تالئم الطرفين وتدعم تفتح حوارا الإلنجاز الجماعي. الالتزام.. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":175,"q":"أثناء الامتحان، لاحظت طالبًا يقلد زميله في الإلجابة، كيف تتصرف بطريقة مهنية وأخالقية؟","o":{"أ":"وتأثيره على مستقبله الدراسي.","ب":"تنبه الطالب بهدوء على الفور وتوضح له مخاطر الغش الامتحان لتوعية الطالبين بخطورة الغش وحفظ كرامتهم.الانتهاء من تناقش الطالب بعد","ج":"تعاقب الطالب بشكل صارم فورًا أمام زملائه لتكون عبرة تمنع تكرار الغش. ا.","د":"تسجل مخالفة الغش وتعطي الطالبين درجة صفر مع شرح أسباب القرار الحق تنبيه الطالب فورًا بهدوء مع توضيح مخاطر الغش يجمع بين الحزم"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":176,"q":"أثناء تقييم أداء أحد المعلمين، تكتشف وجود تحيّز ظاهري تجاه بعض الطالب كيف تتصرف في هذه الحالة؟","o":{"أ":"ا تناقش الموضوع مع المعلم بأسلوب غير اتهامي، وتُقدم له الدعم والإلرشاد لتعزيز العدالة في تعامالته. تخبر الإدارة بالألمر ليتخذوا الإجراءات التأديبية المناسبة بشكل مباشر للحفاظ على","ب":"نزاهة البيئة التعليمية. المتوقعة","ج":"تتحدث مع الطالب المتضررين لتقديم المساندة النفسية ولتوضيح الخطوات لتصحيح الوضع. تراقب أداء المعلم بشكل أكبر لفترة زمنية محددة قبل اتخاذ أي إجراء، بهدف جمع المزيد","د":"من الألدلة. الحوار المباشر والداعم مع المعلم يحقق تحسنا ويعالج مستداما مهنيا"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":178,"q":"في سبيل تحفيز الطالب للمشاركة الفعالة داخل الصف، ما هو الألسلوب الألمثل لتحقيق ذلك حسب أفضل الممارسات التربوية؟","o":{"أ":"مكافأة الطالب ماديًا بانتظام مقابل مشاركتهم في الدروس. توفير فرص منتظمة للطالب للتعبير عن آرائهم ومناقشتها مع تقديم التقدير اللفظي","ب":"البنّاء.","ج":"تشجيع المشاركة من خالل تحديد شروط ومهام واجبة التنفيذ على الطالب لتعزيز الالتزام.","د":"التركيز على نتائج التحصيل الألكاديمي وتقديم مهام إضافي ة لمن يشارك بانتظام دون اعتماد مكافآت مادية أو لفظية. ا لأن إتاحة الفرص للتعبير عن الآلراء مع تقديم التقدير اللفظي البنّاء"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":179,"q":"بعد تطبيق اختبار إلكتروني، أعر ب عدد من الطالب عن اعتراضهم على لعتراضات بشكل مهني وفعّال؟","o":{"أ":"صعوبة بعض الألسئلة. كيف تتصرف تجاه هذه تشرح للطالب أن الهدف الرئيس من الاختبار هو تحفيزهم على بذل جهد أكبر والرقي بالمستوى العلمي. ،وفق المعايير المهنيةالاختبار بدقة، وتراجع مستوى صعوبة الألسئلة","ب":"تقوم بتحليل نتائج مع إعادة النظر في الألسئلة المثيرة للجدل إذا لزم الألمر. تعيد تطبيق الالتزام بالنتائج وعدم التفاوضالاختبار بنفس الألسئلة، مع التأكيد على أهمية","ج":"حول الصعوبة. الاختبار الرسمي كما هي دون تعديل أو مراجعة، مع التشديد على أن النتائج تثبت نتائج","د":"نهائية مهما أثار الطالب من اعتراضات. تحليل النتائج ومراجعة الألسئلة يضمن تطبيق معايير العدالة المهنية"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":180,"q":"أبلغت عن تصرف غير مهني من أحد الزمالء، كيف تتصرف بطريقة مهنية لضمان تحقيق عادل وفعال؟","o":{"أ":"ألة مع االزميل بشكل خاص. تجمع معلومات من الزمالء المباشرين فقط ثم تناقش المس تجمع معلومات من مصادر متعددة وتفتح حوارا مع االزميل لضمان الفهم مباشرا","ب":"المتبادل قبل اتخاذ أي إجراء. تبلغ الإدارة فورا مع تقديم ما لديك من معلومات أولية لتسريع اتخاذ القرار والإجراءات","ج":"الالزمة. تراقب تصرفات االزميل لفترة زمنية محددة لجمع أدلة أكثر قبل أن تتحدث مباشرة معه أو","د":"تبلغ الإدارة. جمع معلومات متعددة المصادر وفتح حوار مباشر مع االزميل"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":181,"q":"عند إعداد خطة توز ،يع المهام وتلاحظ تفاوت مستويات الخبرة بين الموظفين كيف تتصرف لتحقيق أقصى درجات الكفاءة والتنمية؟","o":{"أ":"تُوزع المهام وفق مستوى الخبرة مع متابعة مستمرة وتقديم الدعم الالزم لتحسين الألداء. مهاراتهم لتحفيز تعلمهم وتطوير","ب":"تُكلف الموظفين ذوي الخبرة الألقل بمهام أكثر تحديا سريعا. تخصص المهام البسيطة للموظفين الألقل خبرة حفاظا على جودة االعمل وتجنب الألخطاء","ج":"الكبيرة. تعيد توزيع المهام بشكل متوازن دون تغيير مستوى التحدي، مع مراقبة الألداء لتقييم","د":"الحاجة للدعم أو التدريب. التوزيع المدروس الذي يأخذ في لعتبار مستوى الخبرة ويوفر الدعم"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":182,"q":"في مواجهة طالب مستهتر يسخر من المعلم خالل الحصة، ما هو الإجراء الأنسب للتعامل معه؟","o":{"أ":"بهدوء لتوضيح أثر سلوكه على االعملية التعليمية. التحدث معه فورا انتهاء الحصة بحوار خاص لبناء وعي إيجابي. طلب الحوار معه بعد","ب":"توبيخه بشكل مباشر لكن بمستوى لهجة معتدل أمام المجموعة لردع السلوك.","ج":"خالل الحصة لتجنب التصادم والتركيز على الدرس.","د":"تجاهل السخرية مؤقتا ب- طلب الحوار الخاص بعد الحصة يوفر بيئة مناسبة للتواصل الف عّال"},"a":"أ","e":"الإجابة الصحيحة هي: بهدوء لتوضيح أثر سلوكه على االعملية التعليمية. التحدث معه فورا انتهاء الحصة بحوار خاص لبناء وعي إيجابي. طلب الحوار معه بعد. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":183,"q":"تواجه تعارضًا بين قيم المدرسة وقيم أحد الطالب، كيف تدير الموقف على أفضل نحو؟","o":{"أ":"ا الالتزام بالقواعد. تشرح للطالب أسباب تمسك المدرسة بقيمها مع تأكيد أهمية ين.","ب":"تستمع للطالب بإنصاف وتحاول بناء جسر تفاهم يحترم كال القيمت تطالب الطالب ب لمتثال لقيم المدرسة مع منح فرصة للنقاش حول اختالف وجهات","ج":"النظر.","د":"تتبع إجراءات المدرسة الرسمية في حال تعذر التوافق مع محاولة توضيح العواقب. هذا الخيار الألمثل لأنه يجمع بين لستماع والتفهم ومحاولة إيجاد"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":185,"q":"موظف يستمر في تقديم تقارير االعمل متأخرة، كيف تتصرف لضمان تحسين الألداء والحفاظ على روح التعاون؟","o":{"أ":"جدوال عليه لتسليم متفقا زمنيا تناقش معه أسباب التأخير بأسلوب بنّاء وتضع معه التقارير. تفرض عليه مواعيد نهائية صارمة وتتابع التقارير أسبوعيا مع تحذير رسمي في حالة","ب":"التأخير المتكرر.","ج":"تقلل من مسؤولياته المتعلقة بالتقارير وتكلف زميالالالتزام آخر بمتابعة االعمل لضمان بالمواعيد. ا","د":"تزامن بين المكا فآت والمواعيد المحددة، بزيادة المكافأة في حال الالتزام وتقليلها في حال التأخير. الحوار البناء ووضع جدول زمني متفق عليه يعززان الالتزام"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":186,"q":"في صف يضم طالبا بمستويات تعلم متفاوتة بشكل واضح، كيف تخطط ادة للجميع؟","o":{"أ":"لتصميم وتنفيذ الدرس لتحقيق أقصى استف تتبع خطة تدريس موحدة للجميع مع توفير دعم إضافي فردي حسب الحاجة.","ب":"تعتمد استراتيجيات التعلم التمايزي لتلبية احتياجات كل مجموعة وفق مستوى الطالب.","ج":"تركز على تحديات الطالب المتفوقين لتطوير مهاراتهم بصورة أعمق. للطالب ذوي الألداء المنخفض لتوفير بيئة مناسبة لهم. منفصالتخصص موارد وصفا","د":"التعلم التمايزي هو الخيار الألمثل لأنه يوفر خطة تعليمية مرنة تلبّي"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":187,"q":"موظف يظهر مقاومة واضحة للتعاون مع فريق االعمل، كيف تتصرف حيال هذا الموقف؟","o":{"أ":"ف للاستماع إلى وجهة نظره ومحاولة فهم دوافع رفضه للتعاون. مع الموظ تعقد اجتماعا","ب":"تدعو الموظف وفريقه إلى جلسة مشتركة لبحث الألسباب ووضع خطة تعاون عملية.","ج":"تبلغ الإدارة لمتابعة موقف الموظف واتخاذ الإجراء المناسب إذا استمر الرفض. واضح ة لاالعمل الجماعي في خطوة","د":"تراقب سلوك الموظف عن كثب وتحدد معه أهدافا الحقة. الجمع بين الموظف والفريق في جلسة مشتركة يتيح فهم جميع"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":188,"q":"عند وضع أهداف تقييمية لدرس جديد، كيف تضمن أنها تعكس مهارات تفكيرالسؤ ال38: م الفعّال؟","o":{"أ":"عليا تعزز التعل ر والفهم كأساس لتقييم شامل. تركز على التذك تصوغ أهدافا تربط بين التحليل والتطبيق والتقييم لتحقيق مهارات تفكير عليا.","ب":"تصوغ أهدافا تتدرج من المعرفة إلى التطبيق مع لمسة تحليلية محدودة.","ج":"تصوغ أهدافا تحفز التقييم الذاتي والتركيب مع الحفاظ على أساس المعرفة.","د":"تصوغ أهدافا لأن صياغة الألهداف التي تدمج التحليل والتطبيق والتقييم تمثل أعلى"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":189,"q":"هناك تنافس سلبي بين الموظفين يؤثر على الإلنتاجية وسير االعمل، كيف تتعامل مع هذه المشكلة لضمان تحسين الألداء والحفاظ على بيئة عمل صحية؟","o":{"أ":"حوارية دورية لتبادل الآلراء والتفاهم بين الموظفين.","ب":"تنظيم جلسات عقد ورشة عمل متخصصة لتعزيز روح الفريق وثقافة التعاون البناء.","ج":"تقديم حوافز ومكافآت فردية للموظفين المتميزين لتحفيز الألداء.","د":"توجيه الموظفين لممارسة التركيز على مهامهم الفردية وتقليل التواصل غير الرسمي. على الرغم من أن الخيارات الألخرى تبدو منطقية، إال أن عقد"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":190,"q":"لاحظ مديرك استمرار تأخر بعض االعمليات الإلدارية بصورة متكررة، كيف ال ذلك؟","o":{"أ":"تتصرف حي تتابع الموظفين بشكل مباشر وتعقد اجتماعات دورية لضبط الألداء وتسريع إنجاز المهام. تراجع إجراءات االعمل الحالية وتحلل أسباب التأخير وتقترح تحسينات منهجية لرفع","ب":"كفاءة الألداء. الالتزام بالمواعيد إلظهار الجدية في تضع نظام مكافآت وعقوبات مرتبط بمستوى","ج":"ا معالجة التأخير. تطلب من الموظفين تقرير أسباب التأخير بشكل مكتوب مع احترام حرصهم على جودة","د":"االعمل وعدم التضحية بها. مراجعة الإجراءات وتحليل أسباب التأخير مع اقتراح تحسينات"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":191,"q":"في حالة وجود طالب يعاني من عالمات اضطراب تعلمي غير مشخص ل للتعامل مع وضعه؟","o":{"أ":"رسميًا، ما هو التصرف المهني الألمث توثيق ملاحظات السلوك والألداء مع متابعة مستمرة وإشراك الألسرة في الملاحظة. جمع البيانات التقييمية وتوجيه الطالب للجهات المختصة إلجراء التشخيص المهني","ب":"والدعم المناسب. النتظار للتشخيص.","ج":"تقديم تدخلات تعليمية تعديلية مؤقتة بناءً على ملاحظات المعلم دون ا","د":"طلب تقييمنفسي شامل من الألسرة دون إشراك المدرسة في المرحلة الألولية. لأن جمع البيانات التقييمية وتوجيه الطالب للجهات المختصة يضمن"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":192,"q":"عندما تتلقى شكوى من ولي أمر ضد سوء تعامل موظف، كيف تتصرف لتحقق أفضل معالجة للموقف؟","o":{"أ":"تستمع إلى شكوى ولي الألمر وتوجه الموظف لتحسين سلوكه بدون فتح تحقيق رسمي. تجري تحقيقا يشمل استماع كل من ولي الألمر والموظف، مع توثيق النتائج موضوعيا","ب":"واتخاذ القرارات بناءً على الألدلة. بشأن الموظف حفاظا فورياتعتمد على تقييمك المبدئي لشكوى ولي الألمر وتصدر قرارا","ج":"على سمعة المؤسسة. كواه إلى لجنة مختصة للنظر والبت فيها بشكل مستقل.","د":"ترشد ولي الألمر إلى تقديم ش لأن إجراء تحقيق موضوعي يشمل كل الألطراف ويوثق الألدلة"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":193,"q":"بين مواعيد الاختبارات الرسمية وجدول الحصص، كيف تواجه تعارضا الالتزام الألكاديمي وراحة الطالب؟","o":{"أ":"تتعامل مع الموقف لتحقيق أفضل توازن بين الاختبارات بما ال يؤثر على الجدول الدراسي بشكل كبير. تعدل مواعيد بعض الاختبارات الرسمي ة مع","ب":"تعيد تنظيم جدول الحصص بشكل مرن لتتوافق مع مواعيد محاولة الحد من أي إرباك. تلتزم بالجدول والحصص المقررة مع توفير دعم مكثف للطالب الذين يواجهون تعارضا","ج":"الاختبارات.في مواعيد تطرح مسألة التعارض على الطالب التخاذ قرار شخصي بشأن حضور الحصص أو","د":"الاختبارات حسب أولوياتهم. ب- إعادة تنظ يم جدول الحصص بشكل مرن لتحقيق التوافق مع مواعيد"},"a":"ب","e":"الإجابة الصحيحة هي: تعيد تنظيم جدول الحصص بشكل مرن لتتوافق مع مواعيد محاولة الحد من أي إرباك. تلتزم بالجدول والحصص المقررة مع توفير دعم مكثف للطالب الذين يواجهون تعارضا. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":194,"q":"عند تقديم تغذية راجعة الزميل، كيف تضمن أن تكون بناءة ومقبولة وتعزز التطور المهني؟","o":{"أ":"تشير إلى الجوانب التي تحتاج تحسينا بشكل مباشر مع تقديم أمثلة واقعية، مع الحفاظ على لغة محترمة ومحفزة.","ب":"تبدأ بالإلشادة بالإليج ابيات الفعلية، ثم تطرح الملاحظات النقدية بطريقة موضوعية وتركز على سلوكيات قابلة للتغيير مع اقتراح حلول. تذكر الإليجابيات بشكل مختصر، ثم توضح نقاط الضعف أمام مجموعة لتعزيز الشفافية","ج":"والتحفيز الذاتي. ل وتشجيعه على التحسن. وتقلل من شدة النقد لتجنب إحباط الزمي","د":"تقدم ثناءً موسعا تبدأ التغذية الراجعة بإبراز الإليجابيات الحقيقية لتوفير بيئة دعم"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":195,"q":"موظف طلب منك توضيح حقوقه المنصوص عليها في قانون ا ،لخدمة المدنية كيف تتعامل مع طلبه؟","o":{"أ":"تشرح له الحقوق بشكل مختصر مع توجيهه لمطالعة نصوص القانون بنفسه للتعمق. بالمراجع القانونية ذات الصلة.","ب":"عن حقوقه وواجباته مدعما مفصال تقدم له شرحا ا سمي.","ج":"تحيل الموظف إلى الإدارة المختصة لتزويده بالمعلومات الالزمة بشكل ر تعطيه توضيحات عامة مع التشديد على أهمية الالتزام بالسرية المهنية وعدم إفشاء","د":"تفاصيل قد تكون حساسة. الشرح المفصل المدعوم بالمراجع القانونية هو الأنسب لأنه يزود"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":197,"q":"في حالة وجود خالف بين موظفين حول استخدام موارد محدودة، ما هو الإجراء الألمثل إلدارة هذا النزاع بشكل فعّال وعادل؟","o":{"أ":"تقرر توزي ع الموارد بناءً على تقديرك الشخصي لألولوية دون إبالغ الموظفين لتجنب التصعيد. تفتح حوارا مع الموظفين المتنازعين لمناقشة آليات توزيع الموارد بشكل عادل شفافا","ب":"ومتفق عليه. على يلتزم به الجميع حفاظا نهائيا","ج":"تعرض النزاع على الإدارة التنفيذية لتتخذ قرارا النظام. تؤجل توزيع الموارد مؤقتا إلى حين انتهاء الفترة الحساسة أو توافر المزيد منها لتجنب","د":"الخالف. ا فتح حوار شفاف مع الموظفين المتنازعين يُمكن من إدارة الخالفات"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":198,"q":"كيف يمكن تقييم فعالية استراتيجيات التدريس التي طب قها مدرس في الصف بشكل يعكس دقة وموضوعية الألداء التعليمي؟","o":{"أ":"الاستراتيجيات.الامتحانات النهائية للطالب كمؤشر رئيسي لنجاح الاعتماد على نتائج تحليل متعدد الألبعاد يشمل نتائج الامتحانات النهائية، ملاحظات الحصص، تقييمات","ب":"الطالب، وتطور أداء الطالب بمرور الزمن. الاستراتيجيات.","ج":"استناد التقييم على تقييم المدير ووجهة نظره المهنية حول تطبيق قياس فعالية التدريس من خالل كمية الواجبات التعليمية المعتمدة وتكرارها كمعيار","د":"للتفاعل والإلنجاز."},"a":"ب","e":"لأن التقييم الأكثر دقة وموضوعية يكون من خالل مصادر بيانا ت لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":199,"q":"خالل اجتماع تخطي ط استراتيجي، لاحظت انطواء بعض الألعضاء وعدم مشاركتهم الفاعلة، كيف تتصرف؟","o":{"أ":"على الألعضاء المنطوين لتشجيعهم على التعبير عن رأيهم. مباشرال تطرح سؤ لحترام وتقدير الآلراء المختلفة.","ب":"تشجع الجميع على المشاركة عبر تهيئة جو من لجتماع لمناق شة مع الألعضاء المنطوين أسباب انطوائهم وتحفيزهم بعد","ج":"تخصص وقتا بشكل فردي. تكتفي بملاحظة السلوك السلبي بدون تدخل مباشر لتجنب إحراج الألعضاء حفاظا على","د":"لنسجام. تشجيع المشاركة من خالل تهيئة جو من لحترام وتقدير الآلراء"},"a":"ب","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":200,"q":"موظف يُظهر ميال واضحًا لالعمل الفردي ويقلل من مشاركته في فرق االعمل كيف تتصرف معه لتعزيز اندماجه الفعّال في الفريق؟","o":{"أ":"توفير توجيهات مباشرة وتحديد أهداف جماعية واضحة تشجعه على المشاركة من خالل أكبر.تفرض تعاونا تفهم دوافعه الفردية وتوفر له برامج تدريبية مخصصة لتنمية مهارات التواصل","ب":"والتعاون ضمن الفريق. تناقش معه أهمية دور الفريق وتأخذ منه التزامات واضحة ب لنخراط التدريجي في مهام","ج":"متابعة أداء. جماعية مع تعيد توزيع مهامه بحيث تجمع بين أعمال فردية وأخرى جماعية لتراعي ميوله وتدفعه","د":"للمشاركة بشكل متوازن. لأن توفير برامج تدريبية مخصصة يعالج الألسباب الجذرية لميل"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":201,"q":"أثناء إدارة صفك، لاحظت أن أحد الطالب يكرر مقاطعة الشرح بشكل متكرر كيف تتصرف في هذه الحالة لتحقيق بيئةى الزمالء ويعيق سير الدرس. مما يشوش عل تعليمية مثمرة؟","o":{"أ":"تستوقف الطالب بهدوء داخل الصف لتوضيح أثر سلوكه على الآخرين وتدعوه بوضع خطة سلوكية مشتركة معه تهدئ الصف ثم تجري حوارا مع الطالب بشكل خاص لفهم دافع المقاطعة وتضع معه","ب":"اضحة للسلوك داخل الصف قواعد و توجه تحذيرا للطالب أمام الصف لتوضيح عدم قبول المقاطعة وتحثه على رسميا","ج":"الالتزام فورا تستدعي ولي أمر الطلاب على وجه السرعة لتشاركهم القلق ولبحث الحلول المناسبة","د":"خارج الصف"},"a":"ب","e":"لأن هذا الخيار يعتمد على التعامل ا لمهني والإلنساني مع السبب لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":202,"q":"أثناء التخطيط في أهداف واضحاالاستراتيجي لمؤسستك التعليمية، لاحظت تباينا الألقسام المختلفة، كيف تتعامل مع هذا التحدي لضمان انسجام الألهداف وفعالية التنفيذ؟","o":{"أ":"توحد الألهداف عبر إصدار خطة مركزية تعتمد على رؤية الإدارة العليا مع إشعار الألقسام بها لضمان اتساق الألداء تستشير الألقسام جميعها إلعادة صياغة الألهداف بشكل تشاركي يوازن بين خصوصية","ب":"كل قسم والرؤية الشاملة للمؤسسة تعتمد على صياغة الألهداف من قبل لجنة استراتيجية تمثل جميع الألقسام مع تقديم","ج":"توصيات إلزامية للتنفيذ تسمح لألقسام بوضع أهدافها بحرية تامة على أن تُدرس بشكل دوري لتقييم مدى توافقها","د":"الاستراتيجية العامة مع هذا الخيار يجمع بين المشاركة الفعالة لألقسام والتوازن بين"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":203,"q":"عند استخدام اختبار ت حصيلي إلنهاء وحدة تعليمية، ولاحظت وجود تباين كبير لعدالة التقويم في هذه الحالة؟","o":{"أ":"في درجات الطالب، ما الإجراء الأكثر مهنية وضمانا إعادة مراجعة توزيع الدرجات وتعديله لضمان توازن النتائج بين الطالب.","ب":"الاختبار وصياغة الألسئلة بدقة لتقييم مدى مال ءمتها للمستوى التعليمي تحليل محتوى للطالب.","ج":"اعتماد النتائج كما هي مع توضيح أهمية التفاوت في الألداء كجزء من طبيعة التقييم. الاختبار للطالب أصحاب الدرجات المنخفضة لتحسين أدائهم.","د":"منح فرصة إعادة الاختبار وصياغة الألسئلة هو الإجراء ا ألكثر مهنية ب- تحليل محتوى"},"a":"ب","e":"الإجابة الصحيحة هي: الاختبار وصياغة الألسئلة بدقة لتقييم مدى مال ءمتها للمستوى التعليمي تحليل محتوى للطالب.. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":204,"q":"أثناء إدارة نزاع بين زميلين في االعمل ينشأ أساسا بسبب سوء تواصل، ما الخطوة الأنسب للتعامل مع الموقف بشكل احترافي وفعّال؟","o":{"أ":"لتصال التواصل مع كل منهما على حدة لتوضيح نقاط الخالف وتحفيزهما على تحسين عقد جلسة وساطة مشتركة بحيادية تتيح لكال الطرفين عرض وجهات نظرهما واالعمل","ب":"ا على التفاهم إبالغ المشرف المباشر للنزاع للوقوف على التفاصيل واتخاذ الإجراء المناسب بناءً على","ج":"تقييمه توجيه رسالة رسمية تحذر الطرفين من عواقب الخالف المستمر بدون اللجوء إلى","د":"الوساطة المباشرة الوساطة المباشرة تتيح فض الخالف بحيادية وتطوير حلول"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":205,"q":"أمامك مجموعة من الطالب تختلف في مستوي اتهم وقدراتهم، كيف تطبق نظرية التعلم البنائي عند تخطيط الدروس لتحقيق أقصى استفادة تعليمية؟","o":{"أ":"تبني الدرس على ربط المحتوى بخبرات الطالب السابقة مع دمج أنشطة تعاونية تسهم في دعم تفاعل الطالب متعدد المستويات مع توضيحات إضافية فردية لت ثبيت المعلومة دون تغييرات","ب":"تقدم المحتوى متسلسال جوهرية في تصميم الدرس تنفذ خطة دراسية موحدة مع ترك فرص تناسب الفروق الفردية أثناء تطبيق اللأنشطة","ج":"الصفية تركز على الشرح التوضيحي المكثف للمحتوى مع تطوير أسئلة نقاشية تحفز التفكير","د":"وتعزز بناء المعرفة"},"a":"أ","e":"لأن ا لتعلم البنائي يرتكز على ربط المعرفة الجديدة بخبرات المتعلم لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":206,"q":"أثناء الامتحان، لاحظت حصول إحدى الطالبات على مساعدة من زميلها بطريقة غير مباشرة، كيف تتصرف؟","o":{"أ":"تراقب الموقف بهدوء حتى نهاية الامتحان ثم تتحدث إلى الطالبة بشكل خاص لتوجيهها الالتزام بالنزاهة نحو تنبه الطالبة فورا بهدوء إلى ضرورة التوقف عن هذا السلوك وتحذرها من عواقبه دون","ب":"إعالن الموقف أمام الآخرين على أهمية النزاهة وتجنب أيالامتحان بهدوء وتستاذدها","ج":"تتحدث إلى الطالبة بعد انتهاء ا مخالفة مستقبال الامتحان التخاذ الإجراءات النظامية دون مواجهتها بشكل مباشر تبلغ الإدارة فورا بعد","د":"التحدث إلى الطالبة بعد الامتحان بهدوء وبطريقة ودية هو الألسلوب"},"a":"ج","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":207,"q":"في مواجهة حالة توتر تصاعدي في سلوك أحد الطالب داخل الفصل، مما يشكل لإلصابة، كيف تضمن سالمة الجميع بأفضل طريقة ممكنة؟","o":{"أ":"محتمالتهديدا تحافظ على هدوئك وتهدئ الطالب بهدوء مع وجود زملائه وتطلب منه التحكم في حته من مكانه فورا تصرفاته دون إزا تهدئ الطالب ثم توجهه بلطف إلى المختصين داخل المدرسة، مع الحفاظ على","ب":"استمرارية الدرس بدون تأجيل تطلب من الطالب وتؤجل الدرس إلى وقت الحق بعد تأمين بيئة الفصللبتعاد مؤقتا","ج":"من أي احتمالية للخطر لنص ياع لطلبك فورا مع توجيه تنبيه صارم لباقي","د":"تتحدث مع الطالب بحزم وتطلب منه الطالب للحفاظ على النظام لأن التهدئة الهادئة داخل بيئة الفصل مع الطالب وطلب ضبط السلوك"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":209,"q":"أحد طالبك يعاني صعوبة في التركيز ويظهر عليه تشتتا خالل الدرس، كيف تستخدمنظريات التعلم لتحسين تركيزه؟","o":{"أ":"تزيد من مدة شرحك وتعمق في التفاصيل لتغذية تركيز الطالب بالمعرفة بشكل مكثف","ب":"تدمج أنشطة قصيرة و متنوعة تحفز الطلاب على المشاركة الفعالة وتجدد انتباهه خالل الدرس","ج":"تقتصر على توجيه أسئلة متكررة للطالب بهدف إعادة تركيزه وتنشيط وعيه بالموضوع تُوصِ ل ملاحظات إيجابية منتظمة وتوفر فترات استراحة قصيرة إلعادة شحن تركيز","د":"الطالب ب- دمج الأل نشطة القصيرة والمتنوعة يتوافق مع مبادئ التعلم النشط"},"a":"ب","e":"الإجابة الصحيحة هي: تدمج أنشطة قصيرة و متنوعة تحفز الطلاب على المشاركة الفعالة وتجدد انتباهه خالل الدرس. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":211,"q":"أثناء وضع خطة دراسية لفصل قادم تواجه تفاوت مستويات الطالب، كيف يمكنك توظيف التقويم التكويني بأفضل صورة؟","o":{"أ":"إجراء تقييمات موحدة دورية للطالب بعد كل وحدة تعليمية لتحديد مستوى التحصيل سية بناءً عليها.وضبط الخطة الدرا استخدام مجموعة متنوعة من أدوات التقويم التكويني بصورة مستمرة لتحليل تقدم كل","ب":"طالب وضبط الخطة الدراسية بشكل ديناميكي يلبي التفاوت في الألداء. الاعتماد بشكل أساسي على نتائج التقويم النهائي مع مراجعة الخطة الدراسية في المرات","ج":"ًالقادمة بناء على هذه النتائج. ،تطبيق خطة دراسية موحدة مع إجراء تقييم تقويمي دوري لتحديد مدى توافق الألداء","د":"لت الحاجة الماسة. ولكن مع تعديل الخطة بشكل محدود فقط ح اختيار هذا الخيار يعكس أفضل ممارسات التقويم التكويني التي"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":213,"q":"عند تخطيطك لتطوير مهاراتك المهنية التعليمية بناءً على نظرية التعلم، ما هي أهم خطوة تعزز فعالية اكتساب هذه المهارات؟","o":{"أ":"الالتزام بتجربة استراتي جيات مختلفة دون وضع أهداف عامة لتعلم مهارات جديدة مع تقييمنقاط ضعفك بشكل مفصل تحديد أهداف تعليمية واضحة وواقعية مستندة إلى تحليل دقيق لنقاط ضعفك مع اختيار","ب":"استراتيجيات تعليمية مستحدثة تتناسب معها لت التطوير والتركيز على استراتيجياتالاعتماد على تقييم ذاتي بسيط لتحديد مج","ج":"التعلم المقبولة في مجال عملك فقط أثناء االعمل مع تعديل أهداف تطوير المهاراتلستفادة من فرص التعلم المتاحة عفويا","د":"حسب الحاجة لأن تحديد أهداف تعليمية واضحة وواقعية مع تحليل دقيق لنقاط"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":214,"q":"غير مهني يؤثر سلبالأثناء مراقبتك لطريقة تدريس أحد زمالئك، تلاحظ أسلوبا كيف تتصرف حيال ذلك؟","o":{"أ":"على الطالب محددة لتحسين الألداء.","ب":"حلوال تناقش االزميل بكل احترام خارج الفصل، مقترحا تقدم ملاحظات بناءة لاالزميل بحس مهني ودعوة للمراجعة المشتركة والتطوير المتواصل.","ج":"ترفع الألمر إلدارة المدرسة بعد توثيق الملاحظة، لتتخذ الإجراءات المناسبة. الالتزام بالمعايير التعليمية الصحيحة. كر االزميل بأسلوب مهذب أمام الطالب بضرورة","د":"تذ تقديم الملاحظات بشكل بنّاء بحس مهني ودعوة للمراجعة المتبادلة"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":215,"q":"كيف يمكن إلدارة الصف الجيدة أن تقلل من المشاكل السلوكية بين الطالب بشكل فعّال ومستدام؟","o":{"أ":"ا الالتزام الكامل تطبيق القوانين بصرامة دون تقديم تفسيرات لضمان","ب":"وضع قواعد واضحة مشتركة مع الطالب، وتوظيف استراتيجيات وقائية تشمل تشجي ع المشاركة والمسؤولية الذاتية لنضباط","ج":"استخدام العقوبات الفورية بشكل متوازن مع التنبيه والتوعية لتعزيز منح الطالب حريّة التعبير ضمن حدود مرنة تسمح لهم بالتجريب والتعلم من أخطائهم","د":"لأن وضع قواعد واضحة بمشاركة الطالب يسهم في بناء بيئة صفية"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":217,"q":"في حالة وجود تفاوت ملحوظ في فهم الطالب لمادة معينة، ما هو الألسلوب الألمثل لتقويم هذا التفاوت بدقة وموضوعية؟","o":{"أ":"استخدام اختبار موحد شامل لجميع الطالب مع تحليل النتائج لتحديد الفروقات الفردية توظيف مزيج من أدوات التقويم المتنوعة مثل الاختبارات القصيرة، والملاحظة","ب":"الصفية، والمناقشات لضمان شمولية ودقة التقييم الاعتماد على الملاحظة المستمرة للطالب خالل الحصص وتسجيل الملاحظات لتقدير","ج":"الفروق التفصيلية لمستو ياتهم لضمان تناول","د":"تطبيق تقييمات متكررة بموافقة الطالب مع تعديل الألسئلة وفقا الفروق الفردية ا استخدام مزيج متنوع من أدوات التقويم يوفر صورة شاملة"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":218,"q":"أثناء التخطيط الإالاستراتيجي، ما هو الدور الألهم الذي تؤديه أدوات التحليل البيئي للمؤسسة؟","o":{"أ":"تقييم الموارد ونقاط القوة والضعف والفرص والته ديدات لتحسين صياغة الاستراتيجية وتكييفها مع المتغيرات البيئية تحليل البيئة الداخلية والخارجية لتركيز الجهود على فرص النمو دون إهمال التحديات","ب":"المحتملة الاعتماد على تحليل نقاط القوة والضعف مع استقراء الفرص والتهديدات لدعم اتخاذ","ج":"الاستراتيجية القرارات استخدام تحليل البيئة كمصدر معلومات متكامل لمراجعة الخطط وتحديثها بما يتوافق مع","د":"رؤية الإدارة العليا لأنها تشمل تقييمًا شامال للموارد والعوامل الداخلية والخارجية بطريقة"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":219,"q":"أحد زمالئك يعاني من ضغط وظيفي واضح يؤثر على جودة أدائه، كيف تتصرف كزميل محترف يدعم بيئة االعمل؟","o":{"أ":"تبادر بعرض الدعم النفسي عليه وتشجيعه على طلب المساعدة من الإدارة عند الحاجة لتفهم موقفه وتشجعه على تحسين أدائه بطرق عملية","ب":"تناقشه بهدوء سرّيا","ج":"تلفت انتباه الإدارة إلى تدهور أدائه مع استمرار المراقبة للحفاظ على مستوى الفريق","د":"تحاف ظ على تعاون مهني وتقدم له المساعدة بشكل غير مباشر دون إزعاجه أو إحراجه لأن تقديم الدعم النفسي المباشر وتشجيع االزميل على طلب المساعدة"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":220,"q":"في سياق حل نزاع داخل فريق عمل، كيف تضمن أن يكون الحل مستداما ؟","o":{"أ":"من كافة الألطرافومقبوال اتخاذ قرار إداري بعد استشارة عدد محدود من الألطراف المعنية دون اشتراك كامل للجميع تشارك جميع الألطراف المتنازعة في بناء الحل والتوصل إلى اتفاق واضح على الالتزام","ب":"به اقتراح حلول متعددة متفق عليها من قبل بعض الألطراف مع الرجوع للقيادة العليا","ج":"النهائية للموافقة وضع خطة توافقية مؤقتة تُعيد النظر بها بشكل دوري بناءً على تقييم الألداء وردود الفعل","د":"مشاركة جميع الألطراف المتنازعة في بناء الحل تُعزز من الشعور"},"a":"ب","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":221,"q":"عندما ترغب في رفع مستوى تحصيل طالبك، كيف تستند في اختيار فضل النتائج؟","o":{"أ":"استراتيجية تعليم مناسبة لتحقيق أ تعتمد على خبرتك السابقة وخبرات زمالئك مع مراعاة تعديل الاستراتيجية بحسب ملاحظاتك الشخصية تحلل الاحتياجات الفردية والجماعية للطالب بدقة وتختار استراتيجية تعليمية تتناسب مع","ب":"الاحتياجات لتعزيز الفهم والتطبيق الفعّال هذه","ج":"تختار استراتيجية م جربة وناجحة في مدارس أخرى مماثلة، مع تطبيقها بحذافيرها الاتساق لضمان تستخدم استراتيجية مرنة تعتمد على تقييم مستمر لطريقة التدريس وتعديلها بشكل دوري","د":"حسب تقدم الطالب لأن تحليل الاحتياجات بدقة واختيار استراتيجية متناسبة معها"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":223,"q":"عند ملاحظتك اختالفا في تطبيق قانون الخدمة المدنية بين الموظفين في لختالف لضمان تطبيق عادل وموحد؟","o":{"أ":"المؤسسة، كيف تتعامل مع هذا تناقش الموضوع مع الزمالء المتأثرين مباشرة للوصول إلى اتفاق عملي م ؤقت يعالج لختالفات دون تصعيد رسمي ترفع الملاحظات إلدارة الموارد البشرية مع تقديم توصيات بناءة لضبط التطبيق","ب":"وضمان الموافقة الرسمية تستعين بالالئحة التنظيمية الخاصة بالمؤسسة لترشيد سلوكك في التطبيق ثم تتابع الألمر","ج":"بشكل غير رسمي ضمن فريق االعمل","د":"تتعام ل مع الحالة بناءً على فهمك الشخصي للقانون مع توثيق ما تقوم به الحتمالية مراجعة الحقة لأنه الخيار الأكثر مهنية وفعالية حيث يضمن إشراك الجهة"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":225,"q":"أثناء تقييمك ألداء فريق االعمل، تلاحظ تفاوتا بعوامل بيئية في الألداء مرتبطا تتصرف لتحسين الألداء؟","o":{"أ":"داخل المؤسسة، كيف تعتمد على تقييمات فردية مع الألخذ في لعتبار العوامل البيئية من خالل مناقشات شخصية مع كل موظف.","ب":"توثق التحديات البيئية بشكل منهجي وتوصي بتدخلات منظمة تستهدف تحسين بيئة االعمل بالشمولية.","ج":"تركز على تحسين أداء الألفراد الضعفاء مع توجي ه ملاحظات تحفيزية، متجاهال إلى حد ما العوامل البيئية. تلتزم بقياس النتائج الموضوعية فقط وتعمل على تعديل الألهداف بناءً على تقلبات البيئة","د":"الداخلية. توثيق التحديات البيئية بشكل منهجي واعتماد تدخلات منظمة"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":226,"q":"رة التحليل لفهم أسباب انخفاض تحصيل فصل دراسي؟","o":{"أ":"كيف تستخدم مها تجمع بيانات من تقارير النتائج وتركز على أداء الطالب كمؤشر رئيس تجمع معلومات شاملة من مصادر متنوعة ك الاختبارات، الملاحظات، ومناقشات مع","ب":"الطالب والمعلمين","ج":"تراجع المناهج والإدارة كمحددات رئيسية وترتكز عليها في تفسير الألداء تستند إلى توقعات الخبرة الشخصية مع مقارنة محدودة بالبيانات المتاحة","د":"لأن التحليل الفعّال يتطلب جمع معلومات شاملة من مصادر متعددة"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":227,"q":"عند اكتشاف حالة غش في امتحان، ما الإجراء المهني الألمثل الذي يجب اتباعه لضمان المصداقية والعدالة في االعملية التعليمية؟","o":{"أ":"الطالب المتهم بناءً على الألدلة المتوفرة دون الحاجة لتحقيق توقيع عقوبة مناسبة على معمق فتح تحقيق شامل لمعرفة الألسباب الدافعة للغش وتطبيق الإجراءات النظامية التي توازن","ب":"","ج":"قادمة المرات ال فرض إجراء جماعي على المجموعة أو الصف لضمان الالتزام الفردي والجماعي","د":"بالمصداقية هو الألمثل لأنه يراعي ضرورة التحقيق الدقيق لمعرفة الخيار("},"a":"أ","e":"الإجابة الصحيحة هي: الطالب المتهم بناءً على الألدلة المتوفرة دون الحاجة لتحقيق توقيع عقوبة مناسبة على معمق فتح تحقيق شامل لمعرفة الألسباب الدافعة للغش وتطبيق الإجراءات النظامية التي توازن. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":228,"q":"كيف يمكن للتخطيط الاستراتيجي أن يساهم في تطوير أداء المؤسسة التعليمية بشكل فعّال ومستدام؟","o":{"أ":"بوضع أهداف واضحة ورؤية شاملة تستند إلى تحليل دقيق للموقف الحالي وتوجيه الموارد نحو تحسين الألداء المستمر بالتركيز على تحديد أهداف عامة معتمدة بشكل أساسي على المبادرات الفردية دون","ب":"مراجعة دورية للخطط باتباع خطط مستقبلية تعتمد على معايير خارجية وتجارب مؤسسات أخرى مع تعديل","ج":"طفيف حسب الحاجة الألمد دون تأجيل","د":"بتنفيذ الخطط المعتمدة من الإدارة مع التركيز على تحقيق نتائج قصيرة المهام اليومية لأن التخطيط الاستراتيجي الألمثل يقوم على تحليل شامل ووضع"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":229,"q":"أثناء حضور لقاء تدريبي تشعر أن بعض الم حتوى ال يتوافق تماما مع احتياجاتك المهنية، كيف تتصرف بأكثر السلوكيات المهنية فعالية؟","o":{"أ":"تبدي ملاحظاتك بشكل الئق للمدرب أثناء الجلسة، مع اقتراح بدائل وظيفية دون مقاطعة تناقش مع المدرب بعد انتهاء الجلسة بشكل بنّاء، مقترحا التعديالت التي تناسب تطلعاتك","ب":"مهنية ال بشكل مستقل","ج":"تحضر الجلسة كاملة دون أدنى اعتراض، وتدون ملاحظاتك لتطبيقها الحقا تواصل مع الزمالء في لستراحة لعرض انتقاداتك ومحاولة الضغط على المدرب لتغيير","د":"المحتوى المناقشة البنّاءة مع المدرب بعد الجلسة تتيح تقديم ملاحظات"},"a":"ب","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":230,"q":"كيف يمكن للمعلم استخدام أخالقيات المهنة لتعزيز بيئة تعليمية إيجابية وفعالة؟","o":{"أ":"الالتزام بمبادئ النزاهة واحترام الطالب مع تشجيع الحوار المفتوح والشفافية في التعامل التركيز على تحقيق الألداء الألكاديمي مع تطبيق قواعد السلوك الواجب اتباعها بشكل","ب":"صارم ض القوانين والنظام باستخدام سلطته مع إعالء مصلحة المجموعة على الفرد","ج":"فر منح فرص تقييم عادلة مع التعامل بشكل موضوعي لكن مع تفضيل الطالب الأكثر","د":"اجتهادًا لحترام والحوار المفتوح يخلق بيئة تعليمية تسهمالالتزام بالنزاهة و"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":232,"q":"أثناء مواجهة طالب يظهر ترددا في التحدث داخل الفصل، كيف يمكنك تحفيزه باستخدام أساليب إدارة الصف بشكل فعّال ومهني؟","o":{"أ":"عن ضغط الظهور أمام الزمالء للتحدث في جو هادئ بعيدا خاصا تخصص له وقتا باشرة أمام الجميع لتعزيز ثقته بنفسه عبر المواجهة الم","ب":"تشجعه على التعبير فورا تديره بطرق غير مباشرة بتشجيعه خالل أنشطة جماعية دون تركيز الانتباه عليه بشكل","ج":"خاص تطلب منه المشاركة بشكل منتظم وتذكره بأهمية مساهمته كمحفز لتغييره تدريجيا","د":"لأن توفير بيئة داعمة وخالية من الضغط تساعد الطلاب على التعبير"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":233,"q":"الاجتماعي على سلوك الطالب داخل الصف؟","o":{"أ":"كيف يؤثر تطبيق نظرية التعلم يتعزز التعلم من خالل الملاحظ ة وتقليد السلوكيات الإليجابية للمعلم والزمالء، مما يرسخ المفاهيم ويُنمّي مهارات التواصل الجماعي.","ب":"يرتكز التعلم على استذكار المعلومات ومناقشتها ضمن مجموعات تنمية المهارات الاجتماعية.الفردية و","ج":"يُستخدم تعزيز السلوك الإليجابي عبر المكافآت والتركيز على العوا قب التعليمية لتوجيه سلوك الطالب. الانتباه والتركيز الذهني.","د":"يُعتمد على خلق بيئة هادئة مع تفعيل التفاعل المنظم، لتطوير لأن نظرية التعلم الاجتماعي تؤكد أهمية الملاحظة وتقليد النماذج"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":234,"q":"في حالة وجود خالف قانوني حول حقوق العاملين في مؤسستك، ما هو الدور الألمثل الذي يتعين عليك القيام به كموظف؟","o":{"أ":"لطالع الدقيق على حقوقك والمطالبة بها ضمن القنوات الرسمية التي تضمن معالجة الخالف بشكل نظامي بالتنسيق مع الإدارة. لمتثال للقرارات الصادرة دون السعي لف همالاعتماد على التوجيهات الإلدارية فقط و","ب":"الحقوق القانونية. محاولة حل الخالف شخصيا وبشكل مباشر مع الألطراف المعنية دون الرجوع إلى","ج":"الإدارة أو القنوات الرسمية. التزام الصمت و أو تدخل جهاتلمتناع عن أي تحرك لحين انتهاء المشكلة تلقائيا","د":"أخرى. لطالع والمطالبة ضمن القنوات الرسمية هو الخيار الألمثل لأنه"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":235,"q":"عند ملاحظة انخفاض مستوى مهارات التواصل بين أعضاء فريق االعمل، ما هو الإجراء الألمثل الذي يعزز التعاون ويطور الألداء الجماعي بشكل مستدام؟","o":{"أ":"لستماع النشط والتفاعل البناء تنظيم ورش تدريبية تركز على مهارات التواصل الفعّال و","ب":"عقد جلسات نقاش منتظمة لتبادل وجهات النظر وحل النقاط الخالفية بشكل مباشر","ج":"إرسال تقارير دورية مكتوبة تشمل ملاحظات حول التواصل وتوجيهات لتحسين الألداء لنض باط والتعامل مع","د":"تطبيق نظام تقييم دوري يتضمن ملاحظات فورية تعزز المشكالت سريعا لأن تنظيم ورش تدريبية موجهة يتيح تنمية مهارات التواصل بشكل"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":236,"q":"أثناء متابعة تقدم خطة تطوير مهنية، ما هي الطريقة الأكثر مهنية وفاعلية لتقييم مدى تحقيق الألهداف المنشودة؟","o":{"أ":"ا الاعتماد على تقارير الألداء الدورية وتحليل نتائجها بشكل حكيم رصد مؤشرات الألداء المتنوعة بشكل دوري ومقارنتها بالألهداف المحددة مسبقا مع","ب":"مراجعة النتائج بالفرق المعنية استشارة آراء المديرين المباشرين بشكل مستمر مع الألخذ في لعتبار التقييم الذاتي","ج":"للموظفين متابعة تقارير التقدم وتقويم الألداء باستخدام مؤشر واحد رئيسي مع إجراء مقابالت","د":"توضيحية لأن رصد مؤشرات أداء متعددة بشكل دوري ومقارنتها بالألهداف"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":237,"q":"كيف تتصرف عند تلقي ملاحظات نقدية من زميلك بأسلوب غير الئق للوهلة الألولى؟","o":{"أ":"لنجرار للصراع تحاول تهدئة الوضع بالرد بهدوء مع توضيح موقفك بشكل محترم دون تستمع بتمعن وتطلب توضيح الملاحظات بأسلوب مهني ثم تفكر في أفضل وسيلة","ب":"للتجاوب البناء تعبر عن استيائك بطريقة معتدلة مع طلب إعادة صياغة الملاحظات بأسلوب أكثر","ج":"وضوحا تؤجل الرد على الملاحظات لحين مراجعتها بهدوء ثم تحدد الطريقة الأنسب للتواصل","د":"الحقا لستماع بتمعن وطلب توضيح الملاحظات بأسلوب مهني يتيح فهم"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":238,"q":"عند تصميم اختبار لقياس مهارات التفكير العليا لدى الطالب، أي نوع من ؟","o":{"أ":"الألسئلة يُعد الأنسب لتحقيق هذا الهدف بدقة وفاعلية أسئلة اختيار من متعدد تركز على استرجاع المعلومات وتثبيت المعرفة النظرية أسئلة تطبيقية تعتمد على حل المشكالت وتحليل الح لت المعقدة لتقييم التفكير النقدي","ب":"والتقويم","ج":"أسئلة تعتمد على تفسير نصوص أو مواقف عامة تتطلب فهمًا عامًا وتوليد أفكار جديدة","د":"أس ئلة تطلب من الطالب استنتاج الإلجابات بناءً على أدلة غير كاملة تحفز التفكير لستنتاجي ا لأن الألسئلة التطبيقية التي تتطلب تحليل المشكالت وحلها تتيح قياس"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":239,"q":"كيف يمكن للمعلم أن يدير الصف بفعالية في ظل وجود طالب ذوي اضطرابات سلوكية؟","o":{"أ":"وضع خطط تعليمية فردية بالتعاون مع مختصين وتطبيق استراتيجيات إدارة سلوكية تراعي الفروق الشخصية فرض قواعد سلوكية واضحة مع تطبيق نظامنقاط لتشجيع السلوك الإليجابي ومعاقبة","ب":"السلوك غير المرغوب فيه بشكل متدرج اعتماد أساليب تهدئة الصف والتعامل الحازم مع السلوكيات الخاطئة بالتوازي مع تقديم","ج":"الاجتماعي للطالب الدعم النفسي و عزل الطالب ذوي السلوكيات الصعبة مؤقتًا خالل الحصة وتنظيم جلسات تعديل سلوكي","د":"بالتنسيق مع فريق الدعم المدرسي"},"a":"أ","e":"لأن وضع خطط تعليمية فردية ب التعاون مع المختصين يتضمن لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":240,"q":"عند إعداد خطة عمل بعد تحليل نتائج تقييم داخلي، ما الخطوة الألهم لضمان تحقيق الألهداف بأعلى فعالية؟","o":{"أ":"صياغة أهداف عامة مع توزيع مبدئي لألدوار بدون تحديد مواعيد تنفيذ دقيقة، مع اعتماد بعة دورية مرنة متا ،تحديد أهداف واضحة ومحددة مع توزيع دقيق لألدوار، وضع جداول زمنية مفصلة","ب":"وتأسيس آليات متابعة ورصد مستمرة وفعالة وضع أهداف واضحة مع جداول زمنية محددة، لكن السماح بمرونة كبيرة في توزيع","ج":"الألدوار والألساليب التنفيذية بناءً على تقدير الفريق تطوير خطة عمل شاملة تشمل أهداف ومواعيد تنفيذ محددة، مع تكليف فريق متخصص","د":"من الإدارة العليا بالمتابعة دون تدخل مستمر من الفريق التنفيذي ،لأنها تجمع بين وضوح الألهداف، التنظيم الدقيق لتوزيع الألدوار"},"a":"ب","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":241,"q":"مر؟","o":{"أ":"الالتزام بقواعد الصف بشكل مست كيف تتعامل مع طالب يرفض تفتح حوارا بناءً معه لفهم دوافع سلوكه وتحفزه على المشاركة في تعديل السلوك بطريقة تشاركية توضح له عواقب عدم الالتزام وتفرض عقوبات مناسبة بعد محاولة الحوار معه لضمان","ب":"تنفيذ القواعد","ج":"تعتمد على مراقبته وإعطائه تنبيهات لفظية متكررة قبل اللجوء إلى إج راءات أكثر الالتزام صرامة، مع محاولة تشجيعه على تفرض عليه عقوبات صارمة ومباشرة لضمان لمتثال الفوري لقواعد الصف دون","د":"تأجيل فتح حوار بناء وتحفيز الطلاب على المشاركة في تعديل سلوكه يُعد"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":242,"q":"لتحقيق مصداقية في التق ويم أثناء إعداد الاختبارات، ما هو الإجراء الألمثل الذي يجب اتخاذه؟","o":{"أ":"صياغة أسئلة تعكس بشكل دقيق مستوى المادة والألهداف التعليمية مع مراجعة موضوعية ووضوح الصياغة.","ب":"اختيار أسئلة تغطي مستويات صعوبة متنوعة لضمان تمييز أداء الطالب بشكل شامل. بناءً على نتائج تقييمات سابقة لضبط مستوى التحدي والمالءمة. مراجعة الألسئلة","ج":"الاتساق والإلنصاف. مع تعديل طفيف لضمان","د":"استخدام أسئلة من مصادر معتمدة مسبقا ،لأن صياغة أسئلة متوافقة بدقة مع محتوى المادة والألهداف التعليمية"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":243,"q":"كيف يسهم التخطيط الاستراتيجي في تعزيز قدرة المؤسسة على مواجهة التحديات غير المتوقعة بفعالية؟","o":{"أ":"ا تطوير خطط بديلة متعددة وسيناريوهات مرنة تسمح بالتكيف السريع مع المتغيرات الطارئة الالتزام بالخطة الألصلية مع إدخال تعديالت طفيفة عند الضرورة للحفاظ على استقرار","ب":"الألداء الاعتماد على تحليل المخاطر المستمر لتحديث الخطط وإعادة ترتيب الألولويات استجابة","ج":"للتحديات التنسيق المستمر مع الإدارة العليا لتلقي التوجيهات وتعديل الاستراتيجيات بما يتناسب مع","د":"الظروف الجديدة إعداد خطط بديلة وسيناريوهات مرنة يُمكن المؤسسة من التكيف"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":244,"q":"يستغل منصبه للتأثير سلبا على بعض كيف تتصرف إذا لاحظت زميال العاملين، مع ضرورة الحفاظ على بيئة عمل صحية ومهنية؟","o":{"أ":"تناقشه بشكل مباشر وسري لحثه على التوقف عن سلوكه دون إشراك أطراف أخرى تجمع الألدلة بموضوعية وتبلغ الإدارة المختصة مع طلب متابعة الموضوع بحساسية","ب":"واحترافية دورية وتطرح القضية بشكل عام في اجتماعات الفريق لتوعية","ج":"توثق السلوك في تقارير الجميع تتحدث مع االزميل المتأثرين وتشجعهم على مواجهة الألمر بأنفسهم وطلب المساعدة عند","د":"الحاجة هذا الخيار الألمثل لأنه يوازن بين جمع الألدلة الموضوعية والحفاظ"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":245,"q":"أثناء تدريس وحدة تعليمية تتطلب تطبيقات عملية لتعزيز اكتساب المهارات كيف توظف نظرية التعلم الواقعي بشكل أمثل لتحقيق الفهم العميق لدى الطالب؟","o":{"أ":"تعتمد على شر ح مسبق شامل نظري يدعم لستعداد للتطبيق، مع إعطاء الطالب فرصة ا لتبادل الخبرات بعد الدرس. تدمج أنشطة تعليمية تركز على تنفيذ تجارب فعلية ومحاكاة دقيقة ضمن سياق االعمل","ب":"لتعزيز اكتساب المهارات والفهم.","ج":"توكل للطالب مهام تطبيقية منزلية تتيح لهم تجربة مفاهيم ال وحدة خارج إطار الصف مع مراقبة تقدمهم بشكل دوري. تركز على تقييم تحصيلي كتابي مفصل يعكس مدى فهم الطالب لمفاهيم الوحدة مع توجيه","د":"نقاشات تطبيقية الحقة. لأن دمج التجارب االعملية والمحاكاة الدقيقة داخل البيئات التعليمية"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":246,"q":"للمعلم؟","o":{"أ":"كيف يُسهم التقويم الذاتي بشكل أمثل في تطوير الألداء المهني متابعة المعلم ألدائه بشكل مستمر، تحديد نقاط القوة والضعف، ووضع خطط تطوير فردية مستندة إلى هذا التقييم استقبال المعلم لملاحظات الإدارة والزمالء والمراجعة الذاتية بشكل دوري لتعزيز","ب":"الألداء المهني يز جودة التعليم وتحسين الألداء الاعتماد على تقييم الطالب وملاحظاتهم كمرآة لتعز","ج":"التركيز على أداء المهام التدريسية اليومية مع مراجعة ملخصة لألداء في نهاية كل فترة","د":"تعليمية لأن المتابعة المستمرة والتقييم الذاتي الدقيق يمكنان المعلم من تحديد"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":247,"q":"عند تصميم برنامج تدريبي، ما هو النهج الأنسب لضمان توافق الم حتوى مع احتياجات المتدربين بشكل فعّال ومستدام؟","o":{"أ":"إجراء تحليل شامل لالاحتياجات يتضمن جمع بيانات من المتدربين وتحليل المتطلبات المعلنة والضمنية قبل بناء البرنامج ًاستناد تصميم البرنامج إلى استبيانات المتدربين فقط، مع تحديث المحتوى دوريًا بناء","ب":"لفعلية على ردودهم ا اعتماد محتوى تدريبي موحد تم اعتماده سابقا مع مراجعات دورية لضمان تماشيه مع","ج":"تغيرات بيئة االعمل والمتدربين ا التنسيق مع خبراء التدريب إلعداد محتوى يلبي توقعات المتدربين وكذلك يتوافق مع","د":"الاعتماد المباشر على تحليالت دقيقة للمتط لبات الألهداف التنظيمية دون لأن التحليل الشامل لالاحتياجات الذي يشمل جمع معلومات دقيقة من"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":248,"q":"كيف يظهر احترام أخالقيات المهنة في التعامل مع المعلومات السرية داخل سسة؟","o":{"أ":"المؤ لحتفاظ بسرية المعلومات وعدم مشاركتها إال مع الجهات المخولة رسميًا وفق اللوائح","ب":"بالسرية. الإلفصاح عن المعلومات السرية عند الضرورة القصوى وبموافقة المسؤولين","ج":"المختصين. استخدام المعلومات السرية فقط ضمن نطاق االعمل وتجنب نقلها خارج دائرة االعمل","د":"المباشرة. يحترم بدقة أعلي معايير السرية المهنية من خالل لأن الخيار("},"a":"أ","e":"الإجابة الصحيحة هي: المؤ لحتفاظ بسرية المعلومات وعدم مشاركتها إال مع الجهات المخولة رسميًا وفق اللوائح. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":249,"q":"أعضاء الفريق على التعاون بشكل فعّال أثناء إدارة فريق، كيف يمكنك تحفيز ومستدام؟","o":{"أ":"تعزيز ثقافة لحترام المتبادل، وتقديم مكافآت متنوعة، مع إشراك الفريق في اتخاذ القرارات بطريقة شفافة فرض توجيهات واضحة وسريعة التنفيذ مع متابعة دورية لضمان الالتزام وتحقيق","ب":"النتائج في االعمل مع توفير دعم معقول دون تقيد مفرط بالخطط أو","ج":"منح الألعضاء حرية كبيرة الإجراءات ا الاعتماد بشكل أساسي على تحفيز مادي متنوع مع تقديم تقدير معنوي دوري يلبي","د":"احتياجات الفريق ،لأن بناء بيئة عمل تقوم على لحترام المتبادل، ومكافآت متنوعة"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":251,"q":"أثناء تدريس درس مهم، لاحظت أن بعض الطالب ال يشاركون وال يجيبون على الصف؟","o":{"أ":"كيف تتصرف لتعزيز مشاركتهم الفعالة فيالألسئلة، رغم فهمهم للموضوع. تشجيعهم على المشاركة عبر الإلطراء الفوري عند تقديم أي إجابة لتعزيز ثقتهم.","ب":"طرح أسئلة موجهة مباشرة لهم لتحفيز تفكيرهم وتنشيط مشاركتهم الفردية.","ج":"إشراكهم في مناقشات جماعية صغيرة لتقليل رهبة المشاركة أمام الصف الكامل. إلحساس بالمسؤولية وتشجع على التفاعل.","د":"إسناد مهام محددة لهم تعزز ا طرح أسئلة موجهة مباشرة هو الألسلوب الأكثر فعالية لأنه يستهدف"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":252,"q":"بعد إجراء اختبار منتصف الفصل لوحظ تدهور ملحوظ في أداء أحد الألقسام الدراسية. ما هي الخطوة الأكثر مهنية وفعالية لمعالجة هذا التراجع وتحسين مستوى الطلبة؟","o":{"أ":"إعادة تصميم خطة التدريس الخاصة بالقسم وتحليل طرق التفاعل مع الطلبة لتحديد عوامل الضعف.","ب":"تقديم اختبارات تشخيصية إضافية لتحديد مناط ق الضعف التفصيلية لدى الطالب قبل اتخاذ أي قرار.","ج":"زيادة ساعات الدعم الألكاديمي والواجبات المنزلية بهدف تعزيز استيعاب الطالب للمادة.","د":"تنظيم جلسات مراجعة عامة بعد انتهاء الفصل الدراسي لتعويض النقص في التحصيل. إعادة تصميم خطة التدريس وتحليل أساليب التفاعل تتيح فهما أعمق"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":253,"q":"أثناء اجتماع مع فريق االعمل، انتقد زميلك إحدى طرق عملك بشدة أمام الجميع ما هو التصرف الألمثل من وجهة نظر أخالقية ومهنية؟","o":{"أ":"مام الحاضرين لتوضيح وجهة نظرك دون تصعيد الموقف. توجيه رد هادئ وحازم أ","ب":"طلب من الفريق التوقف مؤقتًا ثم شرح رأيك بهدوء وموضوعية أمام الجميع. لجتماع.","ج":"إنهاء المداخلة بهدوء ثم مناقشة الألمر مع االزميل بشكل خاص بعد انتهاء لحترافية دو ن لنجرار للنقاش في الوقت لنتقاد والتركيز على مهمتك إلظهار","د":"تجاوز الحالي. مناقشة الألمر مع االزميل خارج لجتماع بأسلوب هادئ وتفهّمي هو"},"a":"ج","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":254,"q":"عند إعداد خطة استراتيجية لتطوير االعملية التعليمية، ما أنسب طريقة لتحديد الألولويات لضمان تحقيق الألهداف بكفاءة وفاعلية؟","o":{"أ":"البدء بتقييم شامل لالاحتياجات التعليمية بالتشاور مع الألطراف المعنية ثم ترتي ب الألولويات حسب حجم التأثير المباشر على الطالب. ا إجراء تحليل بيئي داخلي وخارجي يشمل نقاط القوة والضعف والفرص والتهديدات","ب":"(SWOT) ثم ترتيب الألولويات بناءً على نتائج التحليل. توزيع الموارد بشكل متدرج مع التركيز أوال على تطوير الكادر التعليمي ثم تحسين","ج":"نية التحتية التعليمية.الب تحديد الألولويات عبر مقارنة حجم الموارد المتاحة بالحاجات الملموسة، مع التركيز على","د":"الاحتياجات الألساسية قبل المبادرات التطويرية. تقديم يوفر إطارا لتقييم وشامال موضوعيا لأن استخدام تحليلSWOT"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":255,"q":"أثناء مواجهة نزاع بين اثنين من الزمالء في مكان االعمل يؤثر على سير االعمل ما هو الألسلوب الألمثل للتعامل مع هذا الموقف بشكل يحافظ على بيئة االعمل ويعزز التعاون بين الطرفين؟","o":{"أ":"التخاذ قرار نهائي يوقف النزاع ويضمن استمرارية االعمل. إبالغ الإدارة فورا جلسة وساطة موضوعية بحضور طرف محايد لتسهيل الحوار البناء بين","ب":"تنظيم االزميلين.","ج":"تشجيع الطرفين على التفاهم المباشر بينهما لتجاوز النزاع دون اللجوء إلى أطراف خارجية.","د":"إشراك فريق االعمل بالكامل في مناقشة جماعية مفتوحة للتوصل إلى حل يرضي الجميع. منضبطاتنظيم جلسة وساطة بحضور طرف محايد يوفر إطارا"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":256,"q":"عند تصميم أدوات تقويمية لدرس جديد، كيف تضمن أن تكون التقويمات فعالة وشاملة في قياس مدى تعلم الطالب؟","o":{"أ":"صياغة أسئلة تقيس الفهم الألساسي وتؤكد على استجابات دقيقة لمحتوى الدرس.","ب":"تضمين أسئلة تغطي مستويات معرفية م تعددة تشمل الفهم، التطبيق، والتحليل لتقييم مهارات متنوعة. التركيز على أسئلة موضوعية متنوعة تجمع بين معرفة المفردات والفهم وتطبيق","ج":"المعرفة للحفاظ على موضوعية التقييم. ا الاعتماد على تقويمات مستمرة تشمل التقييمات القصيرة والمشروعات إلى جانب","د":"ئي لضمان رؤية شاملة ألداء الطالب. الاختبار النها تضمين أسئلة متعددة المستويات المعرفية هو السبيل الألمثل لضمان"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":257,"q":"أنت معلم جديد في مدرسة تعتمد على نظرية التعلم البنائي، كيف يمكنك تطبيق هذه النظرية في صفك لتحقيق أقصى استفادة من عملية التعلم؟","o":{"أ":"تنظيمنقاشات صفية منظمة تسمح للطالب بالتعبير عن أفكارهم وبناء المعرفة من خالل التفاعل مع المحتوى والمجموعة. تصميم أنشطة تفاعلية تحفز الطلاب على البحث و الاستكشاف الذاتي للمعلومات، مع","ب":"توجيههمنحو تكوين فهم عميق وشخصي للموضوع.","ج":"تقديم ملخصات وشروحات مرك زة تساند الطالب في فهم المفاهيم الألساسية، مع تحفيزهم على التعاون لتثبيت المعلومات. إعداد موارد تعليمية متنوعة تشمل محتوى جاهز للطالب مع فرص محدودة الاستكشاف","د":"مفاهيم جديدة بأنفسهم ضمن إطار توجيهي محدد."},"a":"ب","e":"لأن التعلم البنائي يركز على اكتسا ب المعرفة من خالل التفاعل لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":258,"q":"تواجه صعوبة في إدارة سلوك طالب يعكر صفك بشكل متكرر، ما هو الإجراء الأكثر فاعلية وأخالقية لمساعدته وتحسين سلوكه؟","o":{"أ":"توجيه إنذار شفهي حازم للطالب أمام زملائه لبيان جدية الموقف وتحفيزه على تعديل سلوكه. التحدث مع الطلاب على انفراد لفهم أسباب السلوك، ومن ثم تقديم الدعم والإلرشاد","ب":"المناسبين.","ج":"تذكير الطالب بالنظام الصفالالتزام، مع متابعة مستمرةي بصفة فردية وطلب تعهده ب لسلوكه. ا","د":"تخصيص جلسة نقاش مع ولي الألمر والطالب لمناقشة السلوك المتكرر وا التفاق على خطوات تصحيحية مشتركة. التحدث مع الطلاب على انفراد لفهم أسباب السلوك وتقديم الدعم"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":259,"q":"عند تطبيق قانون الخدمة المدنية في مدرستك، لاحظت وجود تضارب بين بعض مواد القانون والممارسات االعملية المتبعة. كيف تتصرف في هذه الحالة لضما ن احترام القانون وتحقيق استمرارية االعمل بفعالية؟","o":{"أ":"الاعتماد على تفسيرك الشخصي للقانون لتعديل الممارسات بما يتوافق مع الواقع. مناقشة التباين مع الإدارة والبحث عن حلول توافقية تضمن الالتزام القانوني","ب":"واستمرارية االعمل. المعتادة لحين صدور توضيح رسمي أو تعديل قانوني. لستمرار في تطبيق الممارسات","ج":"طلب توجيه رسمي من الجهة المختصة قبل اتخاذ أي إجراء لتجنب المخالفات.","د":"مناقشة التباين مع الإدارة والبحث عن حلول توافقية يتيح توفيق"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":260,"q":"في بداية العام الدراسي، تسعى لوضع نظام إلدارة الصف ي قلل من التشويش لنضباط بشكل فعّال ومستدام. ما هو النهج الأكثر مالءمة لتحقيق هذا الهدف؟","o":{"أ":"ويعزز تطبيق قواعد مُحددة بوضوح مع فرض عقوبات ثابتة على المخالفات لتثبيت النظام. الالتزام بها.","ب":"إشراك الطالب في صياغة قواعد الصف بما يضمن شعورهم بالمسؤولية و","ج":"توضي ح القواعد شفويًا بشكل مستمر مع الاعتماد على التحفيز الإليجابي لتعزيز لنضباط.","د":"السماح بمرونة في تطبيق القواعد لمنح الطالب فرصة لتعلم ضبط النفس عبر التجربة. إشراك الطالب في وضع قواعد الصف يجمع بين الوضوح"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":261,"q":"خالل تخطي ط درس باستخدامنظرية التعلم الاجتماعي، كيف تُدمج هذه النظرية لزيادة فاعلية التعلم بشكل أمثل؟","o":{"أ":"تشجيع الطلاب على ملاحظة السلوكيات المختلفة وتحليلها قبل تقليد اللأنماط الإليجابية فقط. تقديمنماذج سلوكية إيجابية واضحة يمكن للطالب ملاحظتها وتقليدها بشكل مباشر","ب":"وتكراري. تحفيز الطلاب على تقليد السلوكيات التي تحقق نجاحات ملموسة برأي المجموعة بغض","ج":"النظر عن إيجابيتها المطلقة. الاعتماد على تشجيع التعلم بالملاحظة ثمنقاش جماعي لتقييم اللأنماط السلوكية قبل","د":"تقليدها. لجت ماعي تعتمد بشكل أساسي على تقديمنماذج"},"a":"ب","e":"لأن نظرية التعلم لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":262,"q":"أثناء تقويم أداء زميل في االعمل، لاحظت تحسنا، ولكنه ال يزال يواجه ملحوظا كيف تقدم ملاحظاتك بطريقة مهنية وفعالة تعزز منتحديات في التواصل مع الطالب. تحسنه المستقبلي؟","o":{"أ":"تسليط الضوء على نقاط القوة أوال، ثم ذكر نقاط الضعف بشكل مختصر مع التأكيد على ضرورة تحسينها.","ب":"تقديم ملاحظات متوازنة بين الإليجابيات والسلبيات مع اقتراحات محددة قابلة للتنفيذ لتحسين التواصل.","ج":"التركيز بشكل أساسي على نقاط الضعف مع ذكر بعض الإلنجازات العامة لتحفيز التغيير. الإلشارة إلى نقاط القوة ونقاط الضعف في جلسة متابعة الحقة، تفاديا إلثارة توتر محتمل","د":"خالل التقويم الحالي. لأنها توفر توازنا بين الدعم والتحفيز والتحليل البنّاء مع طرح دقيقا"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":263,"q":"أثناء تخطيط استراتيجي لمدرستك، كيف تدمج دور أو لياء الألمور في االعملية ؟","o":{"أ":"مستدامالتعليمية بشكل ي
