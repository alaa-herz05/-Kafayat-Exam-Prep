 تدخل مع","o":{"أ":"عقد اجتماع حواري شامل لتبادل وجهات النظر والسعي إليجاد حل يرضي جميع","ب":"األطراف مع التركيز على أهداف المشروع. ا تفويض قرار نهائي إلى مدير الفريق بعد استعراض آراء الزمالء لتجنب لنقسام","ج":"وضمان التقدم. مؤقت لتجاوز الخالف مع تحديد موعد الحق لمراجعة النتائج وتحليلهالتفاق على حل","د":"بشكل جماعي. ،ألن عقد اجتماع حواري شامل يعزز الشفافية والمشاركة الفعالة ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":306,"q":"كيف يمكنك تقييم أداء معلم جديد بشكل موضوعي وعلمي لتحقيق أفضل فهم مل لمستوى أدائه؟ شا لعتماد على مالحظات المشرفين األكاديميين مدعومة بتحليل نتائج طالبه في","o":{"أ":"لختبارات. دمج مالحظات المشرفين، تقييمات الطالب، وتحليل نمو أداء الطالب عبر فترات زمنية","ب":"متعددة. النهائية. لعتماد على تقييمات الطالب بشكل أساسي مع مراجعة نتائج الطالب","ج":"د) استخدام انطباعك المهني الشخصي مبنيًا على مالحظات مباشرة ومناقشات مع المعلم. التقييم الذي يجمع بين مالحظات المشرفين، آراء الطالب، وتحليل ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":307,"q":"أثناء إعداد التخطيط السنوي، ما هو النهج األنسب في ت عاملك مع التغيرات ورؤية المستقبل لضمان فعالية التنفيذ وتحقيق األهداف؟","o":{"أ":"اعتماد خطة سنوية محددة بدقة، مع إعادة تقييم بسيطة عند الضرورة. وضع خطة سنوية مرنة تسمح بالتعديل المستمر وفقا للمتغيرات الطارئة والرؤية","ب":"المستقبلية المتطورة. ًتصميم خطة تعكس أساس ا قويًا من المعطيات السابقة مع مراجعة دورية للرؤية","ج":"المستقبلية بشكل محدود. التركيز على المعطيات والتوقعات الحالية في التخطيط السنوي مع إمكانية تحديث الخطة","د":"في نهاية الفترة. ا ا ألن التخطيط السنوي المرن الذي يسمح بالتعديل المستمر وفق ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":308,"q":"إ ذا قام موظف بإفشاء معلومات سرية تخص العمل، كيف تكون لستجابة األمثل من اإلدارة؟ إجراء محادثة فورية مع الموظف لتوضيح خطأ الفعل وتحذيره شفهيا مع توثيق","o":{"أ":"المالحظات. فتح تحقيق رسمي حسب اللوائح الداخلية، واتباع اإلجراءات التأديبية المحددة للحفاظ","ب":"المعلومات ومصداقية اإلدارة. على سرية توجيه إنذار رسمي خطي للموظف دون بدء تحقيق رسمي، مع التأكيد على أهمية","ج":"السرية. مناقشة الحادث مع الموظف والقسم المعني شفهيًا لحل المشكلة داخليًا، مع تسجيل وقائع","د":"الحادث بشكل غير رسمي. فتح تحقيق رسمي واتباع اإلجراءات التأديبية المقررة يعتبر األمثل ب-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":309,"q":"كيف تتعامل مع طالب يشعر باإلحباط بعد حصوله على درجات منخفضة؟ تناقشه في أسباب انخفاض درجاته مع التركيز على أهمية لجتهاد وتقديم نصائح لتحسين","o":{"أ":"أدائه مستقبال.","ب":"توضح له أسباب ال عثرات التي واجهها، وتشجعه بلطف على المحاولة مجددا مع تقديم دعم نفسي مناسب يعزز ثقته بنفسه. تُلفت انتباهه إلى النتائج السلبية لعدم الجدّية، مع تحذيره من استمرار األداء الضعيف","ج":"دون تقديم دعم مباشر. لعتبار، مع توجيهه للتر كيز على تطوير مهاراته","د":"تستمع إلى مشاعره وتأخذها بعين الذاتية دون تدخل مباشر في التفاصيل الدراسية. ألن هذا الخيار يجمع بين توضيح أسباب اإلخفاق، التحفيز ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":310,"q":"إذا طلبت من فريقك لبتكار في مشروع جديد، كيف تحفزهم بأفضل طريقة ممكنة؟","o":{"أ":"تشجع الفريق على تقديم األفكار بحرية، مع وضع مع ايير تقييم واضحة تكافئ األفكار المبدعة والمبتكرة.","ب":"تعقد اجتماعات دورية لعرض أفكارك وتوجيه الفريق نحو تنفيذها بدقة. تمنح أفراد الفريق حرية العمل دون تدخل، مع متابعة دورية لضمان سير العمل وفق","ج":"الجدول الزمني.","د":"تكلف أحد أعضاء الفريق بإدارة األفكار الجديد ة مع تشجيع الفريق على للتزام بتوجيهاته لتحقيق األهداف. توفير بيئة تشجع على التفكير الحر مع وجود معايير واضحة لتقييم"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":311,"q":"أثناء تقويم أداء موظف ذو خبرة طويلة تواجه تقييمًا سلبيًا ألدائه، كيف يجب أن تتعامل مع الموقف لتحقيق أفضل نتائج تطويرية ومهنية؟ تشرح له نقاط القصور بشكل مباشر مع التأكيد على ضرورة التغيير، مع تقديم مقترحات","o":{"أ":"لتحسين األداء.","ب":"تناقشه بموضوعية مع التركيز على نقاط التحسين وتقديم دعم مستمر لتحفي زه على التطور. تعطيه تقييمًا سلبيًا موثقا مع إشعاره بأن اإلدارة ستتابع الوضع بشكل رسمي دون تدخلك","ج":"المباشر. تبرر التقييم السلبي بالخبرة السابقة مع التأكيد على أهمية المحافظة على احترامه موقعه","د":"الوظيفي. ب- المناقشة الموضوعية مع دعم مست مر توفر بيئة تفاعلية إيجابية تعزز"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":312,"q":"في حال الحظت أن أحد المعلمين يستخدم أسلوبا ال يتناسب مع نوعية تعليميا الطالب في صفه، كيف تتصرف؟ ا تناقش المعلم مباشرةً لتحليل األسلوب المستخدم وتقديم اقتراحات تطويرية تناسب","o":{"أ":"الطالب. تستعين بخبراء تربويين لتقييم الوضع وتقديم إرشادات مهنية مخصصة تالئم احتياجات","ب":"الطالب. تقترح جلسة تدريبية جماعية لجميع المعلمين تركز على تنويع األساليب التعليمية بما","ج":"يتوافق مع صيغ الطالب المختلفة.","د":"تتابع أداء المعلم لفترة محددة قبل اتخاذ أي إجراء لضمان دقة التقييم وعدم التسرع. لستعانة بخبراء تربويين يضمن تقديم حلول مهنية مدعمة بتحليل ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":313,"q":"تواجه تأخيرً ا في تنفيذ خطة مدرسية ناجمة عن ضعف تنسيق الفرق العاملة. كيف تعالج المشكلة بأفضل طريقة مهنية لضمان استعادة وتطوير التنسيق؟ وتوضيح األدوار بشكل واضح","o":{"أ":"تعقد اجتماعات دورية مع جميع الفرق لتحديث الخطط ومحدد.","ب":"تطلب من الفرق المتأخرة تقديم تقارير دورية ومراجعة مهامها بانتظام. تعيد تشكيل الفرق مع توزيع األدوار وفقا لقدرات األعضاء مع إشراكهم في القرار","ج":"للتزام.لتعزيز تبسط الخطة بتقليل عدد األنشطة وتنقل التركيز إلى المهام األكثر حيوية لتخفيف الضغط","د":"على الفرق. عقد لجتماعات الدورية وتوضيح األدوار بشكل واضح يضمن"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":314,"q":"كيف تتصرف حيالحصة الدرس. يعاني أحد الطالب من تشتت لنتباه أثناء ذلك؟","o":{"أ":"تنبهه بشكل هادئ ومحفز لتوجيه انتباهه مجددًا دون إحداث مقاطعة كبيرة. تنوع طرق التدريس واستخدام استراتيجيات تعليمية متعددة لجذب انتباهه وتعزيز","ب":"تركيزه. ا تحفيزية. تقلل من مدة مشاركته في األنشطة المركزة مع تعويضه بأنشطة بديلة","ج":"د) تخصص له فترات استراحة قصيرة منظمة داخل الحصة لتمكينه من استعادة تركيزه. تنويع استراتيجيات التدريس يعد الخيار األكثر فعالية ألنه يعالج ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":315,"q":"كيف تتعامل مع زميل يرفض التعاون ويخلق أجواءً سلبية داخل فريق العمل؟","o":{"أ":"تناقش معه مباشرةً بأسلوب هادئ بهدف فهم األسباب ومحاولة تشجيعه على التغيير. ل المشكلة بشكل رسمي.","ب":"تخبر اإلدارة بما يحدث لتتدخل بح لنسجام.لحتكاك المباشر به للحفاظ على","ج":"تحاول التكيف مع الموقف وتتجنب له على تعديل سلوكه.","د":"تعبر عن استيائك منه في اجتماع الفريق تحفيزا الحوار المباشر الهادئ يعزز التفاهم ويحفز التغيير اإليجابي بشكل أ-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":316,"q":"أثناء تطبيق خطة استراتيجية جديدة، تواجه مقاومة من بعض الموظفين، كيف أثير سلبي؟ تتصرف لتحقق نجاح التطبيق بأقل ت توضح للموظفين أهمية الخطة وتأثيرها على األداء، مع فتح باب النقاش لالستماع إلى","o":{"أ":"مخاوفهم ومحاولة تذليلها. تُطالب الموظفين ب للتزام الفوري بالخطة مع توضيح أن المقاومة قد تؤثر على","ب":"تقييماتهم المهنية.","ج":"تستمر في تنفيذ الخطة مع مراقبة سلوك الموظ فين المعارضين، وتتخذ إجراءات تصحيحية عند الضرورة. تعقد اجتماعات توعوية دورية تركز على الفوائد العامة للخطة، مع تأجيل مناقشة","د":"المخاوف التفصيلية لفترة الحقة. توضيح األهداف وفتح الحوار لالستماع إلى مخاوف الموظفين يُعد أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":318,"q":"على حساب القواعد المتبعة في العمل، كي ف خاصا موظف يطلب منك تفضيال تتصرف بشكل مهني وأخالقي؟ تشرح له ضرورة إذا أمكن دون اإلخاللللتزام بالقواعد مع محاولة تلبية طلبه جزئيا","o":{"أ":"بالعدل. توضح له أهمية تطبيق القواعد بشكل عادل ومتساوٍ للحفاظ على نزاهة العمل واحترام","ب":"الحقوق.","ج":"تؤجل الرد عليه إلى حين الرجوع إلى الجهات المخت صة أو اإلدارة التخاذ القرار المناسب. على تطبيق القواعد بشكل صارم. دون مناقشة حفاظا","د":"ترفض الطلب فورا توضيح أهمية تطبيق القواعد بعدل ومساواة يعزز النزاهة المهنية ب-"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":320,"q":"في صف دراسي يضم طالبا بقدرات متفاوتة، كيف تحقق الدمج الفعّال لضمان مشاركة وتقدّم الجميع؟ خطة تعليمية موحدة تعتمد على مستوى متوسط للصف بأكمله. تحدد","o":{"أ":"ب) تصمم أنشطة متدرجة تراعي اختالف مستويات الطالب وتحمسهم على التعلم المشترك.","ج":"تركز على تعزيز قدرات المتفوقين مع تقديم مراجعة مبسطة للمتأخرين.","د":"تفصل الطالب حسب مستوياتهم وتطبق طرق تعليمية مخصصة لكل مج موعة داخل الفصل. ألنه يُطبق التدرج في األنشطة بما يناسب اختالف القدرات ضمن ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":321,"q":"أثناء تدريس درس مهم، الحظت أن مجموعة من الطالب ينشغلون باستخدام هواتفهم المحمولة مما يؤثر على تفاعلهم وتركيزهم. كيف تتصرف في هذا الموقف؟ تذكر الطالب بآداب استخدام الهواتف وتوضح لهم ضرورة للتزام بالقواعد الصفية مع","o":{"أ":"إتاحة فترة محددة الستخدام الهواتف ألغراض تعليمية. تطلب من الطالب إيقاف هواتفهم مؤقتا دون مصادرتها مع التوضيح بأن الهدف هو","ب":"الحفاظ على سير الدرس بتركيز. ا","ج":"توضح لهم أن استخدام الهواتف أثناء الدر س غير مقبول وتُحمّلهم مسؤولية تدارك لنتباه مع توجيه تنبيه شفهي فردي لمن يكرر اإلخالل. ،تطلب تسليم الهواتف لفترة قصيرة مع شرح أن ذلك مؤقت للحفاظ على النظام والترك","د":"لنتهاء. مع وعد بإعادتها فور لنضب اط وتسهيل استخدام التقنية أ- ألن هذا الخيار يُوازن بين ضبط"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":322,"q":"استُدعي معلم جديد إلى فريق تدريس يعاني من خالفات متكررة مع زمالئه تؤثر ع هذا الوضع؟ على تماسك العمل الجماعي. ما القرار األمثل للتعامل م تنظيم اجتماع مباشر مع المعلم وأفراد الفريق المعنيين لمناقشة أسباب الخالفات ومحاولة","o":{"أ":"التوصل إلى تفاهم مشترك طلب تدخل وساطة موضوعية من طرف ثالث مختص بحضور جميع األطراف لتسهيل","ب":"الحوار وحل النزاعات","ج":"توجيه تحذير رسمي للمعلم مع التأكيد على ضرو رة تعديل سلوكياته حفاظا على بيئة العمل لحتكاك وحماية بيئة العمل الحالية إعادة توزيع المعلم إلى فريق آخر لتقليل","د":"الوساطة بواسطة طرف ثالث مختص تقدم بيئة محايدة تضمن ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":323,"q":"أثناء تطبيق استراتيجية تعليمية جديدة، الحظت أن تحصيل الطالب لم يتحسن كما هو متوقع بعد فترة من المراقبة. كيف تتصرف؟ تواصل تطبيق لستراتيجية لفترة إضافية مع مضاعفة الجهود التحفيزية للطالب لتحسين","o":{"أ":"النتائج. إلى بيانات األداء، ثم تقوم بتعديل عناصرها معلستراتيجية بدقة مستندا","ب":"تعيد تقييم إشراك الطالب في التغذية الراجعة. توقف تطبيق لستفادة مما تم لتعيد النظر في األساليب األخرى مع لستراتيجية مؤقتا","ج":"تحقيقه من تقدم حتى اآلن. ا لختبارات لتحفيز الطالب على بذل جهد أكبر، مع تزيد من متطلبات الواجبات و","د":"لستراتيجية في وقت الحق. مراجعة إعادة التقييم والتعديل المدروس مع لستناد إلى بيانات األداء ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":324,"q":"في اجتماع مهني، الحظت أن بعض الزمالء يوجهون انتقادات شخصية لزميل آخر تؤثر على معنوياته. ما أفضل تصرف للتعامل مع هذا الموقف بشكل مهني وفعّال؟ التعبير لهدوء عن رفضك للسلوك غير المهني أمام الجميع مع تأكيد أهمية لحترام","o":{"أ":"المتبادل. التحدث مباشرة مع الزمالء المعنيين بشكل خاص لحثهم على احترام اآلخر وتجنب","ب":"الشخصنة. ع توثيق الوقائع للمساعدة في اتخاذ إجراء رسمي.","ج":"رفع الموضوع إلى اإلدارة م","د":"تجنب التدخل المباشر والتركيز على دعم الزميل المتأثر لتخفيف األثر النفسي. التعبير الهادئ والمباشر أمام الجميع يشدد على أهمية لحترام ويضع أ-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":325,"q":"أمامك خطة استراتيجية لتطوير التدريس في المدرسة، ولكن الموارد المالية محدودة. كيف تتصرف لضمان تحقيق أفضل النتائج ضمن هذه الظروف؟ تنفيذ جميع البنود في الخطة كما هي والتركيز على تحصيل التمويل الحقا لتعويض","o":{"أ":"النقص إعادة ترتيب األولويات داخل الخطة والتركيز على المبادرات ذات التأثير المباشر","ب":"واألكثر فعالية ضمن الموارد المتاحة تنفيذ جزء من الخطة بشكل جزئي حسب تقديرك مع متابعة تطوير باقي البنود تدريجيا","ج":"عند توفر الموارد التقدم بطلب تمويل إضافي مع تعديل طفيف في الخطة يهدف إلى تقليل المصاريف دون","د":"إلغاء المبادرات األساسية إعادة ترتيب األولويات والتركيز على المبادرات األكثر تأثيرا يُعد ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":326,"q":"علمت أن أحد المعلمين يستخدم أساليب تقويم قد تظلم بعض الطالب، مما يؤثر ذلك بأكثر الطرق المهنية واألخالقية؟ كيف تتصرف حيالعلى نزاهة التقييم.","o":{"أ":"التحدث معه بشكل خاص وبأسلوب عاطفي لمعرفة وجهة نظره ومحاولة التفاهم مناقشة األمر معه بأسلوب هادئ ومحترم لسبر األسباب والمساهمة في تحسين","ب":"الممارسات ق الطالب على حقو","ج":"رفع الموضوع مباشرة إلى إدارة المدرسة لطلب تدخل فوري حفاظا استشارة زمالئك المختصين لمراقبة الموقف وجمع شواهد قبل اتخاذ أي إجراء رسمي","د":"ألن الحوار الهادئ والمحترم يتيح فرصة لفهم األسباب وتصحيح ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":327,"q":"تواجه معلمة مشكلة تكرار غياب عدد من الطالب عن الحصص بشكل يؤثر على الموقف إليجاد الحل األمثل؟ كيف تحللتحصيلهم الدراسي.","o":{"أ":"تحرص على فرض عقوبات صارمة وعلى الفور لضمان انتظام الطالب بالحضور","ب":"تتواصل مع أولياء األمور لفهم األسباب بدقة وتنسيق الدعم المناسب للطالب تستثمر الوقت في توعية الطالب عن أهمية الحضور وتحثهم على منللتزام بدال","ج":"العقوبات تطبيق تنسق مع إدارة المدرسة لتطبيق نظام متابعة رسمي يهدف إلى التخفيف من الغياب بشكل","د":"ممنهج التواصل مع أولياء األمور يتيح معرفة األسباب الحقيقية للغياب ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":328,"q":"أثناء إدارة صف تعلم عن بعد، تالحظ تزايد التأجيل والمماطلة في تسليم ما اإلجراء األمثل لمعالجة هذه المشكلةلم. الواجبات من الطالب، مما يؤثر على جودة التع بشكل فعال ومستدام؟ للتزام.","o":{"أ":"حصر التقييم على الواجبات المشروطة بتغذية راجعة فورية لتحفيز الطالب على ا تصميم نظام تشجيعي قائم على التغذية الراجعة اإليجابية مع تحديد مواعيد تسليم","ب":"واضحة وتعزيز المتابعة المستمرة. للتزام.","ج":"تقليل حجم الواجبات وتخفيف متطلبات التسليم لتقليل الضغوط وتحسين لنضباط وتحقيق التزام أعلى.","د":"ربط التسليم المتأخر بخصم درجات تدريجي لتحفيز ألن تصميم نظام تشجيعي متكامل يعزز للتزام من خالل وضوح ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":329,"q":"زميل في عملك تعرض لمشكلة أخالقية مع أحد أولياء األمور، ويطلب نصيحتك بشأن كيفية التعامل معها. كيف ترد عليه؟","o":{"أ":"توصي باللجوء إلى اإلجراءات الرسمية المتبعة في المدرسة لضمان الحياد وحفظ الحقوق تصعيده تنصحه بمحاولة الحوار المباشر مع ولي األمر لتسوية األمر وديا قبل","ب":"ج) تقترح عليه توثيق الواقعة ومراجعة األدلة ثم التشاور مع اإلدارة قبل اتخاذ أي خطوة توصيه بالتجاهل وعدم التفاعل مع الموقف حفاظا على العالقات المهنية وعدم تصعيد","د":"النزاع يحمي حق وق جميع نظاميا أ- اللجوء إلى اإلجراءات الرسمية يوفر إطارا"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":330,"q":"الطالب وأهداف بين رغبات أثناء التخطيط للعام الدراسي، تواجه تعارضا المنهج الدراسي. كيف تتعامل مع هذا التعارض لتحقيق أفضل نتائج تعليمية؟ دون تعديل لضمان تحقيق األهداف المحددة بدقة","o":{"أ":"تطبق المنهج الدراسي كامال تدمج بعض رغبات الطالب ضمن أنشطة تعليمية متوافقة مع أهداف المنهج لتعزيز","ب":"مشاركتهم","ج":"تسمح للطالب ب لختيار بين تطبيق المنهج كما هو أو تعديل بعض مكوناته بناءً على رغباتهم تناقش مع اإلدارة تعديل المنهج ليالئم بشكل أكبر رغبات الطالب مع الحفاظ على","د":"األهداف العامة دمج رغبات الطالب ضمن أنشطة متوافقة مع أهداف المنهج يعزز ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":331,"q":"المعلمة تالحظ وجود تفاوت ملحوظ في مستويات ال طالب داخل الصف وتسعى ما أنسبن الجميع من التقدم وتحقيق أكبر استفادة ممكنة. إلى تطبيق استراتيجية تعليمية تُمك قرار يمكن أن تتخذه المعلمة في هذا السياق؟ تقسيم الطالب إلى مجموعات تعلم وفق مستوياتهم وتخصيص مهام تعليمية مالئمة لكل","o":{"أ":"مجموعة.","ب":"تقديم موارد تعلي مية موحدة لكل الطالب مع توفير دعم إضافي فردي للطالب ذوي لحتياجات الخاصة. تنظيم أنشطة تعليمية جماعية تشمل جميع الطالب مع تطوير تحديات متدرجة لتعزيز","ج":"التفاعل والتعلم المشترك. التركيز على تحفيز الطالب ذوي المستوى العالي لتسريع تقدمهم مع متابعة تقدّم الطالب","د":"اآلخرين بشكل غير رسمي. ألن تقسيم الطالب إلى مجموعات وفق مستوياتهم مع مهام مناسبة أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":332,"q":"أثناء محاولة حل نزاع بين موظفين في المدرسة، يصر كالهما على موقفه ويهددان بتصعيد المشكلة. كيف تتصرف؟ تعقد اجتماعا يسمح لكل طرف بالتعبير عن وجهة نظره وتبحث عن نقاط توافق تفضي","o":{"أ":"ل يعزز التفاهم.إلى حل وسط معقو تستمع لكل طرف على حدة لتفهم دوافعهما ثم تقترح حلوال محددة تحاول من خاللها","ب":"التوفيق بين المواقف مع الحفاظ على مصلحة المدرسة. تحيل النزاع إلى اإلدارة العليا بعد محاولة سريعة للوساطة، لتجنب تطور المشكلة دون","ج":"تدخل مباشر منك في التفاصيل. تركز على تهدئة الوضع بإجراء محادثات غير رسمية منفردة مع كل طرف للحد من","د":"التصعيد، مع تأجيل الحل الشامل لوقت الحق. عقد اجتماع يسمح للطرفين بالتعبير بحرية والبحث عن حل وسط أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":333,"q":"مع بداية العام الدراسي، ترغب في وضع نظام رقابي فعال يمنع الغش أثناء لمتحانات. ما اإلجراء األنسب لتحقيق ذلك بأفضل طريقة مهنية تربوية؟","o":{"أ":"إبالغ الطالب بقواعد منع الغش بشكل واضح ومحدد في بداية كل ا متحان دون مناقشة أسبابه عقد جلسات توعوية مستمرة تشرح أثر الغش على الفرد والمجتمع وتعزز قيم األمانة","ب":"لمتحانات قبل اعتماد مراقبة دقيقة خالل لمتحانات مع ذكر العقوبات المحتملة بعد حدوث مخالفة دون","ج":"تحذير مسبق تطبيق عقوبات صارمة على المخالفين فورا مع توزيع نشرة تُذكر بالنتائج السلبية للغش","د":"دون جلسات توعوية ألن التوعية المستمرة تزرع الوعي األخالقي وتحفز السلوك ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":334,"q":"الحظت أن عددا من المعلمين يفتقرون إلى مهارات استخدام التقنية في م؟ التدريس. كيف تعالج هذا الموقف لتحقيق أفضل أثر تطويري وتحسين جودة التعلي تشجع المعلمين على التعلم الذاتي باستخدام موارد تقنية متاحة بشكل مستقل، مع تركهم","o":{"أ":"يتحملون مسؤولية تطوير مهاراتهم. تنظم دورات تدريبية تطبيقية وداعمة تركز على مهارات استخدام التقنية مع متابعة","ب":"مستمرة لتطبيق ما تم تعلمه على أرض الواقع. تقن يا منهم لضمان يساعد المعلمين في أداء مهامهم التقنية بدال مستمرا","ج":"توفر دعما استمرارية العملية التعليمية دون انقطاع. تقلل من استخدام التقنية في التدريس مؤقتا إلى أن يكتسب المعلمون المهارات المطلوبة","د":"ٍبشكل كاف. ب- ألن تنظيم دورات تدريبية تطبيقي ة مع متابعة مستمرة يضمن تطوير"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":335,"q":"ما الخطوة تلقيت شكوى حول انتهاك أحد الموظفين لقواعد السلوك المهني. األولى األنسب للتعامل مع هذه الشكوى بطريقة مهنية؟ لطالع على الشكوى وجمع المعلومات األولية من الموظف المشتكى عليه فقط","o":{"أ":"شامل لجمع األدلة من مصادر متعددة والتحقق من صحة الشكوى بموضوعية تحقيق","ب":"ج) طلب توضيح فوري من الموظف المتورط في انتهاك قواعد السلوك قبل اتخاذ أي إجراء إلدارة الموقف واتخاذ اإلجراءات الالزمة إبالغ المشرف المباشر للموظف فورا","د":"ب- يعد التحقق الشا مل الموضوعي من خالل جمع األدلة من مصادر"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":336,"q":"الفريق اإلداري يضع خطة لتحسين المدرسة، لكنه يرفض إدماج المعلمين في إعداد الخطة. كيف تتصرف في هذه الحالة؟","o":{"أ":"تحترم قرار الفريق اإلداري وتعمل على تطبيق الخطة كما هي دون تدخل المعلمين. تعرض على الفريق اإلداري أهمية تضمين المعلمين في إعداد الخطة لتعزيز التزامهم","ب":"مان نجاح التنفيذ.وض تتواصل مع المعلمين بشكل منفصل لجمع آرائهم ومالحظاتهم دون إشراك اإلدارة في","ج":"ذلك. تبدأ بتنفيذ خطة أولية بمشاركة محدودة من المعلمين ثم تعرض النتائج على اإلدارة","د":"إلقناعها الحقا. ب- ألن إشراك المعلمين في إعداد خطة التحسي ن يعزز من التزامهم"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":337,"q":"،في صفك، تواجه حالة تنمر بين طالبين كيف تتصرف؟ تحث الطالبين على التعبير عن مشاعرهما أمامك وتناقش األسباب بعمق، ثم تقترح","o":{"أ":"عليهما خطوات للتجاوز. تستمع للطرفين باهتمام وتدير حوارالحترام داخل الصف لتعزيز التفاهم و تفاعليا","ب":"المتبادل بينهما. تعقد جلسة خاصة مع كل طالب على حدة لفهم وجهة نظره ثم تتابع معهما بشكل منفصل","ج":"لتصحيح السلوك. ا تطلب من الطالبين كتابة تقرير عن الحادثة وتأثيرها عليهما، وتستخدم ذلك كأساس لحوار","د":"جماعي الحق. لستماع للطرفين وإدارة حوار تفاعلي داخل الصف هو األسلوب ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":338,"q":"أثناء إعداد اختبار تحصيلي، الحظت أن بعض األسئلة تعتمد بشكل كبير على لختبار؟ الحفظ دون تنويع في مستويات التفكير. كيف تتعامل مع هذا الموقف لتحسين جودة تعدل صياغة بعض األسئلة لتشمل مهارات لستيعاب والتطبيق، مع الحفاظ على بعض","o":{"أ":"األسئلة المتعلقة بالحفظ","ب":"تعيد صياغة األسئلة لتشمل مهارات التفكير ا لعليا مثل التحليل والتقويم، مع تقليل أسئلة الحفظ بما يعزز قياس الفهم العميق توزع األسئلة بين مستويات متعددة من الحفظ والفهم والتطبيق، دون التركيز فقط على","ج":"مهارات التفكير العليا ،تزيد من تنوع صياغة أسئلة الحفظ لتشمل مجموعات مختلفة من الحقائق والمعلومات","د":"لتقوية استدعاء المحتوى لدى الطالب ألن إعادة صياغة األسئلة لتشمل مهارات التفكير العليا مثل التحليل ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":339,"q":"معلمين، لكنه قوبل بمعارضة وسط الفريق. تقرر تطبيق نظام جديد لتقويم أداء ال كيف تتصرف؟","o":{"أ":"تشرح أهمية النظام وتؤكد على تطبيقه كما هو مع توفير فرص الحقة للمراجعة","ب":"تستمع لمخاوف المعلمين وتعدل النظام بما يتناسب مع الواقع لضمان تقبله وفعاليته","ج":"تؤجل تطبيق النظام لفترة محددة إلعادة النقاش وجمع مق ترحات الفريق قبل اتخاذ القرار النهائي تواصل تطبيق النظام مع تضمين مالحظات الفريق في تقييمات المرحلة المقبلة دون","د":"تعديل النظام الحالي لستماع للمعلمين وتعديل النظام بشكل يتواءم مع الواقع يعزز تقبل ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":340,"q":"يحدد حدود س اعات العمل واضحا الحظت في قانون الخدمة المدنية بندا تجاوز هذا الحد. كيف تتعامل مع هذا الموقف؟ اإلضافية، لكن اإلدارة تطلب أحيانا لحتفاظ بحقك في مخاطبة الجهات المختصة الحقا بتعليمات اإلدارة مع تلتزم مؤقتا","o":{"أ":"تناقش اإلدارة بهدوء مع التأكيد على أهمية احترام النص القانوني لتحقيق لنضباط","ب":"المؤسسي توافق على تجاوز الساعات عند الحاجة مع توثيق ذلك والبحث عن حلول مستدامة الحقا","ج":"للتزام بالقانون مع محاولة تأمين دعم جماعي لمنع التجاوزات تشرح للزمالء أهمية","د":"للتزام القان وني ب- الحوار الهادئ والمباشر مع اإلدارة مع التأكيد على"},"a":"ب","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":341,"q":"أثناء التخطيط لدرس تعليمي ترغب في تعزيز تعلم التعاون بين الطالب وتحفيز مهارات العمل الجماعي بفعالية. أي طريقة تعتبر األنسب لتحقيق هذا الهدف؟ تقسيم الطالب إلى مجموعات صغيرة للعمل على مشروع مشترك مع تحديد أدوار","o":{"أ":"ومسؤوليات واضحة لكل عضو في المجموعة بشكل فردي ثم يجتمعون لمشار كة نتائجهم ومناقشتها لتعزيز","ب":"جعل الطالب يعملون أوال الفهم المشترك تكليف الطالب بمهام جماعية دون تحديد دقيق لألدوار، مع التشجيع على تبادل األفكار","ج":"بشكل حر تنظيم األنشطة بحيث يعمل الطالب مع زمالئهم بصورة زوجية لتبادل المهام وتقاسم","د":"المسؤوليات بشكل مباشر اختيار تقسيم الطالب في مجموعات صغيرة مع توزيع واضح أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":342,"q":"أثناء مراقبتك لالمتحان، الحظت قيام طالب بالغش، كيف تتصرف تجاه هذا الموقف؟ لم تحان لتفهم ظروفه وتحذيره دون اتخاذ إجراء","o":{"أ":"تحادث الطالب بهدوء عقب انتهاء فوري تطبّق اإلجراءات التأديبية الرسمية بعد لستناد إلىلستماع إلى موقف الطالب و","ب":"اللوائح المعمول بها توجه له إنذارالمتحان مع تسجيل المالحظة كتحذير أولي قبل اتخاذ أي خالل لفظيا","ج":"إجراء رسمي تناقش مع الطالب األسباب التي دفعته للغش وتعمل على تقديم دعم تربوي وتصحيحي له","د":"قبل صدور أي عقوبة اتخاذ اإلجراءات التأديبية الرسمية بعد لستماع للطالب يوازن بين ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":343,"q":"عند مواجهة نقص في الميزانية المخصصة ألنشطة التدريب، ما هو اإلجراء لستفادة القصوى من الموارد المتاحة؟ األمثل لتحقيق تقليص حجم األنشطة التدريبية مع الحفاظ على الجدول الزمني األصلي دون استبعاد أي","o":{"أ":"نشاط إعادة جدولة األنشطة مع التركيز على ذات األولوية واختيار طرق تدريب أكثر كفاءة","ب":"وتوفيرا لحتياجات وأثر التدريب المتوقع","ج":"طلب تمويل إضافي مع تقديم خطة مفصلة تبين تنفيذ األنشطة التدريبية كما هو مقرر مع تعديل محتوى أو مدة بعض الجلسات لتقليل","د":"التكاليف إعادة الجدولة مع تركيز األنشطة ذات األولوية واختيار طرق ب-"},"a":"ب","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":344,"q":"أثناء عملك في الفريق اإلداري، يالحظ أن أحد األعضاء يتجنب التعاون ويؤثر ذلك على تقدم العمل الجماعي. كيف تتصرف لتحقيق أفضل بيئة عمل ممكنة؟ ا للتزام الجماعي لجتماع الجماعي لتحفيزه على مر معه ضمن","o":{"أ":"تناقش األ لفهم أسبابه وتقديم الدعم الذي يعزز مشاركته الفاعلة خاصا","ب":"تجري معه حوارا غ اإلدارة العليا لتقييم الموقف واتخاذ ما يلزم من إجراءات رسمية","ج":"تبل داخل الفريق محددة وبشكل مباشر تزيد من مسؤوليته","د":"تحدد معه مهاما إجراء حوار خاص يتيح فهم الدوافع والتحديات التي يواجهها ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":345,"q":"تواجه عمال يتطلب اتخاذ قرار سريع بين خيارين متقاربين، كيف تحدد إداريا القرار األفضل؟","o":{"أ":"تعتمد على تحليل سريع ومبني على خبرتك الشخصية دون جمع بيانات إضافية تجمع معلومات دقيقة وتقيم إيجابيات وسلبيات كل خيار بشكل موضوعي ثم تختار","ب":"األمثل","ج":"تنا قش الخيارات مع زمالئك لتكوين رأي جماعي مبني على وجهات نظر متباينة قبل اتخاذ القرار","د":"تستعين برأي خبير مختص ليقدم لك توصية مدعومة بتجارب سابقة تتناسب مع الحالة ألنه الخيار الذي يضمن اتخاذ قرار مبني على تقييم موضوعي ب-"},"a":"ب","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":346,"q":"معلمة ترغب في تحفيز طالبها بمنح جوائز، لكنها لم تضع معايير واضح ة للجوائز مسبقا. ما القرار المهني األمثل في هذه الحالة؟","o":{"أ":"تضع معايير محددة وواضحة للجوائز وتمنحها بناءً عليها بعد توضيحها للطالب","ب":"تمنح الجوائز بناءً على تقييمها الشخصي ألداء الطالب دون إعالن معايير مسبقة","ج":"توزع الجوائز بالتساوي بين الطالب لتجنب الشعور بعدم العدالة أو الظلم لتلك المعايير المجمعة تطلب من الطالب اقتراح معاييرهم للجوائز ثم تختار الفائزين وفقا","د":"وضع معايير واضحة ومعلنة للجوائز قبل التقييم يضمن العدالة أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":347,"q":"كيف الحظت أن أحد الزمالء يستخدم لغة غير مهنية في تواصله مع الطالب. تتصرف؟ تتحدث معه بشكل مباشر وباحترام لتوضيح أثر استخدام تلك اللغة على الطالب وبيئة","o":{"أ":"التعلم ترفع األمر إلى اإلدارة بعد محاولة التحدث معه لضمان اتخاذ إجراء رسمي إذا استمر","ب":"السلوك تناقش الموضوع مع الطالب بهدوء لتخفيف آثار اللغة وتحفيزهم على التركيز على","ج":"المحتوى يل لتقييم الحاجة للتدخل الحقا مع مراقبة سلوك الزم","د":"تتجاهل األمر مؤقتا الحوار المباشر والودي مع الزميل هو األكثر مهنية وفعالية لتحفيز أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":348,"q":"في حال نشوب خالف حول توزيع المهام بين أعضاء الفريق، كيف تُدير هذا النزاع لتحقيق أفضل نتيجة؟ مع الفريق لمناقشة وجهات النظر المختلفة والوصول إلى قرار تعقد اجتماعا مفتوحا","o":{"أ":"مشترك يُرضي الجميع ويُعزز التعاون. توزع المهام بناءً على تقييمك الشخصي للمهارات والخبرات مع شرح مبررات التوزيع","ب":"ألعضاء الفريق لضمان قبولهم. تشجع كل عضو على اختيار المهام التي يفضلها بنفسه، مع مراقبة دورية لضمان","ج":"في األعباء والمسؤوليات. التوازن تعين مسؤوال لتولي تنظيم وتوزيع المهام حسب األولويات واألهداف دون تدخل محددا","د":"متعدد األطراف. عقد اجتماع مفتوح يسمح بمناقشة آراء الجميع ويُعزز التوافق أ-"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":349,"q":"أثناء تقويم مشروع تعليمي، الحظت أن بعض األهداف المحددة غير قابلة كيف تتصرف في هذه الحالة لضمان تقييمللتحقق بواقعية ضمن الموارد والوقت المتاح. وتحسين المشروع بشكل مهني؟ لتساق في التقييم","o":{"أ":"تواصل العمل بالمعايير واألهداف األصلية دون تعديل لتفادي فقدان","ب":"تعدل صياغة األهداف لتتوافق مع اإلمكانيات المتاح ة مع الحفاظ على قابلية القياس والوضوح تركز التقييم على النتائج المحققة فعال مع إهمال األهداف غير القابلة للتحقق لتجنب","ج":"التحريف في التقرير إلعادة التخطيط الشامل بسبب عدم واقعية األهداف المبدئية تقترح إيقاف المشروع مؤقتا","د":"ب- تعديل ص ياغة األهداف بشكل يتناسب مع اإلمكانيات المتوافرة"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":350,"q":"الح ظت أن بعض الطالب يفضلون التعلم الذاتي ويواجهون صعوبات في بيئة الفصل التقليدية. كيف تتصرف في هذا الموقف لتحقق أقصى فائدة لجميع الطالب؟ ا على نظام الصف وتركيزه","o":{"أ":"تلتزم بأسلوب التدريس التقليدي لكافة الطالب حفاظ","ب":"تدمج استراتيجيات التعلم الذاتي ضمن خطة التدر يس لتلبية احتياجات الطالب المتنوعة مع الحفاظ على هيكل الفصل تخصص أوقاتًا معينة خارج الحصة للطالب المفضلين للتعلم الذاتي دون تعديل أسلوب","ج":"التدريس األساسي تفتح نشاطات اختيارية للتعلم الذاتي داخل الفصل مع إعطاء الحصص الرئيسية بطريقة","د":"تقليدية لجميع الطالب الدمج المدروس الستراتيجيات التعلم الذاتي ضمن التدريس ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":351,"q":"عند إعداد خطة لتطوير مهارات المعلمين، كيف تضمن مشاركة فعالة تحقق بين احتياجات المعلمين وأهداف المؤسسة؟ انسجاما للتزام بأهداف المؤسسة دون تعديل جوهري","o":{"أ":"تعتمد الخطة على استشارة المعلمين مع اهتماماتهم بشكل متوازن مع معايير التطوير المؤسسي تستطلع آراء المعلمين وتدمج","ب":"ا","ج":"تضع الخطة بناءً على التوجيهات اإلدارية مع إبالغ المعلمين بالمحتوى النهائي تعقد ورش عمل مشتركة بين اإلدارة والمعلمين بناءً على جدول زمني محدد مسبقا","د":"ألنها تمزج بين إشراك المعلمين في تحديد لحتياجات والتوافق مع ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":352,"q":"بين نتائج التقييم الكمي والتقييم النوعي. السؤ ال32: أثناء تقييم أداء الموظفين، الحظت تباينا كيف تصدر حكمك النهائي بشأن أداء الموظف بدقة وموضوعية؟","o":{"أ":"تعتمد على التقييم الكمي ألنه مبني على معايير قابلة للقياس والموضوعية بشكل أكبر","ب":"تدمج بين التقييم الكمي والنو عي إلعداد صورة شاملة ومتوازنة تعكس مختلف جوانب األداء تعطي األولوية للتقييم النوعي ألنه يعكس الجوانب السلوكية واإلنسانية التي قد ال تُقاس","ج":"رقميا تستعين بفريق من الخبراء لمراجعة النزاعات بين التقييمين قبل اتخاذ القرار النهائي","د":"ب- ال دمج بين التقييمين هو األكثر فعالية ألنه يوازن بين الدقة العددية"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":353,"q":"الحظت أحد المعلمين يشارك خبراته مع زمالئه بفعالية خالل أوقات العمل رغم ضيق الوقت المتاح، كيف تقيّم أثر هذا السلوك على بيئة العمل التربوي؟ والتواصل المهني بين الزمالء تراه مساهمة إيجابية ترفع مستوى التفاعل","o":{"أ":"تعتبر مشاركته ضرورية لتعزيز روح الفريق وتنمية مهارات العمل الجماعي بفعالية","ب":"مستدامة تقيمه كإضافة رغم احتمال تأثير المشاركة على تركيزه في مهامه األساسية قليال","ج":"د) تنظر إلى مشاركته باعتبارها مخاطرة قد تشتت انتباهه من أداء مها مه الرسمية المشاركة الفعالة تُعزز من روح التعاون والتنمية المهنية الجماعية ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":354,"q":"أثناء محاولتك حل نزاع نشأ بين موظفين بسبب سوء تفاهم بسيط، كيف تتصرف لضمان حل النزاع بشكل فعال ومستدام؟ اشر دون تدخل إضافي","o":{"أ":"تستمع إلى كال الطرفين بموضوعية ثم توجههم نحو التفاهم المب تشرح وجهات النظر المتبادلة بدقة وتعمل على تعزيز قنوات التواصل لتحسين العالقة","ب":"بين الطرفين مستقبال تعقد اجتماعا مع اإلدارة لتقييم ضرورة إعادة توزيع المهام أو تعديل بيئة العمل لتقليل","ج":"لحتكاك بين الموظفين تنصح كال الطرفين باتباع آليات رسمية للشكاوى والتحكيم لضمان عدم تكرار النزاع","د":"ألن تفسير وجهات النظر والعمل على تحسين التواصل يعد الحل ب-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":355,"q":"عند مواجهة ولي أمر غاضب يتطلب الموقف تعامال حكيمًا، ما األسلوب األمثل ء عالقة إيجابية؟ لتحقيق تفاهم وبنا لستماع لها بانتباه","o":{"أ":"أ-","ب":"الموضوع للمشكلة تهدئه عبر التأكيد على الجهود التي تبذلها المدرسة مع اقتراح حلول محتملة","ج":"تقبل نقده برحابة صدر مع توجيه الحديث نحو أهمية التعاون بين المدرسة واألسرة","د":"األمثل ألنه يجمع بين شرح األسباب بوضوح وهدوء مع الخيار("},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":357,"q":"أثناء تنظيم اجتماع للمعلمين، الحظت انحراف النقاش نحو مواضيع جانبية لجتماع. كيف تتصرف في هذه الحالة؟ تؤثر على سير تحفيز اإلبداع لستمرار في النقاش بحرية إلظهار حرية التعبير و","o":{"أ":"تسمح لهم ب تعيد توجيه الحوار بلطف نحو األهداف الموضوعية لالجتماع مع الحفاظ على روح","ب":"المشاركة لجتماع إلى مساره المحدد وإعادة لنحراف فورا","ج":"تتدخل بشكل حازم لقطع تقترح تأجيل مناقشة المواضيع الجانبية إلى جلسة منفصلة الحقالجتماع دون تعطيل","د":"الحالي إعادة التوجيه بلطف توازن بين احترام حرية التعبير وضمان تحقيق ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":358,"q":"كيف تصمم خطة تدخلالس ؤال38: طالب يعاني من ضعف في مهارات القراءة والتعبير. فعّالة لتحسين مهاراته؟","o":{"أ":"تقدم له تمارين قراءة وتعبير منتظمة مع توفير مالحظات دورية لتحفيزه وتطوير مستواه. مع استخدام استراتيجيات تفاعلية متعددة لتحفيز التع لم مخصصا فرديا","ب":"توفر دعما وتعزيز مهاراته بشكل منهجي. تشجع الطالب على التعلم الذاتي وفق سرعته مع متابعة عامة الداءه دون تدخل مباشر","ج":"مكثف. تخصص جلسات دعم فردية مع التركيز على القراءة فقط دون دمج مهارات التعبير في","د":"الخطة. ب- ألن الدعم الفردي المخصص مع استرات يجيات تفاعلية متكاملة يعزز"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":359,"q":"أثناء تقييم مشروع طالبي، تواجه خيار التركيز على التقييم الفردي أو التقييم الجماعي فقط. كيف تختار أن تقوم بالتقييم األمثل لضمان دقة عدالة قياس األداء؟","o":{"أ":"تعتمد التقييم الفردي حصريًا إلبراز مهارات كل طالب بدقة وزيادة المساءلة الشخصية وتعكس التعاون والتميز","ب":"تدمج التقييم الفردي والجماعي لتغطية جوانب األداء المختلفة الشخصي تعتمد التقييم الجماعي حصريًا إلبراز مهارات العمل الجماعي وتعزيز التفاعل والتكامل","ج":"بين الطالب تركز على تقييم مالحظة السلوك الجماعي مع لستفادة من التقارير الفردية دون فصل","د":"التقييم صراحة دمج التقييم الفردي والجماعي هو األكثر مهنية ألنه يحقق توازنا بين ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":360,"q":"تُطبق قانون الخدمة المدنية الجديد الذي يستلزم تحديث نظام الحضور كيف تعالج هذه المقاومة بأفضللنصراف، وتالحظ مقاومة من الموظفين تجاه التغيير. و طريقة مهنية وإدارية؟","o":{"أ":"تشرح للموظفين أهمية النظام الجديد وتدعم ذلك بتدريب عملي على استخ دامه، مع لستماع لمالحظاتهم وتعديل التطبيق حسب الحاجة. توضح مزايا النظام الجديد للموظفين وتتبع ذلك بتدريب مبدئي عليها، مع تطبيق النظام","ب":"دون استثناءات.تدريجيا تفرض النظام الجديد بحزم مع تقديم شرح موجز للموظفين، مع تشديد الرقابة للحد من","ج":"لنصراف.ر و تجاوزات الحضو تلتزم بالشرح والتدريب على النظام الجديد مع السماح بمرونة مؤقتة في التطبيق لتخفيف","د":"حدة المقاومة. التوضيح الموسع مع التدريب العملي و لستماع للموظفين ومرونة أ-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":361,"q":"عند حدوث خالف بين معلمين حول مسؤوليات مشتركة، ما األسلوب األكثر مان استمرار التعاون؟ مهنية وفعالية إلدارته وض ا لتفاق المتبادل بين الطرفين","o":{"أ":"تحديد وتقسيم المهام بشكل واضح ومكتوب مع","ب":"مناقشة الخالف شفهيًا بهدف التوصل إلى تفاهم مشترك دون الحاجة للتوثيق الرسمي","ج":"اللجوء إلى مسؤول أعلى لتحديد المسؤوليات وتوزيعها بشكل نهائي بين الطرفين","د":"تأجيل ا لنقاش حول الخالف لحين انخفاض التوتر والسماح بوقت كافٍ إلعادة التقييم ألن تقسيم المهام بوضوح وبشكل مكتوب مع لتفاق المتبادل يرسخ أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":362,"q":"أحد المعلمين يظهر أسلوب تعامل سلبي مع الطالب يؤثر على بيئة التعلم، كيف تتصرف في هذه الحالة؟ له مالحظات عامة حول سلوكياته لتجنب إحراجه أمام اآلخرين تقدم","o":{"أ":"ب) تناقش معه بشكل خاص وتقدم تغذية راجعة بناءة مع دعم تدريبي لتحسين أسلوبه","ج":"ترفع الموضوع إلى اإلدارة بعد محاولة نقاشه دون جدوى لضمان التدخل المناسب","د":"تراقب وتدون السلوكيات السلبية مع انتظار إشارات وا ضحة من اإلدارة للتصرف تقديم تغذية راجعة بناءة مع دعم تدريبي هو اإلجراء األكثر مهنية ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":363,"q":"في خطتك لستدامة الفعليةلستراتيجية لتطوير المدرسة، كيف تضمن تحقيق في التنفيذ؟ على تخصيص موارد مالية دورية مع مراجعة سنوية لمؤشرات األداء تعتمد","o":{"أ":"تبني خطة شاملة تتضمن إجراءات واضحة، مؤشرات أداء قياسية، ومشاركة فعالة","ب":"لكافة األطراف المعنية تعزز قدرات فريق العمل وتوفر متابعة مستمرة مع تحفيز دائم للفريق اإلداري","ج":"والتعليمي","د":"تركز على بناء ش راكات طويلة األمد مع مؤسسات داعمة لضمان استمرار الموارد والخبرات ألن بناء خطة شاملة تتضمن إجراءات واضحة ومؤشرات أداء ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":364,"q":"تواجه طالبا يعاني من سلوكيات متكررة غير مرغوبة تؤثر على سير الفصل الدراسي، كيف تتعامل معه بشكل فعّال؟ تفرض إجراءات تأديبية محددة بوضوح بعد تنبيهه، مع توثيق السلوك وأثره في سجل","o":{"أ":"الطالب. ،تبحث بعمق في أسباب السلوك بالتعاون مع الطالب وأسرته واإلرشاد النفسي وتضع","ب":"خطة دعم شاملة. تخصّص وقتا لفردية مع الطالب داخل الصف لتعديل السلوك، مع إشراكه في وضع","ج":"قواعد السلوك المتفق عليها. أم نمطيا عرضياتراقب السلوك لفترة قصيرة دون تدخل مباشر لتقييم ما إذا كان سلوكا","د":"قبل اتخاذ أي إجراء. ب- ألن التعا طي مع السلوك غير المرغوب يتطلب فهما ألسبابه عميقا"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":365,"q":"أثناء وضع خطة لتقويم تعلم الطالب، ترغب أن تكون شاملة وعادلة وتعكس مستويات أداء الطالب بدقة، كيف تختار منهجية التقويم األنسب؟ لختبارات التحريرية المنظمة التي تقيس المعرفة والفهم بشكل منهجي.","o":{"أ":"تعتمد على تستخدم ،أدوات تقويم متنوعة تشمل لختبارات التحريرية، مالحظة األداء، المشاريع","ب":"والتقويم الذاتي لتعزيز الشمولية والعدالة. تركز على مالحظة السلوك والتفاعل ضمن الصف لتقييم مهارات التفكير والتطبيق","ج":"العملي بشكل مستمر.","د":"تسمح للمعلم باختيار أدوات التقويم التي يراها م ناسبة حسب خبرته واحتياجات طالبه الفورية دون تقيد بخطة محددة. ألن التنويع في أدوات التقويم يدمج بين القياس الكمي والنوعي ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":366,"q":"الحظت وجود سوء تفاهم بخصوص ساعات العمل اإلضافية بين اإلدارة والموظفين، كيف تتعامل مع هذا الموقف؟ تعقد اجتماعًا توضيحيًا مشتركًا لشرح البنود واإلجابة على لستفسارات بهدف الوصول","o":{"أ":"إلى تفاهم مشترك. للتزام به دون فتح باب النقاش.","ب":"ترسل مذكرة رسمية تشرح فيها النظام وتطلب تنظم ورشة عمل تدريبية تتضمن عرضًا تفصيليًا للنظام مع فرصة أسئلة محدودة","ج":"لضمان الفهم. دارة للقاء الموظفين وجمع مالحظاتهم دون تقديم شرح مباشر للنظام. عن اإل","د":"تكلف ممثال ألن عقد اجتماع توضيحي مشترك يتيح حوارً ا مباشرًا وفرصة لتبادل أ-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":367,"q":"أثناء متابعتك ألداء فريقك، الحظت وجود تحيز في توزيع المهام مما قد يؤثر على الروح المعنوية للفريق. كيف تتصرف لتحقيق أفضل نتائج ممكنة؟","o":{"أ":"تعيد توزيع المهام وحدك بناءً على تقييمك الشخصي دون إشراك الفريق لضمان الكفاءة","ب":"تناقش مع الفريق مع إعادة تقييم توزيع المهام بشكل شفاف لتحقيق العدالة والتوازن تترك التوزيع الحالي كما هو مع مراقبة األداء لفترة إضافية لتجنب اضطراب سير","ج":"العمل لجهودهم لتعزيز األداء الجماعي","د":"تخصص مها م إضافية ألعضاء المتميزين تقديرا إذ إن إشراك الفريق في إعادة تقييم توزيع المهام بشكل شفاف ب-"},"a":"ب","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":368,"q":"كيف تتصرف إذا طلب منك زميل اإلفشاء عن معلومات سرية تخص عمل اإلدارة؟ بسياسات العمل على السرية المهنية والتزاما","o":{"أ":"ترفض اإلفشاء حفاظا تناقش مع الزميل الهدف من اإلفشاء وتفصح عن المعلومات بعد التأكد من مبرر ذلك","ب":"رسميا تشرح للزميل أهمية السرية وتؤجل اإلفشاء لحين الحصول على موافقة رسمية من","ج":"ا اإلدارة تنبه الزميل إلى خطورة طلب اإلفشاء وتحذره من العواقب دون إفشاء المعلومات","د":"أ- رفض اإلفشا ء حفاظا بسياسات العمل هو على السرية المهنية والتزاما"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":370,"q":"في ضمان تنفيذ خطة استراتيجية بسبب مقاومة للتغيير من قبل تواجه تحديا بعض الموظفين، ما الخطوة األكثر فاعلية لضمان تقليل هذه المقاومة وتحقيق التنفيذ الناجح للخطة؟ تنظيم ورش عمل حوارية مع المعنيين لشرح تفاصيل الخطة و لستماع لمخاوفهم","o":{"أ":"ومحاولة دمج مقترحاتهم ضمن الخطة","ب":"إشر اك المعنيين في تصميم مراحل التنفيذ مع تقديم حوافز تحفيزية مرتبطة بتحقيق أهداف التغيير تقديم توجيهات واضحة وصارمة بضرورة للتزام بالخطة مع شرح الفوائد المرجوة","ج":"دون تغيير في الخطة األصلية تعجيل نشر الخطة مع تفعيل قنوات اتصال مستمرة لتوضيح أي استفسارات والرد على","د":"المالحظات بشكل دوري إشراك المعنيين وتقديم حوافز تحفيزية يعزز الشعور بالمسؤولية ب-"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":371,"q":"خالل حصة دراسية، يالحظ المعلم مجموعة من الطالب مشتتين ويناقشون ما هو اإلجراء األمثل إلدارة هذا الموقف وضمان استمراريةموضوعًا غير متعلق بالمادة. لنتباه والتركيز داخل الصف؟ توجيه سؤال مباشر للطالب المشتتين للربط بين موضوع النقاش والمادة الدراسية، مما","o":{"أ":"يعيدهم للدرس بطريقة غير مباشرة. طلب انتباه الطالب بهدوء وتذكيرهم بأهمية للتزام بالموضوع دون مقاطعة النقاش","ب":"بشكل مباشر. توجيه سؤال مباشر للطالب المشتتين لتحفيزهم على العودة للدرس والتركيز على المادة","ج":"بشكل فعال. إيقاف الدرس لفترة قصيرة لتوجيه نصيحة جماعية حول لنضباط وأهمية التركيز داخل","د":"الصف. توجيه سؤال مباشر للطالب المشتتين هو الخيار األمثل ألنه يعيدهم ج-"},"a":"ج","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":372,"q":"كيف موظف جديد في المدرسة يعاني من صعوبة في تطبيق نظام التقويم الجديد. يمكن لمدير المدرسة دعمه بشكل أكثر فاعلية لتعزيز تطبيق النظام بشكل صحيح وعملي؟ توجيه متابعة أسبوعية للنقاش حول تطبيق النظام. تزويده بدليل تفصيلي مكتوب مع","o":{"أ":"إشراكه في ورشة عمل تطبيقية مع زمالء ذوي خبرة يشجع الحوار العملي والتدريب","ب":"المباشر. تكليف موظف متمرس للمتابعة المستمرة معه أثناء تطبيق النظام وتقديم تغذية راجعة","ج":"دورية.","د":"تنظيم جلسة تقييم فردية مع الموظف لت حديد نقاط القوة والضعف وتقديم خطة تطوير شخصية. ورشة العمل التطبيقية توفر بيئة تعليمية تفاعلية تجمع التدريب"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":373,"q":"بعد فترة تقييم أداء، الحظ المدرس أن أحد الطالب يعاني من ضعف ملحوظ في مادة الرياضيات. ما اإلجراء األكثر مهنية وفعالية لدعم هذا الطالب؟","o":{"أ":"تكليف الطالب بحل تمارين إضافية بانتظام لتعزيز الفهم والتطبيق.","ب":"تنظيم جلسات دعم فردية منتظمة مع مدرس مختص لمتابعة نقاط الضعف بشكل مباشر.","ج":"تشجيع الطالب على المشاركة في مجموعات دراسة مشت ركة مع زمالئه لتعزيز التعلم التفاعلي. مراجعة خطة التدريس الخاصة بالفصل لضمان توفير استراتيجية تعلم مناسبة لجميع","د":"الطالب مع متابعة خاصة للطالب الذي يعاني. ألن تنظيم جلسات دعم فردية يوفر متابعة مخصصة ومباشرة لنقاط ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":374,"q":"كيف يمكنف بين موظفين حول توزيع المهام. في اجتماع مع الزمالء ظهر خال لقائد الفريق التعامل مع هذا الخالف بأفضل طريقة لتحقيق حل مستدام وفعّال؟","o":{"أ":"اتخاذ قرار فوري وتوجيه توزيع المهام بناءً على األولويات دون نقاش مفصل.","ب":"عقد جلسة تفاهم منفتحة لمناقشة وجهات النظر المختلفة والسعي إليجاد ح ل يرضي جميع األطراف. استشارة كل طرف بشكل منفرد لجمع وجهات النظر ثم اتخاذ القرار، مع إبالغ الجميع","ج":"الحقا. مع إبالغ الفريق بأن التوزيع قابل للمراجعة بعد فترة تقييم.","د":"إعادة توزيع المهام مؤقتا للتعبير عن وجهات ب- عقد جلسة تفاهم مفتوحة يتيح فرصة للجميع"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":375,"q":"أثناء التخطيط لستراتيجي للعام الدراسي، تبين أن أحد األهداف غير قابل ما هو القرار األكثر مهنية لضمان تحقيق الخطة بأفضل صورةللتحقيق بالموارد المتاحة. ممكنة؟ مع اإلمكانيات المتاح ة، مع الحفاظ على ومتوافقا","o":{"أ":"إعادة صياغة الهدف ليصبح واقعيا أهميته. ا","ب":"طلب تعزيز الموارد الالزمة لتحقيق الهدف دون تغيير نصه األصلي. تأجيل الهدف إلى فترة الحقة داخل العام الدراسي عند توفر موارد إضافية، مع إبقائه في","ج":"الخطة. ة.","د":"حذف الهدف من الخطة والتركيز على أهداف أخرى قابلة للتحقيق بالموارد الحالي إعادة صياغة الهدف بشكل واقعي يحافظ على أهميته ويُضمن من أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":377,"q":"ما موظف يواجه ضغط عمل شديد نتيجة تعدد المهام الموكلة إليه في نفس الوقت. هو النهج األنسب إلدارة وقته بفعالية؟ ن المتوقع إلنجازها، والبدء باألقصر ثم األطول.","o":{"أ":"ترتيب المهام بحسب الز قيق أثر مستدام؟","o":{"أ":"تخصيص الموارد المالية بشكل دقيق لضمان استمرارية التنفيذ. للتزام.","ب":"إشراك جميع أصحاب المصلحة في عملية التخطيط لضمان التوافق و ا لستفادة من تجارب وخبرات مدارس أخرى مع تكييفها بما يتالءم مع خصوصية","ج":"المدرسة.","د":"تنفيذ الخطة بسرعة مع مراجعة دورية لضبط األداء وتحقيق النتائج. إشراك جميع أصحاب المصلحة هو العامل األكثر أهمية ألنه يعزز ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":426,"q":"موظف يشعر بأن زميله يقلل من أداء مهامه مما يؤثر على جودة العمل التعامل مع الوضع بطريقة مهنية لضمان استمرارية التعاونالجماعي. كيف ينبغي له وجودة العمل؟","o":{"أ":"فتح حوار مباشر معه بأسلوب محترم ومهذب لمناقشة المالحظة وإيجاد حلول مشتركة.","ب":"تسجيل المالحظات ومتابعة األداء لفترة ثم طرح المشكلة بشكل رسمي إذا استمرت.","ج":"محاولة دعم الزميل بحمل بعض مها مه بشكل مؤقت مع إشعاره بذلك لتحفيزه على تحسين األداء. مع المحافظة على عالقة مهنية لتجنّب تصعيد الخالف.","د":"تقليل تفاعل العمل معه تدريجيا ،فتح الحوار المباشر بأسلوب محترم يتيح التوضيح والفهم المتبادل أ-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":427,"q":"كيفمستمر. تلميذ يظهر سلوكا في الفصل ويشتت انتباه زمالئه بشكل عدوانيا يتصرف المعلم بطريقة تربوية فعالة لتحقيق تعديل إيجابي في السلوك مع الحفاظ على بيئة تعليمية صحية؟","o":{"أ":"التحدث بصراحة مع التلميذ أمام زمالئه لتوضيح خطورة السلوك وإشعاره بالمسؤولية.","ب":"تخصيص وقت خاص لالستماع لتفسيرات التلميذ ومحاولة فهم الدوافع وراء ا لعدوانية ثم وضع خطة دعم مالئمة. إخطار أولياء األمور فورا وطلب تعاونهم التخاذ إجراءات مشتركة تؤدي إلى تعديل","ج":"السلوك. مراقبة السلوك بتأنٍ وتقديم توجيهات فردية مباشرة داخل الصف دون التطرق لألسباب","د":"العميقة. ب- تخصيص وقت خاص مع الطالب لفه م األسباب الدفينة وراء سلوكه"},"a":"أ","e الج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":444,"q":"في مؤسسة تعليمية جامعية، يرفض أعضاء هيئة التدريس تقليل الحمل كيف يمكنلنخراط في البحث العلمي. التدريسي رغم توجيهات اإلدارة الجديدة لزيادة يق توازن فعّال بين متطلبات البحث األكاديمي والحمل التدريسي؟ تحق تقديم حوافز مالية مع إعادة تنظيم الحمل التدريسي بشكل تدريجي يراعي قدرات أعضاء","o":{"أ":"هيئة التدريس. فرض تخفيض ثابت ومباشر للحمل التدريسي مع مراقبة للتزام دون تقديم حوافز","ب":"مالية. في الفصول الدراسية مع إبقاء الحمل التدريسي مستقرا دون حوافز","ج":"تخفيف عدد الطالب إضافية. التراجع مؤقتا عن توجيهات البحث مع إعداد خطة تشاركية لتحسين جودة التعليم والبحث","د":"الحقا. ألن الجمع بين الحوافز المالية وإعادة التنظيم التدريجي يُعد األسلوب أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":445,"q":"خالل أزمة مالية مفاجئة تستوجب مدير الموارد البشرية إعادة هيكلة بخفض عدد الموظفين، ما هو األسلوب األكثر فعالية للتخفيف من تأثير القرار وضمان استمرارية األداء وسمعة اإلدارة؟ التواصل بشفافية مع الموظفين، وشرح أسباب األزمة وخطة التخفيف مع فتح باب الحوار","o":{"أ":"تلقي المالحظات.ل إعالم الموظفين بشكل تدريجي حسب درجات المخاطر واألقسام المتأثرة لتجنّب إثارة","ب":"قلق عام مفاجئ. اعتماد معايير موضوعية ومعلنة الختيار الموظفين الذين سيشملهم التقليص بناءً على","ج":"األداء والكفاءة مع إشراكهم في الخطوات المقبلة.","د":"تقديم الدعم الن فسي والمهني للموظفين المتأثرين من التخفيض عبر برامج إعادة التوظيف والتدريب، مع شرح الظروف التي دفعت للقرار. الشفافية الكاملة مع الموظفين وشرح األسباب بوضوح تتيح لهم فهم أ-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":446,"q":"أنت مسؤول عن ت القي و لختالف، مع تنفيذ دمج","o":{"أ":"تدريجي ودعم تدريب مستمر لتعزيز التفاهم. تطبيق دمج فوري شامِل مع تعديل سياسات العمل بشكل موحد إللغاء التداخالت الثقافية","ب":"السابقة.","ج":"إعداد خطة دمج تدريجية مع ا لتركيز على تنسيق إداري محكم دون تعديل جوهري في ثقافات األقسام. البدء بدمج تدريجي مع تفويض بعض مهام األقسام إلى فرق مستقلة ذات ثقافات متجانسة","د":"لحتكاك. لتخفيف ألن تقييم الثقافات بدقة وتحديد نقاط التالقي و لختالف يتيح بناء أ-"},"a":"د","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":450,"q":"أثناء التواصل مع شريك تجاري رئيسي، تالحظ وجود غموض وعدم وضوح موقف؟ في األهداف المشتركة قد يؤثر على سير المشروع. كيف تدير ال لستراتيجية.","o":{"أ":"تنظيم اجتماع مخصص لتوثيق األهداف المشتركة وتوحيد الرؤية لستمرار بتنفيذ المشروع بناءً على الفرضيات الحالية لتفادي توقف العمل وتأجيل","ب":"اإلنجاز. أعمق.","ج":"طلب تدخل طرف خارجي مختص لتقييم وتعديل األهداف بما يضمن توافقا لحين التوصل إلى اتفاق رسمي وموثق. نشطة المتعلقة بالمشروع مؤقتا","د":"تعليق جميع األ تنظيم اجتماع مخصص لتوثيق األهداف وتوحيد الرؤية هو اإلجراء أ-"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":451,"q":"في مؤسسة صحية تواجه نقصا في األدوية األساسية خالل أزمة صحية مفاجئا متطورة، مع تزايد الطلبات واإللحاح من مختلف األقسام، كيف تحدد أولويات التوزيع لتحقيق أقصى أثر إنساني وأخالقي؟ بناءً على تقييم سريري دقيق.جا واحتيا صحيا","o":{"أ":"تخصيص األدوية للفئات األكثر ضعفا لترتيب وصول الطلبات لضمان العدالة اإلجرائية.","ب":"توزيع األدوية وفقا توزيع األدوية أوال على المستشفيات التي تخدم أكبر عدد من المرضى لضمان أقصى","ج":"تغطية. لت المبلغ عنها مع مراعاة معدل استهالك المستشفى تخصيص األدوية حسب شدة الح","د":"السابق. ألن تخصيص الموارد لألكثر ضعفا يحقق أعلى قيمة صحيا واحتياجا أ-"},"a":"أ","e":"ل ار بحرية دون التسرع في نقدها فورا.","o":{"أ":"تقديم تدريبات مستمرة للفريق على مهارات التفكير اإلبداعي وتغيير نمط التفكير","ب":"ا التقليدي تدريجيا. وضع قواعد","ج":"منح الفريق حرية تنظيم اجتماعات مفتوحة للخروج بأفكار جديدة مع واضحة للنقد البنّاء. إشراك مستشارين خارجيين متخصصين لدعم وتوجيه الفريق في ابتكار استراتيجيات","د":"مبتكرة بشكل مشارك. تنظيم ورش العمل التفاعلية التي تسمح بتجريب األفكار بدون نقد أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":505,"q":"مشروع قائم، ما هو النهج األمثل عند مواجهة مخاطر غير متوقعة تهدد تنفيذ لمواجهتها وضمان استمرارية المشروع بأقل تأثير سلبي؟ لضبط المسار والمخاطر.","o":{"أ":"إجراء تقييم سريع للمخاطر وتفعيل خطة طوارئ معدة مسبقا","ب":"وقف مؤقت للمشروع لتحديد جميع المخاطر بدقة قبل استكمال العمل. إعادة توزيع الموارد لتقليل المخاطر دون تعطيل سير المشروع أو إجراء تقييم شامل","ج":"فوري. متابعة المخاطر الحالية مع تحديث خطة المشروع تدريجيا دون إنشاء خطة طوارئ","د":"فورية. ألن التقييم السريع وتفعيل خطة الطوارئ المسبقة يسمحان بالتصدي أ-"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":506,"q":"أنت تقود فريقا وكانت هناك محاوالت سابقة فشلت في معقدا ينفذ مشروعا امه. ما الخطوة األكثر فعالية لتحليل الوضع الحالي وتحسين األداء؟ إتم تنظيم ورشة عمل تشاركية تضم جميع أعضاء الفريق وأصحاب المصلحة لمناقشة أسباب","o":{"أ":"الفشل وتبادل اآلراء. إجراء مراجعة فردية دقيقة مع كل عضو من أعضاء الفريق لتحديد نقاط الضعف","ب":"لمشروع.الشخصية وتأثيرها على ا إعادة تقييم منهجية العمل الحالية من خالل اجتماع مغلق مع قادة الفريق الستنباط نقاط","ج":"الخلل ووضع خطة تصحيحية. تكليف جهة خارجية متخصصة بإجراء تقييم شامل للوضع الحالي وتقديم توصيات","د":"موضوعية للتحسين. ا جميع األطراف المعنية، مما يتيح أ- تنظيم ورشة عمل تشاركية يشمل"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":507,"q":"كيف يمكن للقيادة التحويلية أن تسهم بأفضل صورة في تحقيق نجاح إدارة التغيير داخل مؤسسة عريقة تواجه تحديات التحديث؟ عبر تحفيز األفراد وتقديم رؤية ملهمة مشتركة تراعي مصالح الجميع وتدعم التفاعل","o":{"أ":"المستمر.","ب":"عبر فرض التغيير بحسم مع التركي ز على تحقيق األهداف المحددة وضمان تنفيذ الخطط بدقة. عبر لستماع المستمر آلراء الموظفين وتكييفللتزام بتغيير تدريجي مدروس مع","ج":"لستراتيجيات حسب الحاجة. عبر تعزيز بيئة عمل مستقرة مع تحفيز الموظفين للحفاظ على أفضل الممارسات الراهنة","د":"عند الضرورة القصوى. مع إدخال التحديث ألن القيادة التحويلية تعزز من للتزام الداخلي من خالل رؤية ملهمة أ-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":508,"q":"بين المخاطر والفرص أنت بصدد اتخاذ قرار استثماري معقد، كيف توازن التخاذ القرار األكثر فعالية؟ إجراء تحليل كمي ونوعي متكامل للمخاطر والفرص، مع استشارة خبراء متخصصين","o":{"أ":"إلثراء الرؤية واتخاذ قرار مستند إلى بيانات دقيقة. استخدام تحليل كمي للمخاطر والفرص بناءً على بيانات مالية متاحة، مع لعتماد على","ب":"رة داخلية للفريق اإلداري في التقييم النوعي. خب التركيز على تحليل نوعي للفرص والمخاطر مستندا إلى تجارب اإلدارة السابقة، مع","ج":"استخدام بيانات مالية كأساس لدعم القرار دون استشارة خارجية. إلى توقعات متفائلة قائمة على تحليالت كمية نوعية مع مراعاة ،اتخاذ القرار استنادا","د":"المخاطر المحتملة لكن بدون استشارة خبراء خارجيين. ا ألن الدمج المتكامل بين التحليل الكمي والنوعي مع استشارة الخبراء أ-"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":509,"q":"في بيئة عمل تتسم بتعدد الثقافات، تواجه صعوبات في تحقيق التناغم والتعاون بين أعضاء الفريق. ما هو اإلجراء األنسب لتعزيز األداء الجماعي بطريقة فعّالة ومستدامة؟ تنفيذ برامج تدريبية مستمرة تهدف إلى تعزيز الوعي الثقافي واحترام التنوع وتطوير","o":{"أ":"مهارات التواصل بين األعضاء.","ب":"وضع سياسات واضحة وصارمة توجّه سلوك الموظفي ن على أساس معايير موحدة بغض النظر عن خلفياتهم الثقافية.","ج":"تشكيل فرق العمل بناءً على التشابهات الثقافية لتقليل الصراعات وتعزيز الفهم المتبادل. منح كل عضو حرية اتباع أساليب عمل تناسب ثقافته مع تقديم دعم محدود دون فرض","د":"أطر تنظيمية مشددة. ألن تنفيذ برامج تدريبية وتوعوية مستمرة يعزز الوعي و لحترام أ-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":510,"q":"عند مواجهة تهديد إلكتروني يؤثر على بيانات حساسة، ما هو التصرف لستراتيجي األمثل لضمان الحد من األضرار وحماية المعلومات؟ تفعيل خطة مع إشعار الجهات المختصة واإلدارة العليا لتنسيقلستجابة للحوادث فورا","o":{"أ":"راءات.اإلج جمع المعلومات عن التهديد بدقة قبل اتخاذ أي إجراء، مع إشعار الفريق التقني المختص","ب":"أوال. البدء بإجراءات الحماية الداخلية فحسب ومحاولة احتواء التهديد دون إشراك جهات","ج":"على السرية.خارجية حفاظا لإلدارة العليا مع تأجيل تنفيذ أي إجر اءات تقنية حتى صدور توجيهات","د":"رفع األمر فورا واضحة. ألن التفعيل الفوري لخطة لستجابة مع إشعار الجهات المختصة أ-"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":511,"q":"تعمل في شركة تواجه تحدي ابتكار منتج جديد وسط منافسة شديدة، كيف تحفز فريق البحث والتطوير لتحقيق نتائج متميزة؟ تعزيز التنوع الفكري ضمن الفريق مع توفير بيئة محفزة ودعم الموارد الالزمة لتطوير","o":{"أ":"لبتكارية.األفكار تشجيع الفريق على تكثيف ساعات العمل والتركيز على األهداف قصيرة المدى لتحفيز","ب":"اإلنجاز السريع. وضع نظام مكافآت قائم على تقليد وتحسين المنتجات ا لهدف المطلوب بالكامل."},{"n":539,"q":"في ،سياق تقييم مخاطر مشروع استثماري جديد ضمن سوق متقلبة وغير مستقرة ما هو األسلوب األكثر شمولية وفعالية لتقدير المخاطر وتحقيق رؤية واضحة؟ لعتماد على تحليل البيانات التاريخية ودراسة اتجاهات السوق السابقة فقط لتقدير","o":{"أ":"المخاطر المحتملة.","ب":"دمج تقييم المخاطر ا لمالية والتشغيلية والسياسية مع تطوير سيناريوهات متعددة لتقدير تأثيراتها المتبادلة. ا استخدام خبرة الفريق الداخلي مع إجراء مراجعات دورية من خبراء متخصصين","ج":"لعتماد الكامل عليهم.خارجيين دون","د":"التركيز على تقييم المخاطر المالية والسياسية مع مراعاة تبني استرا تيجيات تحوط موجهة دون تحليل شامل للمخاطر التشغيلية. ألنه يجمع بشكل منهجي بين تقييم كافة أنواع المخاطر المرتبطة ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":540,"q":"قائد فريق يواجه ضغوط عمل كبيرة ويسعى إللهام الموظفين وتحفيزهم، ما هو للقيادة التحويلية في هذا السياق؟ األسلوب األمثل وضع أهداف واضحة ومحددة مع متابعة مستمرة وتشجيع على للتزام، مع معالجة","o":{"أ":"التقصير بأسلوب بنّاء. التواصل الدائم مع الموظفين وإظهار رؤية ملهمة، مع تقديم التشجيع والتقدير المستمر","ب":"لتعزيز الحافز الذاتي.","ج":"التركيز على تطوير ا لقدرات الفنية للموظفين من خالل التدريب والتوجيه، مع لعتراف بالجهود المبذولة. تفويض جزء من مسؤوليات القيادة لمديرين فرعيين لضمان السيطرة واإلشراف، مع","د":"إبقاء بوابة التواصل مفتوحة مع الفريق. رؤية مشتركة وتحفيز على بناء ب- ألن القيادة التحويلية تعتمد أساسا"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":541,"q":"تواجه شركة تحديا في دمج تقنية جديدة وسط مقاومة من العمالء الحاليين، كيف ومستدام؟ ينبغي لإلدارة التعامل مع هذا التحدي لتحقيق قبول فعال مع تقديم دعم فني مستمر للعمالء لتسهيل التكيف.","o":{"أ":"فرض التقنية الجديدة تدريجيا تنظيم حمالت توعوية وتدريب ك خالف بين أعضاء الفريق حول ،التقنية التي يجب اعتمادها؛ البعض يطالب باستخدام تقنية مجربة تعرف استقرارها واآلخرون يفضلون تقنية مبتكرة لم تُختبر بعد لكن تعد بميزة تنافسية. كي ف تتخذ القرار األمثل بناءً على ظروف السوق والتوقعات المستقبلية؟ لتعزيز ميزة تنافسية فريدة في السوق قبل المنافس","o":{"أ":"تعتمد التقنية المبتكرة فورا","ب":"تختار التقنية المجربة إلطالق المنتج بأقل قدر من المخاطر وضمان استقرار الجودة. تقييم معمق من خبراء مستقلين وتحليل بيانات السوق","ج":"تؤجل القرار إلى الحصول على والمخاطر المحتملة. تدمج بين التقنيتين في خطة متدرجة، تبدأ بالتقنية المجربة مع اختبار تدريجي للتقنية","د":"المبتكرة في السوق. تأجيل القرار للحصول على تقييم معمق من خبراء مستقلين يتيح لك ج-"},"a":"ج","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":583,"q":"تواجه مؤسسة ما لية أزمة ثقة من العمالء إثر تقارير إعالمية عن مشكالت مالية داخلية. ما اإلجراء األكثر فعالية الستعادة المصداقية دون اإلضرار بسمعة المؤسسة؟","o":{"أ":"إصدار بيان رسمي شفاف يوضح الوضع المالي الحالي واإلجراءات التصحيحية المتخذة. وتقديم خطط اإلصالح المستقبلية للعمالء","ب":"عقد مؤتمر صحفي شامل للرد على األسئلة والمساهمين. نشر تقرير مستقل من جهة خارجية موثوقة يقيّم الوضع المالي ويؤكد مصداقية","ج":"المؤسسة. التواصل المباشر مع العمالء عبر قنوات متخصصة لشرح الوضع واإلجراءات التأهيلية","د":"وتعزيز الثقة. إصدار بيان رسمي شفاف هو األكثر فاعلية ألنه يضمن وضوح أ-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":584,"q":"في سياق تخطيط استراتيجي طويل األمد لمؤسسة تعليمية، كيف يمكن دمج التكنولوجيا المتقدمة في الخطة مع ضمان قابلية التنفيذ ضمن الميزانية المحددة؟","o":{"أ":"إجراء دراسة جدوى شاملة ثم ت نفيذ تجريبي محكم للتقنيات الجديدة على نطاق محدود قبل التوسع. تخصيص جزء كبير من الميزانية الستثمار فوري في أحدث التقنيات مع مراقبة األداء","ب":"وتحسينه تدريجيا. اعتماد التكنولوجيا الحالية مع تعزيزها بتحديثات مستمرة وفعالة ضمن حدود الميزانية","ج":"دون تجارب مسبقة. وضع خطة لتطوير التكنولوجيا المتقدمة بالتدريج مع تخصيص الميزانية بشكل دوري","د":"بناءً على مراجعات دورية للنتائج. ،ألن إجراء دراسة جدوى شاملة يضمن تقييم المخاطر والتكاليف بدقة أ-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":585,"q":"كقائد فريق عمل في مؤسسة تواجه مقاومة داخلية ملحوظة تجاه تغيير تنظيمي لستراتيجية األكثر فاعلية لتحويل الموقف إلى دعم إيجابي ومستدام للتغيير؟ كبير، ما للتزام.","o":{"أ":"تحديد معايير واضحة للتغيير مع متابعة تطبيقها بدقة لضمان","ب":"إشراك الموظفين في مراحل التخطيط والتنفيذ لتعزيز الشعور بالملكية والقبول.","ج":"تقديم التغييرات بشكل تدريجي مع توضيح الفوائد لتقليل القلق والمقاومة. لنضباط. للتزام و","د":"توضيح العواقب المحتملة للمقاومة بشكل صريح لتحفيز إشراك الموظفين في مراحل التخطيط والتنفيذ يعزز شعورهم ب-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":586,"q":"أنت مسؤول تخطيط في شركة تواجه منافسة شديدة في سوق سريع التطور وغير مستقر. كيف تضمن تحديث استراتيجيتكم بفعالية لضمان التكيف المستمر مع المتغيرات؟ ة دورية محددة مسبقا(مثل كل سنتين)","o":{"أ":"وضع خطة استراتيجية متعددة السنوات مع مراجع لتقييم التقدم وإجراء التعديالت الالزمة. ا اعتماد نظام مراجعة استراتيجية ديناميكي مستمر مع مراقبة دقيقة لالتجاهات السوقية","ب":"والتكنولوجية وتضمين انخراط األقسام المختلفة في التحديثات. لستراتيجية فقط عند حدوث تغييرات كبيرة في سلوك التركيز على إعادة تقييم","ج":"المنافسين أو ظهور تهديدات جديدة، مع تبني حلول فورية مستقبلية. تحسين األداء من خالل تحليل واعتماد أفضل ممارسات المنافسين بشكل مستمر مع","د":"لذلك للحفاظ على القدرة التنافسية. لستراتيجية وفقاتعديل ب- اع ت
