عزز النتائج ويضمن تعاونا إجراء لقاءات دورية معهم لتقديم تقارير الألداء ومناقشة سير االعملية التعليمية.","ب":"إشراكهم في اجتماعات وفعاليات تفاعلية منتظمة تسهم في تطوير االعملية التعليمية. توفير قنوات اتصال مفتوحة تشمل اللقاءات الفردية والمتابعة عبر وسائل التواصل","ج":"المختلفة. إعالمهم بشكل مستمر عبر نشرات دورية وتقارير تفصيلية بشأن تقدم الطالب والمشاريع","د":"التعليمية. إذ إن إشراك أولياء الألمور في اجتماعات وفعاليات تفاعلية منتظمة"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":264,"q":"فما هو التصرف الألخالقي،إذا لاحظت مخالفة مهنية من زميلك في االعمل والمهني الألمثل للتعامل مع الموقف؟","o":{"أ":"التحدث مع االزميل مباشرة وبطريقة هادئة مع الحفاظ على سرية الموضوع، لمحاولة تصحيح الخطأ بدون تصعيد. وبمسؤولية كاملة. مع تقديم الألدلة، لضمان معالجة الألمر رسميا","ب":"إبالغ الإدارة أوال مناقشة الألمر مع زمالء آخرين للحصول على مشورتهم قبل اتخاذ أي خطوة، وذلك","ج":"لضمان الرأي الجماعي. لخلق توتر أو صراعات داخل الفريق. والتركيز على االعمل، تفاديا","د":"تجاهل المخالفة مؤقتا لأن الحوار المباشر بحذر مع االزميل يحافظ على سرية المعلومات"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":266,"q":"خالل اجتماع سنوي لتقييم الألداء، لاحظت أن بعض الألهداف الموضوعة ال كيفتتوافق تمامًا مع الظروف الحالية للمدرسة وتبدو غير قابلة للتحقيق بشكل عملي. حقيق أفضل نتائج؟","o":{"أ":"تتعامل مع هذا الموقف لت لجتماع. تقبل الألهداف كما هي لتجنب تعقيد النقاشات وضبط سير اقتراح تعديل الألهداف بما يتوافق مع الإلمكانيات والظروف الفعلية لضمان قابلية","ب":"الإلنجاز. الالتزام بجداول التنفيذ دون تعديل مباشر.","ج":"التعبير عن ملاحظاتك على الألهداف مع ا. لموافقة على الألهداف وطلب دراسة إضافية من الفريق إلعادة صياغتها الحق","د":"تأجيل ا تعديل الألهداف بما يتوافق مع الظروف الفعلية هو الخيار الألمثل"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":267,"q":"ترغب في تحفيز زمالئك في االعمل على تطوير مهاراتهم المهنية بشكل فعّال ا الأنسب لتحقيق هذا الهدف؟","o":{"أ":"ومستدام، أي استراتيجية تعتبره تنظيم دورات تدريبية إلزامية على فترات منتظمة مع متابعة أداء المشاركين. تقديم حوافز معنوية ومادية للموظفين الذين يحققون مستويات متقدمة في برامج التطوير","ب":"المهني. دون فرض جدول محدد. توفير مواد تدريبية متنوعة وتشجيع المبادرة الذاتية في التعلم","ج":"السماح لكل موظف باختيار وقت ومجال التدريب حسب رغبته دون تدخل إداري مباشر.","د":"ا ،تقديم الحوافز المعنوية والمادية يعزز الدافعية والمشاركة الفعالة"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":268,"q":"في حالة وقوع شجار بين طالبان داخل الصف، ما هو القرار الأنسب للتعامل حقق ضبط النظام ويحافظ على استقرار البيئة التعليمية؟","o":{"أ":"مع الموقف بما ي تهدئة الطالب فورا والتحدث معهم منفردين لفهم أسباب الشجار واالعمل على حله بطريقة تربوية. تطبيق عقوبة مناسبة لكال الطالبين لتأكيد عدم التسامح مع السلوك العدواني داخل","ب":"الصف. رع وقت إلشراكهم في معالجة السبب ومنع تكرار الشجار.","ج":"إبالغ أولياء الألمور في أس تخصيص وقت الحق بعد الدرس لمناقشة الموقف مع الطالب و لستماع إلى وجهات","د":"نظرهم بهدوء. التهدئة الفورية والتحدث منفردا مع الطالب تكفل تفهم الألسباب"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":269,"q":"بداية الفصل الدراسي، ما هي النصيحة الألهم عند تصميم تقويم تشخيصي في لضمان فعالية استخدامه في توجيه االعملية التعليمية؟","o":{"أ":"تضمين مجموعة من الألسئلة تغطي مستويات صعوبة متنوعة لتقييم الفروق الفردية بدقة.","ب":"التأكد من شمولية لت المحتوى التعليمي الألساسية ذات الصلةالاختبار لجميع مج بالألهداف التعليمية.","ج":"التركيز على تصميم أسئلة تعكس مهارات الطالب السابقة لتعزيز الثقة وتحسين الدافعية. الاختبار لتكوين صورةالاعتماد على ملاحظة سلوك الطالب في الصف إلى جانب","د":"شاملة عن مستواهم. لت المحتوى الألساس ية تمكن من تحديد الاختبار لمج ب- شمولية"},"a":"ب","e":"الإجابة الصحيحة هي: التأكد من شمولية لت المحتوى التعليمي الألساسية ذات الصلةالاختبار لجميع مج بالألهداف التعليمية.. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":270,"q":"في حالة وجود تداخل بين مهام مسؤوليتك ووظيفة زميل آخر، كيف تتصرفالسؤ ال20: لضمان سير االعمل بشكل فعّال واحترافي؟","o":{"أ":"للتفاهم المشترك. التفاوض مع االزميل لتقاسم المهام وتقسيمها بشكل متوازن تحقيقا واضح","ب":"توضيح الألدوار والمسؤوليات مع االزميل ومع الإدارة للوصول إلى توزيع ومحدد للمهام. التركيز على مهامك الألساسية وتأجيل المهام المشتركة إلى حين وضوح التصنيف دون","ج":"تدخل مباشر. المبادرة بأداء المهام المشتركة فورا عن لتجنب أي تأخير محتمل، مع الإلبالغ الحقا","د":"التداخل للمسؤولين. إذ إن توضيح الألدوار والمسؤوليات مع جميع الألطراف المعنية"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":271,"q":"أثناء تدريس إحدى الحصص، لاحظت أن مجموعة من الطالب يتحدثون بصوتال سؤال1: مرتفع مما يشتت انتباه بقية الصف. كيف تتصرف؟","o":{"أ":"تذكر الطالب بصمت بأهمية احترام القواعد، وتأمل أن يغيروا سلوكهم تلقائيا دون إحداث توتر. تذكر الصف بقواعد النظام بشكل عام، وتحفز الجميع على المشاركة في خلق بيئة تعلم","ب":"مناسبة، مع إعطاء الطالب فرصة لتعديل سلوكهم. توجه الطالب المتحدثين بتحذير فوري وحازم لضمان استعادة فيلنضباط فورا","ج":"الحصة. تعقد اجتماعا مع الطالب المعنيين بعد الدرس لمناقشة أثر سلوكهم على الزمالء خاصا","د":"المسؤولية الذاتية. وتشجيعهم على تذكير الصف بقواعد النظام بشكل عام مع تحفيز المشاركة ومنح"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":272,"q":"موظف جديد في المدرسة يعاني من ضعف في تنظيم وقته وتأخر متكرر عن تسليم المهام. ما الإجراء الأكثر مهنية وفعالية لتحسين أدائه بشكل مستدام؟","o":{"أ":"الالتزام. عرض اللوائح التنظيمية عليه بوضوح مع توضيح عقوبات التأخير لضمان","ب":"عقد جلسة إرشادية معه لتحليل أسباب تأخره ومساعدته في إعداد خطة زمنية مناسبة.","ج":"تخفيف عبء مهامه مؤقتًا وتقييم تأثير ذلك على أدائه قبل اتخاذ خطوات أخرى. الالتزام بخطة تسليم محددة وموثقة.","د":"توجيهه رسميًا بتحذير رسمي مع طلب"},"a":"ب","e":"لأن فهم أسبا ب المشكلة وتقديم دعم شخصي في تنظيم الوقت يعزز لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":273,"q":"وجود تضارب بين أهداف المنهج ومدى عند إعداد خطة دراسية جديدة، لاحظت اهتمام الطالب. كيف تتصرف؟","o":{"أ":"تلتزم بأهداف المنهج المعتمدة مع إدماج بعض أنشطة تحفيزية لالهتمامات الطالبية دون تعديل الألهداف. تعيد صياغة الألهداف بما يتوافق مع اهتمامات الطالب مع الحفاظ على معايير المنهج","ب":"التعليمية الألساسية. والمخرجات تستشير الطالب لتعديل الألهداف الدراسية بما يلبي تطلعاتهم مع مراجعة المعايير مع","ج":"زمالء مختصين. تطلب من فريق متخصص إعادة تصميم الألهداف والخطة الدراسية من الصفر لضمان","د":"توافق كامل مع اهتمامات الطالب. ب- إعادة صياغة الأل هداف بما يتوافق مع اهتمامات الطالب مع الحفاظ"},"a":"ب","e":"الإجابة الصحيحة هي: التعليمية الألساسية. والمخرجات تستشير الطالب لتعديل الألهداف الدراسية بما يلبي تطلعاتهم مع مراجعة المعايير مع. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":274,"q":"ئة االعمل. على بي لاحظت وجود خالف مستمر بين اثنين من الزمالء يؤثر سلبا كيف تتصرف لتحقيق أفضل نتائج؟","o":{"أ":"مع مرور الوقت.","ب":"وتأمل أن يُحل تلقائيا تتجاهل الخالف مؤقتا تجمع الطرفين لحوار مشترك تهدف خالله إلى فهم وجهات نظرهما والتفاوض على نقاط اتفاق. ا","ج":"تناقش كل طرف على حدة لتحديد جذور الخالف قبل محاولة التوسط بينهما. للنزاع.","د":"تبلغ مشرفك المباشر ليتدخل بشكل رسمي ويضع حدا جمع الطرفين لحوار مباشر يشجع على التواصل المفتوح والفهم"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":275,"q":"طلبت من الطالب تنفيذ مشروع جماعي، لكن لاحظت أن بعض المجموعات لم كيف تتصرف في هذا الموقفتلتزم بالتعاون المطلوب، مما أثر على جودة االعمل الجماعي. لتحقيق أفضل نتائج تعليمية؟","o":{"أ":"تناقش مع المجموعات المعنية أسباب قلة التعاون وتشجعهم على تحسين الألداء ضمن دورهم الحالي.","ب":"تعيد توزيع الألدوار داخل المجموعات وتوضح أه مية كل دور في إنجاح االعمل الجماعي مع تقديم توجيه مباشر لتحفيز التعاون. تخصص وقتًا لمراجعة نتائج المشاريع الفردية لكل طالب لتقييم مدى تأثير التعاون على","ج":"الألداء، وتطلب منهم تقييم أدائهم الذاتي ضمن الفريق. وتتابع تقدم المجموعات الحقا","د":"تقدم ورشة عمل إضافية حول مهارات االعمل ضمن الفريق لتقويم التحسن في التعاون. إعادة توزيع الألدوار مع توجيه واضح بشأن أهمية التعاون يوفر"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":276,"q":"أثناء إجراء تقييم للطالب، لاحظت أن بعض الألسئلة لم تعكس ب دقة مستوى إتقان المحتوى المطلوب. ما هو الإجراء الأنسب لضمان دقة وشمولية التقييم الحالي والمستقبلي؟","o":{"أ":"الاعتماد على نتائج التقييم الحالية دون تعديل، مع تدوين الملاحظات لتحسين التقييم مستقبال.","ب":"مراجعة وتصحيح الألسئلة غير الدقيقة قبل إعادة استخدامها في التق ييمات القادمة، مع الإلشارة إلى تأثيرها في التقرير النهائي.","ج":"استبعاد نتائج الألسئلة غير المالئمة من تحليل أداء الطالب لتفادي التحيز في التقييم الحالي. ا","د":"ضبط درجات الألسئلة غير الدقيقة بما يتناسب مع قيمتها الحقيقية لتصحيح التقييم الحالي. لأن تعديل الألسئلة غير الدقيقة قبل استخدامها مجددا يعزز من جودة -"},"a":"ب","e":"الإجابة الصحيحة هي: مراجعة وتصحيح الألسئلة غير الدقيقة قبل إعادة استخدامها في التق ييمات القادمة، مع الإلشارة إلى تأثيرها في التقرير النهائي.. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":277,"q":"كيف تتعامل مع لرؤية الإدارة. مخالفا في اجتماع عمل، طرح موظف اقتراحا لبتكار؟","o":{"أ":"هذا الوضع بشكل يوازن بين احترام الرؤية وتشجيع لقتراح برفق مع توضيح أسباب عدم توافقه مع الرؤية لتجنب إثارة توتر الفريق. ترفض تفتح باب النقاش حول لقتراح مع الفريق لتقييمه بناءً على جدواه وأثره، مع التأكيد","ب":"الاستراتيجية.على توافقه مع الألهداف","ج":"تقترح تع ديل لتحسينلقتراح بشكل مبدئي بما يقترب من الرؤية، ثم تدع النقاش مستمرا الفكرة. تؤجل مناقشة لجتماع الرئيسي للحفاظ على سير لقتراح إلى اجتماع خاص الحقا","د":"الانتباه.وعدم تشتيت فتح باب النقاش المنظم حول لقتراح ضمن إطار الألهداف"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":278,"q":"كيف تتصرف أحد الطالب يعاني من مشاكل نفسية تؤثر على تحصيله الدراسي. في إطار دعم شامل وفعال؟","o":{"أ":"تناقش الطالب بحساسية وتنسق مع الألخصائيين داخل المدرسة مع إبالغ أولياء الألمور بعد استئذان الطالب. تناقش الطالب بحساسية وتنقل الحالة إلى الألخصائيين مع إشراك أولياء الألمور بشكل","ب":"مباشر ومنسق. تحيل الطالب إلى المختصين داخل المدرسة بعد إعالم أولياء الألمور مع الحفاظ على","ج":"سرية المعلومات قدر الإلمكان. للطالب داخل الصف مع التنسيق غير المباشر مع الألخصائيين تقدم دعما مبدئيا نفسيا","د":"وأولياء الألمور عند الحاجة. ا لأنها تجمع بين التعامل المباشر والمهني مع الطالب، والتنسيق"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":279,"q":"تواجه صعوبة في تحفيز الطلاب على المشاركة الفعالة في النشاطات الصفية. م ا هو القرار الألمثل في هذه الحالة؟","o":{"أ":"فرض قواعد انضباطية صارمة مع تكرار التذكير بالعقوبات للحد من التكاسل. تصميم أنشطة تعليمية تفاعلية ومتنوعة تتواءم مع اهتمامات الطالب وتراعي مستوياتهم","ب":"المختلفة. ن تعديل طبيعة اللأنشطة.","ج":"تحفيز الطالب عبر تقديم حوافز معنوية ومادية بشكل دوري دو تقليل عدد اللأنشطة الصفية والتركيز على المحاضرات المباشرة مع رفع وتيرة الشرح","د":"والتوضيح. تصميم أنشطة تفاعلية تالئم اهتمامات الطالب ومستوياتهم يحقق"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":281,"q":"عند إعداد خطة تطوير مهني للمعلمين، أي من الاستراتيجيات التالية تعتبر الأكثر فعالية لتحقيق تحسين حقيقي ومستدام في الألداء التدريسي؟","o":{"أ":"امج تطوير مهنية موحدة لكل المعلمين بناءً على تقييم عام ألداء المدرسة. تصميم بر استقصاء حاجات المعلمين الفردية وتحليلها لتخصيص برامج تطويرية تلبي اهتمامات","ب":"واحتياجات كل معلم. تقديم مجموعة من البرامج المعتمدة مسبقا مع إتاحة اختيار المعلمين منها حسب رغباتهم","ج":"صية.الشخ التركيز على تطوير المهارات التقنية فقط مع تحديث مستمر لمحتوى التدريب بناءً على","د":"التقدم التكنولوجي. تخصيص التطوير المهني بناءً على استقصاء دقيق لحاجات"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":282,"q":"أثناء تنفيذ قانون الخدمة المدنية، تواجه موظفاالالتزام بالتعديالت يرفض الالتزام ويعزز الألجواء الإليجابية؟","o":{"أ":"هذا الموقف بشكل يضمن الجديدة، كيف تتعامل مع تعقد جلسة حوار توضح فيها التعديالت وتستمع لمخاوف الموظف بهدف الوصول إلى تفاهم مشترك. توضّح للموظف التعديالت بشكل رسمي مع التأكيد على ضرورة الالتزام، مع تعديالت","ب":"بسيطة بناءً على ملاحظاته. ، مع متابعة موقفه بانتظام.جراءات تأديبية تدريجية بعد تنبيه الموظف رسميا","ج":"تفرض إ تُصدر توجيهات كتابية صارمة للموظف مع تسجيل الملاحظات في ملفه الوظيفي","د":"لضمان التقيد بالتعديالت. لأن الحوار المفتوح الذي يشمل لستماع لمخاوف الموظف يعمل"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":283,"q":"أحد المعلمين يعاني من ضعف في مهارات التواصل مع زملائه، مما يؤدي إلى كيف يمكنك دعمه بأفضل طريقة لخفض هذا التوتر وتحسين بيئةتوتر في بيئة االعمل. االعمل؟","o":{"أ":"تقديم ملاحظات بناءة له حول سلوكياته في التواصل لتحفيزه على تعديلها. ا ارات التواصل الفعّال واالعمل الجماعي.","ب":"تنظيم برامج تدريبية متخصصة في مه","ج":"تشجيعه على تقليل تفاعالته المباشرة مع الزمالء والتركيز على مهام فردية.","د":"توجيه الزمالء إلى تبني موقف صبور ومتفهّم تجاهه دون تعديل سلوكه. نه من تطوير مهاراته ،بشكل فعّال لأنه يقدم دعما يُمك ومهنيّا عمليا"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":284,"q":"أثناء التخطيط الاستراتيجي للمدرسة، ما هو الألسلوب الألمثل لضمان مشاركة الة وشاملة لجميع أصحاب المصلحة؟","o":{"أ":"فع تنظيم ورش عمل تشارك فيها الإدارة والمعلمون فقط لتعزيز الفهم المشترك. إشراك المعلمين والطالب وأولياء الألمور وممثلي المجتمع المحلي في حوارات متكررة","ب":"لتبادل الآلراء وصياغة الألهداف.","ج":"جمع آراء أصحاب المصلحة عبر استبيانات دو رية مع تحليل نتائجها وتضمينها في الخطة. تشكيل لجان تمثل مختلف الفئات والجهات المعنية مع عقد اجتماعات دورية لمناقشة سير","د":"التخطيط والتعديل عليه. لأن إشراك جميع الألطراف ذات العالقة من خالل حوارات مفتوحة"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":287,"q":"في حال نشوء خالف بين معلم وولي أمر بشأن تقدم الطالب، كيف تتصرف؟","o":{"أ":"إلى وجهة نظره وتبادل الآلراء بغرض التوصل مع ولي الألمر للاستماع تعقد لقاءً هادئا إلى تفاهم مشترك. ترسل رسالة رسمية توضح موقفك وتطلب من ولي الألمر مراجعة الإدارة للنقاش","ب":"المباشر. تتابع النقاش مع ولي الألمر عبر الهاتف لتوضيح وجهات النظر والحفاظ على الحوار","ج":"المستمر. تترك الألمر لإلدارة لتتولى التعامل مع ولي الألمر دون تدخلك المباشر حفاظا على","د":"الألدوار. عقد لقاء هادئ يتيح لستماع الفعّال وتبادل الآلراء المباشرة يحقق"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":288,"q":"أثناء وضع تقييم تشخيصي، كيف تضمن شمولية التقييم وفعاليته في قياس مهارات الطالب المختلفة؟","o":{"أ":"الاختيار من متعدد تغطي جميع المهارات.","ب":"تعتمد على أسئلة موحدة من نوع من أنواع متعددة من الألسئلة تتناسب مع مختلف المهارات المستهدفة. تضمّن مزيجا","ج":"تستخدم أسئلة متنوعة لكنها تركز بشكل رئيسي على المهارات الألساسية والمهمة فقط.","د":"تستعين بتقييمات تشخيصية سابقة معدلة بشكل طفيف لتناسب السياق الجديد. ا ب- تضمي ن مزيج متنوع من أنواع الألسئلة يسمح بقياس شامل ودقيق"},"a":"ب","e":"الإجابة الصحيحة هي: تعتمد على أسئلة موحدة من نوع من أنواع متعددة من الألسئلة تتناسب مع مختلف المهارات المستهدفة. تضمّن مزيجا. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":289,"q":"مل ال يحترم مواعيد الحضور، مما يؤثر على أداء فريق االعمل. زميل في الع كيف تتصرف في هذه الحالة؟","o":{"أ":"تفتح معه حوارا لتعزيز تشرح فيه أثر تأخره على الفريق وتقترح معه حلوال مباشرا الالتزام. تذكره بشكل ودي ومتكرر بأهمية الالتزام، مع التأكيد على أن هذا يصب في مصلحة","ب":"ق.الفري ترفع الموضوع بشكل غير مباشر إلدارة الموارد البشرية لتتولى التنسيق معه وتطبيق","ج":"الإجراءات المناسبة. تتجنب التصعيد معه وتحاول التكيف مع وضعه بتوزيع المهام بين الفريق مؤقتا لتعويض","د":"أثر تأخره. فتح حوار مباشر يوضح أثر التأخير ويقترح حلوال يشجع على التفاهم"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":290,"q":"في سياق إعداد خطة تطوير المدرسة مع موارد محدودة، ما هي أنسب طريقة لتحديد أولويات تخصيص الموارد لضمان تحقيق أفضل أثر استراتيجي؟","o":{"أ":"تخصيص الموارد بناءً على تقويم الإلدارات المختلفة ألهمية كل نشاط وفق احتياجاتها الميدانية. تقييم أثر كل نشاط على الألهداف الاستراتيجية المدرسية وترتيب الموارد حسب الألولوية","ب":"المبنية على هذا التقييم. بولهم له.الاعتماد على نسبة المشاركة الطالبية في كل نشاط ومدى ق","ج":"تحديد الألولويات ب إعطاء الألفضلية للأنشطة الألكاديمية الأكثر ترابطا مع المقررات الدراسية على غيرها","د":"من اللأنشطة. لأن تقييم أثر كل نشاط على الألهداف الاستراتيجية وترتيب"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":291,"q":"عند مواجهة طالب يكرر التصرفات غير المالئمة بالرغم من التنبيهات المتكررة، ما هو الإجراء الأكثر مهنية وفعالية لتحقيق تعديل سلوكي مستدام؟","o":{"أ":"وطلب مشاركتهم في اتخاذ إجراءات تأديبية صارمة.","ب":"إبالغ أولياء الألمور فورا محاولة فهم دوافع السلوك بالتعاون مع إخصائي المدرسة لوضع خطة دعم ترافقها متابعة مستمرة.","ج":"تطبيق إجراءات تأديبية متدرجة مع شرح واض ح للعواقب وتكرار التنبيهات بدال من الإلهمال أو العقاب الفوري. مراقبة السلوك لفترة إضافية مع تسجيل ملاحظات دقيقة قبل اتخاذ أي إجراء تأديبي أو","د":"دعمنفسي. لأن فهم الألسباب الكامنة وراء السلوك والتعاون مع لختصاصيين"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":292,"q":"ٍأثناء تنفيذ برنامج تدريبي، اكتشفت أن محتوى التدريب ال يتناسب بشكل كافالسؤا ل22: مع مستوى المشاركين. كيف تتصرف في هذه الحالة؟","o":{"أ":"تواصل تنفيذ المحتوى كما هو ولكن تشرح المفاهيم بصياغات أبسط أثناء التدريب. شاركين قبل المتابعة.","ب":"تعدل محتوى التدريب ليتناسب بدقة مع مستوى واحتياجات الم تضيف جلسات دعم وتمارين تطبيقية إضافية للمتدربين لتعزيز فهمهم دون تعديل","ج":"المحتوى الألصلي.","د":"تُجري تقييمًا سريعًا إلعادة تصنيف مستوى المشاركين وتستكمل البرنامج حسب النتيجة. المشاركين هو"},"a":"ب","e":"تعديل المحتوى ليناسب بدقة مستوى واحتياجات لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":293,"q":"عند إدارة فريق عمل متنوع الخلفيات والثقافات، ما النهج الألمثل لتعزيز التعاون الفعّال بينهم؟","o":{"أ":"تشجيع التكيف المتبادل مع تطبيق مجموعة قواعد واضحة ومشتركة على الجميع مع لختالفات ا تعزيز احترام التنوع وتشجيع الحوار المفتوح والمتبادل لفهم الاحتياجات الثقافية","ب":"المختلفة تنظيم أنشطة تفاهم جماعية تركز على الجوانب المشتركة لتوحيد رؤية الفريق قبل","ج":"لختالفات التعامل مع","د":"تمكين الألفراد من إدارة عالقا تهم بأنفسهم مع توفير دعم استشاري عند ظهور نزاعات ثقافية لأن تعزيز لحترام والتواصل المفتوح يطور بيئة عمل شاملة تمكن"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":294,"q":"مع تصاعد أعباء االعمل، يلاحظ أن بعض الموظفين بدأوا يظهرون عالمات الإلرهاق والتراجع في الألداء. كيف تتصرف؟","o":{"أ":"تابعة أدائهم بانتظام. تحفزهم على تحمل الضغوط وتحقيق الألهداف، مع م","ب":"تعيد توزيع المهام بشكل متوازن مع توفير استراحات ودعمنفسي لتعزيز رفاههم. لتحافظ على معدالت الألداء. مؤقتا","ج":"تناقش مع الإدارة إمكانية استبدال من يعاني ضعفا ية.","د":"تسمح لهم بمواصلة االعمل بنفس النسق لتجنب تعطيل االعمليات أو تقليل الإلنتاج إعادة توزيع المهام مع توفير الدعم النفسي و لستراحات يعكس"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":295,"q":"عند تقييم أثر برنامج تعليمي حديث، ما هو الألسلوب الأكثر شموال وموضوعية الستخالص النتائج بدقة؟","o":{"أ":"الاختبارات المعيارية للطالب بعد تنفيذ البرنامج. تحليل نتائج ،جمع البيانات من أدوات تقييم متعددة تشمل نتائج الاختبارات، والملاحظات الصفية","ب":"وتقارير المعلمين، ومستوى مشاركة الطالب.","ج":"استقصاء آراء الطالب والمعلمين بشكل منهجي عن جودة البرنامج وتأثيره. الاعتماد على نسبة الحضور والمشاركة الفعلية في جلسات البرنامج كمؤش ر رئيسي","د":"لتقييم الألداء. لأن استخدام أدوات تقييم متنوعة ومتكاملة يجمع بين البيانات الكمية"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":296,"q":"موظف في الفريق يفضل االعمل بشكل منفرد ويرفض المشاركة الجماعية، كيف تتعامل معه لتحقيق أفضل تعاون بين الزمالء؟","o":{"أ":"الالتزام بالمشاركة بشكل مستمر. تشرح له أهمية االعمل الجماعي وتطلب منه في المهام الجماعية مع احترامتستمع لمبرراته وتناقش معه إمكانية دمجه تدريجيا","ب":"خصوصيته. تكلفه مهاما للحفاظ على إنتاجيته دون إجباره على االعمل فردية مع متابعتة تحفيزيا","ج":"الجماعي فورا. واضحة في إطار الفريق وتحثه على المشاركة بما يتناسب مع قدراته.","د":"تحدد له أهدافا لستماع لموقف الموظف ومناقشته بحساسية لتحقيق دمج تدريجي"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":297,"q":"في حالة وجود تعارض بين القوانين الداخلية للمدرسة وقانون الخدمة المدنية لنضباط الإلداري؟","o":{"أ":"الالتزام القانوني وتحقيق كيف تتصرف لضمان للوضع التنظيمي ويحقق فعالية التنفيذ. تطبق القانون الداخلي للمدرسة باعتباره مخصصا","ب":"تراعي قانون الخدمة المدن ية باعتباره القانون الألعلى والملزم قانونيا لجميع الجهات الحكومية.","ج":"تستشير الجهات القانونية المختصة لتحديد الألولوية بين القانونين قبل اتخاذ القرار.","د":"تؤجل التنفيذ وتعمل على تعديل اللأنظمة الداخلية لتتوافق مع قانون الخدمة المدنية. ًنظر ا لأن قانون الخدمة المدنية هو القانون الألعلى والأكثر شموال"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":298,"q":"لاحظت أن أحد المعلمين يستخدم أساليب تقييم قد ال تكون عادلة تماما تجاه الطالب، كيف تتصرف حيال هذا الموقف بطريقة تعزز العدالة والمهنية في االعمل؟","o":{"أ":"مع المعلم لتبادل وجهات النظر والتأكيد على أهمية العدالة في التقييم.خاصا تفتح نقاشا تبلغ إدارة المدرسة مباشرةً لتتخذ الإجراءات المناسبة بناءً على ما لاحظته. ا","ب":"","ج":"تشجع الطلاب على تقديم شكاوى رسمية تتيح مراجعة التقييمات المتأثرة. تخاذ أي خطوة لتجميع أدلة أقوى.","د":"تراقب سلوك المعلم لفترة أطول قبل ا فتح نقاش خاص وبنّاء يعزز التعاون المهني ويهدف إلى تحسين"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":299,"q":"أثناء التخطيط لدرس ، كيف يمكنك دمج نظريات التعلم لتعزيز استيعاب الطالب بشكل فعال؟","o":{"أ":"تركز على نظرية التعلم التي تراها الأنسب لمحتوى الدرس دون تعديلها بناءً على اختالف أساليب تعلم الطالب. تستخدم مزيجا لخصائص المحتوى من النظريات التعليمية مع تعديل التطبيق وفقا","ب":"لطالب المتنوعة.واحتياجات ا تعتمد بشكل رئيس على نظرية الحفظ والتكرار وتضمّن عناصر من نظريات أخرى عند","ج":"الضرورة. تطبق نظريات التعلم بشكل متسلسل وثابت عبر جميع الدروس مع التركيز على تنويع","د":"أساليب العرض. الدمج المرن والمتكيف لنظريات التعلم مع مراعاة اختالفات الطالب"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":300,"q":"عندما تواجه نزاعا بين موظفين في بيئة االعمل، ما هو النهج الألمثل للتعامل مع ستمرارية التعاون بين الألطراف؟","o":{"أ":"النزاع وضمان ا لستماع للطرفين بشكل منفصل ثم اتخاذ قرار سريع يحسم النزاع بناءً على المعلومات المتوفرة. جمع المعلومات من الطرفين معا، وتحليل تفاصيل النزاع ثم التوسط بينهم للوصول إلى","ب":"حل عادل ومستدام. استدعاء كل طرف على حدة للاستماع إلى وجهة نظره مع تسجيل الملاحظات، ثم إعالم","ج":"الإدارة التخاذ القرار المناسب. منح الطرفين فرصة لمناقشة النزاع فيما بينهما بتركيز، مع إشرافك الخفيف دون اتخاذ","د":"قرار مباشر إال في حالة تفاقم النزاع. ا وتحليل المعلوماتلستماع الشامل للطرفين ب- هذا النهج يجمع بين"},"a":"ب","e":"هذا النهج يجمع بين لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":301,"q":"في إدارة الصف، كيف تتعامل مع طالب يستمر في مقاطعة الدرس رغم التنبيهات المتكررة؟","o":{"أ":"تُجري معه حوارًا خاصًا فورً ا داخل الصف لمحاولة فهم السبب وتوضيح العواقب السلوكية.","ب":"تطلب منه لنتظار حتى انتهاء الحصة ثم تفتح معه حوارً ا هادئًا الاستكشاف الدوافع وتقديم الدعم المناسب.","ج":"تعطيه تحذيرًا رسميًا أمام الصف مع إبراز أهمية احترام النظام وتعزيز بيئة التعلم. ا. ر سلوكه الحق","د":"تُواصل الشرح مع تجاهل المقاطعة مؤقتًا مع مراقبته عن قرب لتقييم تغي لأن تأجيل الحوار حتى بعد الحصة يسمح بإجراء نقاش هادئ وغير"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":302,"q":"كيف تتصرف حيال أبلغ أحد الموظفين عن مخالفات إدارية في مكان االعمل. هذا البالغ؟","o":{"أ":"تبدأ بالتحقيق في البالغ بسرية مع الحفاظ على سرية هوية المبلغ، وتتابع الإجراءات النظامية بناءً على النتائج.","ب":"تُبل مع الحفاظ على سرية الهوية، وتنتظر توجيهاتها التخاذغ الإدارة العليا فورا الإجراءات المناسبة.","ج":"تناقش موضوع البالغ مع المبلغ بشكل مباشر لتأكيد التفاصيل قبل الشروع ف ي أي تحقيق رسمي. توثغ الجهات المختصة مع محاولة حماية المبلغ من أي تأثيرق البالغ بشكل رسمي وتبل","د":"سلبي محتمل. التحقيق السري مع الحفاظ على سرية المبلغ يضمن حماية حقوق"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":303,"q":"ا، ما هو العامل الألسا سي الذيا استراتيجيًا دقيق في بيئة عمل تتطلب تخطيط يضمن نجاح خطة التنفيذ بالشكل الألمثل؟","o":{"أ":"صياغة أهداف واضحة وقابلة للقياس بمشاركة فاعلة من جميع الألطراف المعنية.","ب":"تحديد أهداف واضحة من قبل الإدارة العليا مع تقارير دورية للفريق التنفيذي. فيذ فقط.","ج":"اعتماد أهداف محددة مع مراجعة دورية للتقدم من قبل فريق التن","د":"وضع أهداف عامة قابلة للتعديل اعتمادًا على ملاحظات الألفراد خالل التنفيذ. صياغة أهداف واضحة وقابلة للقياس بمشاركة جميع الألطراف"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":304,"q":"تواجه طالبا يعاني من غياب متكرر يؤثر على تحصيله الدراسي، كيف تتصرف؟","o":{"أ":"لتصال بأولياء الألمور. تناقش الطالب بشكل مباشر وتشجعه على تعديل سلوكه دون تتواصل مع أولياء الألمور أوال لفهم الألسباب ثم تعمل مع الطلاب على خطة لتقليل","ب":"الغياب. تبحث مع الطالب عن أسباب الغياب وتتواصل مع أولياء الألمور بشكل متزامن لوضع","ج":"حلول مشتركة. ن تدخل فوري من والديه. مع متابعة مستمرة لسلوكه دو رسميا","د":"تقدم للطالب تحذيرا لأنها تجمع بين التواصل المباشر مع الطالب واستشارة أولياء"},"a":"ج","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":305,"q":"في حالة وجود اختالف في وجهات النظر بين زمالء االعمل حول مشروع لختالف لتحقيق أفضل نتائج؟","o":{"أ":"معين، ما هو النهج الألمثل للتعامل مع هذا الالتزام بالمهام المحددة لكل فرد.ضرورة الإلبقاء على الآلراء المختلفة دون تدخل مع عقد اجتماع حواري شامل لتبادل وجهات النظر والسعي إليجاد حل يرضي جميع","ب":"الألطراف مع التركيز على أهداف المشروع. ا تفويض قرار نهائي إلى مدير الفريق بعد استعراض آراء الزمالء لتجنب لنقسام","ج":"وضمان التقدم. مؤقت لتجاوز الخالف مع تحديد موعد الحق لمراجعة النتائج وتحليلهالتفاق على حل","د":"بشكل جماعي. ،لأن عقد اجتماع حواري شامل يعزز الشفافية والمشاركة الفعالة"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":306,"q":"كيف يمكنك تقييم أداء معلم جديد بشكل موضوعي وعلمي لتحقيق أفضل فهم مل لمستوى أدائه؟","o":{"أ":"شا الاعتماد على ملاحظات المشرفين الألكاديميين مدعومة بتحليل نتائج طالبه في الاختبارات. دمج ملاحظات المشرفين، تقييمات الطالب، وتحليل نمو أداء الطالب عبر فترات زمنية","ب":"متعددة. النهائية. الاعتماد على تقييمات الطالب بشكل أساسي مع مراجعة نتائج الطالب","ج":"استخدام انطباعك المهني الشخصي مبنيًا على ملاحظات مباشرة ومناقشات مع المعلم.","د":"التقييم الذي يجمع بين ملاحظات المشرفين، آراء الطالب، وتحليل"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":307,"q":"أثناء إعداد التخطيط السنوي، ما هو النهج الأنسب في ت عاملك مع التغيرات ورؤية المستقبل لضمان فعالية التنفيذ وتحقيق الألهداف؟","o":{"أ":"اعتماد خطة سنوية محددة بدقة، مع إعادة تقييم بسيطة عند الضرورة. وضع خطة سنوية مرنة تسمح بالتعديل المستمر وفقا للمتغيرات الطارئة والرؤية","ب":"المستقبلية المتطورة. ًتصميم خطة تعكس أساس ا قويًا من المعطيات السابقة مع مراجعة دورية للرؤية","ج":"المستقبلية بشكل محدود. التركيز على المعطيات والتوقعات الحالية في التخطيط السنوي مع إمكانية تحديث الخطة","د":"في نهاية الفترة. ا ا لأن التخطيط السنوي المرن الذي يسمح بالتعديل المستمر وفق"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":308,"q":"إ ذا قام موظف بإفشاء معلومات سرية تخص االعمل، كيف تكون لستجابة الألمثل من الإدارة؟","o":{"أ":"إجراء محادثة فورية مع الموظف لتوضيح خطأ الفعل وتحذيره شفهيا مع توثيق الملاحظات. فتح تحقيق رسمي حسب اللوائح الداخلية، واتباع الإجراءات التأديبية المحددة للحفاظ","ب":"المعلومات ومصداقية الإدارة. على سرية توجيه إنذار رسمي خطي للموظف دون بدء تحقيق رسمي، مع التأكيد على أهمية","ج":"السرية. مناقشة الحادث مع الموظف والقسم المعني شفهيًا لحل المشكلة داخليًا، مع تسجيل وقائع","د":"الحادث بشكل غير رسمي. فتح تحقيق رسمي واتباع الإجراءات التأديبية المقررة يعتبر الألمثل"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":309,"q":"كيف تتعامل مع طالب يشعر بالإلحباط بعد حصوله على درجات منخفضة؟","o":{"أ":"تناقشه في أسباب انخفاض درجاته مع التركيز على أهمية لجتهاد وتقديمنصائح لتحسين أدائه مستقبال.","ب":"توضح له أسباب ال عثرات التي واجهها، وتشجعه بلطف على المحاولة مجددا مع تقديم دعمنفسي مناسب يعزز ثقته بنفسه. تُلفت انتباهه إلى النتائج السلبية لعدم الجدّية، مع تحذيره من استمرار الألداء الضعيف","ج":"دون تقديم دعم مباشر. لعتبار، مع توجيهه للتر كيز على تطوير مهاراته","د":"تستمع إلى مشاعره وتأخذها بعين الذاتية دون تدخل مباشر في التفاصيل الدراسية. لأن هذا الخيار يجمع بين توضيح أسباب الإلخفاق، التحفيز"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":310,"q":"إذا طلبت من فريقك لبتكار في مشروع جديد، كيف تحفزهم بأفضل طريقة ممكنة؟","o":{"أ":"تشجع الفريق على تقديم الألفكار بحرية، مع وضع مع ايير تقييم واضحة تكافئ الألفكار المبدعة والمبتكرة.","ب":"تعقد اجتماعات دورية لعرض أفكارك وتوجيه الفريق نحو تنفيذها بدقة.","ج":"تمنح أفراد الفريق حرية االعمل دون تدخل، مع متابعة دورية لضمان سير االعمل وفق الجدول الزمني.","د":"تكلف أحد أعضاء الفريق بإدارة الألفكار الجديد ة مع تشجيع الفريق على الالتزام بتوجيهاته لتحقيق الألهداف. توفير بيئة تشجع على التفكير الحر مع وجود معايير واضحة لتقييم"},"a":"أ","e":"الإجابة الصحيحة هي: تشجع الفريق على تقديم الألفكار بحرية، مع وضع مع ايير تقييم واضحة تكافئ الألفكار المبدعة والمبتكرة.. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":311,"q":"أثناء تقويم أداء موظف ذو خبرة طويلة تواجه تقييمًا سلبيًا ألدائه، كيف يجب أن تتعامل مع الموقف لتحقيق أفضل نتائج تطويرية ومهنية؟","o":{"أ":"تشرح له نقاط القصور بشكل مباشر مع التأكيد على ضرورة التغيير، مع تقديم مقترحات لتحسين الألداء.","ب":"تناقشه بموضوعية مع التركيز على نقاط التحسين وتقديم دعم مستمر لتحفي زه على التطور. تعطيه تقييمًا سلبيًا موثقا مع إشعاره بأن الإدارة ستتابع الوضع بشكل رسمي دون تدخلك","ج":"المباشر. تبرر التقييم السلبي بالخبرة السابقة مع التأكيد على أهمية المحافظة على احترامه موقعه","د":"الوظيفي. ب- المناقشة الموضوعية مع دعم مست مر توفر بيئة تفاعلية إيجابية تعزز"},"a":"ب","e":"الإجابة الصحيحة هي: تناقشه بموضوعية مع التركيز على نقاط التحسين وتقديم دعم مستمر لتحفي زه على التطور. تعطيه تقييمًا سلبيًا موثقا مع إشعاره بأن الإدارة ستتابع الوضع بشكل رسمي دون تدخلك. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":312,"q":"في حال لاحظت أن أحد المعلمين يستخدم أسلوبا ال يتناسب مع نوعية تعليميا الطالب في صفه، كيف تتصرف؟","o":{"أ":"ا تناقش المعلم مباشرةً لتحليل الألسلوب المستخدم وتقديم اقتراحات تطويرية تناسب الطالب. تستعين بخبراء تربويين لتقييم الوضع وتقديم إرشادات مهنية مخصصة تالئم احتياجات","ب":"الطالب. تقترح جلسة تدريبية جماعية لجميع المعلمين تركز على تنويع الألساليب التعليمية بما","ج":"يتوافق مع صيغ الطالب المختلفة.","د":"تتابع أداء المعلم لفترة محددة قبل اتخاذ أي إجراء لضمان دقة التقييم وعدم التسرع. لستعانة بخبراء تربويين يضمن تقديم حلول مهنية مدعمة بتحليل"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":313,"q":"تواجه تأخيرً ا في تنفيذ خطة مدرسية ناجمة عن ضعف تنسيق الفرق العاملة. كيف تعالج المشكلة بأفضل طريقة مهنية لضمان استعادة وتطوير التنسيق؟","o":{"أ":"وتوضيح الألدوار بشكل واضح تعقد اجتماعات دورية مع جميع الفرق لتحديث الخطط ومحدد.","ب":"تطلب من الفرق المتأخرة تقديم تقارير دورية ومراجعة مهامها بانتظام. تعيد تشكيل الفرق مع توزيع الألدوار وفقا لقدرات الألعضاء مع إشراكهم في القرار","ج":"الالتزام.لتعزيز تبسط الخطة بتقليل عدد اللأنشطة وتنقل التركيز إلى المهام الأكثر حيوية لتخفيف الضغط","د":"على الفرق. عقد الاجتماعات الدورية وتوضيح الألدوار بشكل واضح يضمن"},"a":"أ","e":"الإجابة الصحيحة هي: وتوضيح الألدوار بشكل واضح تعقد اجتماعات دورية مع جميع الفرق لتحديث الخطط ومحدد.. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":314,"q":"كيف تتصرف حيالحصة الدرس. يعاني أحد الطالب من تشتت الانتباه أثناء ذلك؟","o":{"أ":"تنبهه بشكل هادئ ومحفز لتوجيه انتباهه مجددًا دون إحداث مقاطعة كبيرة. تنوع طرق التدريس واستخدام استراتيجيات تعليمية متعددة لجذب انتباهه وتعزيز","ب":"تركيزه. ا تحفيزية. تقلل من مدة مشاركته في اللأنشطة المركزة مع تعويضه بأنشطة بديلة","ج":"تخصص له فترات استراحة قصيرة منظمة داخل الحصة لتمكينه من استعادة تركيزه.","د":"تنويع استراتيجيات التدريس يعد الخيار الأكثر فعالية لأنه يعالج"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":315,"q":"كيف تتعامل مع زميل يرفض التعاون ويخلق أجواءً سلبية داخل فريق االعمل؟","o":{"أ":"تناقش معه مباشرةً بأسلوب هادئ بهدف فهم الألسباب ومحاولة تشجيعه على التغيير. ل المشكلة بشكل رسمي.","ب":"تخبر الإدارة بما يحدث لتتدخل بح لنسجام.لحتكاك المباشر به للحفاظ على","ج":"تحاول التكيف مع الموقف وتتجنب له على تعديل سلوكه.","د":"تعبر عن استيائك منه في اجتماع الفريق تحفيزا الحوار المباشر الهادئ يعزز التفاهم ويحفز التغيير الإليجابي بشكل"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":316,"q":"أثناء تطبيق خطة استراتيجية جديدة، تواجه مقاومة من بعض الموظفين، كيف أثير سلبي؟","o":{"أ":"تتصرف لتحقق نجاح التطبيق بأقل ت توضح للموظفين أهمية الخطة وتأثيرها على الألداء، مع فتح باب النقاش للاستماع إلى مخاوفهم ومحاولة تذليلها.","ب":"تُطالب الموظفين ب الالتزام الفوري بالخطة مع توضيح أن المقاومة قد تؤثر على تقييماتهم المهنية.","ج":"تستمر في تنفيذ الخطة مع مراقبة سلوك الموظ فين المعارضين، وتتخذ إجراءات تصحيحية عند الضرورة. تعقد اجتماعات توعوية دورية تركز على الفوائد العامة للخطة، مع تأجيل مناقشة","د":"المخاوف التفصيلية لفترة الحقة. توضيح الألهداف وفتح الحوار للاستماع إلى مخاوف الموظفين يُعد"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":318,"q":"على حساب القواعد المتبعة في االعمل، كي ف خاصا موظف يطلب منك تفضيال تتصرف بشكل مهني وأخالقي؟","o":{"أ":"تشرح له ضرورة إذا أمكن دون الإلخاللالالتزام بالقواعد مع محاولة تلبية طلبه جزئيا بالعدل.","ب":"توضح له أهمية تطبيق القواعد بشكل عادل ومتساوٍ للحفاظ على نزاهة االعمل واحترام الحقوق.","ج":"تؤجل الرد عليه إلى حين الرجوع إلى الجهات المخت صة أو الإدارة التخاذ القرار المناسب. على تطبيق القواعد بشكل صارم. دون مناقشة حفاظا","د":"ترفض الطلب فورا توضيح أهمية تطبيق القواعد بعدل ومساواة يعزز النزاهة المهنية"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":320,"q":"في صف دراسي يضم طالبا بقدرات متفاوتة، كيف تحقق الدمج الفعّال لضمان مشاركة وتقدّم الجميع؟","o":{"أ":"خطة تعليمية موحدة تعتمد على مستوى متوسط للصف بأكمله.","ب":"تحدد تصمم أنشطة متدرجة تراعي اختالف مستويات الطالب وتحمسهم على التعلم المشترك.","ج":"تركز على تعزيز قدرات المتفوقين مع تقديم مراجعة مبسطة للمتأخرين.","د":"تفصل الطالب حسب مستوياتهم وتطبق طرق تعليمية مخصصة لكل مج موعة داخل الفصل. لأنه يُطبق التدرج في اللأنشطة بما يناسب اختالف القدرات ضمن"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":321,"q":"أثناء تدريس درس مهم، لاحظت أن مجموعة من الطالب ينشغلون باستخدام هواتفهم المحمولة مما يؤثر على تفاعلهم وتركيزهم. كيف تتصرف في هذا الموقف؟","o":{"أ":"تذكر الطالب بآداب استخدام الهواتف وتوضح لهم ضرورة الالتزام بالقواعد الصفية مع إتاحة فترة محددة الستخدام الهواتف ألغراض تعليمية. تطلب من الطالب إيقاف هواتفهم مؤقتا دون مصادرتها مع التوضيح بأن الهدف هو","ب":"الحفاظ على سير الدرس بتركيز. ا","ج":"توضح لهم أن استخدام الهواتف أثناء الدر س غير مقبول وتُحمّلهم مسؤولية تدارك الانتباه مع توجيه تنبيه شفهي فردي لمن يكرر الإلخالل. ،تطلب تسليم الهواتف لفترة قصيرة مع شرح أن ذلك مؤقت للحفاظ على النظام والترك","د":"الانتهاء. مع وعد بإعادتها فور لنضب اط وتسهيل استخدام التقنية"},"a":"أ","e":"لأن هذا الخيار يُوازن بين ضبط لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":322,"q":"استُدعي معلم جديد إلى فريق تدريس يعاني من خالفات متكررة مع زملائه تؤثر ع هذا الوضع؟","o":{"أ":"على تماسك االعمل الجماعي.","ب":"ما القرار الألمثل للتعامل م تنظيم اجتماع مباشر مع المعلم وأفراد الفريق المعنيين لمناقشة أسباب الخالفات ومحاولة التوصل إلى تفاهم مشترك طلب تدخل وساطة موضوعية من طرف ثالث مختص بحضور جميع الألطراف لتسهيل الحوار وحل النزاعات","ج":"توجيه تحذير رسمي للمعلم مع التأكيد على ضرو رة تعديل سلوكياته حفاظا على بيئة االعمل لحتكاك وحماية بيئة االعمل الحالية إعادة توزيع المعلم إلى فريق آخر لتقليل","د":"الوساطة بواسطة طرف ثالث مختص تقدم بيئة محايدة تضمن"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":323,"q":"أثناء تطبيق استراتيجية تعليمية جديدة، لاحظت أن تحصيل الطالب لم يتحسن كما هو متوقع بعد فترة من المراقبة. كيف تتصرف؟","o":{"أ":"تواصل تطبيق الاستراتيجية لفترة إضافية مع مضاعفة الجهود التحفيزية للطالب لتحسين النتائج. إلى بيانات الألداء، ثم تقوم بتعديل عناصرها معالاستراتيجية بدقة مستندا","ب":"تعيد تقييم إشراك الطالب في التغذية الراجعة. توقف تطبيق لستفادة مما تم لتعيد النظر في الألساليب الألخرى مع الاستراتيجية مؤقتا","ج":"تحقيقه من تقدم حتى الآلن. ا الاختبارات لتحفيز الطلاب على بذل جهد أكبر، مع تزيد من متطلبات الواجبات و","د":"الاستراتيجية في وقت الحق. مراجعة إعادة التقييم والتعديل المدروس مع لستناد إلى بيانات الألداء"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":324,"q":"في اجتماع مهني، لاحظت أن بعض الزمالء يوجهون انتقادات شخصية الزميل آخر تؤثر على معنوياته. ما أفضل تصرف للتعامل مع هذا الموقف بشكل مهني وفعّال؟","o":{"أ":"التعبير لهدوء عن رفضك للسلوك غير المهني أمام الجميع مع تأكيد أهمية لحترام المتبادل. التحدث مباشرة مع الزمالء المعنيين بشكل خاص لحثهم على احترام الآلخر وتجنب","ب":"الشخصنة.","ج":"ع توثيق الوقائع للمساعدة في اتخاذ إجراء رسمي. رفع الموضوع إلى الإدارة م","د":"تجنب التدخل المباشر والتركيز على دعم االزميل المتأثر لتخفيف الألثر النفسي. التعبير الهادئ والمباشر أمام الجميع يشدد على أهمية لحترام ويضع"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":325,"q":"أمامك خطة استراتيجية لتطوير التدريس في المدرسة، ولكن الموارد المالية محدودة. كيف تتصرف لضمان تحقيق أفضل النتائج ضمن هذه الظروف؟","o":{"أ":"تنفيذ جميع البنود في الخطة كما هي والتركيز على تحصيل التمويل الحقا لتعويض النقص إعادة ترتيب الألولويات داخل الخطة والتركيز على المبادرات ذات التأثير المباشر","ب":"والأكثر فعالية ضمن الموارد المتاحة تنفيذ جزء من الخطة بشكل جزئي حسب تقديرك مع متابعة تطوير باقي البنود تدريجيا","ج":"عند توفر الموارد التقدم بطلب تمويل إضافي مع تعديل طفيف في الخطة يهدف إلى تقليل المصاريف دون","د":"إلغاء المبادرات الألساسية إعادة ترتيب الألولويات والتركيز على المبادرات الأكثر تأثيرا يُعد"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":326,"q":"علمت أن أحد المعلمين يستخدم أساليب تقويم قد تظلم بعض الطالب، مما يؤثر ذلك بأكثر الطرق المهنية والألخالقية؟","o":{"أ":"كيف تتصرف حيالعلى نزاهة التقييم.","ب":"التحدث معه بشكل خاص وبأسلوب عاطفي لمعرفة وجهة نظره ومحاولة التفاهم مناقشة الألمر معه بأسلوب هادئ ومحترم لسبر الألسباب والمساهمة في تحسين الممارسات ق الطلاب على حقو","ج":"رفع الموضوع مباشرة إلى إدارة المدرسة لطلب تدخل فوري حفاظا استشارة زمالئك المختصين لمراقبة الموقف وجمع شواهد قبل اتخاذ أي إجراء رسمي","د":"لأن الحوار الهادئ والمحترم يتيح فرصة لفهم الألسباب وتصحيح"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":327,"q":"تواجه معلمة مشكلة تكرار غياب عدد من الطالب عن الحصص بشكل يؤثر على الموقف إليجاد الحل الألمثل؟","o":{"أ":"كيف تحللتحصيلهم الدراسي. تحرص على فرض عقوبات صارمة وعلى الفور لضمان انتظام الطالب بالحضور","ب":"تتواصل مع أولياء الألمور لفهم الألسباب بدقة وتنسيق الدعم المناسب للطالب تستثمر الوقت في توعية الطالب عن أهمية الحضور وتحثهم على منالالتزام بدال","ج":"العقوبات تطبيق تنسق مع إدارة المدرسة لتطبيق نظام متابعة رسمي يهدف إلى التخفيف من الغياب بشكل","د":"ممنهج التواصل مع أولياء الألمور يتيح معرفة الألسباب الحقيقية للغياب"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":328,"q":"أثناء إدارة صف تعلم عن بعد، تلاحظ تزايد التأجيل والمماطلة في تسليم ما الإجراء الألمثل لمعالجة هذه المشكلةلم. الواجبات من الطالب، مما يؤثر على جودة التع بشكل فعال ومستدام؟","o":{"أ":"الالتزام. حصر التقييم على الواجبات المشروطة بتغذية راجعة فورية لتحفيز الطلاب على ا تصميمنظام تشجيعي قائم على التغذية الراجعة الإليجابية مع تحديد مواعيد تسليم","ب":"واضحة وتعزيز المتابعة المستمرة. الالتزام.","ج":"تقليل حجم الواجبات وتخفيف متطلبات التسليم لتقليل الضغوط وتحسين لنضباط وتحقيق التزام أعلى.","د":"ربط التسليم المتأخر بخصم درجات تدريجي لتحفيز لأن تصميمنظام تشجيعي متكامل يعزز الالتزام من خالل وضوح"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":329,"q":"زميل في عملك تعرض لمشكلة أخالقية مع أحد أولياء الألمور، ويطلب نصيحتك بشأن كيفية التعامل معها. كيف ترد عليه؟","o":{"أ":"توصي باللجوء إلى الإجراءات الرسمية المتبعة في المدرسة لضمان الحياد وحفظ الحقوق تصعيده تنصحه بمحاولة الحوار المباشر مع ولي الألمر لتسوية الألمر وديا قبل","ب":"تقترح عليه توثيق الواقعة ومراجعة الألدلة ثم التشاور مع الإدارة قبل اتخاذ أي خطوة توصيه بالتجاهل وعدم التفاعل مع الموقف حفاظا على العالقات المهنية وعدم تصعيد","ج":"","د":"النزاع يحمي حق وق جميع نظاميا أ- اللجوء إلى الإجراءات الرسمية يوفر إطارا"},"a":"أ","e":"الإجابة الصحيحة هي: توصي باللجوء إلى الإجراءات الرسمية المتبعة في المدرسة لضمان الحياد وحفظ الحقوق تصعيده تنصحه بمحاولة الحوار المباشر مع ولي الألمر لتسوية الألمر وديا قبل. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":330,"q":"الطالب وأهداف بين رغبات أثناء التخطيط للعام الدراسي، تواجه تعارضا المنهج الدراسي. كيف تتعامل مع هذا التعارض لتحقيق أفضل نتائج تعليمية؟","o":{"أ":"دون تعديل لضمان تحقيق الألهداف المحددة بدقة تطبق المنهج الدراسي كامال تدمج بعض رغبات الطالب ضمن أنشطة تعليمية متوافقة مع أهداف المنهج لتعزيز","ب":"مشاركتهم","ج":"تسمح للطالب ب الاختيار بين تطبيق المنهج كما هو أو تعديل بعض مكوناته بناءً على رغباتهم تناقش مع الإدارة تعديل المنهج ليالئم بشكل أكبر رغبات الطالب مع الحفاظ على","د":"الألهداف العامة دمج رغبات الطالب ضمن أنشطة متوافقة مع أهداف المنهج يعزز"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":331,"q":"المعلمة تلاحظ وجود تفاوت ملحوظ في مستويات ال طالب داخل الصف وتسعى ما أنسبن الجميع من التقدم وتحقيق أكبر استفادة ممكنة. إلى تطبيق استراتيجية تعليمية تُمك قرار يمكن أن تتخذه المعلمة في هذا السياق؟","o":{"أ":"تقسيم الطالب إلى مجموعات تعلم وفق مستوياتهم وتخصيص مهام تعليمية مالئمة لكل مجموعة.","ب":"تقديم موارد تعلي مية موحدة لكل الطالب مع توفير دعم إضافي فردي للطالب ذوي الاحتياجات الخاصة. تنظيم أنشطة تعليمية جماعية تشمل جميع الطالب مع تطوير تحديات متدرجة لتعزيز","ج":"التفاعل والتعلم المشترك. التركيز على تحفيز الطالب ذوي المستوى العالي لتسريع تقدمهم مع متابعة تقدّم الطالب","د":"الآخرين بشكل غير رسمي. لأن تقسيم الطالب إلى مجموعات وفق مستوياتهم مع مهام مناسبة"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":332,"q":"أثناء محاولة حل نزاع بين موظفين في المدرسة، يصر كالهما على موقفه ويهددان بتصعيد المشكلة. كيف تتصرف؟","o":{"أ":"تعقد اجتماعا يسمح لكل طرف بالتعبير عن وجهة نظره وتبحث عن نقاط توافق تفضي ل يعزز التفاهم.إلى حل وسط معقو تستمع لكل طرف على حدة لتفهم دوافعهما ثم تقترح حلوال محددة تحاول من خاللها","ب":"التوفيق بين المواقف مع الحفاظ على مصلحة المدرسة. تحيل النزاع إلى الإدارة العليا بعد محاولة سريعة للوساطة، لتجنب تطور المشكلة دون","ج":"تدخل مباشر منك في التفاصيل. تركز على تهدئة الوضع بإجراء محادثات غير رسمية منفردة مع كل طرف للحد من","د":"التصعيد، مع تأجيل الحل الشامل لوقت الحق. عقد اجتماع يسمح للطرفين بالتعبير بحرية والبحث عن حل وسط"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":333,"q":"مع بداية العام الدراسي، ترغب في وضع نظام رقابي فعال يمنع الغش أثناء الامتحانات. ما الإجراء الأنسب لتحقيق ذلك بأفضل طريقة مهنية تربوية؟","o":{"أ":"إبالغ الطالب بقواعد منع الغش بشكل واضح ومحدد في بداية كل ا متحان دون مناقشة أسبابه عقد جلسات توعوية مستمرة تشرح أثر الغش على الفرد والمجتمع وتعزز قيم الألمانة","ب":"الامتحانات قبل اعتماد مراقبة دقيقة خالل الامتحانات مع ذكر العقوبات المحتملة بعد حدوث مخالفة دون","ج":"تحذير مسبق تطبيق عقوبات صارمة على المخالفين فورا مع توزيع نشرة تُذكر بالنتائج السلبية للغش","د":"دون جلسات توعوية لأن التوعية المستمرة تزرع الوعي الألخالقي وتحفز السلوك"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":334,"q":"لاحظت أن عددا من المعلمين يفتقرون إلى مهارات استخدام التقنية في م؟","o":{"أ":"التدريس. كيف تعالج هذا الموقف لتحقيق أفضل أثر تطويري وتحسين جودة التعلي تشجع المعلمين على التعلم الذاتي باستخدام موارد تقنية متاحة بشكل مستقل، مع تركهم يتحملون مسؤولية تطوير مهاراتهم. تنظم دورات تدريبية تطبيقية وداعمة تركز على مهارات استخدام التقنية مع متابعة","ب":"مستمرة لتطبيق ما تم تعلمه على أرض الواقع. تقن يا منهم لضمان يساعد المعلمين في أداء مهامهم التقنية بدال مستمرا","ج":"توفر دعما استمرارية االعملية التعليمية دون انقطاع.","د":"تقلل من استخدام التقنية في التدريس مؤقتا إلى أن يكتسب المعلمون المهارات المطلوبة ٍبشكل كاف."},"a":"ب","e":"لأن تنظيم دورات تدريبية تطبيقي ة مع متابعة مستمرة يضمن تطوير لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":335,"q":"ما الخطوة تلقيت شكوى حول انتهاك أحد الموظفين لقواعد السلوك المهني. الألولى الأنسب للتعامل مع هذه الشكوى بطريقة مهنية؟","o":{"أ":"لطالع على الشكوى وجمع المعلومات الألولية من الموظف المشتكى عليه فقط شامل لجمع الألدلة من مصادر متعددة والتحقق من صحة الشكوى بموضوعية تحقيق","ب":"طلب توضيح فوري من الموظف المتورط في انتهاك قواعد السلوك قبل اتخاذ أي إجراء إلدارة الموقف واتخاذ الإجراءات الالزمة إبالغ المشرف المباشر للموظف فورا","ج":"","د":""},"a":"ب","e":"يعد التحقق الشا مل الموضوعي من خالل جمع الألدلة من مصادر لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":336,"q":"الفريق الإلداري يضع خطة لتحسين المدرسة، لكنه يرفض إدماج المعلمين في إعداد الخطة. كيف تتصرف في هذه الحالة؟","o":{"أ":"تحترم قرار الفريق الإلداري وتعمل على تطبيق الخطة كما هي دون تدخل المعلمين. تعرض على الفريق الإلداري أهمية تضمين المعلمين في إعداد الخطة لتعزيز التزامهم","ب":"مان نجاح التنفيذ.وض تتواصل مع المعلمين بشكل منفصل لجمع آرائهم وملاحظاتهم دون إشراك الإدارة في","ج":"ذلك.","د":"تبدأ بتنفيذ خطة أولية بمشاركة محدودة من المعلمين ثم تعرض النتائج على الإدارة إلقناعها الحقا."},"a":"ب","e":"لأن إشراك المعلمين في إعداد خطة التحسي ن يعزز من التزامهم لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":337,"q":"في صفك، تواجه حالة تنمر بين طالبين كيف تتصرف؟","o":{"أ":"تحث الطالبين على التعبير عن مشاعرهما أمامك وتناقش الألسباب بعمق، ثم تقترح عليهما خطوات للتجاوز. تستمع للطرفين باهتمام وتدير حوارالحترام داخل الصف لتعزيز التفاهم و تفاعليا","ب":"المتبادل بينهما. تعقد جلسة خاصة مع كل طالب على حدة لفهم وجهة نظره ثم تتابع معهما بشكل منفصل","ج":"لتصحيح السلوك. ا تطلب من الطالبين كتابة تقرير عن الحادثة وتأثيرها عليهما، وتستخدم ذلك كأساس لحوار","د":"جماعي الحق. لستماع للطرفين وإدارة حوار تفاعلي داخل الصف هو الألسلوب"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":338,"q":"أثناء إعداد اختبار تحصيلي، لاحظت أن بعض الألسئلة تعتمد بشكل كبير على الاختبار؟","o":{"أ":"الحفظ دون تنويع في مستويات التفكير. كيف تتعامل مع هذا الموقف لتحسين جودة تعدل صياغة بعض الألسئلة لتشمل مهارات لستيعاب والتطبيق، مع الحفاظ على بعض الألسئلة المتعلقة بالحفظ","ب":"تعيد صياغة الألسئلة لتشمل مهارات التفكير ا لعليا مثل التحليل والتقويم، مع تقليل أسئلة الحفظ بما يعزز قياس الفهم العميق توزع الألسئلة بين مستويات متعددة من الحفظ والفهم والتطبيق، دون التركيز فقط على","ج":"مهارات التفكير العليا ،تزيد من تنوع صياغة أسئلة الحفظ لتشمل مجموعات مختلفة من الحقائق والمعلومات","د":"لتقوية استدعاء المحتوى لدى الطالب لأن إعادة صياغة الألسئلة لتشمل مهارات التفكير العليا مثل التحليل"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":339,"q":"معلمين، لكنه قوبل بمعارضة وسط الفريق. تقرر تطبيق نظام جديد لتقويم أداء ال كيف تتصرف؟","o":{"أ":"تشرح أهمية النظام وتؤكد على تطبيقه كما هو مع توفير فرص الحقة للمراجعة","ب":"تستمع لمخاوف المعلمين وتعدل النظام بما يتناسب مع الواقع لضمان تقبله وفعاليته","ج":"تؤجل تطبيق النظام لفترة محددة إلعادة النقاش وجمع مق ترحات الفريق قبل اتخاذ القرار النهائي تواصل تطبيق النظام مع تضمين ملاحظات الفريق في تقييمات المرحلة المقبلة دون","د":"تعديل النظام الحالي لستماع للمعلمين وتعديل النظام بشكل يتواءم مع الواقع يعزز تقبل"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":340,"q":"يحدد حدود س اعات االعمل واضحا لاحظت في قانون الخدمة المدنية بندا تجاوز هذا الحد. كيف تتعامل مع هذا الموقف؟","o":{"أ":"الإلضافية، لكن الإدارة تطلب أحيانا لحتفاظ بحقك في مخاطبة الجهات المختصة الحقا بتعليمات الإدارة مع تلتزم مؤقتا تناقش الإدارة بهدوء مع التأكيد على أهمية احترام النص القانوني لتحقيق لنضباط","ب":"المؤسسي توافق على تجاوز الساعات عند الحاجة مع توثيق ذلك والبحث عن حلول مستدامة الحقا","ج":"الالتزام بالقانون مع محاولة تأمين دعم جماعي لمنع التجاوزات تشرح للزمالء أهمية","د":"الالتزام القان وني ب- الحوار الهادئ والمباشر مع الإدارة مع التأكيد على"},"a":"ب","e":"الإجابة الصحيحة هي: المؤسسي توافق على تجاوز الساعات عند الحاجة مع توثيق ذلك والبحث عن حلول مستدامة الحقا. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":341,"q":"أثناء التخطيط لدرس تعليمي ترغب في تعزيز تعلم التعاون بين الطالب وتحفيز مهارات االعمل الجماعي بفعالية. أي طريقة تعتبر الأنسب لتحقيق هذا الهدف؟","o":{"أ":"تقسيم الطالب إلى مجموعات صغيرة لاالعمل على مشروع مشترك مع تحديد أدوار ومسؤوليات واضحة لكل عضو في المجموعة بشكل فردي ثم يجتمعون لمشار كة نتائجهم ومناقشتها لتعزيز","ب":"جعل الطالب يعملون أوال الفهم المشترك تكليف الطالب بمهام جماعية دون تحديد دقيق لألدوار، مع التشجيع على تبادل الألفكار","ج":"بشكل حر تنظيم اللأنشطة بحيث يعمل الطالب مع زملائهم بصورة زوجية لتبادل المهام وتقاسم","د":"المسؤوليات بشكل مباشر اختيار تقسيم الطالب في مجموعات صغيرة مع توزيع واضح"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":342,"q":"أثناء مراقبتك لاالامتحان، لاحظت قيام طالب بالغش، كيف تتصرف تجاه هذا الموقف؟","o":{"أ":"لم تحان لتفهم ظروفه وتحذيره دون اتخاذ إجراء تحادث الطالب بهدوء عقب انتهاء فوري تطبّق الإجراءات التأديبية الرسمية بعد لستناد إلىلستماع إلى موقف الطالب و","ب":"اللوائح المعمول بها توجه له إنذارالامتحان مع تسجيل الملاحظة كتحذير أولي قبل اتخاذ أي خالل لفظيا","ج":"إجراء رسمي تناقش مع الطالب الألسباب التي دفعته للغش وتعمل على تقديم دعم تربوي وتصحيحي له","د":"قبل صدور أي عقوبة اتخاذ الإجراءات التأديبية الرسمية بعد لستماع للطالب يوازن بين"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":343,"q":"عند مواجهة نقص في الميزانية المخصصة لأنشطة التدريب، ما هو الإجراء لستفادة القصوى من الموارد المتاحة؟","o":{"أ":"الألمثل لتحقيق تقليص حجم اللأنشطة التدريبية مع الحفاظ على الجدول الزمني الألصلي دون استبعاد أي نشاط إعادة جدولة اللأنشطة مع التركيز على ذات الألولوية واختيار طرق تدريب أكثر كفاءة","ب":"وتوفيرا الاحتياجات وأثر التدريب المتوقع","ج":"طلب تمويل إضافي مع تقديم خطة مفصلة تبين تنفيذ اللأنشطة التدريبية كما هو مقرر مع تعديل محتوى أو مدة بعض الجلسات لتقليل","د":"التكاليف إعادة الجدولة مع تركيز اللأنشطة ذات الألولوية واختيار طرق"},"a":"ب","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":344,"q":"أثناء عملك في الفريق الإلداري، يلاحظ أن أحد الألعضاء يتجنب التعاون ويؤثر ذلك على تقدم االعمل الجماعي. كيف تتصرف لتحقيق أفضل بيئة عمل ممكنة؟","o":{"أ":"ا الالتزام الجماعي لجتماع الجماعي لتحفيزه على مر معه ضمن تناقش الأل لفهم أسبابه وتقديم الدعم الذي يعزز مشاركته الفاعلة خاصا","ب":"تجري معه حوارا غ الإدارة العليا لتقييم الموقف واتخاذ ما يلزم من إجراءات رسمية","ج":"تبل داخل الفريق محددة وبشكل مباشر تزيد من مسؤوليته","د":"تحدد معه مهاما إجراء حوار خاص يتيح فهم الدوافع والتحديات التي يواجهها"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":345,"q":"تواجه عمال يتطلب اتخاذ قرار سريع بين خيارين متقاربين، كيف تحدد إداريا القرار الألفضل؟","o":{"أ":"تعتمد على تحليل سريع ومبني على خبرتك الشخصية دون جمع بيانات إضافية تجمع معلومات دقيقة وتقيم إيجابيات وسلبيات كل خيار بشكل موضوعي ثم تختار","ب":"الألمثل","ج":"تنا قش الخيارات مع زمالئك لتكوين رأي جماعي مبني على وجهات نظر متباينة قبل اتخاذ القرار","د":"تستعين برأي خبير مختص ليقدم لك توصية مدعومة بتجارب سابقة تتناسب مع الحالة لأنه الخيار الذي يضمن اتخاذ قرار مبني على تقييم موضوعي"},"a":"ب","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":346,"q":"معلمة ترغب في تحفيز طالبها بمنح جوائز، لكنها لم تضع معايير واضح ة للجوائز مسبقا. ما القرار المهني الألمثل في هذه الحالة؟","o":{"أ":"تضع معايير محددة وواضحة للجوائز وتمنحها بناءً عليها بعد توضيحها للطالب","ب":"تمنح الجوائز بناءً على تقييمها الشخصي ألداء الطالب دون إعالن معايير مسبقة","ج":"توزع الجوائز بالتساوي بين الطالب لتجنب الشعور بعدم العدالة أو الظلم لتلك المعايير المجمعة تطلب من الطالب اقتراح معاييرهم للجوائز ثم تختار الفائزين وفقا","د":"وضع معايير واضحة ومعلنة للجوائز قبل التقييم يضمن العدالة"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":347,"q":"كيف لاحظت أن أحد الزمالء يستخدم لغة غير مهنية في تواصله مع الطالب. تتصرف؟","o":{"أ":"تتحدث معه بشكل مباشر وباحترام لتوضيح أثر استخدام تلك اللغة على الطالب وبيئة التعلم ترفع الألمر إلى الإدارة بعد محاولة التحدث معه لضمان اتخاذ إجراء رسمي إذا استمر","ب":"السلوك تناقش الموضوع مع الطالب بهدوء لتخفيف آثار اللغة وتحفيزهم على التركيز على","ج":"المحتوى يل لتقييم الحاجة للتدخل الحقا مع مراقبة سلوك الزم","د":"تتجاهل الألمر مؤقتا الحوار المباشر والودي مع االزميل هو الأكثر مهنية وفعالية لتحفيز"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":348,"q":"في حال نشوب خالف حول توزيع المهام بين أعضاء الفريق، كيف تُدير هذا النزاع لتحقيق أفضل نتيجة؟","o":{"أ":"مع الفريق لمناقشة وجهات النظر المختلفة والوصول إلى قرار تعقد اجتماعا مفتوحا مشترك يُرضي الجميع ويُعزز التعاون. توزع المهام بناءً على تقييمك الشخصي للمهارات والخبرات مع شرح مبررات التوزيع","ب":"ألعضاء الفريق لضمان قبولهم. تشجع كل عضو على اختيار المهام التي يفضلها بنفسه، مع مراقبة دورية لضمان","ج":"في الألعباء والمسؤوليات. التوازن تعين مسؤوال لتولي تنظيم وتوزيع المهام حسب الألولويات والألهداف دون تدخل محددا","د":"متعدد الألطراف. عقد اجتماع مفتوح يسمح بمناقشة آراء الجميع ويُعزز التوافق"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":349,"q":"أثناء تقويم مشروع تعليمي، لاحظت أن بعض الألهداف المحددة غير قابلة كيف تتصرف في هذه الحالة لضمان تقييمللتحقق بواقعية ضمن الموارد والوقت المتاح. وتحسين المشروع بشكل مهني؟","o":{"أ":"الاتساق في التقييم تواصل االعمل بالمعايير والألهداف الألصلية دون تعديل لتفادي فقدان","ب":"تعدل صياغة الألهداف لتتوافق مع الإلمكانيات المتاح ة مع الحفاظ على قابلية القياس والوضوح تركز التقييم على النتائج المحققة فعال مع إهمال الألهداف غير القابلة للتحقق لتجنب","ج":"التحريف في التقرير إلعادة التخطيط الشامل بسبب عدم واقعية الألهداف المبدئية تقترح إيقاف المشروع مؤقتا","د":""},"a":"ب","e":"تعديل ص ياغة الألهداف بشكل يتناسب مع الإلمكانيات المتوافرة لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":350,"q":"الح ظت أن بعض الطالب يفضلون التعلم الذاتي ويواجهون صعوبات في بيئة الفصل التقليدية. كيف تتصرف في هذا الموقف لتحقق أقصى فائدة لجميع الطالب؟","o":{"أ":"ا على نظام الصف وتركيزه تلتزم بأسلوب التدريس التقليدي لكافة الطالب حفاظ","ب":"تدمج استراتيجيات التعلم الذاتي ضمن خطة التدر يس لتلبية احتياجات الطالب المتنوعة مع الحفاظ على هيكل الفصل تخصص أوقاتًا معينة خارج الحصة للطالب المفضلين للتعلم الذاتي دون تعديل أسلوب","ج":"التدريس الألساسي تفتح نشاطات اختيارية للتعلم الذاتي داخل الفصل مع إعطاء الحصص الرئيسية بطريقة","د":"تقليدية لجميع الطالب الدمج المدروس الاستراتيجيات التعلم الذاتي ضمن التدريس"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":351,"q":"عند إعداد خطة لتطوير مهارات المعلمين، كيف تضمن مشاركة فعالة تحقق بين احتياجات المعلمين وأهداف المؤسسة؟","o":{"أ":"انسجاما الالتزام بأهداف المؤسسة دون تعديل جوهري تعتمد الخطة على استشارة المعلمين مع اهتماماتهم بشكل متوازن مع معايير التطوير المؤسسي تستطلع آراء المعلمين وتدمج","ب":"ا","ج":"تضع الخطة بناءً على التوجيهات الإلدارية مع إبالغ المعلمين بالمحتوى النهائي تعقد ورش عمل مشتركة بين الإدارة والمعلمين بناءً على جدول زمني محدد مسبقا","د":"لأنها تمزج بين إشراك المعلمين في تحديد الاحتياجات والتوافق مع"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":352,"q":"بين نتائج التقييم الكمي والتقييم النوعي. السؤ ال32: أثناء تقييم أداء الموظفين، لاحظت تباينا كيف تصدر حكمك النهائي بشأن أداء الموظف بدقة وموضوعية؟","o":{"أ":"تعتمد على التقييم الكمي لأنه مبني على معايير قابلة للقياس والموضوعية بشكل أكبر","ب":"تدمج بين التقييم الكمي والنو عي إلعداد صورة شاملة ومتوازنة تعكس مختلف جوانب الألداء تعطي الألولوية للتقييم النوعي لأنه يعكس الجوانب السلوكية والإلنسانية التي قد ال تُقاس","ج":"رقميا تستعين بفريق من الخبراء لمراجعة النزاعات بين التقييمين قبل اتخاذ القرار النهائي","د":"ال دمج بين التقييمين هو الأكثر فعالية لأنه يوازن بين الدقة العددية"},"a":"ب","e":"الإجابة الصحيحة هي: تدمج بين التقييم الكمي والنو عي إلعداد صورة شاملة ومتوازنة تعكس مختلف جوانب الألداء تعطي الألولوية للتقييم النوعي لأنه يعكس الجوانب السلوكية والإلنسانية التي قد ال تُقاس. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":353,"q":"لاحظت أحد المعلمين يشارك خبراته مع زملائه بفعالية خالل أوقات االعمل رغم ضيق الوقت المتاح، كيف تقيّم أثر هذا السلوك على بيئة االعمل التربوي؟","o":{"أ":"والتواصل المهني بين الزمالء تراه مساهمة إيجابية ترفع مستوى التفاعل تعتبر مشاركته ضرورية لتعزيز روح الفريق وتنمية مهارات االعمل الجماعي بفعالية","ب":"مستدامة تقيمه كإضافة رغم احتمال تأثير المشاركة على تركيزه في مهامه الألساسية قليال","ج":"تنظر إلى مشاركته باعتبارها مخاطرة قد تشتت انتباهه من أداء مها مه الرسمية المشاركة الفعالة تُعزز من روح التعاون والتنمية المهنية الجماعية","د":""},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":354,"q":"أثناء محاولتك حل نزاع نشأ بين موظفين بسبب سوء تفاهم بسيط، كيف تتصرف لضمان حل النزاع بشكل فعال ومستدام؟","o":{"أ":"اشر دون تدخل إضافي تستمع إلى كال الطرفين بموضوعية ثم توجههمنحو التفاهم المب تشرح وجهات النظر المتبادلة بدقة وتعمل على تعزيز قنوات التواصل لتحسين العالقة","ب":"بين الطرفين مستقبال تعقد اجتماعا مع الإدارة لتقييم ضرورة إعادة توزيع المهام أو تعديل بيئة االعمل لتقليل","ج":"لحتكاك بين الموظفين تنصح كال الطرفين باتباع آليات رسمية للشكاوى والتحكيم لضمان عدم تكرار النزاع","د":"لأن تفسير وجهات النظر واالعمل على تحسين التواصل يعد الحل"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":355,"q":"عند مواجهة ولي أمر غاضب يتطلب الموقف تعامال حكيمًا، ما الألسلوب الألمثل ء عالقة إيجابية؟","o":{"أ":"لتحقيق تفاهم وبنا لستماع لها بانتباه","ب":"الموضوع للمشكلة تهدئه عبر التأكيد على الجهود التي تبذلها المدرسة مع اقتراح حلول محتملة","ج":"تقبل نقده برحابة صدر مع توجيه الحديث نحو أهمية التعاون بين المدرسة والألسرة","د":"الألمثل لأنه يجمع بين شرح الألسباب بوضوح وهدوء مع الخيار("},"a":"أ","e":"الإجابة الصحيحة هي: لتحقيق تفاهم وبنا لستماع لها بانتباه. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":357,"q":"أثناء تنظيم اجتماع للمعلمين، لاحظت انحراف النقاش نحو مواضيع جانبية لجتماع. كيف تتصرف في هذه الحالة؟","o":{"أ":"تؤثر على سير تحفيز الإلبداع لستمرار في النقاش بحرية إلظهار حرية التعبير و تسمح لهم ب تعيد توجيه الحوار بلطف نحو الألهداف الموضوعية لالجتماع مع الحفاظ على روح","ب":"المشاركة لجتماع إلى مساره المحدد وإعادة لنحراف فورا","ج":"تتدخل بشكل حازم لقطع تقترح تأجيل مناقشة المواضيع الجانبية إلى جلسة منفصلة الحقالجتماع دون تعطيل","د":"الحالي إعادة التوجيه بلطف توازن بين احترام حرية التعبير وضمان تحقيق"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":358,"q":"كيف تصمم خطة تدخلالس ؤال38: طالب يعاني من ضعف في مهارات القراءة والتعبير. فعّالة لتحسين مهاراته؟","o":{"أ":"تقدم له تمارين قراءة وتعبير منتظمة مع توفير ملاحظات دورية لتحفيزه وتطوير مستواه. مع استخدام استراتيجيات تفاعلية متعددة لتحفيز التع لم مخصصا فرديا","ب":"توفر دعما وتعزيز مهاراته بشكل منهجي. تشجع الطلاب على التعلم الذاتي وفق سرعته مع متابعة عامة الداءه دون تدخل مباشر","ج":"مكثف.","د":"تخصص جلسات دعم فردية مع التركيز على القراءة فقط دون دمج مهارات التعبير في الخطة."},"a":"ب","e":"لأن الدعم الفردي المخصص مع استرات يجيات تفاعلية متكاملة يعزز لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":359,"q":"أثناء تقييم مشروع طالبي، تواجه خيار التركيز على التقييم الفردي أو التقييم الجماعي فقط. كيف تختار أن تقوم بالتقييم الألمثل لضمان دقة عدالة قياس الألداء؟","o":{"أ":"تعتمد التقييم الفردي حصريًا إلبراز مهارات كل طالب بدقة وزيادة المساءلة الشخصية وتعكس التعاون والتميز","ب":"تدمج التقييم الفردي والجماعي لتغطية جوانب الألداء المختلفة الشخصي تعتمد التقييم الجماعي حصريًا إلبراز مهارات االعمل الجماعي وتعزيز التفاعل والتكامل","ج":"بين الطالب تركز على تقييم ملاحظة السلوك الجماعي مع لستفادة من التقارير الفردية دون فصل","د":"التقييم صراحة دمج التقييم الفردي والجماعي هو الأكثر مهنية لأنه يحقق توازنا بين"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":360,"q":"تُطبق قانون الخدمة المدنية الجديد الذي يستلزم تحديث نظام الحضور كيف تعالج هذه المقاومة بأفضللنصراف، وتلاحظ مقاومة من الموظفين تجاه التغيير. و طريقة مهنية وإدارية؟","o":{"أ":"تشرح للموظفين أهمية النظام الجديد وتدعم ذلك بتدريب عملي على استخ دامه، مع لستماع لملاحظاتهم وتعديل التطبيق حسب الحاجة. توضح مزايا النظام الجديد للموظفين وتتبع ذلك بتدريب مبدئي عليها، مع تطبيق النظام","ب":"دون استثناءات.تدريجيا تفرض النظام الجديد بحزم مع تقديم شرح موجز للموظفين، مع تشديد الرقابة للحد من","ج":"لنصراف.ر و تجاوزات الحضو تلتزم بالشرح والتدريب على النظام الجديد مع السماح بمرونة مؤقتة في التطبيق لتخفيف","د":"حدة المقاومة. التوضيح الموسع مع التدريب االعملي و لستماع للموظفين ومرونة"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":361,"q":"عند حدوث خالف بين معلمين حول مسؤوليات مشتركة، ما الألسلوب الأكثر مان استمرار التعاون؟","o":{"أ":"مهنية وفعالية إلدارته وض ا لتفاق المتبادل بين الطرفين تحديد وتقسيم المهام بشكل واضح ومكتوب مع","ب":"مناقشة الخالف شفهيًا بهدف التوصل إلى تفاهم مشترك دون الحاجة للتوثيق الرسمي","ج":"اللجوء إلى مسؤول أعلى لتحديد المسؤوليات وتوزيعها بشكل نهائي بين الطرفين","د":"تأجيل ا لنقاش حول الخالف لحين انخفاض التوتر والسماح بوقت كافٍ إلعادة التقييم لأن تقسيم المهام بوضوح وبشكل مكتوب مع لتفاق المتبادل يرسخ"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":362,"q":"أحد المعلمين يظهر أسلوب تعامل سلبي مع الطالب يؤثر على بيئة التعلم، كيف تتصرف في هذه الحالة؟","o":{"أ":"له ملاحظات عامة حول سلوكياته لتجنب إحراجه أمام الآخرين تقدم تناقش معه بشكل خاص وتقدم تغذية راجعة بناءة مع دعم تدريبي لتحسين أسلوبه","ب":"","ج":"ترفع الموضوع إلى الإدارة بعد محاولة نقاشه دون جدوى لضمان التدخل المناسب","د":"تراقب وتدون السلوكيات السلبية مع انتظار إشارات وا ضحة من الإدارة للتصرف تقديم تغذية راجعة بناءة مع دعم تدريبي هو الإجراء الأكثر مهنية"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":363,"q":"في خطتك لستدامة الفعليةالاستراتيجية لتطوير المدرسة، كيف تضمن تحقيق في التنفيذ؟","o":{"أ":"على تخصيص موارد مالية دورية مع مراجعة سنوية لمؤشرات الألداء تعتمد تبني خطة شاملة تتضمن إجراءات واضحة، مؤشرات أداء قياسية، ومشاركة فعالة","ب":"لكافة الألطراف المعنية تعزز قدرات فريق االعمل وتوفر متابعة مستمرة مع تحفيز دائم للفريق الإلداري","ج":"والتعليمي","د":"تركز على بناء ش راكات طويلة الألمد مع مؤسسات داعمة لضمان استمرار الموارد والخبرات لأن بناء خطة شاملة تتضمن إجراءات واضحة ومؤشرات أداء"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":364,"q":"تواجه طالبا يعاني من سلوكيات متكررة غير مرغوبة تؤثر على سير الفصل الدراسي، كيف تتعامل معه بشكل فعّال؟","o":{"أ":"تفرض إجراءات تأديبية محددة بوضوح بعد تنبيهه، مع توثيق السلوك وأثره في سجل الطالب. ،تبحث بعمق في أسباب السلوك بالتعاون مع الطالب وأسرته والإلرشاد النفسي وتضع","ب":"خطة دعم شاملة. تخصّص وقتا لفردية مع الطالب داخل الصف لتعديل السلوك، مع إشراكه في وضع","ج":"قواعد السلوك المتفق عليها.","د":"أمنمطيا عرضياتراقب السلوك لفترة قصيرة دون تدخل مباشر لتقييم ما إذا كان سلوكا قبل اتخاذ أي إجراء."},"a":"ب","e":"لأن التعا طي مع السلوك غير المرغوب يتطلب فهما ألسبابه عميقا لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":365,"q":"أثناء وضع خطة لتقويم تعلم الطالب، ترغب أن تكون شاملة وعادلة وتعكس مستويات أداء الطالب بدقة، كيف تختار منهجية التقويم الأنسب؟","o":{"أ":"الاختبارات التحريرية المنظمة التي تقيس المعرفة والفهم بشكل منهجي. تعتمد على تستخدم ،أدوات تقويم متنوعة تشمل الاختبارات التحريرية، ملاحظة الألداء، المشاريع","ب":"والتقويم الذاتي لتعزيز الشمولية والعدالة.","ج":"تركز على ملاحظة السلوك والتفاعل ضمن الصف لتقييم مهارات التفكير والتطبيق االعملي بشكل مستمر.","د":"تسمح للمعلم باختيار أدوات التقويم التي يراها مناسبة حسب خبرته واحتياجات طالبه الفورية دون تقيد بخطة محددة. لأن التنويع في أدوات التقويم يدمج بين القياس الكمي والنوعي"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":366,"q":"لاحظت وجود سوء تفاهم بخصوص ساعات االعمل الإلضافية بين الإدارة والموظفين، كيف تتعامل مع هذا الموقف؟","o":{"أ":"تعقد اجتماعًا توضيحيًا مشتركًا لشرح البنود والإلجابة على لستفسارات بهدف الوصول إلى تفاهم مشترك. الالتزام به دون فتح باب النقاش.","ب":"ترسل مذكرة رسمية تشرح فيها النظام وتطلب تنظم ورشة عمل تدريبية تتضمن عرضًا تفصيليًا للنظام مع فرصة أسئلة محدودة","ج":"لضمان الفهم. دارة للقاء الموظفين وجمع ملاحظاتهم دون تقديم شرح مباشر للنظام. عن الإل","د":"تكلف ممثال لأن عقد اجتماع توضيحي مشترك يتيح حوارً ا مباشرًا وفرصة لتبادل"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":367,"q":"أثناء متابعتك ألداء فريقك، لاحظت وجود تحيز في توزيع المهام مما قد يؤثر على الروح المعنوية للفريق. كيف تتصرف لتحقيق أفضل نتائج ممكنة؟","o":{"أ":"تعيد توزيع المهام وحدك بناءً على تقييمك الشخصي دون إشراك الفريق لضمان الكفاءة","ب":"تناقش مع الفريق مع إعادة تقييم توزيع المهام بشكل شفاف لتحقيق العدالة والتوازن تترك التوزيع الحالي كما هو مع مراقبة الألداء لفترة إضافية لتجنب اضطراب سير","ج":"االعمل لجهودهم لتعزيز الألداء الجماعي","د":"تخصص مها م إضافية ألعضاء المتميزين تقديرا إذ إن إشراك الفريق في إعادة تقييم توزيع المهام بشكل شفاف"},"a":"ب","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":368,"q":"كيف تتصرف إذا طلب منك زميل الإلفشاء عن معلومات سرية تخص عمل الإدارة؟","o":{"أ":"بسياسات االعمل على السرية المهنية والتزاما ترفض الإلفشاء حفاظا تناقش مع االزميل الهدف من الإلفشاء وتفصح عن المعلومات بعد التأكد من مبرر ذلك","ب":"رسميا تشرح لاالزميل أهمية السرية وتؤجل الإلفشاء لحين الحصول على موافقة رسمية من","ج":"ا الإدارة تنبه االزميل إلى خطورة طلب الإلفشاء وتحذره من العواقب دون إفشاء المعلومات","د":"رفض الإلفشا ء حفاظا بسياسات االعمل هو على السرية المهنية والتزاما"},"a":"أ","e":"الإجابة الصحيحة هي: بسياسات االعمل على السرية المهنية والتزاما ترفض الإلفشاء حفاظا تناقش مع االزميل الهدف من الإلفشاء وتفصح عن المعلومات بعد التأكد من مبرر ذلك. لأنها الخيار الأكثر مناسبة مهنيًا وإداريًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":370,"q":"في ضمان تنفيذ خطة استراتيجية بسبب مقاومة للتغيير من قبل تواجه تحديا بعض الموظفين، ما الخطوة الأكثر فاعلية لضمان تقليل هذه المقاومة وتحقيق التنفيذ الناجح للخطة؟","o":{"أ":"تنظيم ورش عمل حوارية مع المعنيين لشرح تفاصيل الخطة و لستماع لمخاوفهم ومحاولة دمج مقترحاتهم ضمن الخطة","ب":"إشر اك المعنيين في تصميم مراحل التنفيذ مع تقديم حوافز تحفيزية مرتبطة بتحقيق أهداف التغيير تقديم توجيهات واضحة وصارمة بضرورة الالتزام بالخطة مع شرح الفوائد المرجوة","ج":"دون تغيير في الخطة الألصلية تعجيل نشر الخطة مع تفعيل قنوات اتصال مستمرة لتوضيح أي استفسارات والرد على","د":"الملاحظات بشكل دوري إشراك المعنيين وتقديم حوافز تحفيزية يعزز الشعور بالمسؤولية"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":371,"q":"خالل حصة دراسية، يلاحظ المعلم مجموعة من الطالب مشتتين ويناقشون ما هو الإجراء الألمثل إلدارة هذا الموقف وضمان استمراريةموضوعًا غير متعلق بالمادة. الانتباه والتركيز داخل الصف؟","o":{"أ":"توجيه سؤال مباشر للطالب المشتتين للربط بين موضوع النقاش والمادة الدراسية، مما يعيدهم للدرس بطريقة غير مباشرة. طلب انتباه الطالب بهدوء وتذكيرهم بأهمية الالتزام بالموضوع دون مقاطعة النقاش","ب":"بشكل مباشر. توجيه سؤال مباشر للطالب المشتتين لتحفيزهم على العودة للدرس والتركيز على المادة","ج":"بشكل فعال. إيقاف الدرس لفترة قصيرة لتوجيه نصيحة جماعية حول لنضباط وأهمية التركيز داخل","د":"الصف. توجيه سؤال مباشر للطالب المشتتين هو الخيار الألمثل لأنه يعيدهم"},"a":"ج","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":372,"q":"كيف موظف جديد في المدرسة يعاني من صعوبة في تطبيق نظام التقويم الجديد. يمكن لمدير المدرسة دعمه بشكل أكثر فاعلية لتعزيز تطبيق النظام بشكل صحيح وعملي؟","o":{"أ":"توجيه متابعة أسبوعية للنقاش حول تطبيق النظام. تزويده بدليل تفصيلي مكتوب مع إشراكه في ورشة عمل تطبيقية مع زمالء ذوي خبرة يشجع الحوار االعملي والتدريب","ب":"المباشر.","ج":"تكليف موظف متمرس للمتابعة المستمرة معه أثناء تطبيق النظام وتقديم تغذية راجعة دورية.","د":"تنظيم جلسة تقييم فردية مع الموظف لت حديد نقاط القوة والضعف وتقديم خطة تطوير شخصية. ورشة االعمل التطبيقية توفر بيئة تعليمية تفاعلية تجمع التدريب"},"a":"ب","e":"الإجابة الصحيحة هي: المباشر.. لأنها الخيار الأكثر مناسبة تربويًا للموقف؛ فهي تعالج المشكلة مباشرة وتحافظ على التوازن والعدالة وتحقق الهدف المطلوب."},{"n":373,"q":"بعد فترة تقييم أداء، لاحظ المدرس أن أحد الطالب يعاني من ضعف ملحوظ في مادة الرياضيات. ما الإجراء الأكثر مهنية وفعالية لدعم هذا الطالب؟","o":{"أ":"تكليف الطالب بحل تمارين إضافية بانتظام لتعزيز الفهم والتطبيق.","ب":"ت
