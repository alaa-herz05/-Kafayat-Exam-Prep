 ا، معلعتماد على مقارنة نتائج األداء الفردي المحققة مقارنة باألهداف المحددة مسبق","o":{"أ":"تبار.لعتعديل طفيف ألخذ الظروف الشخصية في إجراء مقابالت تفصيلية مع كل عضو في الفريق لجمع معلومات نوعية، مع استخدام","ب":"مقاييس كمية مرنة تأخذ الحيثيات البيئية في الحسبان. تبني نظام تقييم يجمع بين التقييم الذاتي، والتغذية الراجعة المتبادلة بين الزمالء، وتحليل","ج":"نتائج األداء بشكل موضوعي. لعتماد بشكل حصري على البيانات الكمية الدقيقة دون تعديل، لضمان النزاهة","د":"والحيادية في التقييم بغض النظر عن الظروف الشخصية. التقييم الذاتي، التغذية ألن هذا الخيار يدمج بين المقاربات المختلفة("},"a":"ج","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":645,"q":"أنت قائد في منظمة غير ربحية تواجه تحديا في وضع خطة استراتيجية طويلة األمد وسط بيئة متغيرة وسريعة التطور. كيف تصوغ الخطة؟ وضع خطة استراتيجية تغطي خمس سنوات تتضمن أهدافا واضحة، مع تحديثات دورية","o":{"أ":"","ب":"تبني خطة تركز على أهداف مرنة ومتدرجة مستمرة تسمح بتكييف السياسات حسب الظروف المتغيرة. تصميم خطة قصيرة األمد مدتها سنة واحدة مع تحديد رؤى عامة بعيدة المدى، تُحدَّث","ج":"لستقرار والمرونة. بناءً على المراجعات الدورية لتحقيق التوازن بين ا","د":"دمج رؤى مختلفة من فرق الع مل لوضع خطة استراتيجية شاملة وثابتة مع جدول مراجعات محدد لضمان توافق الخطة مع التغيرات البيئية. يجمع بين وضع أهداف واضحة ضمن إطار زمني ألن الخيار("},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":647,"q":"بينما تقود فريقا من الطالب عن التعليم متزايدا في مدرسة تواجه عزوفا تعليميا اإللكتروني، يقترح أحد المعلمين تغييرا في أسلوب التدريس اإللكتروني مع تقدير جذريا لقتراح؟ عامل مع هذا التكاليف والمخاطر المحتملة. ما هو األسلوب األكثر مهنية وفعالية للت لبتكار ودفع التغيير بسرعة في فريق العمل. لتعزيز","o":{"أ":"اعتماد التغيير فورا تنفيذ التغيير تدريجيا في فصل تجريبي مع مراقبة دقيقة للنتائج وتأثيرها على الطالب","ب":"ا والمعلمين.","ج":"إجراء دراسة جدوى شاملة تشمل تقييم آراء الطالب والمعلمين والجوا نب المالية والفنية قبل اتخاذ قرار نهائي. تحسين األدوات والتدريب على األساليب الحالية لتحسين جودة التعليم اإللكتروني دون","د":"تغييرات جذرية في الوقت الحالي. ألن إجراء دراسة جدوى شاملة يمكن القيادة من اتخاذ قرار مستنير"},"a":"ج","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":648,"q":"في مؤسسة حكومية شهدت تراجعا في مؤشرات األداء نتيجة ظروف ملحوظا ،طارئة مفاجئة، يُطلب منك تقييم األداء وفق معايير غير تقليدية تتناسب مع الوضع الراهن ما األسلوب األمثل لتحقيق تقييم موضوعي وشامل؟ الحالية لتتماشى حصريا مع الظروف الطارئة التي أثرت على","o":{"أ":"تعديل مؤشرات األداء األداء. اعتماد تحليل جودة شامل يجمع بين مؤشرات كمية ونوعية مع األخذ في لعتبار تأثير","ب":"الظروف الطارئة بشكل متوازن. لستمرار في استخدام مؤشرات األداء القياسية السابقة كمقياس أساسي مع إضافة","ج":"مالحظة تفسيرية عن الظروف الطارئة. تأجيل عملية تقييم األداء حتى عودة الظروف إلى طبيعتها لضمان مقارنة األداء بمعايير","د":"ثابتة. ألن اعتماد تحليل جودة شامل يجمع بين مؤشرات كمية ونوعية مع"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":649,"q":"أنت قائد فريق في بيئة عمل مبتكرة، ويعبر أحد األعضاء عن مخاوفه من سالمة فكرة جديدة وتأثيرها المحتمل على العمالء، كيف تتعامل مع هذا لعتراض بما يضمن لبتكار والمسؤولية؟ التوازن بين","o":{"أ":"تد عو العضو إلى مناقشة موسعة لمخاوفه، وتحفزه على تقديم اقتراحات بديلة قبل اتخاذ أي قرار نهائي. ا تؤجل تطبيق الفكرة مباشرةً إلى حين إجراء اختبارات تجريبية في بيئة محكومة تقيّم","ب":"تأثيرها بدقة. تشجع الفريق على التصويت الجماعي التخاذ قرار سريع بشأن الموافقة أو ،الرفض","ج":"لتجنب إطالة الجدال. تستعرض يعزز موقفلعتراض بشكل منفرد مع العضو المعترض، ثم تقدم توضيحا","د":"الفكرة ويطلب متابعة التنفيذ بحذر. ألن التعامل المباشر مع مخاوف العضو وتشجيعه على اقتراح بدائل"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":650,"q":"بصفتك مديرا في مؤسسة تعليمية تواجه تحديات أخالقية بشأن قبول منح دراسية لطالب مع شروط قد تؤثر على استقاللية البرامج األكاديمية، كيف تتصرف لتحقيق لستقاللية األكاديمية؟ لستفادة من المنح والحفاظ على التوازن األمثل بين قبول المنح المشروطة مع محاولة تعديل الشروط داخليا لضمان الحد من تأثيرها على","o":{"أ":"البرامج األكاديمية. لستقاللية األكاديمية دون المساومة. على","ب":"رفض المنح المشروطة بالكامل حفاظا قبول المنح بعد التفاوض الفعّال مع الجهات المانحة إللغاء أو تعديل الشروط التي تمس","ج":"يُعد األكثر م هنية وأخالقية، حيث يسعى إلى حماية","د":"لستقالل األكاديمي. ألن الخيار("},"a":"ج","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":651,"q":"أنت مدير مشروع في مؤسسة تعليمية تواجه انخفاضًا في أ داء فريق العمل بسبب كيف تتعامل مع هذه األزمة لضمانتوترات داخلية وصراعات غير معلنة بين األعضاء. استمرارية اإلنتاجية مع الحفاظ على بيئة عمل صحية؟ ا عقد اجتماعات فردية مع أعضاء الفريق لفهم دوافعهم ووجهات نظرهم، ثم عقد اجتماع","o":{"أ":"الخالفات. جماعي لتعزيز الحوار المفتوح وحل تنظيم جلسات حوارية جماعية باستخدام تقنيات الوساطة لحل الصراعات وتعزيز الثقة","ب":"بين األعضاء، دون تفصيل األدوار قبل ذلك. إعادة توزيع المهام بين أعضاء الفريق بناءً على تحليل سلوكهم وتفاعالتهم، مع عقد","ج":"اجتماعات متابعة دورية لمراقبة األثر. تطبيق قواعد وإجراءات تنظيمية واضحة للسلوك، مع توضيح عواقب المخالفات، إلى","د":"جانب توفير فرص للتعبير عن المشكالت بشكل رسمي. ألن عقد اجتماعات فردية أوال يسمح بفهم عميق وشخصي لمشاكل"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":652,"q":"مالبتكار ضمن فريقه. ويرغب في تعزيز ل بموارد محدودة جدا قائد قسم يعم لبتكار في ظل هذه الظروف؟ أنسب طريقة لتحفيز الفريق لتحقيق أعلى مستويات وضع أهداف ابتكارية واضحة وقابلة للقياس، مع مراجعة دورية لضبط األولويات وتقليل","o":{"أ":"المشاريع غير المجدية. المستمر مع توفير دعم معنوي ونفسي، مع قبول احتمالية الفشل","ب":"تشجيع ثقافة التجريب كجزء من التعلم. توجيه الموارد بشكل أساسي نحو المشاريع التي أظهرت نتائج مبدئية واعدة لتقليل","ج":"المخاطر وتحقيق أثر ملموس.","د":"تحسين العمليات الحالية لتعزيز الكفاءة التشغيلية قبل توجيه الموارد لمحاولة ا بتكار حلول جديدة قد تكون مكلفة. ألن تشجيع ثقافة التجريب مع الدعم المعنوي المستمر يخلق بيئة"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":653,"q":"أنت مدير مؤسسة وتالحظ وجود تقارير تشير إلى احتمال حدوث خلل أخالقي ية وفاعلية لمعالجة هذه القضية؟ في قسم حساس. ما هو اإلجراء األكثر مهن تبدأ بإجراء تحقيق داخلي سري بدقة وحياد لجمع األدلة وتحليل الوضع قبل اتخاذ أي","o":{"أ":"إجراءات أخرى. مع مدير القسم المباشر لمناقشة التقارير وتقييم المعلومات قبل رفع األمر.","ب":"تعقد اجتماعا إلى لجنة أخالقيات المؤسسة مع تزويدهم بكل البيانات المتاحة تحيل القضية فورا","ج":"وانتظار توجيهاتهم التنفيذية.","د":"تعلن بدء تحقيق رسمي أمام الموظفين لتعزيز الشفافية والشفاء في بيئة العمل منذ البداية. ألن إجراء تحقيق داخلي سري يحفظ نزاهة العملية ويمنع التأثير"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":654,"q":"في بيئة تعليمية تواجه تغييرات تكنولوجية سريعة ومتالحقة على مدى خ مس سنوات، كيف تخطط استراتيجيًا لتأهيل المعلمين بشكل مستدام وفعال للتعامل مع هذه التحديات؟ اعتماد برامج تدريب دورية محدثة توافق كل تطور تقني جديد يتم رصده خالل هذه","o":{"أ":"الفترة. تكوين فريق داخلي متخصص يتولى رصد التقنيات الحديثة ويقدم ورش عمل موجهة","ب":"ا.فور ظهوره تصميم خطة تطوير مهني فردية تستند إلى تقييم دوري شامل لمهارات كل معلم وتحليل","ج":"احتياجاته. تعزيز ثقافة التعلم الذاتي عبر توفير مصادر إلكترونية معتمدة ودعم الموجهين لتحفيز","د":"لستقاللية التعليمية."},"a":"ج","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":655,"q":"أنت تقيم أداء موظف يعمل في بيئة عمل متغيرة ومليئة بعدم اليقين، كيف تقيس أدائه بدقة لتحقيق تقييم عادل وموضوعي؟ لعتماد على تقييم النتائج واإلنجازات الكمية التي حققها الموظف بغض النظر عن","o":{"أ":"ظروف التغير.","ب":"دمج تقييم األداء الذاتي مع تقارير الزمالء والمديرين لتكوين صورة شاملة عن أدائه.","ج":"التر كيز على قدرة الموظف على التكيف والمرونة في التعامل مع المتغيرات مع األخذ لعتبار النتائج المحققة.في تقييم مدى التزام الموظف باإلجراءات والسياسات الداخلية كأساس لتقدير أدائه في ظل","د":"التغيرات."},"a":"ج","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":656,"q":"في موقف قيادي يتطلب اتخاذ قرا ر مهم، بينما تكون المعلومات المتاحة متضاربة وغير مكتملة، كيف تتصرف لضمان أفضل نتيجة مهنية وعملية؟ لعتماد على تحليل سريع للبيانات المتاحة مع استشارة فورية لبعض الزمالء ذوي","o":{"أ":"الخبرة لتقليل الوقت قبل القرار.","ب":"تجميع أكبر قدر ممكن من المعلومات مع محاولة دم ج وجهات نظر الفريق، وتأجيل القرار حتى تكون الصورة أوضح. اتخاذ القرار استنادًا إلى الخبرات السابقة والحدس المهني، مع إبقاء قنوات التواصل","ج":"ا.مفتوحة لمراجعة القرار الحق استشارة فريق الخبراء بشكل رسمي لمناقشة رؤية متعددة األبعاد، ثم إصدار قرار","د":"مدعوم بتحليل متكامل. جماعي ألن اتخاذ قرار قيادي في وقت المعلومات المتضاربة والمحدودة"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":657,"q":"كيف يمكن لقائد تربوي أن يعزز ثقافة أخالقية إيجابية في فريقه دون لعتماد صارمة؟ فقط على فرض قواعد العمل على تقديم نفسه كقدوة نموذجية من خالل للتزام المستمر بالقيم األخالقية والسلوك","o":{"أ":"المهني. وضع أطر واضحة للسلوك األخالقي مع متابعة تطبيقها بإشراف مباشر لتعزيز","ب":"لنضباط الذاتي.","ج":"تحفيز الفريق على المشاركة في ورش عمل تفاعلية تهدف لتعميق فهم ا لقيم والمبادئ األخالقية. تشجيع حوار مستمر ونقاشات منتظمة بين أعضاء الفريق حول تحديات مواقف العمل","د":"األخالقية. ألن تقديم القائد نفسه قدوة حقيقية بالسلوك األخالقي يعزز ثقافة"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":659,"q":"في مؤسسة تواجه ميزانية محدودة مخصصة للتطوير المهني، أي من لستثمار على تنمية مهاراتلستراتيجيات التالية يُعتبر األكثر فعالية في تعظيم أثر الموظفين؟","o":{"أ":"التركيز على تقديم دورات تدريبية دا خلية مختارة بدقة تركز على المهارات الفنية لحترافية المرتبطة مباشرة بمهام العمل.األساسية و تشجيع التعلم الذاتي من خالل توفير مصادر تعليمية مجانية ومبادرات ورش عمل","ب":"داخلية تديرها األقسام المختلفة.","ج":"دعم مشاركة الموظفين في برامج تدريبية خارجية ذات جودة ع الية، مع تقديم مساهمات مالية جزئية للتكاليف لتخفيف العبء على الموظف. تعديل جداول العمل والمشاريع لفتح فترات زمنية مخصصة للتدريب الداخلي والخارجي","د":"دون زيادة في الميزانية اإلجمالية."},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":660,"q":"أنت مدير في مؤسسة تعليمية وتواجه حالة تضارب مصالح أخالقي معقدة بين موظفين. ما هو اإلجراء األمثل إلدارة هذا الموقف بشكل احترافي وأخالقي؟","o":{"أ":"تنظيم جلسة حوار مفت وح مع األطراف المعنية بهدف التوصل إلى تفاهم متبادل وحل ودي. لستعانة بمستشار داخلي مختص في األخالقيات إلجراء تقييم دقيق وتقديم توصيات","ب":"ملموسة. إحالة القضية لفريق رقابي مستقل داخل المؤسسة لضمان الشفافية واتخاذ اإلجراءات","ج":"المناسبة. من خالل التعامل السري مع النزاع وتوثيق اإلجراءات داخليًا دون","د":"حماية سمعة المؤسسة إفشاء التفاصيل. ألن فتح حوار مفتوح هو اإلجراء األمثل الذي يعزز الشفافية ويحفز"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":661,"q":"كقائد فريق في شركة تكنولوجية صغيرة تعاني من نقصٍ حاد في الموارد المالية كيف تتصرف كبيرا. م بدئيا والتقنية، طرحت فكرة ابتكار منتج جديد يتطلب استثمارا لضمان تقدم المشروع مع تقليل مخاطره بأفضل طريقة ممكنة؟ تبدأ بتطوير نموذج أولي مبسط قابل لالختبار مع مجموعة محدودة من العمالء لجمع","o":{"أ":"للتزام باستثمارات كبيرة.بيانات ميدانية قبل جدوى مفصلة توضح اإلمكانات من المستثمرين بناءً على دراسة إضافيا","ب":"تطلب تمويال والمخاطر المحتملة للمنتج. تعيد تقييم متطلبات المشروع وتحدد نطاقا لتقليص التكلفة مع الحفاظ على أقل تطلبا","ج":"جودة مقبولة خالل مرحلة التطوير. تؤجل المشروع مؤقتا مع تعزيز المشاريع الحالية األقل مخاطرة للحفاظ على استقرار","د":"الموارد وتركيز الفريق. تطوير نموذج أولي مبسط وقابل لالختبار مع مجموعة مستهدفة أ–"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":662,"q":"في مدرستك، الحظت تصاعد نزاعات متكررة بين الطالب بشأن توزيع الفرص التفاعل وضمانفي األنشطة الالمنهجية. كمدير، كيف تتعامل مع هذا الوضع لتحسين بيئة عدالة الفرص؟ تعقد اجتماعا مع الطالب المتنازعين الستكشاف أسباب النزاع، وتشجع على حوار بناء","o":{"أ":"يُمكن من خالله التوصل إلى حلول توافقية قائمة على مبادئ اإلنصاف. تضع إطارا لتوزيع الفرص يعتمد على معايير محددة كاألداء األكاديمي ومشفرا واضحا","ب":"لهتمامات الشخصية، وتشرح ذلك للطالب لتفادي اللبس والنزاعات.و تطبق سياسة توزيع الفرص بالتساوي بين جميع الطالب، مع توفير دعم إضافي للطالب","ج":"األقل مشاركة لتعزيز دمجهم وتشجيعهم. ا تكلف المعلمين بوضع معايير اختيار خاصة بأنشطتهم، مع متابعة دورية من اإلدارة","د":"مان التزامهم بالعدالة وعدم التحيز. لض ألن عقد اجتماع حواري مع الطالب المتنازعين الستكشاف األسباب"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":663,"q":"أثناء تقييم أداء مشروع يمتد لمدة طويلة، الحظت أن النتائج النهائية أقل من كيف تقيّم األداء بموضوعية في ظل هذهالمتوقع رغم الجهود الكبيرة والموارد المستخدمة. الظروف المعقدة؟ تجري مقابالت مع أعضاء الفريق لتحديد العقبات التي واجهتهم، مع تحليل مؤشرات","o":{"أ":"األداء الكمية والنوعية بشكل متكامل.","ب":"تركز على المخرجات الكمية كالمؤشرات واألرقام وحدها لتحديد مدى تحقيق األهداف.","ج":"تعطى وزنًا متساويًا للجهود المبذولة والنتائج المحققة بغض النظر عن الفارق بينهما. يُستكمل المشروع بالكامل ثم تقارن النتائج المتوقعة","د":"تؤجل تقييم األداء النهائي حتى بالنتائج المحققة. ألن هذا الخيار يجمع بين تقييم المشكلة من خالل تحليل شامل يشمل"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":664,"q":"أنت مدير في مؤسسة شبه حكومية تواجه قرارا يتعلق بمنح عقد غامضا أخالقيا كيفلمورد تعرف عنه تقارير فساد مالي محلي، وتوجد ضغوط سياسية إلتمام العقد سريعا. تتخذ القرار؟ ،ترفض التعامل مع المورد حفاظا على القيم األخالقية للمؤسسة رغم الضغوط السياسية","o":{"أ":"ن بدائل أخرى.وتبحث ع تواصل التفاوض مع المورد مع وضع آليات رقابة صارمة وشروط تعاقدية تضمن","ب":"الشفافية والمسائلة. تؤجل اتخاذ القرار لتقييم الوضع القانوني وأثره على سمعة المؤسسة بالتنسيق مع","ج":"الجهات الرقابية المختصة. ا","د":"تمنح العقد للمورد مع التزامه بتقديم تقارير ما لية دورية ومراجعة داخلية لضمان للتزام بالمعايير األخالقية. ألن رفض التعامل مع مورد معروف بالفساد هو القرار األكثر اتساقا"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":665,"q":"قائد فريقك أظهر مقاومة واضحة للتغييرات التي تهدف إلى تعزيز لبتكار قيادة تحويلية تسعى لتحسين األداء التنظيمي؟ كيف تتعامل مع مقاومته في إطارالداخلي. تستمع إلى مخاوفه بعناية وتدمج نقاطه البناءة في خطة التغيير لتعزيز شعوره بالمشاركة","o":{"أ":"والمسؤولية. توضح له أهداف التغيير بصورة حازمة مع توفير الدعم المطلوب دون التنازل عن","ب":"شكل دوري.الرؤية، مع متابعة أثر التغيير على أدائه ب ،تشركه في جلسات حوارية لتعزيز فهمه للتغيير وتحفزه على تبني المبادرات الجديدة","ج":"مع تحديد أهداف واضحة تقيّم التقدم بشكل منتظم. تتيح له فترة زمنية محددة للتكيف مع التغيير مع مراقبة أدائه، دون ضغط مباشر، مما","د":"يد. يمنحه فرصة إلثبات نفسه ضمن السياق الجد ألن لستماع الفعّال ودمج المواقف البناءة يعزز من مشاركته"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":666,"q":"في إطار خطة استراتيجية طويلة األمد لمؤسستك، تثار معارضة داخلية بشأن لستثمار في تقنيات جديدة يُنظر إليها من قبل بعض األعضاء كمخاطر محتملة تهدد لستقرار المالي. كيف تتعامل مع هذه المعارضة؟","o":{"أ":"تقدم تحاليل مفصلة توضح الفوائد المحتملة والمخاطر المحتملة مع مقارنات واقعية لتطمين األطراف المعنية وتسهيل اتخاذ القرار. تلتزم بتنفيذ لبتكار وأهميته المستقبلية، مع متابعة دقيقةلستثمار بعد مناقشة مبادئ","ب":"لألداء لضبط المسار إذا اقتضى األمر. تقترح تأجيل القرار حتى تتوفر دراسات محلية وتقييمات تجريبية إضافية تثبت جدوى","ج":"ا قبل التعهد بها. التقنية تفتح حوارا، مع إمكانية تعديل مع الفريق المعارض إلعادة تقييم الخطة تكامليا موسعا","د":"بعض بنودها بناءً على المالحظات والمخاوف المؤيدة. ألن تقديم تحاليل مفصلة وشفافة يمثل الخطوة األكثر مهنية وفعالية"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":667,"q":"أثناء إدارة صراع معقد بين قسمين في المنظمة، يتبادل كل قسم لتهامات بسوء ما أفضل استراتيجية إلدارة هذا الصراع وضمان تحقيقالتفاهم والتقليل من جهود اآلخر. تعاون فعّال ومستدام؟ عقد جلسة وساطة مشتركة تركز على استكشاف مصالح الطرفين وإعادة صياغة وجهات","o":{"أ":"لتهامات المباشرة. عن النظر بعيدا على تقييم محايد ًتعيين وسيط خارجي متخصص إلدارة الحوار وتقديم توصيات بناء","ب":"لألسباب الجوهرية للصراع. تشجيع الطرفين على التباحث المباشر تحت إشراف المدير لتقليل لحتكاك وبناء تفاهم","ج":"تدريجي قائم على الحوار المفتوح. توجيه الطرفين للتركيز على مهامهم العملية مؤقتا مع إقامة ورش عمل لتطوير مهارات","د":"األقسام الحقا. التواصل بين ألنها تتيح بيئة آمنة يستكشف فيها الطرفان مصالحهما الحقيقية بعيدًا"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":668,"q":"أحد معلمي المدرسة يستخدم أساليب تقييم تقليدية ال تعكس قدرات الطالب اإلبداعية. كيف يمكنك تقويم أدائه بشكل م بني على التفكير الناقد لتحسين جودة التقييمات لبتكار لدى الطالب؟ وتعزيز جمع بيانات تغذية راجعة من الطالب والزمالء بشأن أساليب التقييم المستخدمة، وتحليلها","o":{"أ":"لتحديد نقاط التحسين بدقة.","ب":"مقارنة نتائج اختبارات الطالب التي يقوم بها مع نتائج المدارس األخرى ذا ت األداء ا المشابه ألخذ صورة نسبية عن فعالية التقييم. تقديم توصيات عملية بعد مراجعة أساليب التقييم الحالية، ثم متابعة تطبيق هذه ال","ج":"بشكل دوري مع المعلم قبل اتخاذ أي خطوات إجرائية.","د":"نقل مسؤولية التقييم إلى معلم آخر أكثر خبرة في أساليب التقييم الحديث ة لضمان تحسين نتائج الطالب بشكل فوري. ألن جمع بيانات متعددة من مصادر مختلفة وتحليلها يعكس تفكيرا"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":669,"q":"في بيئة عمل تتسم بزيادة الضغوط التنظيمية، يظهر أحد الموظفين عالمات كيف تتخذ القرار األمثل لدعم الموظف على أدائه المهني. واضحة لإلرهاق تؤثر سلبا وضمان استمرارية األداء الفعّال للفريق؟ تعقد جلسة استماع خاصة معه لتحليل وضعه الشخصي والمُهني، ثم تُعيد توزيع عبء","o":{"أ":"العمل بشكل يتناسب مع قدراته الحالية مع متابعته دوريا.","ب":"تشجع ه على تعزيز جهوده وتحمل الضغوط مؤقتا، مع تقديم تحفيزات تشجيعية للفريق بأكمله للحفاظ على األداء في هذه المرحلة الحرجة. تنقل بعض مهامه إلى زمالئه بشكل مؤقت مع تقديم توضيح شفاف للفرق في","ج":"للتزام الكامل.المسؤوليات وتحديثات دورية لضمان نفسي وجلسات ترفيهية لجميع الموظفين بشكل شامل، مع متابعة","د":"تنظم ورش عمل دعم لت اإلرهاق. فردية الحقة لتقييم أثرها على ح ألن الخيار أ يضمن توازنالهتمام الفردي الدقيق للموظف بين"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":670,"q":"تواجه منظمتك قرارا يتطلب تخصيص استثمار كبير بين تطوير استراتيجيا قدرات الموظفين أو تحديث البنية التحتية التقنية. أي الخيارين تختا ر لتحقيق أفضل توازن لستدامة والفعالية التنظيمية؟ بين لستثمار األساسي في تطوير قدرات الموظفين ألن بناء المهارات يعزز مرونة المنظمة","o":{"أ":"ا في التعامل مع التغيرات التقنية المستمرة.","ب":"التركيز على تحديث البنية التحتية التقنية باعتبارها عنصر األساس الذي يدعم تح سين اإلنتاجية وتطوير الخدمات بشكل مستدام. توزيع الموارد بشكل أفضلي على تطوير قدرات الموظفين مع دعم محدود لتحديث البنية","ج":"التحتية لضمان مسايرة التطورات التقنية دون التضحية بالمهارات. للبيئة الداخلية وال خارجية لتحديدلستثمار لحين إجراء تحليل أكثر تفصيال","د":"تأجيل قرار األولويات المتغيرة بدقة. لستثمار في تطوير قدرات الموظفين هو األمثل ألن المهارات"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":671,"q":"أنت مدير مشروع في مؤسسة تعليمية تواجه مقاومة غير معلنة من بعض بالرغم من أن البيانات األولية تؤكد فاعليةأعضاء الفريق تجاه استخدام تقنية تعليمية حديثة. كيف تتصرّف إلدارةالتقنية، إال أن األجواء السلبية قد تضع تنفيذ المشروع في خطر. هذه هذه المقاومة بشكل فعّال ومهني؟ تعقد جلسات حوارية تفاعلية بالفريق توضح فيها مزايا التقنية","o":{"أ":"المباشر لبناء الثقة والتفاهم. الفريق بعمق، مدعومة بتقارير مفصلة لتحليل جذور","ب":"توزّع استبيانات سرية لتحليل آراء المقاومة بدقة. تستعين بخبير إداري مختص إلدارة التغيير، يقوم بتحليل الموقف موضوعيا ويساعد في","ج":"تصميم حلول مدروسة. تبدأ بتنفيذ التقنية بشكل تجريبي في أجزاء محددة من المشروع، مع إشراك المتشككين","د":"مهم في التغيير. لتحكتدريجيا عقد الجلسات الحوارية المباشرة يسمح بالتواصل المفتوح وبناء الثقة أ-"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":672,"q":"كقائد لفريق في منظمة غير ربحية تواجه تقليصا في الميزانية، كيف يمكنك كبيرا لبتكار رغم الموارد المحدودة؟ تحفيز الفريق للحفاظ على األداء و تعزز ثقافة الشفافية في توزيع الموارد وتحدد المسؤوليات بوضوح مع تشجيع المشاركة","o":{"أ":"الفعّالة في صنع القرار. لل مكافآت المعنوية والمادية بناءً على األداء، مع التركيز على تحفيز محدودا","ب":"تضع نظاما النتائج وتقليل التكاليف. تركز على تقوية الروح المعنوية للفريق من خالل تنظيم فعاليات تنمية ذات تكاليف","ج":"لرتباط الشخصي.منخفضة تعزز التعاون و داخل حدود عامة، مع التكيفلبتكار بحرية تامة","د":"تمنح الفريق صالحية التجريب و السريع مع األخطاء دون عقوبات صارمة. ألن تعزيز الشفافية وتحديد المسؤوليات بوضوح مع تشجيع المشاركة أ-"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":673,"q":"أنت مسؤول تخطيط استراتيجي في شركة تكنولوجية تواجه سرعة تغيرات كيف تبني خطة استراتيجية طويلة األمد تخدمالسوق وعدم وضوح التوجهات المستقبلية. مصلحة الشركة؟ تضع رؤية استراتيجية مرنة تركز على تعزيز قدرات التكيف و لبتكار لضمان","o":{"أ":"استمرارية األداء رغم عدم وضوح المستقبل. تعتمد على تحليالت السوق الحالية لتحديد أولويات ثابتة تضمن ثبات األداء وتجنب","ب":"المخاطرة. تجمع رؤى متعددة من كافة اإلدارات لتكوين خطة متوازنة ترتكز على توافق وجهات","ج":"النظر مع بعض المرونة في التنفيذ.","د":"تركز على تطوير المنتجات الحالية وتحسينها لل حفاظ على المنافسة دون تحمّل مخاطر لتجاهات غير الواضحة للسوق. كبيرة في ألن صياغة رؤية استراتيجية مرنة تعزز نلبتكار والتكيف تُمك أ-"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":674,"q":"في مؤسسة تعليمية تواج ه حالة غامضة تتعلق بسلوك عضو هيئة تدريس مع طلبة، كيف تتخذ قرارا يتميز بأعلى معايير األخالقية والمهنية لضمان عدالة وشفافية المعالجة؟ إجراء تحقيق شامل مع جميع األطراف المعنية مع الحفاظ على السرية والنزاهة قبل اتخاذ","o":{"أ":"أي إجراء. إصدار توجيهات واضحة تعزز السلوك األخالقي وتطبيق إجراءات مؤقتة بعد تقييم","ب":"مبدئي، مع التخطيط لتحقيق موسع الحق. تنظيم ورش تدريبية تأهيلية للسلوك المهني األخالقي لجميع أعضاء الهيئة التدريسية مع","ج":"مراقبة التطبيق المستمر دون تأجيل التحقيق.","د":"إنشاء آلية إبالغ آمنة وسرية للطلبة مع دعم نف سي مستمر، وتفعيل تحقيق فوري بعد تلقي البالغ دون تأخير. التحقيق الشامل والمحايد مع الحفاظ على السرية والنزاهة هو الخطوة أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":675,"q":"أنت قائد في بيئة عمل متعددة الثقافات ويحدث صراع بين أفراد الفريق بسبب اختالفات في طرق التواصل والعمل. ما هو أنسب نهج إلد ارة هذا الصراع بشكل فعّال ومستدام؟ تنظيم جلسات حوار بنّاءة تركز على تبادل وجهات النظر الثقافية وابتكار حلول مشتركة","o":{"أ":"توافقية. وضع وتنفيذ تعليمات عمل موحدة تشمل قواعد تواصل وسلوك واضحة ل // State
let questions = [...QUESTIONS_DATA];
let filteredQ = [...questions];
let currentIdx = 0;
let answers = {}; // qNum -> {selected, correct}
let filter = 'all';
let searchTerm = '';

// Letter mapping for display
const letterMap = {'أ':'أ','ب':'ب','ج':'ج','د':'د'};
const letterOrder = ['أ','ب','ج','د'];

function init() {
  filteredQ = applyFilter([...questions]);
  buildSidebar();
  renderQuestion();
  updateScore();
}

function applyFilter(src) {
  let res = src;
  if (searchTerm) {
    const t = searchTerm.toLowerCase();
    res = res.filter(q => q.q.includes(t) || Object.values(q.o || {}).some(v => v.includes(t)));
  }
  if (filter === 'unanswered') res = res.filter(q => !answers[q.n]);
  else if (filter === 'correct') res = res.filter(q => answers[q.n]?.correct);
  else if (filter === 'wrong') res = res.filter(q => answers[q.n] && !answers[q.n].correct);
  return res;
}

function setFilter(f) {
  filter = f;
  ['filterAll','filterUnanswered','filterCorrect','filterWrong'].forEach(id => {
    document.getElementById(id)?.classList.remove('active');
  });
  document.getElementById('filter' + f.charAt(0).toUpperCase() + f.slice(1))?.classList.add('active');
  currentIdx = 0;
  filteredQ = applyFilter([...questions]);
  buildSidebar();
  renderQuestion();
}

function handleSearch() {
  searchTerm = document.getElementById('searchBox').value;
  currentIdx = 0;
  filteredQ = applyFilter([...questions]);
  buildSidebar();
  renderQuestion();
}

function buildSidebar() {
  const grid = document.getElementById('sidebarGrid');
  grid.innerHTML = '';
  filteredQ.forEach((q, i) => {
    const dot = document.createElement('button');
    dot.className = 'nav-dot';
    dot.textContent = q.n;
    dot.title = `سؤال ${q.n}`;
    if (i === currentIdx) dot.classList.add('current');
    const ans = answers[q.n];
    if (ans) dot.classList.add(ans.correct ? 'answered-correct' : 'answered-wrong');
    dot.onclick = () => { currentIdx = i; renderQuestion(); buildSidebar(); };
    grid.appendChild(dot);
  });
}

function renderQuestion() {
  const card = document.getElementById('questionCard');
  const noRes = document.getElementById('noResults');
  const finalScr = document.getElementById('finalScreen');
  
  finalScr.classList.remove('show');
  
  if (filteredQ.length === 0) {
    card.style.display = 'none';
    noRes.classList.add('show');
    updateProgress(0, 0);
    return;
  }
  noRes.classList.remove('show');
  card.style.display = 'block';

  if (currentIdx >= filteredQ.length) currentIdx = filteredQ.length - 1;
  if (currentIdx < 0) currentIdx = 0;

  const q = filteredQ[currentIdx];
  
  document.getElementById('qNum').textContent = currentIdx + 1;
  document.getElementById('qOrigNum').textContent = `(#${q.n})`;
  document.getElementById('qText').textContent = q.q;

  // Render options
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const opts = q.o || {};
  const ans = answers[q.n];
  
  letterOrder.forEach(letter => {
    if (!opts[letter]) return;
    const div = document.createElement('div');
    div.className = 'option' + (ans ? ' disabled' : '');
    
    if (ans) {
      if (letter === q.a) div.classList.add('correct-opt');
      else if (letter === ans.selected) div.classList.add('wrong-opt');
    }

    div.innerHTML = `<div class="option-letter">${letter}</div><div class="option-text">${opts[letter]}</div>`;
    
    if (!ans) {
      div.onclick = () => selectAnswer(letter, q);
    }
    container.appendChild(div);
  });

  // Feedback
  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback';
  fb.innerHTML = '';
  if (ans) {
    fb.classList.add('show', ans.correct ? 'feedback-correct' : 'feedback-wrong');
    const icon = ans.correct ? '✅' : '❌';
    const title = ans.correct ? 'إجابة صحيحة!' : `إجابة خاطئة — الصواب: (${q.a})`;
    fb.innerHTML = `
      <div class="feedback-header"><span class="icon">${icon}</span>${title}</div>
      <div class="feedback-exp">${q.e || 'الإجابة الصحيحة هي الخيار (' + q.a + ').'}</div>
    `;
  }

  // Nav buttons
  document.getElementById('prevBtn').disabled = currentIdx === 0;
  document.getElementById('nextBtn').textContent = currentIdx === filteredQ.length - 1 ? 'إنهاء ✓' : 'التالي ←';

  updateProgress(currentIdx + 1, filteredQ.length);
  
  // Scroll sidebar dot into view
  const dots = document.querySelectorAll('.nav-dot');
  if (dots[currentIdx]) dots[currentIdx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function selectAnswer(letter, q) {
  const isCorrect = letter === q.a;
  answers[q.n] = { selected: letter, correct: isCorrect };
  renderQuestion();
  buildSidebar();
  updateScore();
}

function navigate(dir) {
  if (dir === 1 && currentIdx === filteredQ.length - 1) {
    showFinal();
    return;
  }
  currentIdx = Math.max(0, Math.min(filteredQ.length - 1, currentIdx + dir));
  renderQuestion();
  buildSidebar();
}

function goToRandom() {
  const unanswered = filteredQ.filter((q, i) => !answers[q.n]);
  if (unanswered.length === 0) { goToRandom2(); return; }
  const target = unanswered[Math.floor(Math.random() * unanswered.length)];
  currentIdx = filteredQ.findIndex(q => q.n === target.n);
  renderQuestion();
  buildSidebar();
}

function goToRandom2() {
  currentIdx = Math.floor(Math.random() * filteredQ.length);
  renderQuestion();
  buildSidebar();
}

function updateScore() {
  const correct = Object.values(answers).filter(a => a.correct).length;
  const total = Object.keys(answers).length;
  document.getElementById('scoreDisplay').textContent = correct;
  document.getElementById('totalAnswered').textContent = total;
}

function updateProgress(cur, total) {
  const pct = total > 0 ? Math.round((cur / total) * 100) : 0;
  document.getElementById('progressText').textContent = `السؤال ${cur} من ${total}`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function showFinal() {
  const correct = Object.values(answers).filter(a => a.correct).length;
  const total = Object.keys(answers).length;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  
  document.getElementById('questionCard').style.display = 'none';
  const fs = document.getElementById('finalScreen');
  fs.classList.add('show');
  
  document.getElementById('finalPct').textContent = pct + '%';
  document.getElementById('fCorrect').textContent = correct;
  document.getElementById('fWrong').textContent = total - correct;
  document.getElementById('fTotal').textContent = total;
  
  const badge = document.getElementById('gradeBadge');
  if (pct >= 85) { badge.className = 'grade-badge grade-A'; badge.textContent = '🏆 ممتاز'; }
  else if (pct >= 70) { badge.className = 'grade-badge grade-B'; badge.textContent = '⭐ جيد جداً'; }
  else if (pct >= 60) { badge.className = 'grade-badge grade-C'; badge.textContent = '👍 جيد'; }
  else { badge.className = 'grade-badge grade-D'; badge.textContent = '📖 تحتاج مراجعة'; }
}

function reviewWrong() {
  filter = 'wrong';
  document.getElementById('finalScreen').classList.remove('show');
  document.getElementById('questionCard').style.display = 'block';
  setFilter('wrong');
}

function shuffleQuestions() {
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }
  currentIdx = 0;
  filteredQ = applyFilter([...questions]);
  buildSidebar();
  renderQuestion();
}

function resetAll() {
  answers = {};
  filter = 'all';
  searchTerm = '';
  currentIdx = 0;
  questions = [...QUESTIONS_DATA];
  filteredQ = [...questions];
  document.getElementById('searchBox').value = '';
  ['filterAll','filterUnanswered','filterCorrect','filterWrong'].forEach(id => {
    document.getElementById(id)?.classList.remove('active');
  });
  document.getElementById('filterAll')?.classList.add('active');
  document.getElementById('finalScreen').classList.remove('show');
  document.getElementById('questionCard').style.display = 'block';
  updateScore();
  buildSidebar();
  renderQuestion();
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') navigate(1);
  if (e.key === 'ArrowRight') navigate(-1);
  // Number keys 1-4 for options
  const map = {'1':'أ','2':'ب','3':'ج','4':'د'};
  if (map[e.key] && filteredQ[currentIdx] && !answers[filteredQ[currentIdx].n]) {
    selectAnswer(map[e.key], filteredQ[currentIdx]);
  }
});

// Init
init();
</script>
</body>
</html>
