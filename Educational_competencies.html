<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار الكفايات التربوية 2026</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --card: #222222;
    --border: #333333;
    --border-light: #444444;
    --text: #e8e8e8;
    --text-muted: #888888;
    --text-dim: #555555;
    --accent: #c0a060;
    --accent-dim: rgba(192,160,96,0.12);
    --correct: #3a7d44;
    --correct-bg: rgba(58,125,68,0.15);
    --correct-border: #3a7d44;
    --wrong: #8b2c2c;
    --wrong-bg: rgba(139,44,44,0.15);
    --wrong-border: #8b2c2c;
    --neutral: #2a2a2a;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Tahoma', Arial, sans-serif;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ─── Header ─── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 16px;
  }
  .header-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .header-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .score-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .score-badge span { color: var(--accent); font-weight: 700; font-size: 15px; }

  /* ─── Progress bar ─── */
  .progress-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px 14px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 11.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #d4b070);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ─── Controls ─── */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12.5px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .search-box {
    flex: 1;
    min-width: 180px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    direction: rtl;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-dim); }

  /* ─── Main layout ─── */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 120px);
  }

  /* ─── Sidebar ─── */
  .sidebar {
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 8px;
    height: calc(100vh - 140px);
    position: sticky;
    top: 140px;
  }
  .sidebar-label {
    font-size: 10.5px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0 8px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .sidebar-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 3px;
    padding: 4px;
  }
  .nav-dot {
    width: 100%;
    aspect-ratio: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
    padding: 0;
  }
  .nav-dot:hover { border-color: var(--accent); color: var(--accent); }
  .nav-dot.current { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); font-weight: 700; }
  .nav-dot.answered-correct { background: var(--correct-bg); border-color: var(--correct-border); color: #6dbf7a; }
  .nav-dot.answered-wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: #e06060; }
  .nav-dot.hidden-dot { display: none; }

  /* ─── Question area ─── */
  .main {
    padding: 28px 36px;
    max-width: 820px;
  }

  .q-number {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .q-number em {
    color: var(--accent);
    font-style: normal;
    font-weight: 600;
  }

  .q-text {
    font-size: 16.5px;
    color: var(--text);
    line-height: 1.75;
    margin-bottom: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px;
    border-right: 3px solid var(--accent);
  }

  /* ─── Options ─── */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-align: right;
  }
  .option:hover:not(.disabled) { border-color: var(--accent); background: var(--accent-dim); }
  .option.disabled { cursor: default; }

  .option-letter {
    width: 30px;
    height: 30px;
    min-width: 30px;
    border-radius: 50%;
    background: var(--neutral);
    border: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    margin-top: 1px;
    transition: all 0.2s;
  }
  .option-text { flex: 1; font-size: 14.5px; line-height: 1.6; color: var(--text); }

  /* Option states */
  .option.selected { border-color: #6699cc; background: rgba(102,153,204,0.1); }
  .option.selected .option-letter { background: rgba(102,153,204,0.25); border-color: #6699cc; color: #8bb5dd; }

  .option.correct-opt {
    border-color: var(--correct-border) !important;
    background: var(--correct-bg) !important;
  }
  .option.correct-opt .option-letter {
    background: var(--correct-border) !important;
    border-color: var(--correct-border) !important;
    color: #fff !important;
  }

  .option.wrong-opt {
    border-color: var(--wrong-border) !important;
    background: var(--wrong-bg) !important;
  }
  .option.wrong-opt .option-letter {
    background: var(--wrong-border) !important;
    border-color: var(--wrong-border) !important;
    color: #fff !important;
  }

  /* ─── Feedback ─── */
  .feedback {
    display: none;
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    border: 1px solid;
    animation: fadeSlide 0.3s ease;
  }
  .feedback.show { display: block; }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .feedback.feedback-correct {
    background: var(--correct-bg);
    border-color: var(--correct-border);
  }
  .feedback.feedback-wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong-border);
  }
  .feedback-header {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .feedback-header .icon { font-size: 18px; }
  .feedback-correct .feedback-header { color: #6dbf7a; }
  .feedback-wrong .feedback-header { color: #e06060; }
  .feedback-exp {
    font-size: 13.5px;
    color: var(--text-muted);
    line-height: 1.7;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 8px;
  }
  .feedback-exp strong { color: var(--text); }

  /* ─── Nav buttons ─── */
  .nav-btns {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 40px;
  }
  .btn {
    padding: 10px 24px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--accent);
    color: #111;
  }
  .btn-primary:hover { background: #d4b070; }
  .btn-secondary {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.35; cursor: default; }

  /* ─── Final screen ─── */
  .final-screen {
    display: none;
    padding: 40px;
    text-align: center;
  }
  .final-screen.show { display: block; }
  .final-circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 4px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    background: var(--accent-dim);
  }
  .final-pct { font-size: 42px; font-weight: 800; color: var(--accent); }
  .final-pct-label { font-size: 12px; color: var(--text-muted); }
  .final-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .final-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }
  .final-stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 28px;
    min-width: 120px;
  }
  .stat-num { font-size: 28px; font-weight: 800; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .stat-box.c .stat-num { color: #6dbf7a; }
  .stat-box.w .stat-num { color: #e06060; }
  .stat-box.s .stat-num { color: var(--accent); }

  .grade-badge {
    display: inline-block;
    padding: 8px 28px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 28px;
  }
  .grade-A { background: rgba(58,125,68,0.2); border: 1px solid #3a7d44; color: #6dbf7a; }
  .grade-B { background: rgba(192,160,96,0.15); border: 1px solid var(--accent); color: var(--accent); }
  .grade-C { background: rgba(102,153,204,0.15); border: 1px solid #6699cc; color: #8bb5dd; }
  .grade-D { background: rgba(139,44,44,0.2); border: 1px solid #8b2c2c; color: #e06060; }

  /* ─── No results ─── */
  .no-results {
    display: none;
    padding: 60px;
    text-align: center;
    color: var(--text-dim);
  }
  .no-results.show { display: block; }
  .no-results-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 20px 16px; }
    .header { padding: 12px 16px; }
    .controls { padding: 8px 16px; }
    .progress-wrap { padding: 0 16px 10px; }
    .header-title { font-size: 14px; }
    .q-text { font-size: 15px; padding: 14px 16px; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-title">📚 اختبار الكفايات التربوية 2026</div>
    <div class="header-sub">إعداد أ. حسين الشلول</div>
  </div>
 <nav class="top-nav">
  <a href="index.html">🏠 Home</a>
  <a class="active" href="Educational competencies.html">🎓 Educational competencies</a>
 
</nav>

  <div class="score-badge">

</div>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-info">
    <span id="progressText">السؤال 1 من 636</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <input class="search-box" type="text" id="searchBox" placeholder="🔍  ابحث في الأسئلة..." oninput="handleSearch()" />
  <button class="ctrl-btn" id="filterAll" onclick="setFilter('all')" class="active">الكل</button>
  <button class="ctrl-btn" id="filterUnanswered" onclick="setFilter('unanswered')">لم يُجب</button>
  <button class="ctrl-btn" id="filterCorrect" onclick="setFilter('correct')">✓ صحيح</button>
  <button class="ctrl-btn" id="filterWrong" onclick="setFilter('wrong')">✗ خطأ</button>
  <button class="ctrl-btn" onclick="shuffleQuestions()">🔀 ترتيب عشوائي</button>
  <button class="ctrl-btn" onclick="resetAll()">↺ بدء من جديد</button>
</div>

<!-- Layout -->
<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-label">تصفح الأسئلة</div>
    <div class="sidebar-grid" id="sidebarGrid"></div>
  </div>

  <!-- Main content -->
  <div class="main" id="mainContent">
    <!-- Question card -->
    <div id="questionCard">
      <div class="q-number">سؤال رقم <em id="qNum">—</em> <span id="qOrigNum" style="color:var(--text-dim)"></span></div>
      <div class="q-text" id="qText">جارٍ التحميل...</div>
      <div class="options" id="optionsContainer"></div>
      <div class="feedback" id="feedbackBox"></div>
      <div class="nav-btns">
        <button class="btn btn-secondary" id="prevBtn" onclick="navigate(-1)">→ السابق</button>
        <button class="btn btn-primary" id="nextBtn" onclick="navigate(1)">التالي ←</button>
        <button class="btn btn-secondary" onclick="goToRandom()" style="margin-right:auto">سؤال عشوائي 🎲</button>
      </div>
    </div>

    <!-- No results -->
    <div class="no-results" id="noResults">
      <div class="no-results-icon">🔍</div>
      <div>لا توجد أسئلة تطابق البحث</div>
    </div>

    <!-- Final screen -->
    <div class="final-screen" id="finalScreen">
      <div class="final-circle">
        <div class="final-pct" id="finalPct">—</div>
        <div class="final-pct-label">النتيجة</div>
      </div>
      <div class="final-title">🎓 انتهى الاختبار!</div>
      <div class="final-sub">لقد أجبت على جميع الأسئلة</div>
      <div id="gradeBadge" class="grade-badge"></div>
      <div class="final-stats">
        <div class="stat-box c"><div class="stat-num" id="fCorrect">0</div><div class="stat-label">إجابات صحيحة</div></div>
        <div class="stat-box w"><div class="stat-num" id="fWrong">0</div><div class="stat-label">إجابات خاطئة</div></div>
        <div class="stat-box s"><div class="stat-num" id="fTotal">0</div><div class="stat-label">مجموع الأسئلة</div></div>
      </div>
      <button class="btn btn-primary" onclick="resetAll()" style="margin-left:10px">إعادة الاختبار من البداية</button>
      <button class="btn btn-secondary" onclick="reviewWrong()">مراجعة الأخطاء</button>
    </div>
  </div>
</div>

const QUESTIONS_DATA = [{"n":1,"q":"في حصة صفية، يالحظ المعلم أن مجموعة من الطالب تشتت انتباهها بسبب طالب معين. ما هو اإلجراء األنسب لمعالجة هذه الحالة؟ تدخالت متكررة من توجيه إنذار شفهي خاص للطالب على هامش الحصة لتصحيح السلوك دون إحراجه أمام","o":{"أ":"اآلخرين. التحدث مع الطالب على انفراد لفهم أسباب سلوكه ومساعدته على تحسين تركيزه داخل","ب":"الصف.","ج":"توجيه إنذار شفهي مباشر للطالب ب حضور زمالئه لتنبيههم جميعا إلى أهمية التركيز دون استهداف الطالب فقط.","د":"تنسيق لقاء مع ولي أمر الطالب واإلدارة لمناقشة السلوك ووضع خطة تعديل مناسبة. ألن التواصل الفردي مع الطالب يساعد على استكشاف أسباب ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":2,"q":"أثناء تخطيط المعلم لوحدة دراسية تهدف إلى تحفيز الطالب ع لى بناء المعرفة من خالل اكتشافهم الذاتي، أي من النظريات التالية يُعدُّ األنسب لتصميم أنشطة تعليمية تدعم هذا النهج؟","o":{"أ":"نظرية السلوكية التي تركز على تعزيز السلوكيات المرغوبة عبر التكرار والتعزيز لستيعاب لفهم و م العمليات الذهنية الداخلية لتسهيل ا","ب":"نظرية المعرفية التي تنظ لكتشاف عبر التجربة و","ج":"نظرية البنائية التي تشجع الطالب على بناء المعرفة ذاتيا لجتماعي التي تؤكد التعلم عبر المالحظة والتقليد ضمن بيئة تفاعلية نظرية التعلم","د":"نظرية البنائية هي األنسب ألنها تمكن الطالب من بناء المعرفة بنفسه ج-"},"a":"ج","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":3,"q":"موظف في قسم يعنى بحل نزاعات الموظفين واجه خالفا بين زميلين حول توزيع المهام. ما الخطوة األكثر مهنية وفاعلية للتعامل مع هذا الوضع؟ عقد اجتماع مشترك مع الطرفين لالستماع إلى وجهات نظرهما والعمل على التوصل إلى","o":{"أ":"حل وسط يرضيهما. إصدار قرار إداري بتوزيع المهام بشكل محدد على كل طرف استنادًا إلى تقييم","ب":"موضوعي للمهام والمسؤوليات. تشجيع كل طرف على تقديم مخاوفه بشكل مكتوب ثم م ي دمج طفل من ذوي رف؟ وترغب في تحقيق أفضل بيئة تعلمية له. كيف ينبغي أن تتص","o":{"أ":"تعديل األنشطة التعليمية بما يتناسب مع احتياجات الطفل مع إشراكه في المجموعة","ب":"توفير بيئة تعليمية داعمة تراعي الفروق الفردية للطفل وتدعم مشاركته الفعالة","ج":"معاملة الطفل كما يُعامل بقية الطالب مع مراقبة احتياجاته دون تعديل خاص تشجيع الطفل على تحمل مسؤولياته كاملة ضمن نشاطات الصف مع تقديم الدعم الحد","د":"األدنى ألنها تحقق تهيئة بيئة تعليمية شاملة تدعم الفروق الفردية بشكل فعال ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":99,"q":"موظف يالحظ تكرار تأخر بعض الزمالء عن مواعيد العمل مما يؤثر على أداء الفريق وجودة النتائج. ما أنسب تصرف له نحو هذا الوضع؟ للتزام.","o":{"أ":"التحدث مع الزمالء بشكل خاص وباحترام لمحاولة فهم أسباب التأخير وتشجيع للتزام.لنضباط في الفريق أمام الجميع لتحفيز","ب":"التذكير الجماعي بسياسات الحضور و رفع الموضوع إلى اإلدارة مع توثيق ح ا بتوصيات للمراجعة دونلت التأخير مرفق","ج":"تدخل مباشر. مؤقتًا كرد فعل لتراجع األداء الجماعي وانتظار تحسّن الوضع. تقليل مساهماته الشخصية","د":"الحوار الخاص والودي يتيح فهم األسباب الحقيقية للتقصير ويشجع"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":100,"q":"ما الفائدة األهم معلمة تخطط الستخدام تقويم تكويني مستمر أثناء عمليّة التعلم. التقويم في دعم تعلم الطالب؟ من هذا النوع من","o":{"أ":"متابعة تقدم الطالب باستمرار وتعديل استراتيجيات التدريس بناءً على نتائج التقويم.","ب":"جمع معلومات دورية عن أداء الطالب لتحديد نقاط الضعف وإعطاء تغذية راجعة بناءة. ل الفجوات.","ج":"استخدام نتائج التقويم لتوقع األداء في التقييمات الختامية وتحلي تقديم اختبارات قصيرة ومتكررة لتعزيز التركيز وتحفيز الطالب على المراجعة","د":"المستمرة. ألن التقويم التكويني المستمر يهدف باألساس إلى مراقبة تقدم الطالب أ–"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":101,"q":"أثناء حصتك الدراسية، الحظت أن مجموعة من الطالب تنشغل بالدردشة وتبادل زهم ويعيق سير الدرس. كيف تتصرف؟ الرسائل عبر الهاتف المحمول، مما يؤثر على تركي تطلب منهم إيقاف استخدام الهواتف فورا وتوضح لهم أن التكرار سيؤدي إلى خصم نقاط","o":{"أ":"من درجات السلوك. تشرح لهم أهمية لنتباه وأثر التشتيت على جودة التعلم، وتقترح وضع قواعد الستخدام","ب":"الهاتف خالل فترات محددة داخل الحصة. ا لهم فترة قصيرة الستخدام الهاتف بشكل مسؤول أثناء الدرس، مع توجيههم","ج":"تخصص الستخدامه في أنشطة تعليمية محددة تهدف لتعزيز التعلم. تحث الطالب على تنظيم أنفسهم بأنفسهم للتحكم في استخدام الهواتف دون تدخل مباشر","د":"منك، مع تشجيعهم على احترام أوقات التعلم. ألن وضع قواعد واضحة مدعومة بشرح ألهمية لنتباه يعزز ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":102,"q":"أنت موظف في شركة حكومية، وطلب منك زميل تنفيذ مهام تتعارض جزئيا مع نطاق مسؤولياتك الرسمية. كيف تتصرف للحفاظ على المهنية والتعاون الفعّال؟ توافق على تنفيذ المهام المطلوب منك من الزميل لتجنب التوتر بينكما، مع توثيق طلبه","o":{"أ":"للرجوع إليه الحقا. تشرح للزميل حدود مهامك مستندا إلى قانون الخدمة المدنية، وتقترح توزيع المهام","ب":"بحيث ال يتعارض ذلك مع مسؤولياتك األساسية. تناقش مع الزميل الحاجة إلى تنفيذ المهام بخطوة تفاهمية ،مبنية على للتزام الوظيفي","ج":"مع إشعار مديرك بشكل غير رسمي. ترفض تنفيذ المهام التي ال تقع ضمن اختصاصك، مع إبقاء باب الحوار مفتوحا لتوضيح","د":"للتزامات والمسؤوليات المشتركة. ألن التوضيح المبني على القانون مع اقتراح حلول عملية يُحافظ ب-"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":103,"q":"في اجتماع فريق العمل، الحظت تصاعد خالف بين عضوين بشأن توزيع ما هي أفضل خطوة تتخذها لضمان إدارة الخالفالمهام، مما أثر سلبًا على إنتاجية الفريق. بفعالية وتعزيز التعاون؟ تفتح حوارًا مباشرً ا مع الطرفين لتبادل وجهات النظر، مع توجيه النقاش نحو إيجاد حل","o":{"أ":"وسط يرتضيه الجميع. تستمع بهدوء للطرفين دون التدخل الفوري، متيحًا لهم فرصة تنظيم أفكارهم بهدف","ب":"التوصل لحل ذاتي. تقترح تأجيل النقاش إلى وقت الحق بعد جمع المزيد من المعلومات واآلراء، ثم تعيد","ج":"توزيع المهام بناءً على رؤية أشمل. ا","د":"تطلب من المدير اإلداري التدخل فورًا التخاذ قرا ر حاسم يضع حدًا للنزاع ويعيد سير العمل بشكل سريع. ألن إدارة حوار موجه يتيح للطرفين التعبير بصدق وبناء على ذلك أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":104,"q":"أثناء إعداد خطة تعليمية للفصل الدراسي، تواجه ضعف تحفيز الطالب ومعدالت متابعة منخفضة. ما اإلجراء األمثل لتحسين الوضع؟ لختبارات المتكررة.","o":{"أ":"تعزيز المحتوى التعليمي مع إضافة أنشطة تحفيزية تعتمد على إدماج أساليب التعلم النشط مع تطبيق استراتيجيات تحفيزية متنوعة تركز على مشاركة","ب":"الطالب وتفاعلهم. التركيز على التقويم المستمر مع تطوير محتوى يراعي مستويات التحصيل المختلفة","ج":"للطالب.","د":"تشجيع الطالب على تشكيل مجموعات دراسية ذاتية التنظيم لتعزيز التعلم التعا وني والتحفيز الذاتي. يعد إدماج أساليب التعلم النشط مع استراتيجيات التحفيز المتنوعة ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":105,"q":"أنت معلم جديد تواجه مقاومة من زميل قديم عند اقتراح طرق تدريس حديثة. كيف تتعامل مع الموقف لتحقيق أقصى تعاون ممكن؟ تحاول استقطابه عبر عرض مزايا الطريقة الجديدة مع فتح باب النقاش لتبادل اآلراء","o":{"أ":"لهتمامات.و لس تجابة لبعض مالحظاته لتقليل","ب":"تواصل تنفيذ طرقك الحديثة بأسلوب متدرج، مع لحتكاك. تقيم اجتماعا بمشاركة اإلدارة لعرض التحديات وطلب دعم إداري لتبني الطرق رسميا","ج":"الجديدة. تعتمد الحوار المفتوح لفهم مخاوفه وتحليلها وتقديم األدلة العملية التي تبين مدى فعالية","د":"األسلوب الحديث. د- أل ن الحوار المفتوح المبني على فهم المخاوف وتقديم األدلة المدعمة"},"a":"د","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":106,"q":"أثناء تقييم مشروع طالبي، الحظت أن مجموعة اعتمدت على مصادر معلومات غير موثوقة بشكل واضح. كيف تتصرف؟ تعطي المجموعة درجة منخفضة وترفق مالحظة رسمية توضح ضعف المصادر دون","o":{"أ":"طلب إعادة العمل. تشرح للمجموعة أهمية استخدام مصادر موثوقة وتقترح عليهم تحسين المراجع مع منح","ب":"فرصة إلعادة تقديم المشروع. تُدخل التعديالت الضرورية على التقييم بناءً على مراجعتك للمصادر دون إشراك","ج":"الطالب في هذه المراجعة. تقبل المشروع كما هو مع مالحظة شفوية تحذر فيها الطالب من لعتماد على مصادر","د":"غير موثوقة في المستقبل. ألنها تتبنى نهجا يشجع على التعلم والتصحيح من ومهنيا تربويا ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":107,"q":"أنت موظف وتلقت منك مراجعة إدارية تنتقد أسلوب عملك بشكل غير مباشر. كيف ترد؟","o":{"أ":"تستقبل المراجعة بهدوء وتطلب من المدير توضيح النقاط المطروحة لتطوير أدائك. تعبر عن استعدادك لالستماع للنقد وتناقش مع المدير خطة مشتركة لتحسين مهاراتك","ب":"ساليب عملك. وأ تطلب من المدير أمثلة محددة على المالحظات وتوضح وجهة نظرك مع األخذ بعين","ج":"لعتبار مالحظاته. تشكر المدير على المراجعة وتراجع أسلوب عملك بناءً على تقييمك الذاتي مع طلب","د":"متابعة دورية لألداء. لستعداد للنقد ومناق شة خطة مشتركة يعكس نضجا ب- التعبير عن"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":108,"q":"خالل إحدى الحصص الدراسية، يالحظ وجود طالب يعاني من ضعف في كيف تتصرف في هذه الحالة لتعزيز بيئة تعلمالتركيز ويشوش على زمالئه بشكل متكرر. فعّالة؟ لنتباه وتشجيعه على تحسين سلوكه.","o":{"أ":"تحاور الطالب بهدوء أمام الصف لتوضيح أهمية ديم الدعم والتوجيه المالئمين.","ب":"تتحدث مع الطالب بشكل خاص لفهم أسبابه وتق تطلب من الطالب المشاركة في أنشطة صفية بسيطة مع مجموعات صغيرة للحد من","ج":"التشويش.","د":"تناقش األمر مع أولياء األمور وتنسق معهم لتوفير دعم إضافي خارج المدرسة. ب- ألن التعامل الخاص المبني على التفاهم يسمح بتحديد ا ألسباب"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":109,"q":"عن فريق عمل، الحظت تراجعًا في األداء دون أسباب واضحة. كونك مسؤوال ما الخطوة األمثل لمعالجته بفعالية واحترافية؟ تنظيم لقاء لحصر مالحظات كل عضو حول التحديات التي تواجههم في تحقيق األداء","o":{"أ":"المطلوب. عقد اجتماع تشاركي مع الفريق لتحليل األسباب الجذرية للتراجع واقتراح حلول","ب":"مشتركة.","ج":"تطبيق نظام تقييم دوري مكثف لمراقبة األداء وتحديد نقاط الضعف بدقة. مراجعة األهداف والمهام مع الفريق وتعديلها بشكل تدريجي لتتوافق مع واقع األداء","د":"الحالي. ألن عقد اجتماع تشاركي يتيح فهمًا عميقا لألسباب الحقيقية ويسمح ب-"},"a":"ب","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":110,"q":"كمدرس، كيف يمكنك تطبيق مبادئ نظرية التعلم البنائية عند تدريس موضوع جديد لتحقيق أفضل تعلم لدى الطالب؟","o":{"أ":"تنظيم محاضرة تفاعلية تتيح للطالب طرح األسئلة ومناقشة األفكار ضمن إطار محدد. تشجيع الطالب على استكشاف المفاهيم بأنفسهم من خالل أنشطة تطبيقية ومشاريع","ب":"ا تعاونية. استخدام اختبارات قصيرة متكررة لتقييم فهم الطالب وتحفيزهم على المراجعة","ج":"ة.المستمر","د":"تكرار عرض المفاهيم بمداخل وأساليب مختلفة لتعزيز التذكر والفهم العميق. ألن التعلم البنائي يعتمد بشكل أساسي على بناء المعرفة من خالل ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":111,"q":"أثناء عملية تقييم نتائج الطالب، لوحظ تباين ملحوظ في الدرجات رغم تشابه فعلي. ما هو السبب األرجح لهذا التباين، وما هو اإلجراء األمثل لمعالجته؟ مستويات أدائهم ال احتمال وجود اختالفات دقيقة في تطبيق معايير التصحيح بين المقيمين، ويجب توحيد","o":{"أ":"إرشادات التصحيح بشكل دقيق. تفاوت في معايير التقويم أو تصميم األسئلة، ويجب وضع معايير موحدة واضحة","ب":"وشاملة لجميع الطالب. تغيرات طفيفة في بيئة لختبار تؤثر على تركيز الطالب، ويجب ضمان ثبات ظروف","ج":"لمتحان. اختالفات بسيطة في قدرات الطالب التي ال تبرر تعديل المعايير، ويستحسن إبقاء التقييم","د":"كما هو. ب- ألن توحيد معايير التقويم وتصميم األسئلة ب شكل موحد وشامل"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":112,"q":"أثناء إعداد استراتيجية تطوير مهني للمعلمين، ما الجانب األهم الذي يجب التركيز عليه لتحقيق أقصى فاعلية في تدريبهم؟ اف العامة للمؤسسة التعليمية.","o":{"أ":"مواءمة محتوى التدريب مع األهد لحتياجات العملية الفعلية للمعلمين في الصفوف الدراسية.","ب":"توافق محتوى التدريب مع من المواضيع الحديثة للتطوير. واسعا","ج":"تصميم البرنامج التدريبي بحيث يغطي عددا لتربوي.لستعانة بمدربين ذوي خبرة طويلة وسمعة علمية مرموقة في المجال ا","د":"ألن التركيز على احتياجات المعلمين الفعلية في الصف يضمن ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":113,"q":"عند مواجهة تهديد لفظي من طالب تجاه زميله داخل الفصل، ما هو اإلجراء األمثل الذي يتوجب عليك اتخاذه؟ فتح حوار فوري بين الطالبين بحضور إدارة المدرسة لضمان معالجة المشكلة بشكل","o":{"أ":"مباشر ومنهج ع الطالب لتوحيد الجهود التربوية والنفسية","ج":"إلصالح السلوك.","د":"تراقب السلوك عن قرب مع تثبيت اإلجراءات التأديبية بعد توثيق الح وادث، مع إدخال برامج توعية للصف. ألن التحدث الهادئ لفهم دوافع السلوك مع الدعم النفسي المتخصص ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":138,"q":"في اجتماع لتحليل أداء الموظفين، ما هو أفضل األساليب لضمان تقي يم موضوعي وعادل؟ لعتماد على معايير أداء محددة وواضحة يصادق عليها جميع األطراف.","o":{"أ":"لعتبار كمعيار رئيسي للتقييم.","ب":"أخذ انطباعات المدير المباشر بعين","ج":"جمع تقييمات من الزمالء والفرق المختلفة لتعزيز التوازن في التقييم. لنتائج المباشرة كأساس للتقييم.","د":"استخدام مالحظات األداء اليومية وا ألن وضع معايير أداء محددة وواضحة ومعتمدة من جميع األطراف"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":139,"q":"أثناء تنفيذ خطة استراتيجية، يثير فريق العمل اعتراضًا حول أولوية إحدى األهداف المحددة. كيف تتصرف في هذا الموقف لتحقيق أفضل نتائج تنفيذية وفريقية؟ تشرح مجددًا أسباب تحديد األولوية وتطالب الفريق بقبولها دون تعديل حفاظا على","o":{"أ":"الجدول الزمني. تعقد جلسة نقاش تشاركية مع الفريق إلعادة تقييم األولويات بناءً على وجهات نظرهم","ب":"وحقائق جديدة. تؤكد على األولوية المخططة وتطلب من الفريق للتزام بها مع توضيح العواقب","ج":"لمتثال.المحتملة لعدم","د":"ت ؤجل اتخاذ القرار النهائي حول األولوية لفترة قصيرة لتقييم ردود الفعل والمراجعة الذاتية للفريق. ألن عقد جلسة نقاش تشاركية يعزز الفهم المشترك، ويعزز التزام ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":140,"q":"في موقف عملي، الحظت أن زميال يتعامل مع معلومات العمالء بطريقة قد تن هدف المطلوب بالكامل."},{"n":144,"q":"أثناء تدريس مادة معقدة، كيف تستخدم تقنيات التقويم لتسه يل فهم الطالب وتحسين أدائهم التعليمي؟ تعتمد على اختبارات نهاية الوحدة لتقييم مدى استيعاب الطالب للمفاهيم، مع تقديم","o":{"أ":"لنتهاء.مالحظات عامة بعد تعتمد تقويمات مستمرة متنوعة تشمل الواجبات، المناقشات، و لختبارات القصيرة، مع","ب":"توفير تغذية راجعة فورية لتوجيه التعلم. تركز على تقييم الطالب من خالل أنشطة تقويم ذاتية وتقييم زمالء، مع تقارير دورية","ج":"تعكس تقدمهم. تستخدم تقويمات تشخيصية قبل البدء في الدرس وبعد كل وحدة، مع تحليل النتائج لتعديل","د":"استراتيجيات التدريس. ب- ألن التقويمات المستمرة الم تنوعة مع التغذية الراجعة الفورية تتيح"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":145,"q":"في حالة نشوب خالف بين زميلين في فريقك، كيف تُحدد دورك كقائد في إدارة اع؟ هذا النز لنحياز ألحد منهم. يراعي مصلحة الفريق دون","o":{"أ":"تستمع لكل طرف بعناية ثم تقدم حال","ب":"تتدخل بفعالية إليجاد حل وسط يرضي جميع األطراف مباشرة.","ج":"تسمح للطرفين بمحاولة حل خالفهما بأنفسهم مع تقديم دعم استشاري عند الحاجة. لم يتم التوصل التفاق خالل فترة زمنية محددة. ترفع الموضوع إلى اإلدارة العليا إذا","د":"ألن لستماع المنصف لكل طرف مع السعي لتقديم حل يوازن بين أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":146,"q":"كيف تعزز أخالقيات المهنة في بيئة العمل بشكل فعال ومستدام؟","o":{"أ":"بتطبيق نظام مراقبة صارم ومعاقبة المخالفين بشكل فوري. اإليجابي. بتوفير تدريبات توعوية دورية ومكافأة السلوك األخالقي","ب":"لنتهاكات بالتدرج وفق خطورتها.","ج":"بوضع قواعد أخالقية واضحة والتعامل مع 60 األستاذ حسين إبراهيم الشلول دوسية الكفايات التربوية بتشجيع بيئة عمل شفافة تتيح للموظفين التعبير عن مخاوفهم ومحاسبة الجميع على","د":"السلوك المهني. ألن توفير التدريبات المستمرة والمكافآت على السل ي تفهما بالجودة. تؤجل الرد عليه مؤقتاللتزام بالجدول الزمني الرسمي لضمان مع تبرير ضرورة","د":"العدالة والمصداقية. ألن التوضيح المهني الشفاف إلجراءات التقويم والوقت الالزم يبني"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":150,"q":"عندما تخطط الجتماع فريقك الدوري، كيف تضمن فعاليته القصوى؟","o":{"أ":"تضع جدول أعمال محددًا وتخصص وقتًا مناسبًا لكل بند مع إشراك الفريق في صياغته. لجتماع بدون جدول رسمي لكن تحرص على إدارة الوقت ومتابعة النقاط المهمة.","ب":"تبدأ","ج":"تحضر محضر اجتماع سابق وتناقش المهام بدون تحديد أوقات دقيقة لكل نقطة.","د":"تعد قائمة نقاط رئيسية وترصد وقتًا كليًا لالجتماع مع مرونة في توزيع الوقت بين النقاط. ألن وضع جدول أعمال محدد مع تخصيص الوقت لكل بند وإشراك أ-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":151,"q":"أثناء تدريس موضوع جديد، الحظت تشتت انتباه عدد كبير من الطالب وارتفاع كيف تتصرف لتحقيق بيئةمستوى الضوضاء داخل الصف، مما يؤثر على سير الدرس. تعليمية فعالة ومستقرة؟ لن ضباط وتضع قواعد واضحة للسلوك داخل الصف، ثم تستأنف","o":{"أ":"تذكر الطالب بأهمية الدرس مباشرة. تقسم الطالب إلى مجموعات صغيرة لتنفيذ نشاط تطبيقي مرتبط بالموضوع، مما","ب":"يشغلهم بشكل إيجابي ويخفض الضوضاء. توجّه نداءً هادئالنتباه وتطلب من الطالب تحديد مصادر التشتت مع تشجيعهم لجلب","ج":"للتزام بالهدوء قبل متابعة الدرس. على توقف الدرس مؤقتالنضباط وتطلب من الطالب الوقوف بهدوء لفترة قصيرة الستعادة","د":"ثم تستكمل التدريس الحقا. تقسيم الطالب إلى مجموعات صغيرة للنشاط التطبيقي يشغلهم ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":152,"q":"مدير المدرسة طلب منك إعداد خطة لتحسين أداء طالب متوسط المستوى في مادة الرياضيات. ما هي الخطوة األكثر مهنية وفاعلية للبدء بها من بين الخيارات التالية؟","o":{"أ":"تنظيم دروس تقوية إضافية موجهة للطالب بعد ساعات الدوام لتعزيز الفهم. فصل لتحديد نقاط الضعف بدقة قبل وضع خطة التدخل.","ب":"إجراء تقويم تشخيصي م تنظيم جلسات دعم جماعية تعتمد على حل تمارين متقدمة لتحفيز الطالب وتحسين","ج":"مهاراتهم.","د":"تحفيز الطالب عبر تقديم مكافآت تشجيعية بناء على تحسن درجاتهم خالل الفترة القادمة. التقويم التشخيصي يوفر أساسا لفهم نقاط الضعف دقيقا علميا ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":153,"q":"أثناء اجتماع مع زميل تشعر بأنه يقلل من جهودك المهنية أمام الزمالء، كيف تتصرف بطريقة تعكس المهنية والفعالية في حل المشكلة دون تصعيد الخالف؟ لجتماع لتوضح موقفك دون تأجيل.ه مباشرة وبوضوح أثناء","o":{"أ":"ترد علي لجتماع لتبادل وجهات النظر بهدوء.","ب":"تطلب منه التحدث معك بشكل خاص بعد لجتماع وتركز في أداء عملك على نحو أفضل.","ج":"تتجاهل تعليقاته خالل تك المهنية. لجتماع لتوضيح موقفك ودعم صور","د":"تعبر عن استيائك لفريق العمل بعد طلب الحديث بشكل خاص بعد لجتماع يتيح فرصة لحوار هادئ ب-"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":154,"q":"الحظت أن أحد الطالب يعاني من ضعف متكرر في أداء الواجبات المنزلية رغم يم الدعم، ما هو اإلجراء األمثل للتعامل مع هذا الوضع؟ تقد لستفسار منه بشكل مباشر داخل الصف عن أسباب ضعف أدائه وتحفيزه.","o":{"أ":"ا","ب":"التواصل مع ولي أمره لمعرفة ظروفه ودعم التعاون بين المدرسة واألسرة.","ج":"تكليفه بمهام إضافية ومسؤوليات صفية لتحفيز مشاركته وانضباطه. قديم استشارة توجيهية فردية لمساعدة الطالب على تنظيم وقته وتحسين أدائه.","د":"ت التواصل مع ولي األمر يتيح فهم أسباب المشكلة بشكل أعمق ويخلق ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":155,"q":"أثناء تطبيق اختبار نقدي للبناء المعرفي، الحظت أن بعض األسئلة تركز فقط على الحفظ والتذكر، ماذا تفعل؟ لختبار أسئلة تقيس مها رات التحليل والتركيب لتوازن","o":{"أ":"تدمج في الجزء القادم من مستويات التفكير. لختبار.","ب":"تحافظ على األسئلة الحفظية الحالية ألن تعديلها قد يؤثر على موثوقية نتائج ترفق تعليمات للطالب تبرز أهمية التفكير النقدي لتوجيههم تجاه التعامل العميق مع","ج":"المحتوى. تفسر نتائج األسئلة الحفظية ضمن سياقها التعليمي وتعزز تقييم مهارات التفكير العليا في","د":"تقاريرك. ألن تطوير أسئلة تقيس مهارات التفكير العليا يعزز من جودة التقييم أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":156,"q":"موظف تقدم بطلب إجازة مفاجئة بسبب ظرف عائلي طارئ في نظام الخدمة المدنية. كيف تتعامل مع طلبه بأكثر الطرق مهنية وفعالية؟ تمنحه اإلجازة إذا استوفت الشروط النظامية. تفحص أسباب الطلب بعناية ثم","o":{"أ":"ب) تطلب من الموظف تقديم طلب رسمي وانتظار الموافقة مع مراجعة الحالة الطارئة. لإلجراءات النظامية. للظرف العائلي مع تسجيل الطلب الحقا احتراما","ج":"تمنح اإلجازة فورا ح بعد التحقق من صحة الطلب.","د":"تطلب من الموظف توثيق الظرف العائلي وتطبيق اللوائ فحص األسباب بعناية ثم منح اإلجازة وفق الشروط النظامية يوازن أ-"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":157,"q":"،تواجه نزاعًا بين زميلين في قسمك ناجمًا عن تضارب في فهم أدوار العمل كيف تتصرف؟ تجتمع مع كل منهما بشكل منفرد لالستماع إلى وجهات نظرهما ثم توضح األدوار","o":{"أ":"المتداخلة بناءً على ذلك. تعقد جلسة وساطة مشتركة تجمع الزميلين لتوضيح األدوار وحل الخالف بشكل","ب":"تعاوني. ليل التداخل.","ج":"تخصص مهام محددة لكل منهما مع إشراكهما في صياغة تقسيم األدوار لتق ترفع األمر إلى اإلدارة العليا بعد محاولة التفاهم مع كل منهما بشكل فردي إذا استمر","د":"النزاع. ألن الوساطة المشتركة تتيح توضيح األدوار بصيغة شفافة ومتفق ب-"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":158,"q":"عند التخطيط لستراتيجي للعام الدراسي، وجدت تعارضًا بين الموارد المتاحة 8: السؤال واألهداف الموضوعة في الخطة، كيف تتصرف لتحقيق أقصى فاعلية؟ تراجع األهداف بشكل دقيق لتتناسب مع الموارد المتاحة مع الحفاظ على معايير الجودة","o":{"أ":"األساسية.","ب":"تحاول تأمين موارد إضافية مع تعديل طفيف ومبرر في األهداف لتقليل الفجوة.","ج":"تلتزم باألهداف األصلية مع محاولة تحسين كفاءة الموارد دون تعديل األهداف.","د":"تعيد صياغة الخطة كليًا مع تقييم شامل للموارد واألهداف قبل التنفيذ. أ- ألن تعديل األهداف بدقة يتناسب مع الموارد المتا حة مع المحافظة"},"a":"أ","e":"لأنها الأنسب حسب سياق السؤال؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":159,"q":"أثناء تدريس نظرية تعلم جديدة، تالحظ أن بعض الطالب يظهرون مقاومة لنطواء، كيف تحفزهم على المشاركة الفعالة؟ ويميلون إلى الصمت و","o":{"أ":"تعزز المحاضرة بإضافة المزيد من األمثلة التفصيلية لتوضيح تطبيقات النظرية. والتطبيقية. تفتتح نقاشًا مباشرًا يربط النظرية بخبراتهم الشخصية","ب":"تطلب منهم إعداد تقرير كتابي يعكس فهمهم للنظرية مع عرض مختصر في الحصة","ج":"ا التالية.","د":"تخصص وقتًا فرديًا لتقديم الدعم وتوضيح أي مفاهيم غير واضحة لكل طالب على حدة. فتح نقاش مباشر يرتكز على ربط النظرية بالتجارب الشخصية ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":160,"q":"موظف جديد في قسمك يعاني من تردد متكرر في تنفيذ مهامه ويطلب مساعدتك بشكل مستمر، كيف تدير الموقف بأفضل طريقة تعزز كفاءته واستقالليته؟ لمهام له بشكل متكرر حتى يتمكن من تنفيذها بشكل مستقل.","o":{"أ":"تقوم بإعادة شرح ا","ب":"تعقد له جلسة تدريبية مركزة توضح فيها المهارات المطلوبة وتشجعه على المبادرة. من مهامه إلى زميل أكثر خبرة لتخفيف الضغط عليه تدريجيا.تحيل جزءا","ج":"وتحفيزه على التحسن. تفرض عليه متابعة دقيقة وتقارير يومية لمتابعة تقدمه","د":"ألن التدريب المركز يزوّد الموظف الجديد بالمعرفة والمهارات ب-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":161,"q":"في صف دراسي، تواجه طالبًا يظهر سلوكا يؤثر على جو متكررا عدائيا لنضباط ويوفر فرص الدعم الفعّال له؟ الصف العام، كيف تتعامل مع الموقف بما يحقق الدوام في الصف لمناقشة السلوك بشكل خاص وبناء خطة تعديل","o":{"أ":"تطلب منه البقاء بعد مناسبة.","ب":"تتحدث معه بهدوء خارج الصف فور حدوث السلوك لفهم دوافعه واحتياجاته. تشاركه القواعد والنتائج المحتملة لسلوكه أثناء الحصة أمام زمالئه مع توجيه تلميحات","ج":"داعمة. اءً مع ولي أمره لبحث الحلول البديلة.","د":"تسجّل مالحظات السلوك وترتب لق التحدث بهدوء خارج الصف فور حدوث السلوك يسمح بفهم ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":162,"q":"ما هو القرار12: خالل تقييم أداء معلمي المدرسة، الحظت تفاوتًا كبيرً ا في األداء. السؤال األمثل لتحسين األداء بشكل مستدام ومهني؟","o":{"أ":"تقديم تغذية راجعة عامة لجميع المعلمين لتشجيعهم على تطوير مهاراتهم. على حدة. تصميم برامج تطوير مهني مخصصة تعالج نقاط القوة والضعف لكل معلم","ب":"تنظيم ورش عمل جماعية تركز على المهارات األساسية التي تحتاج تطويرً ا في أغلب","ج":"المعلمين.","د":"عقد لقاءات فردية دورية مع المعلمين ذوي األداء المتفاوت لمتابعة تقدمهم بشكل خاص. تصميم برامج تطوير مهني مخصصة لكل معلم هو القرار األمثل ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":163,"q":"موظف يطلب ترقية رغم عدم توفر فرص حاليا، كيف تتعامل مع طلبه بما للتزام؟ يعكس مهنية اإلدارة ويحفز تشرح له بوضوح نظام الترقيات والمعايير المعتمدة، مع التأكيد على المتابعة لتطور","o":{"أ":"فرص الترقية مستقبال. لحاجته وترشح له فرص تطوير مهني قد تساهم في تأهيله لترقية مستقبلية.","ب":"تبدي تفهما تعبر عن رفضك للطلب مع توضيح أن األوضاع الحالية ال تسمح بالترقيات، مع","ج":"التشجيع على الصبر.","د":"تعده بأن طلبه سيكون محل اعتبار بمجرد توافر الفرص، دو ن التفاصيل أو للتزامات الواضحة. ،الشرح الواضح والمنهجي للسياسات وبناء توقعات واقعية يعزز الثقة أ-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":164,"q":"أثناء اجتماع عمل، الحظت تكرار المقاطعة وعدم لستماع الفعّال من أحد على جو العمل؟ الزمالء، كيف تتصرف لتعزيز التواصل الفعّال دون التأثير سلبا لستماع الجيد لتجنب التكرار وعدم التركيز.","o":{"أ":"تطرح مالحظة عامة أمام الفريق عن أهمية لجتماع.","ب":"تناقشه بشكل خاص وهادئ لتوضيح تفسير سلوك المقاطعة وأثره على سير لنتباه بشكل مباشر.لجتماع وتحفزه على","ج":"تعبر عن استيائك بلطف خالل لجتماعات. ابعة الزميل بما يضمن تحسين أدائه في","د":"تطلب من المدير تفهّم الوضع ومت ا مناقشة الزميل بشكل خاص تحفظ كرامته وتعزز فهمه للسلوك"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":165,"q":"ٍبعد إجراء تقييم تحصيلي للطالب، تبين أن غالبية األسئلة لم تغطِ بشكل كاف فعالية التقييم وصدق نتائجه؟ النقاط األساسية للمقرر، فما هو اإلجراء األمثل لضمان إعادة تصميم أسئلة التقييم مع تحليل دقيق لنتائج الطالب لتحقيق تغطية شاملة للنقاط","o":{"أ":"األساسية. مراجعة التقييم الحالي مع إجراء تعديل طفيف في ترتيب األسئلة وتحليل النتائج بشكل","ب":"جزئي. فة دون تغيير أسئلة التقييم األساسي.","ج":"اعتماد تقييم تكميلي يعتمد على طرق صياغة مختل توسيع فترة لختبار للطالب مع إعادة تطبيق نفس األسئلة دون تعديل لضمان تغطية","د":"أفضل. إعادة تصميم أسئلة التقييم وتحليل النتائج بدقة هو اإلجراء األمثل ألنه أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":166,"q":"طالب شكا لك من ظلم زميله في تقسيم األدوار داخل مشروع جماعي، كيف امل مع الشكوى بما يحافظ على العدالة ويعزز روح الفريق؟ تتع تستمع للشكوى وتحث الطالب المتضرر على محاولة حل المشكلة بشكل شخصي مع","o":{"أ":"زميله أوال. تعقد جلسة حوارية مع جميع أعضاء الفريق لمراجعة توزيع األدوار وتعديلها بما","ب":"يرضي الجميع بشكل عام.","ج":"تنقل الشكوى إلى ا لمشرف للمساعدة في حل النزاع مع اقتراح تعديل األدوار بناءً على تقييم الفريق. تتابع الموضوع بشكل غير رسمي من خالل التحدث مع الطالب المتهم وتحفيزه على","د":"التعاون وإعادة النظر في تقسيم األدوار. ب- عقد جلسة حوارية مع الفريق يتيح بيئة شفافة و حوارا يعزز مباشرا"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":168,"q":"أثناء تدريس نظرية التعلم البنائي، يبدِي بعض الطالب ارتباكا في استيعاب يز فهمهم؟ المفهوم، كيف تُفضّل أن تتصرف لتعز","o":{"أ":"تُعيد شرح النظرية بأسلوب مختلف مع تدعيمها بأمثلة تطبيقية واضحة وملموسة. تشجع الطالب على مناقشة المفهوم فيما بينهم وتبادل األفكار دون شرح إضافي من","ب":"جانبك.","ج":"توكل مهمة شرح المفهوم للطالب المتفوقين ليشركوا زمالءهم في العملية التعليمية. ل من تفصيل الشرح وتُوجّه تركيز الدرس نحو المفاهيم األساسية األكثر وضوحا.","د":"تُقل إعادة الشرح بأسلوب مختلف مدعوم بأمثلة تطبيقية هي الطريقة أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":169,"q":"تواجه موظفًا يعاني من تراجع في أدائه رغم التنبيهات السابقة، كيف تتعامل مع لتحقيق أفضل النتائج؟ المشكلة بطريقة مهنية تناقش معه أسباب التراجع بشكل مباشر، وتحدد معه خطة تحسين زمنية قابلة للقياس","o":{"أ":"ا والمتابعة. تطبق عليه إجراءات تأديبية تدريجية مع توثيق للتقارير لضمان جدية التعامل مع","ب":"المشكلة. تعقد اجتماعًا مع الموظف لمراجعة األداء بشكل شامل، وتشجعه على التعبير عن","ج":"مشاكله، ثم تتابع تنفيذ الحلول بشكل دوري. تلفت نظر الموظف إلى تأثير تقصيره على الفريق وتحفزه عبر إظهار أهمية دوره، مع","د":"متابعة تحسنه بشكل منتظم. ألن الحوار المباشر وتحديد خطة تحسين واضحة وقابلة للقياس"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":170,"q":"المدرس يرغب في دمج تقنيات التقييم البديل في صفه لكنه غير متأكد منال سؤال20: أفضل منهجية لذلك، ماذا تنصحه؟ يبدأ بتطبيق تقنيات التقييم البديل بشكل فوري وشامل لتحقيق التجديد الكامل في","o":{"أ":"الممارسات التعليمية. مع التخطيط ال مسبق والتقييم المستمر لضمان التكيف","ب":"يدمج تقنيات التقييم البديل تدريجيا والتحسين المستهدف. يجرب تقنيات التقييم البديل بشكل متقطع وبعيدا عن التخطيط المسبق لتيسير العملية","ج":"بشكل عفوي. يدمج تقنيات التقييم البديل فقط في بعض الفصول الدراسية متجاهال التخطيط العام","د":"لضمان عدم تعطيل جداول التدريس. الدمج التدريجي مع التخطيط المسبق والتقييم المستمر هو األسلوب ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":171,"q":"في حالة ورود شكوى من أحد الطالب ضد أحد المعلمين، كيف تتعامل معها لحترافية والمهنية؟ بأعلى درجات ن مصادر متعددة.","o":{"أ":"تستمع للطالب بعناية وتؤجل أي إجراء حتى تجمع معلومات إضافية م تستمع للطالب وتتحقق من الشكوى مباشرة وبطريقة موضوعية، مع ضمان حماية","ب":"حقوق جميع األطراف.","ج":"تتواصل فورًا مع المعلم المعني لالستماع إلى وجهة نظره قبل اتخاذ أي موقف. ا توضح للطالب أهمية تسجيل شكواه رسميًا ثم تراجع األمر مع اإلدارة المختصة التخاذ","د":"القرار المناسب. هذا الخيار هو األكثر مهنية ألنه يضمن التوازن بين لستماع ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":172,"q":"تتلقى تعليمات من اإلدارة بزيادة انضباط الطالب، لكن الطرق المتبعة تؤثر كيف تتصرف في هذه الحالة لضمان تحقيقسلبًا على الجو التعليمي وتشوش بيئة التعلم. ورة ممكنة؟ األهداف بأفضل ص","o":{"أ":"تنفذ التعليمات بدقة مع مراقبة مستمرة لآلثار السلبية ومحاولة التقليل منها. تناقش مع اإلدارة بشكل بناء لتعديل األساليب بما يتناسب مع طبيعة الطالب ويحفز بيئة","ب":"تعليمية إيجابية. لستمرار في التنفيذ كما تضع مالحظاتك ووجهات نظرك في تقرير رسمي لإلدارة، مع","ج":"هو مطلوب. تتبع أسلوبك الخاص في إدارة ا المبادئ العامة، مع إبالغ اإلدارة الحقلنضباط مراعيا","د":"بنتائج هذا األسلوب. هذا الخيار يمثل نهجا يعترف بأهمية التعليمات مع متوازنا مهنيا ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":173,"q":"أثناء إعداد خطة العمل السنوية، الحظت وجود فجوة في الكفاءات األساسية تطويرية؟ لدى فريق العمل، فما الخطوة األنسب لمعالجتها حسب أفضل ممارسات اإلدارة ال","o":{"أ":"إعادة توزيع المهام بحيث يتولى كل موظف مسؤوليات ضمن مستوى كفاءته الحالي.","ب":"تنظيم دورات تدريبية مستمرة ومتخصصة لتطوير مهارات الفريق بشكل منهجي. استقطاب موظفين جدد ذوي كفاءات عالية لتعويض النقص الحالي فورا.","ج":"لتتوافق مع القدرات الحالية للفريق دون تغييرات تدريبية. تعديل أهداف الخطة السنوية","د":"تنظيم دورات تدريبية مستمرة ومتخصصة هو الحل األمثل ألنه ب-"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":174,"q":"زميلك في المشروع الم شترك يلتزم بنسبة متقطعة بالمواعيد المتفق عليها، مما يسبب بعض التأخير في سير العمل. كيف تتعامل مع هذا الوضع لتحقيق أفضل نتائج؟ تناقش معه األسباب وراء التأخير وتطلب منه للتزام بشكل صارم بالمواعيد دون","o":{"أ":"مرونة. معه لفهم أسباب التأخير والتوصل إلى حلول مشتركة تالئم الطرفين وتدعم تفتح حوارا","ب":"اإلنجاز الجماعي. للتزام.","ج":"ترفع األمر لإلدارة لتدخلها المباشر وتحديد اإلجراءات الالزمة لضمان تتولى العمل بشكل مستقل إلنجاز المهام الالزمة بسرعة، مع تجنب إثارة خالفات قد تؤثر","د":"على أجواء الفريق. ب- ف تح الحوار لفهم األسباب ووضع حلول مشتركة يعزز التعاون"},"a":"ب","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":175,"q":"أثناء لمتحان، الحظت طالبًا يقلد زميله في اإلجابة، كيف تتصرف بطريقة مهنية وأخالقية؟ وتأثيره على مستقبله الدراسي. تنبه الطالب بهدوء على الفور وتوضح له مخاطر الغش","o":{"أ":"لمتحان لتوعية الطالبين بخطورة الغش وحفظ كرامتهم.لنتهاء من","ب":"تناقش الطالب بعد","ج":"تعاقب الطالب بشكل صارم فورًا أمام زمالئه لتكون عبرة تمنع تكرار الغش. ا.","د":"تسجل مخالفة الغش وتعطي الطالبين درجة صفر مع شرح أسباب القرار الحق تنبيه الطالب فورًا بهدوء مع توضيح مخاطر الغش يجمع بين الحزم أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":176,"q":"،أثناء تقييم أداء أحد المعلمين، تكتشف وجود تحيّز ظاهري تجاه بعض الطالب كيف تتصرف في هذه الحالة؟ ا تناقش الموضوع مع المعلم بأسلوب غير اتهامي، وتُقدم له الدعم واإلرشاد لتعزيز العدالة","o":{"أ":"في تعامالته. تخبر اإلدارة باألمر ليتخذوا اإلجراءات التأديبية المناسبة بشكل مباشر للحفاظ على","ب":"نزاهة البيئة التعليمية. المتوقعة","ج":"تتحدث مع الطالب المتضررين لتقديم المساندة النفسية ولتوضيح الخطوات لتصحيح الوضع. تراقب أداء المعلم بشكل أكبر لفترة زمنية محددة قبل اتخاذ أي إجراء، بهدف جمع المزيد","د":"من األدلة. الحوار المباشر والداعم مع المعلم يحقق تحسنا ويعالج مستداما مهنيا أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":178,"q":"في سبيل تحفيز الطالب للمشاركة الفعالة داخل الصف، ما هو األسلوب األمثل لتحقيق ذلك حسب أفضل الممارسات التربوية؟","o":{"أ":"مكافأة الطالب ماديًا بانتظام مقابل مشاركتهم في الدروس. توفير فرص منتظمة للطالب للتعبير عن آرائهم ومناقشتها مع تقديم التقدير اللفظي","ب":"البنّاء. تشجيع المشاركة من خالل تحديد شروط ومهام واجبة التنفيذ على الطالب لتعزيز","ج":"للتزام.","د":"التركيز على نتائج التحصيل األكاديمي وتقديم مهام إضافي ة لمن يشارك بانتظام دون اعتماد مكافآت مادية أو لفظية. ا ألن إتاحة الفرص للتعبير عن اآلراء مع تقديم التقدير اللفظي البنّاء ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":179,"q":"بعد تطبيق اختبار إلكتروني، أعر ب عدد من الطالب عن اعتراضهم على لعتراضات بشكل مهني وفعّال؟ صعوبة بعض األسئلة. كيف تتصرف تجاه هذه تشرح للطالب أن الهدف الرئيس من لختبار هو تحفيزهم على بذل جهد أكبر والرقي","o":{"أ":"بالمستوى العلمي. ،وفق المعايير المهنيةلختبار بدقة، وتراجع مستوى صعوبة األسئلة","ب":"تقوم بتحليل نتائج مع إعادة النظر في األسئلة المثيرة للجدل إذا لزم األمر. تعيد تطبيق للتزام بالنتائج وعدم التفاوضلختبار بنفس األسئلة، مع التأكيد على أهمية","ج":"حول الصعوبة. لختبار الرسمي كما هي دون تعديل أو مراجعة، مع التشديد على أن النتائج تثبت نتائج","د":"نهائية مهما أثار الطالب من اعتراضات. تحليل النتائج ومراجعة األسئلة يضمن تطبيق معايير العدالة المهنية ب-"},"a":"ب","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":180,"q":"أبلغت عن تصرف غير مهني من أحد الزمالء، كيف تتصرف بطريقة مهنية لضمان تحقيق عادل وفعال؟ ألة مع الزميل بشكل خاص.","o":{"أ":"تجمع معلومات من الزمالء المباشرين فقط ثم تناقش المس تجمع معلومات من مصادر متعددة وتفتح حوارا مع الزميل لضمان الفهم مباشرا","ب":"المتبادل قبل اتخاذ أي إجراء. تبلغ اإلدارة فورا مع تقديم ما لديك من معلومات أولية لتسريع اتخاذ القرار واإلجراءات","ج":"الالزمة. تراقب تصرفات الزميل لفترة زمنية محددة لجمع أدلة أكثر قبل أن تتحدث مباشرة معه أو","د":"تبلغ اإلدارة. جمع معلومات متعددة المصادر وفتح حوار مباشر مع الزميل ب-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":181,"q":"عند إعداد خطة توز ،يع المهام وتالحظ تفاوت مستويات الخبرة بين الموظفين كيف تتصرف لتحقيق أقصى درجات الكفاءة والتنمية؟","o":{"أ":"تُوزع المهام وفق مستوى الخبرة مع متابعة مستمرة وتقديم الدعم الالزم لتحسين األداء. مهاراتهم لتحفيز تعلمهم وتطوير","ب":"تُكلف الموظفين ذوي الخبرة األقل بمهام أكثر تحديا سريعا. تخصص المهام البسيطة للموظفين األقل خبرة حفاظا على جودة العمل وتجنب األخطاء","ج":"الكبيرة. تعيد توزيع المهام بشكل متوازن دون تغيير مستوى التحدي، مع مراقبة األداء لتقييم","د":"الحاجة للدعم أو التدريب. التوزيع المدروس الذي يأخذ في لعتبار مستوى الخبرة ويوفر الدعم أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":182,"q":"في مواجهة طالب مستهتر يسخر من المعلم خالل الحصة، ما هو اإلجراء األنسب للتعامل معه؟ بهدوء لتوضيح أثر سلوكه على العملية التعليمية.","o":{"أ":"التحدث معه فورا انتهاء الحصة بحوار خاص لبناء وعي إيجابي. طلب الحوار معه بعد","ب":"ج) توبيخه بشكل مباشر لكن بمستوى لهجة معتدل أمام المجموعة لردع السلوك. خالل الحصة لتجنب التصادم والتركيز على الدرس.","د":"تجاهل السخرية مؤقتا ب- طلب الحوار الخاص بعد الحصة يوفر بيئة مناسبة للتواصل الف عّال"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":183,"q":"تواجه تعارضًا بين قيم المدرسة وقيم أحد الطالب، كيف تدير الموقف على أفضل نحو؟ ا للتزام بالقواعد.","o":{"أ":"تشرح للطالب أسباب تمسك المدرسة بقيمها مع تأكيد أهمية ين.","ب":"تستمع للطالب بإنصاف وتحاول بناء جسر تفاهم يحترم كال القيمت تطالب الطالب ب لمتثال لقيم المدرسة مع منح فرصة للنقاش حول اختالف وجهات","ج":"النظر.","د":"تتبع إجراءات المدرسة الرسمية في حال تعذر التوافق مع محاولة توضيح العواقب. هذا الخيار األمثل ألنه يجمع بين لستماع والتفهم ومحاولة إيجاد ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":185,"q":"موظف يستمر في تقديم تقارير العمل متأخرة، كيف تتصرف لضمان تحسين األداء والحفاظ على روح التعاون؟ جدوال عليه لتسليم متفقا زمنيا","o":{"أ":"تناقش معه أسباب التأخير بأسلوب بنّاء وتضع معه التقارير. تفرض عليه مواعيد نهائية صارمة وتتابع التقارير أسبوعيا مع تحذير رسمي في حالة","ب":"التأخير المتكرر. تقلل من مسؤولياته المتعلقة بالتقارير وتكلف زميالللتزام آخر بمتابعة العمل لضمان","ج":"بالمواعيد. ا","د":"تزامن بين المكا فآت والمواعيد المحددة، بزيادة المكافأة في حال للتزام وتقليلها في حال التأخير. الحوار البناء ووضع جدول زمني متفق عليه يعززان للتزام أ-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":186,"q":"في صف يضم طالبا بمستويات تعلم متفاوتة بشكل واضح، كيف تخطط ادة للجميع؟ لتصميم وتنفيذ الدرس لتحقيق أقصى استف","o":{"أ":"تتبع خطة تدريس موحدة للجميع مع توفير دعم إضافي فردي حسب الحاجة.","ب":"تعتمد استراتيجيات التعلم التمايزي لتلبية احتياجات كل مجموعة وفق مستوى الطالب.","ج":"تركز على تحديات الطالب المتفوقين لتطوير مهاراتهم بصورة أعمق. للطالب ذوي األداء المنخفض لتوفير بيئة مناسبة لهم. منفصالتخصص موارد وصفا","د":"التعلم التمايزي هو الخيار األمثل ألنه يوفر خطة تعليمية مرنة تلبّي ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":187,"q":"موظف يظهر مقاومة واضحة للتعاون مع فريق العمل، كيف تتصرف حيال هذا الموقف؟ ف لالستماع إلى وجهة نظره ومحاولة فهم دوافع رفضه للتعاون. مع الموظ","o":{"أ":"تعقد اجتماعا","ب":"تدعو الموظف وفريقه إلى جلسة مشتركة لبحث األسباب ووضع خطة تعاون عملية.","ج":"تبلغ اإلدارة لمتابعة موقف الموظف واتخاذ اإلجراء المناسب إذا استمر الرفض. واضح ة للعمل الجماعي في خطوة","د":"تراقب سلوك الموظف عن كثب وتحدد معه أهدافا الحقة. الجمع بين الموظف والفريق في جلسة مشتركة يتيح فهم جميع ب-"},"a":"أ","e":"لأنها الأنسب مهنيًا وإداريًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":188,"q":"عند وضع أهداف تقييمية لدرس جديد، كيف تضمن أنها تعكس مهارات تفكيرالسؤ ال38: م الفعّال؟ عليا تعزز التعل ر والفهم كأساس لتقييم شامل. تركز على التذك","o":{"أ":"تصوغ أهدافا تربط بين التحليل والتطبيق والتقييم لتحقيق مهارات تفكير عليا.","ب":"تصوغ أهدافا تتدرج من المعرفة إلى التطبيق مع لمسة تحليلية محدودة.","ج":"تصوغ أهدافا تحفز التقييم الذاتي والتركيب مع الحفاظ على أساس المعرفة.","د":"تصوغ أهدافا ألن صياغة األهداف التي تدمج التحليل والتطبيق والتقييم تمثل أعلى ب-"},"a":"أ","e":"لأنها الأنسب تربويًا؛ فهي تعالج جوهر الموقف المذكور في السؤال بطريقة مباشرة ومتوازنة، بينما باقي الخيارات إمّا أقل شمولًا، أو تؤجل الحل، أو تركّز على جانب واحد فقط ولا تحقق الهدف المطلوب بالكامل."},{"n":189,"q":"هناك تنافس سلبي بين الموظفين يؤثر على اإلنتاجية وسير العمل، كيف تتعامل مع هذه المشكلة لضمان تحسين األداء والحفاظ على بيئة عمل صحية؟ حوارية دورية لتبادل اآلراء والتفاهم بين الموظفين. تنظيم جلسات","o":{"أ":"ب) عقد ورشة عمل متخصصة لتعزيز روح الفريق وثقافة التعاون البناء.",
