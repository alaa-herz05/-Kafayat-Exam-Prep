<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الامتحان التفاعلي - الكفايات التربوية 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap');

  :root {
    --sky: #38BDF8;
    --sky-light: #BAE6FD;
    --sky-pale: #E0F2FE;
    --sky-dark: #0284C7;
    --sky-deeper: #0369A1;
    --white: #FFFFFF;
    --off-white: #F0F9FF;
    --text-main: #0C2340;
    --text-secondary: #334155;
    --correct-bg: #D1FAE5;
    --correct-border: #10B981;
    --correct-text: #064E3B;
    --wrong-bg: #FEE2E2;
    --wrong-border: #EF4444;
    --wrong-text: #7F1D1D;
    --shadow: 0 4px 24px rgba(2,132,199,0.13);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', 'Tajawal', sans-serif;
    background: linear-gradient(135deg, #EFF6FF 0%, #E0F2FE 60%, #F0F9FF 100%);
    min-height: 100vh;
    color: var(--text-main);
    direction: rtl;
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(120deg, var(--sky-deeper) 0%, var(--sky-dark) 60%, var(--sky) 100%);
    padding: 28px 20px 22px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(2,132,199,0.25);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }
  .header h1 {
    font-size: 1.7rem; font-weight: 900; color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    position: relative;
  }
  .header p {
    font-size: 0.92rem; color: var(--sky-light);
    margin-top: 5px; position: relative;
  }
  .header .badge {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    color: #fff; border-radius: 20px;
    padding: 3px 14px; font-size: 0.8rem;
    margin-top: 8px; border: 1px solid rgba(255,255,255,0.3);
  }

  /* ===== SCREEN BASE ===== */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== HOME SCREEN ===== */
  .home-container {
    max-width: 720px; margin: 0 auto; padding: 30px 16px;
  }
  .section-cards {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px; margin-bottom: 28px;
  }
  .top-nav{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    padding:15px 20px;
    background:rgba(255,255,255,0.05);
    border-bottom:1px solid #BAE6FD;
}

.top-nav a{
    color:#FFFFFF;
    text-decoration:none;
    padding:10px 22px;
    border-radius:50px;
    font-weight:800;
    background:linear-gradient(90deg,#0369A1,#38BDF8);
    box-shadow:0 4px 14px rgba(2,132,199,.3);
    transition:.3s;
}

.top-nav a:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 20px rgba(2,132,199,.45);
}
  @media(max-width:520px){ .section-cards { grid-template-columns: 1fr; } }

  .section-card {
    background: var(--white); border-radius: var(--radius);
    padding: 20px 18px; cursor: pointer;
    border: 2px solid transparent;
    box-shadow: var(--shadow);
    transition: all 0.22s ease;
    position: relative; overflow: hidden;
  }
  .section-card:hover {
    border-color: var(--sky);
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(2,132,199,0.2);
  }
  .section-card.selected {
    border-color: var(--sky-dark);
    background: var(--sky-pale);
  }
  .section-card::after {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 4px; height: 100%;
    background: linear-gradient(180deg, var(--sky), var(--sky-dark));
    border-radius: 0 var(--radius) var(--radius) 0;
    opacity: 0; transition: opacity 0.2s;
  }
  .section-card.selected::after, .section-card:hover::after { opacity: 1; }
  .card-icon { font-size: 1.8rem; margin-bottom: 8px; }
  .card-title { font-size: 1rem; font-weight: 800; color: var(--text-main); margin-bottom: 4px; }
  .card-count { font-size: 0.8rem; color: var(--sky-dark); font-weight: 600; }

  .start-btn {
    display: block; width: 100%;
    background: linear-gradient(90deg, var(--sky-dark), var(--sky));
    color: #fff; border: none; border-radius: 50px;
    padding: 16px; font-size: 1.1rem; font-weight: 800;
    font-family: 'Cairo', sans-serif;
    cursor: pointer; box-shadow: 0 4px 18px rgba(2,132,199,0.35);
    transition: all 0.22s;
    letter-spacing: 0.5px;
  }
  .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(2,132,199,0.45);
  }
  .start-btn:active { transform: scale(0.98); }

  .info-bar {
    background: var(--white); border-radius: 12px;
    padding: 16px 18px; margin-bottom: 22px;
    border: 1px solid var(--sky-light);
    display: flex; gap: 20px; flex-wrap: wrap;
    box-shadow: var(--shadow);
  }
  .info-item { display: flex; align-items: center; gap: 8px; font-size: 0.88rem; color: var(--text-secondary); }
  .info-item strong { color: var(--sky-dark); }

  /* ===== EXAM SCREEN ===== */
  .exam-container {
    max-width: 720px; margin: 0 auto; padding: 20px 16px 60px;
  }

  .progress-bar-wrap {
    background: var(--sky-light); border-radius: 50px; height: 8px;
    margin-bottom: 6px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sky-dark), var(--sky));
    border-radius: 50px;
    transition: width 0.4s ease;
  }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 0.8rem; color: var(--sky-dark); margin-bottom: 18px;
    font-weight: 700;
  }

  .question-card {
    background: var(--white); border-radius: var(--radius);
    padding: 26px 22px; box-shadow: var(--shadow);
    border: 1px solid var(--sky-light);
    margin-bottom: 16px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .q-num {
    background: linear-gradient(135deg, var(--sky-dark), var(--sky));
    color: #fff; border-radius: 50%; width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem; font-weight: 800; flex-shrink: 0;
  }
  .q-category {
    font-size: 0.75rem; background: var(--sky-pale);
    color: var(--sky-dark); border-radius: 20px;
    padding: 3px 12px; font-weight: 700;
  }
  .q-text {
    font-size: 1.05rem; font-weight: 700; line-height: 1.7;
    color: var(--text-main);
  }

  .options-list { list-style: none; margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    width: 100%; text-align: right;
    background: var(--off-white);
    border: 2px solid var(--sky-light);
    border-radius: 12px; padding: 14px 18px;
    font-size: 0.97rem; font-weight: 600;
    font-family: 'Cairo', sans-serif;
    cursor: pointer; transition: all 0.18s;
    color: var(--text-main);
    display: flex; align-items: center; gap: 12px;
  }
  .option-btn:hover:not(:disabled) {
    background: var(--sky-pale);
    border-color: var(--sky);
    transform: translateX(-2px);
  }
  .option-letter {
    background: var(--sky-light); color: var(--sky-darker, var(--sky-dark));
    border-radius: 8px; padding: 2px 8px; font-size: 0.82rem;
    font-weight: 800; flex-shrink: 0; min-width: 30px; text-align: center;
  }

  /* Result states */
  .option-btn.correct {
    background: var(--correct-bg) !important;
    border-color: var(--correct-border) !important;
    color: var(--correct-text) !important;
  }
  .option-btn.correct .option-letter { background: #10B981; color: #fff; }
  .option-btn.wrong {
    background: var(--wrong-bg) !important;
    border-color: var(--wrong-border) !important;
    color: var(--wrong-text) !important;
  }
  .option-btn.wrong .option-letter { background: #EF4444; color: #fff; }
  .option-btn.show-correct {
    background: var(--correct-bg) !important;
    border-color: var(--correct-border) !important;
    color: var(--correct-text) !important;
    animation: pulse 0.5s ease;
  }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
  .option-btn:disabled { cursor: default; }

  /* Feedback box */
  .feedback-box {
    border-radius: 14px; padding: 18px 20px; margin-top: 14px;
    animation: fadeIn 0.35s ease;
    display: none;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .feedback-box.correct {
    background: linear-gradient(135deg, #D1FAE5, #ECFDF5);
    border: 2px solid #10B981; display: block;
  }
  .feedback-box.wrong {
    background: linear-gradient(135deg, #FEE2E2, #FFF5F5);
    border: 2px solid #EF4444; display: block;
  }
  .feedback-header {
    display: flex; align-items: center; gap: 10px;
    font-size: 1.05rem; font-weight: 800; margin-bottom: 10px;
  }
  .feedback-icon { font-size: 1.5rem; }
  .feedback-text { font-size: 0.92rem; line-height: 1.75; color: var(--text-secondary); }
  .correct-answer-label {
    font-size: 0.82rem; font-weight: 700; color: var(--correct-text);
    background: rgba(16,185,129,0.12); border-radius: 8px;
    padding: 4px 10px; display: inline-block; margin-bottom: 8px;
  }

  .next-btn {
    width: 100%; margin-top: 16px;
    background: linear-gradient(90deg, var(--sky-dark), var(--sky));
    color: #fff; border: none; border-radius: 50px;
    padding: 14px; font-size: 1rem; font-weight: 800;
    font-family: 'Cairo', sans-serif;
    cursor: pointer; box-shadow: 0 4px 14px rgba(2,132,199,0.3);
    transition: all 0.2s; display: none;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(2,132,199,0.4); }
  .next-btn.visible { display: block; animation: fadeIn 0.3s ease; }

  /* ===== RESULT SCREEN ===== */
  .result-container {
    max-width: 640px; margin: 0 auto; padding: 30px 16px 60px;
    text-align: center;
  }
  .score-circle {
    width: 140px; height: 140px; border-radius: 50%;
    background: conic-gradient(var(--sky-dark) 0deg, var(--sky) var(--score-deg, 180deg), var(--sky-light) var(--score-deg, 180deg) 360deg);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 8px 32px rgba(2,132,199,0.3);
    position: relative;
  }
  .score-inner {
    width: 110px; height: 110px; border-radius: 50%;
    background: #fff; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-num { font-size: 2rem; font-weight: 900; color: var(--sky-deeper); line-height: 1; }
  .score-label { font-size: 0.72rem; color: var(--text-secondary); font-weight: 600; }

  .result-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 6px; color: var(--text-main); }
  .result-sub { font-size: 0.92rem; color: var(--text-secondary); margin-bottom: 26px; }

  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 12px; margin-bottom: 26px;
  }
  .stat-box {
    background: #fff; border-radius: 14px; padding: 16px 10px;
    box-shadow: var(--shadow); border: 1px solid var(--sky-light);
  }
  .stat-num { font-size: 1.6rem; font-weight: 900; }
  .stat-num.green { color: #10B981; }
  .stat-num.red { color: #EF4444; }
  .stat-num.blue { color: var(--sky-dark); }
  .stat-desc { font-size: 0.78rem; color: var(--text-secondary); margin-top: 3px; }

  .retry-btn {
    display: inline-block; margin: 0 6px 12px;
    padding: 13px 28px; border-radius: 50px;
    border: none; font-size: 0.95rem; font-weight: 800;
    font-family: 'Cairo', sans-serif; cursor: pointer;
    transition: all 0.2s;
  }
  .retry-btn.primary {
    background: linear-gradient(90deg, var(--sky-dark), var(--sky));
    color: #fff; box-shadow: 0 4px 16px rgba(2,132,199,0.35);
  }
  .retry-btn.secondary {
    background: var(--white); color: var(--sky-dark);
    border: 2px solid var(--sky-light);
  }
  .retry-btn:hover { transform: translateY(-2px); }

  /* Review list */
  .review-section { margin-top: 28px; text-align: right; }
  .review-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 14px; color: var(--text-main); }
  .review-item {
    background: #fff; border-radius: 12px; padding: 14px 16px;
    margin-bottom: 10px; border-right: 4px solid;
    box-shadow: 0 2px 10px rgba(2,132,199,0.08);
    font-size: 0.88rem;
  }
  .review-item.correct-r { border-color: #10B981; }
  .review-item.wrong-r { border-color: #EF4444; }
  .review-q { font-weight: 700; color: var(--text-main); margin-bottom: 6px; line-height: 1.5; }
  .review-ans { font-size: 0.82rem; color: var(--text-secondary); }
  .review-ans span { font-weight: 700; }
  .review-ans .cr { color: #10B981; }
  .review-ans .wr { color: #EF4444; }

  /* Motivational messages */
  .motivate { font-size: 1rem; font-weight: 700; margin-bottom: 20px; padding: 12px 20px; border-radius: 12px; }
  .motivate.gold { background: #FEF9C3; color: #854D0E; border: 1px solid #FDE68A; }
  .motivate.silver { background: #F1F5F9; color: #475569; border: 1px solid #CBD5E1; }
  .motivate.bronze { background: #FFF7ED; color: #9A3412; border: 1px solid #FDBA74; }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <h1>🎓 نظام الامتحان التفاعلي</h1>
  <p>دوسية الكفايات التربوية والوظيفية 2026</p>
 <nav class="top-nav">
    <a href="index.html">🏠 Home</a>
</nav>
</div>

<!-- ===== HOME SCREEN ===== -->
<div id="homeScreen" class="screen active">
  <div class="home-container">
    <div class="info-bar">
      <div class="info-item">📚 <span>اختر موضوع واحد أو أكثر، ثم اضغط <strong>ابدأ الامتحان</strong></span></div>
      <div class="info-item">✅ <span>كل سؤال يعطيك <strong>شرحاً فورياً</strong> للإجابة</span></div>
    </div>

    <div class="section-cards" id="sectionCards">
      <!-- Generated by JS -->
    </div>

    <button class="start-btn" onclick="startExam()">🚀 ابدأ الامتحان الآن</button>
  </div>
</div>

<!-- ===== EXAM SCREEN ===== -->
<div id="examScreen" class="screen">
  <div class="exam-container">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-meta">
      <span id="progressText">السؤال 1 من 10</span>
      <span id="scoreTrack">✅ 0 &nbsp;❌ 0</span>
    </div>
    <div id="questionArea"></div>
  </div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div id="resultScreen" class="screen">
  <div class="result-container">
    <div class="score-circle" id="scoreCircle">
      <div class="score-inner">
        <div class="score-num" id="scoreNum">0%</div>
        <div class="score-label">النتيجة</div>
      </div>
    </div>
    <div class="result-title" id="resultTitle">أحسنت!</div>
    <div class="result-sub" id="resultSub"></div>
    <div class="motivate" id="motivateMsg"></div>

    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num green" id="rCorrect">0</div><div class="stat-desc">إجابات صحيحة</div></div>
      <div class="stat-box"><div class="stat-num red" id="rWrong">0</div><div class="stat-desc">إجابات خاطئة</div></div>
      <div class="stat-box"><div class="stat-num blue" id="rTotal">0</div><div class="stat-desc">مجموع الأسئلة</div></div>
    </div>

    <div>
      <button class="retry-btn primary" onclick="retryExam()">🔁 أعد الامتحان</button>
      <button class="retry-btn secondary" onclick="goHome()">🏠 الرئيسية</button>
    </div>

    <div class="review-section">
      <div class="review-title">📋 مراجعة إجاباتك</div>
      <div id="reviewList"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// DATA: All questions with options, correct answer, explanation
// ============================================================
const allQuestions = [

  // ===== التقويم التربوي =====
  { cat: 'التقويم التربوي', q: 'معلم اللغة العربية طلب من طلابه حل ورقة عمل نهائية للانتقال للمستوى المتقدم بشرط الحصول على 10/10.', opts: ['تقويم بنائي','تقويم ختامي فقط','تقويم تشخيصي','تقويم واقعي'], ans: 1, exp: 'الهدف المعلن هو الحكم على الأهلية للانتقال للمستوى المتقدم = تقويم ختامي. البنائي يكون أثناء التعلم لتصحيح المسار، والتشخيصي يكشف الثغرات قبل التدريس.' },
  { cat: 'التقويم التربوي', q: 'في حصة الرياضيات، أجرى المعلم اختباراً قصيراً في الدقائق العشر الأخيرة للتحقق من إتقان مفهوم اليوم.', opts: ['تقويم بنائي','تقويم ختامي','تقويم مرحلي','تقويم قبلي'], ans: 1, exp: 'رغم أن الحصة لم تنته زمنياً إلا أن مرحلة الشرح اكتملت. الاختبار يهدف للتحقق من الإتقان النهائي لما شُرح اليوم = ختامي لمرحلة الشرح. المعيار هو الهدف لا الوقت.' },
  { cat: 'التقويم التربوي', q: 'مشرف العلوم طلب تقريراً مكتوباً سيتم تثبيت علامته في السجل الفصلي.', opts: ['تقويم بنائي','تقويم ختامي (تجميعي)','تقويم تشخيصي','تقويم بنائي وختامي'], ans: 1, exp: 'التقرير الذي تُثبَّت علامته في السجل هو حكم نهائي تجميعي = تقويم ختامي (تجميعي) بامتياز. إدخال السجل الرسمي دليل قاطع على الطابع الختامي.' },
  { cat: 'التقويم التربوي', q: 'معلمة اللغة الإنجليزية أعطت خانة "متقن/غير متقن" في نهاية الحصة لمهارة واحدة.', opts: ['تقويم بنائي','تقويم ذاتي','تقويم ختامي تحصيلي على مستوى درس','تقويم تمهيدي'], ans: 2, exp: 'الخانة تُعطى بعد انتهاء الشرح للحكم على إتقان مهارة اليوم = ختامي على مستوى درس. التقويم الذاتي يتطلب أن يُقيّم الطالب نفسه.' },
  { cat: 'التقويم التربوي', q: 'معلم الكيمياء يطرح أسئلة شفهية أثناء الشرح لتصحيح الفهم فوراً.', opts: ['تقويم ختامي','تقويم بنائي','تقويم تشخيصي','تقويم قبلي'], ans: 1, exp: 'الأسئلة أثناء الشرح بهدف التصحيح الفوري وضبط مسار التعلم = تقويم بنائي (تكويني). الكلمة المفتاحية هي "تصحيح المسار الفوري".' },
  { cat: 'التقويم التربوي', q: 'في بداية وحدة العمليات الحسابية، وزعت المعلمة اختباراً لمعرفة ما يعرفه الطلاب مسبقاً.', opts: ['تقويم ختامي','تقويم بنائي','تقويم تشخيصي قبلي','تقويم تكويني'], ans: 2, exp: 'الاختبار قبل الشرح لمعرفة المعرفة السابقة والثغرات = تقويم تشخيصي قبلي (Diagnostic). التوقيت قبل البدء هو المعيار الحاسم هنا.' },
  { cat: 'التقويم التربوي', q: 'معلم الرياضيات يطلب من كل طالب تحديد ما فهمه وما لم يفهمه في نهاية الحصة بنفسه.', opts: ['تقويم الأقران','تقويم ذاتي','تقويم ختامي','تقويم بنائي'], ans: 1, exp: 'الطالب يُقيّم نفسه = تقويم ذاتي (Self-Assessment). الكلمة المفتاحية "بنفسه" تميّزه عن تقويم الأقران حيث يُقيّم الطالب زميله.' },
  { cat: 'التقويم التربوي', q: 'بطاقة الخروج: يكتب الطالب سؤالاً لديه أو ما فهمه في نهاية الحصة.', opts: ['تقويم ختامي للحصة','تقويم بنائي + ذاتي (Exit Ticket)','تقويم تشخيصي','تقويم الأقران'], ans: 1, exp: 'بطاقة الخروج (Exit Ticket) أداة تقويم بنائية + ذاتية تستخدم لتعديل التخطيط للحصة القادمة. إنها تعطي المعلم تغذية راجعة فورية وتجعل الطالب يتأمل تعلمه.' },
  { cat: 'التقويم التربوي', q: 'قبيل الانتقال لدرس المليمترات، اختبرت المعلمة إتقان الطلاب لدرس المتر.', opts: ['تقويم قبلي','تقويم بنائي','تقويم تشخيصي','تقويم ختامي'], ans: 3, exp: 'الهدف هو الحكم على أهلية الطلاب للانتقال لموضوع جديد بناءً على إتقان الموضوع الحالي = ختامي لدرس اليوم. القاعدة: تحديد المستوى للانتقال = ختامي دائماً.' },
  { cat: 'التقويم التربوي', q: 'اختبار الثانوية العامة النهائي (التوجيهي) لمادة اللغة العربية.', opts: ['تقويم بنائي مستمر','تقويم ختامي تجميعي رسمي','تقويم تشخيصي','تقويم ذاتي'], ans: 1, exp: 'اختبار يُصدر حكماً نهائياً على نواتج تعلم سنة كاملة = تقويم ختامي تجميعي رسمي (Summative). الثلاث كلمات: نهائي + رسمي + تجميعي هي بصمة التوجيهي.' },
  { cat: 'التقويم التربوي', q: 'المعلم يستخدم لوحة "إشارة المرور" (أخضر/أصفر/أحمر) ليعرف مستوى فهم الطلاب.', opts: ['تقويم ختامي','تقويم بنائي سريع (Traffic Light)','تقويم تشخيصي','تقويم الأقران'], ans: 1, exp: 'تقنية إشارة المرور أداة تقويم بنائي فوري (Quick Formative Check) تعطي المعلم صورة آنية عن مدى الفهم أثناء الدرس، وتُمكّنه من تعديل مساره فوراً.' },
  { cat: 'التقويم التربوي', q: 'معلمة تتجول بين الطلاب وتكتب ملاحظاتها على لوح بينما يحلون المسائل.', opts: ['تقويم ختامي','تقويم بنائي غير رسمي (Informal Observation)','تقويم تشخيصي','تقويم ذاتي'], ans: 1, exp: 'الملاحظة غير الرسمية أثناء العمل وتسجيل ملاحظات = تقويم بنائي غير رسمي. "أثناء" + "لا يُدرج في السجل" = بنائي.' },
  { cat: 'التقويم التربوي', q: 'قبل درس جديد، يسأل المعلم: "ماذا تعرفون عن البركان؟" ويكتب الإجابات على السبورة.', opts: ['تقويم ختامي','تقويم بنائي أثناء الحصة','تقويم تشخيصي قبلي','تقويم الأقران'], ans: 2, exp: 'السؤال قبل الشرح لاستكشاف المعرفة السابقة = تشخيصي قبلي. الكلمات المفتاحية: "قبل درس جديد" + "ما تعرفونه".' },
  { cat: 'التقويم التربوي', q: 'معلم يطلب من الطلاب تصحيح أوراق بعضهم وفق مفتاح إجابة محدد.', opts: ['تقويم ذاتي','تقويم الأقران (Peer Assessment)','تقويم بنائي','تقويم ختامي'], ans: 1, exp: 'تصحيح الطالب لورقة زميله = تقويم الأقران. الفارق عن الذاتي: في الذاتي يُقيّم الطالب نفسه، وفي الأقران يُقيّم زميله.' },
  { cat: 'التقويم التربوي', q: 'اختبار "الاستعداد للقراءة" يُجرى للأطفال قبل دخول الصف الأول.', opts: ['تقويم ختامي','تقويم بنائي','تقويم تشخيصي / تحديد الاستعداد','تقويم مستمر'], ans: 2, exp: 'يُجرى قبل الدراسة لتحديد مستوى الاستعداد والكشف عن احتياجات خاصة = تشخيصي. الهدف هو التشخيص قبل البدء لا الحكم النهائي.' },

  // ===== نظريات التعلم =====
  { cat: 'نظريات التعلم', q: 'معلمة علوم وزعت قطع فلين وطلبت من الطالبات ملاحظة الطفو ثم صياغة جملة علمية دون إعطائهن قانون أرخميدس مسبقاً.', opts: ['الأسلوب الاستقرائي الموجه (أمثلة → تعميم)','الاكتشاف الموجه مع نتائج جاهزة','حل المشكلات من كتاب مدرسي','الأسلوب الاستنتاجي'], ans: 0, exp: 'تقديم تجربة (أمثلة حسية) ثم استنتاج القاعدة = استقراء. الاستنتاجي يبدأ بالقاعدة ثم يُطبّق. الكلمة المفتاحية: أمثلة أولاً ← قاعدة لاحقاً.' },
  { cat: 'نظريات التعلم', q: 'معلم تربية مهنية وجّه طالباً يخطئ في تثبيت الخشب ومنحه نقطة إضافية على السلامة.', opts: ['اشتراط بافلوفي','استبصار جشطلت','اشتراط إجرائي (سكنر) - تعزيز إيجابي','محاولة وخطأ ثورندايك'], ans: 2, exp: 'تعزيز السلوك المرغوب (التثبيت الصحيح) بمكافأة فورية (نقطة) = اشتراط إجرائي سكنر. التعزيز الإيجابي = إضافة مثير محبب بعد السلوك لزيادته.' },
  { cat: 'نظريات التعلم', q: 'طالبة في الحادي عشر فجأة صرخت "لقد فهمت!" بعد إعادة النظر في مسألة المتتاليات.', opts: ['محاولة وخطأ ثورندايك','اشتراط إجرائي سكنر','استبصار جشطلت (فهم مفاجئ)','نمو معرفي بياجيه'], ans: 2, exp: 'الفهم المفاجئ + إعادة تنظيم الإدراك ككل = استبصار جشطلت. الكلمات المفتاحية: "فجأة" + "لقد فهمت" + "إدراك كلي".' },
  { cat: 'نظريات التعلم', q: 'مرشد تربوي تجاهل صراخ الطالب في الطابور وعزز هدوءه بالمدح في الإذاعة.', opts: ['اشتراط كلاسيكي بافلوف','محاولة وخطأ','اشتراط إجرائي - تعزيز تفاضلي للسلوك البديل','تعلم اجتماعي باندورا'], ans: 2, exp: 'تجاهل (إطفاء) + تعزيز السلوك البديل (الهدوء) = تعزيز تفاضلي للسلوك البديل = إجرائي متقدم. الإطفاء وحده لا يكفي بل يجب تعزيز السلوك البديل.' },
  { cat: 'نظريات التعلم', q: 'طفل عمره 6 سنوات يعتقد أن الكأس الطويل يحتوي عصيراً أكثر من القصير العريض.', opts: ['مرحلة العمليات المجردة','مرحلة ما قبل العمليات (تمركز + غياب مبدأ الحفظ)','مرحلة العمليات المحسوسة','المرحلة الحسية الحركية'], ans: 1, exp: '6 سنوات + تمركز حول بُعد واحد (الطول) + غياب الحفظ = مرحلة ما قبل العمليات (2-7 سنوات) عند بياجيه.' },
  { cat: 'نظريات التعلم', q: 'برنامج تعليمي محوسب يعرض سؤالاً ثم يعطي "أحسنت + 10 نقاط" للصحيح و"حاول مجدداً" للخطأ.', opts: ['محاولة وخطأ ثورندايك','اشتراط إجرائي - تعزيز فوري وتشكيل سلوك','استبصار جشطلت','بنائية بياجيه'], ans: 1, exp: 'تعزيز فوري + انتقال للسؤال التالي = تصميم برمجي إجرائي سكنري. سكنر طوّر "التعليم المبرمج" بالتعزيز الفوري.' },
  { cat: 'نظريات التعلم', q: 'معلم نثر أعطى الطلاب نصاً ليقرؤوه بصمت، ثم شاركوا ثنائياً ثم نقاش عام، دون شرح مسبق.', opts: ['محاضرة تفاعلية','استقرائي','تعلم نشط (فكر - زاوج - شارك)','استنتاجي'], ans: 2, exp: 'الخطوات الثلاث: قراءة فردية → مشاركة ثنائية → نقاش عام = استراتيجية (فكر - زاوج - شارك) = تعلم نشط.' },
  { cat: 'نظريات التعلم', q: 'معلمة صف أول حاولت تغيير خوف الأطفال من غرفة المصادر بتوزيع شوكولاتة على من يدخل.', opts: ['اشتراط كلاسيكي بافلوف','اشتراط إجرائي سكنر (تعزيز دخول الغرفة بمكافأة)','استبصار جشطلت','نمو معرفي بياجيه'], ans: 1, exp: 'الدخول (سلوك إرادي) → مكافأة (شوكولاتة) → زيادة الدخول = اشتراط إجرائي. بافلوف للاستجابات اللاإرادية، وسكنر للسلوك الإرادي.' },
  { cat: 'نظريات التعلم', q: 'طالب يتعلم الكتابة بمحاولات عشوائية، وتثبيت الحروف الصحيحة تدريجياً.', opts: ['اشتراط كلاسيكي','اشتراط إجرائي','محاولة وخطأ (ثورندايك)','استبصار'], ans: 2, exp: 'محاولات عشوائية + تثبيت الصحيح تدريجياً = قانون الأثر (ثورندايك) = محاولة وخطأ. يختلف عن سكنر بغياب التعزيز المقصود.' },
  { cat: 'نظريات التعلم', q: 'معلم رياضيات قسّم الطلاب لمجموعات مع درجة فردية ودرجة جماعية معاً.', opts: ['تنافس ودي','اعتماد متبادل إيجابي (مسؤولية فردية + هدف جماعي)','تفاعل معزز فقط','عمليات المجموعة الداخلية'], ans: 1, exp: 'درجة فردية + درجة جماعية = مسؤولية فردية + اعتماد متبادل إيجابي = جوهر التعلم التعاوني.' },
  { cat: 'نظريات التعلم', q: 'معلمة أحياء عرضت قصص صبر الأنبياء وطلبت استنتاج الجامع المشترك.', opts: ['استقرائي (جزئيات → حكم كلي)','استنتاجي','اكتشاف غير موجه','حل مشكلات'], ans: 0, exp: 'أمثلة متعددة (نوح، أيوب، يوسف) → استنتاج الحكم الكلي = استقراء. أمثلة أولاً ثم القاعدة = استقرائي دائماً.' },

  // ===== تصنيف بلوم =====
  { cat: 'تصنيف بلوم', q: 'السؤال: "ما تعريف التقويم البنائي؟" يقيس مستوى:',opts: ['الفهم','التذكر','التطبيق','التحليل'], ans: 1, exp: 'طلب التعريف = استرجاع المعلومة مباشرةً من الذاكرة = مستوى التذكر (أدنى المستويات). الكلمات المفتاحية: ما تعريف، ما معنى، سمّ، اذكر.' },
  { cat: 'تصنيف بلوم', q: 'السؤال: "اشرح الفرق بين التعزيز الإيجابي والسلبي" يقيس مستوى:', opts: ['التذكر','الفهم','التطبيق','التحليل'], ans: 1, exp: 'الشرح والمقارنة = إعادة صياغة المعلومة بأسلوب خاص = مستوى الفهم. الكلمات المفتاحية: اشرح، قارن، لخّص، فسّر.' },
  { cat: 'تصنيف بلوم', q: 'السؤال: "طبّق قانون فيثاغورس على هذه المسألة" يقيس مستوى:', opts: ['التذكر','الفهم','التطبيق','التحليل'], ans: 2, exp: 'استخدام القاعدة في موقف محدد = التطبيق. الكلمات المفتاحية: طبّق، استخدم، حلّ، نفّذ.' },
  { cat: 'تصنيف بلوم', q: 'السؤال: "قارن بين أسلوبي التدريس الاستقرائي والاستنتاجي" يقيس مستوى:', opts: ['التذكر','الفهم','التطبيق','التحليل'], ans: 3, exp: 'المقارنة والتفكيك والاستنتاج = التحليل. الكلمات المفتاحية: قارن، حلّل، ميّز، استنتج، يفكك.' },
  { cat: 'تصنيف بلوم', q: 'السؤال: "بماذا تحكم على أفضل أسلوب تدريس لهذا الموقف؟" يقيس مستوى:', opts: ['التطبيق','التحليل','التقييم','الإبداع'], ans: 2, exp: 'إصدار حكم مبني على معايير = التقييم. الكلمات المفتاحية: احكم، انتقد، قيّم، برّر، دافع عن.' },
  { cat: 'تصنيف بلوم', q: 'السؤال: "صمّم وحدة دراسية متكاملة عن التقويم" يقيس مستوى:', opts: ['التقييم','التحليل','التطبيق','الإبداع'], ans: 3, exp: 'التصميم والابتكار وبناء شيء جديد = الإبداع (أعلى المستويات). الكلمات المفتاحية: صمّم، ابتكر، اقترح، خطّط، أنتج.' },
  { cat: 'تصنيف بلوم', q: '"مستويات التفكير الدنيا (LOTS)" تشمل:', opts: ['التحليل + التقييم + الإبداع','التذكر + الفهم + التطبيق','التطبيق + التحليل + التقييم','التذكر + الفهم + التحليل'], ans: 1, exp: 'مستويات التفكير الدنيا = التذكر + الفهم + التطبيق. مستويات التفكير العليا = التحليل + التقييم + الإبداع.' },
  { cat: 'تصنيف بلوم', q: 'أيٌّ من الأفعال التالية ينتمي لمستوى الإبداع في تصنيف بلوم المحدَّث؟', opts: ['يذكر','يفسر','يحلل','يبتكر'], ans: 3, exp: 'يبتكر = مستوى الإبداع. يذكر = التذكر. يفسر = الفهم. يحلل = التحليل. الإبداع = أعلى المستويات.' },

  // ===== الكفايات التربوية =====
  { cat: 'الكفايات التربوية', q: 'معلم يكتب خطة درس بأهداف SMART ويختار الاستراتيجيات المناسبة. هذا ينتمي لكفاية:', opts: ['التدريس والتعلم والتقويم','التخطيط وتنظيم التعلم','إدارة الصف والبيئة','النمو المهني والتواصل'], ans: 1, exp: 'أهداف SMART + اختيار الاستراتيجيات + تحضير الدرس = كفاية التخطيط وتنظيم التعلم. الكلمات المفتاحية: تحضير، خطة، أهداف.' },
  { cat: 'الكفايات التربوية', q: 'معلمة تطرح أسئلة التفكير العليا وتقدم تغذية راجعة فورية أثناء الحصة. هذا ينتمي لكفاية:', opts: ['التخطيط وتنظيم التعلم','إدارة الصف والبيئة','التدريس والتعلم والتقويم','النمو المهني والتواصل'], ans: 2, exp: 'أسئلة التفكير العليا + تغذية راجعة فورية + تنفيذ الدرس = كفاية التدريس والتعلم والتقويم. يحدث أثناء الحصة.' },
  { cat: 'الكفايات التربوية', q: 'معلم يضع قواعد صفية واضحة ويتعامل مع السلوك السلبي بفعالية. هذا ينتمي لكفاية:', opts: ['التخطيط','التدريس والتقويم','إدارة الصف والبيئة','النمو المهني'], ans: 2, exp: 'ضبط الصف + التعامل مع السلوك + البيئة الآمنة = كفاية إدارة الصف والبيئة. الكلمات المفتاحية: ضبط، انضباط، بيئة تعلم.' },
  { cat: 'الكفايات التربوية', q: 'معلم يحضر دورات تطويرية ويتواصل مع الأهل وزملائه. هذا ينتمي لكفاية:', opts: ['التخطيط','التدريس والتقويم','إدارة الصف','النمو المهني والتواصل'], ans: 3, exp: 'التطوير الذاتي + التواصل مع الأهل والزملاء = كفاية النمو المهني والتواصل. الكلمات المفتاحية: تطوير، نمو، تواصل.' },

  // ===== أخلاقيات المهنة =====
  { cat: 'أخلاقيات المهنة', q: 'معلم اكتشف أن أحد زملائه يتلاعب في علامات الطلاب. ما الإجراء الصحيح؟', opts: ['تجاهل الأمر حفاظاً على العلاقة','نصيحة سرية للزميل أولاً، ثم تصعيد عند الاستمرار','الإبلاغ الفوري للمدير','إخبار الطلاب مباشرة'], ans: 1, exp: 'قاعدة التعامل مع أخطاء الزميل: نصيحة سرية أولاً ← متابعة ← تصعيد عند التكرار أو الخطورة. التلاعب بالعلامات خطير فيحتاج تصعيداً سريعاً عند الاستمرار.' },
  { cat: 'أخلاقيات المهنة', q: 'معلم يعرف معلومات سرية عن طالب. متى يكسر السرية المهنية؟', opts: ['عندما يطلب ولي الأمر','عند إساءة الطالب أو الخطر على سلامته','عندما يطلب الزملاء','لا يكسرها أبداً'], ans: 1, exp: 'السرية المهنية تُكسر عند الإساءة للطالب أو الخطر على سلامته. حماية الطفل أعلى من السرية المهنية = قاعدة ذهبية في الأخلاقيات.' },

  { cat: 'التعليم المتمايز', q: 'المهام المتدرجة (Tiered Tasks) في التمايز تعني:', opts: ['مهام مختلفة بأهداف مختلفة لكل مجموعة','نفس الهدف بمستويات تعقيد ودعم مختلفة','مهام سهلة للضعاف وصعبة للمتفوقين','تخفيض المطلوب من الضعاف'], ans: 1, exp: 'المهام المتدرجة = نفس الهدف + مستويات تعقيد مختلفة + دعم مختلف. وحدة الهدف مع تعدد المسارات هي جوهر التمايز الحقيقي.' },
  { cat: 'التعليم المتمايز', q: 'التمايز الحقيقي في الصف يعني:', opts: ['فوضى منظمة + أنشطة متعددة','هدف واحد + مسارات متعددة مبنية على بيانات تقويمية','مهام مختلفة لكل طالب + أهداف مختلفة','إلغاء المعايير الوطنية لمراعاة الفروق'], ans: 1, exp: 'التمايز الحقيقي = هدف واحد + مسارات متعددة مبنية على بيانات تقويمية. ليس فوضى منظمة ولا إلغاء للمعايير.' },

  { cat: 'الصف المقلوب', q: 'المدة المثلى لفيديو الصف المقلوب هي:', opts: ['30-45 دقيقة','20-25 دقيقة','6-10 دقائق','ساعة كاملة'], ans: 2, exp: 'المدة المثلى للفيديو في الصف المقلوب = 6-10 دقائق (مدة انتباه المراهقين). الفيديوهات الطويلة تؤدي لمشاهدة سلبية وفقدان التركيز.' },
  { cat: 'الصف المقلوب', q: 'معلم يجلس ويتصفح هاتفه بينما الطلاب يعملون ويدّعي أنه "ميسّر". ما الرد الصحيح؟', opts: ['هذا صحيح في الصف المقلوب','الميسّر الحقيقي: تنقل نشط + أسئلة استقصائية + تغذية راجعة فورية + تشخيص مستمر','أعِد الشرح التقليدي','ركّز على المجموعة الضعيفة فقط'], ans: 1, exp: 'الميسّر ≠ متفرج. الميسّر الحقيقي يعمل أكثر من المحاضر لكن بطريقة مختلفة: تنقل + أسئلة + تغذية راجعة + تشخيص.' },
  { cat: 'الصف المقلوب', q: 'الفرق بين الصف المقلوب والتعلم المدمج هو:', opts: ['لا فرق بينهما','التعلم المدمج = تقنية داخل الصف فقط','الصف المقلوب نموذج فرعي من التعلم المدمج، والتعلم المدمج مظلة أوسع','الصف المقلوب للمواد العلمية فقط'], ans: 2, exp: 'Flipped Classroom ⊂ Blended Learning. الصف المقلوب نموذج محدد يقوم على قلب الأدوار، ضمن مظلة التعلم المدمج الأوسع.' },
  { cat: 'الصف المقلوب', q: 'في الصف المقلوب، أفضل استجابة عندما يكشف التقويم أن 60% من الطلاب أخطأوا في مفهوم ما:', opts: ['جمع البطاقات دون مناقشة','سؤال طالب صحيح ليشرح','محطتان: معلم يعيد الشرح للمخطئين + مجموعة متقدمة للصحيحين + دمج ختامي','عرض الفيديو القديم مرة أخرى'], ans: 2, exp: 'التقويم البنائي الفوري = تعديل مسار الحصة في الحال بناءً على البيانات. محطتا العمل المتزامن = أفضل استخدام لوقت الصف.' },

// Section definitions
const sections = [
  { key: 'التقويم التربوي', icon: '📊', title: 'التقويم التربوي', color: '#0284C7' },
  { key: 'نظريات التعلم', icon: '🧠', title: 'نظريات التعلم', color: '#0369A1' },
  { key: 'تصنيف بلوم', icon: '🎯', title: 'تصنيف بلوم', color: '#0284C7' },
  { key: 'الكفايات التربوية', icon: '⭐', title: 'الكفايات التربوية', color: '#0369A1' },
  { key: 'أخلاقيات المهنة', icon: '⚖️', title: 'أخلاقيات المهنة', color: '#0284C7' },
  { key: 'التواصل الفعال', icon: '💬', title: 'التواصل الفعال', color: '#0369A1' },
  { key: 'التعليم المتمايز', icon: '🌈', title: 'التعليم المتمايز', color: '#0284C7' },
  { key: 'الصف المقلوب', icon: '🔄', title: 'الصف المقلوب', color: '#0369A1' },
];

// ============================================================
// STATE
// ============================================================
let selectedSections = new Set(sections.map(s => s.key));
let examQuestions = [];
let currentIdx = 0;
let score = 0;
let wrongs = 0;
let answered = [];
let currentAnswered = false;
let lastExamSections = null;

// ============================================================
// HOME
// ============================================================
function renderSectionCards() {
  const container = document.getElementById('sectionCards');
  container.innerHTML = '';
  sections.forEach(sec => {
    const count = allQuestions.filter(q => q.cat === sec.key).length;
    const div = document.createElement('div');
    div.className = 'section-card selected';
    div.id = 'card_' + sec.key;
    div.onclick = () => toggleSection(sec.key);
    div.innerHTML = `
      <div class="card-icon">${sec.icon}</div>
      <div class="card-title">${sec.title}</div>
      <div class="card-count">${count} سؤال</div>
    `;
    container.appendChild(div);
  });
}

function toggleSection(key) {
  if (selectedSections.has(key)) {
    if (selectedSections.size > 1) {
      selectedSections.delete(key);
      document.getElementById('card_' + key).classList.remove('selected');
    }
  } else {
    selectedSections.add(key);
    document.getElementById('card_' + key).classList.add('selected');
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startExam() {
  const pool = allQuestions.filter(q => selectedSections.has(q.cat));
  if (pool.length === 0) return;
  lastExamSections = new Set(selectedSections);
  examQuestions = shuffle([...pool]);
  currentIdx = 0; score = 0; wrongs = 0; answered = [];
  showScreen('examScreen');
  renderQuestion();
}

// ============================================================
// EXAM
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQuestion() {
  currentAnswered = false;
  const q = examQuestions[currentIdx];
  const total = examQuestions.length;
  const pct = (currentIdx / total) * 100;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `السؤال ${currentIdx + 1} من ${total}`;
  document.getElementById('scoreTrack').innerHTML = `✅ ${score} &nbsp;❌ ${wrongs}`;

  const letters = ['أ', 'ب', 'ج', 'د'];
  let optsHtml = q.opts.map((o, i) => `
    <li>
      <button class="option-btn" id="opt_${i}" onclick="selectAnswer(${i})">
        <span class="option-letter">${letters[i]}</span>
        <span>${o}</span>
      </button>
    </li>
  `).join('');

  document.getElementById('questionArea').innerHTML = `
    <div class="question-card">
      <div class="q-header">
        <div class="q-num">${currentIdx + 1}</div>
        <span class="q-category">${q.cat}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <ul class="options-list">${optsHtml}</ul>
      <div class="feedback-box" id="feedbackBox"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
      ${currentIdx + 1 < examQuestions.length ? 'السؤال التالي ←' : '🏁 عرض النتائج'}
    </button>
  `;
}

function selectAnswer(idx) {
  if (currentAnswered) return;
  currentAnswered = true;

  const q = examQuestions[currentIdx];
  const isCorrect = idx === q.ans;
  const letters = ['أ', 'ب', 'ج', 'د'];

  // Disable all buttons
  document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);

  // Style chosen
  const chosenBtn = document.getElementById('opt_' + idx);
  if (isCorrect) {
    chosenBtn.classList.add('correct');
    score++;
    document.getElementById('scoreTrack').innerHTML = `✅ ${score} &nbsp;❌ ${wrongs}`;
  } else {
    chosenBtn.classList.add('wrong');
    wrongs++;
    document.getElementById('scoreTrack').innerHTML = `✅ ${score} &nbsp;❌ ${wrongs}`;
    // Show correct
    document.getElementById('opt_' + q.ans).classList.add('show-correct');
  }

  answered.push({ q: q.q, chosen: idx, correct: q.ans, isCorrect, opts: q.opts, exp: q.exp, cat: q.cat });

  // Feedback
  const fb = document.getElementById('feedbackBox');
  if (isCorrect) {
    fb.className = 'feedback-box correct';
    fb.innerHTML = `
      <div class="feedback-header">
        <span class="feedback-icon">✅</span>
        <span style="color:#064E3B">إجابة صحيحة! أحسنت 🎉</span>
      </div>
      <div class="feedback-text"><strong>لماذا هذه الإجابة صحيحة؟</strong><br>${q.exp}</div>
    `;
  } else {
    fb.className = 'feedback-box wrong';
    fb.innerHTML = `
      <div class="feedback-header">
        <span class="feedback-icon">❌</span>
        <span style="color:#7F1D1D">إجابة خاطئة</span>
      </div>
      <div class="correct-answer-label">✅ الإجابة الصحيحة: (${letters[q.ans]}) ${q.opts[q.ans]}</div>
      <div class="feedback-text"><strong>لماذا هذه هي الإجابة الصحيحة؟</strong><br>${q.exp}</div>
    `;
  }

  document.getElementById('nextBtn').classList.add('visible');
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= examQuestions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

// ============================================================
// RESULTS
// ============================================================
function showResults() {
  showScreen('resultScreen');
  const total = examQuestions.length;
  const pct = Math.round((score / total) * 100);
  const deg = (pct / 100) * 360;

  document.getElementById('scoreCircle').style.setProperty('--score-deg', deg + 'deg');
  document.getElementById('scoreNum').textContent = pct + '%';
  document.getElementById('rCorrect').textContent = score;
  document.getElementById('rWrong').textContent = wrongs;
  document.getElementById('rTotal').textContent = total;

  let title, sub, motivate, motivateClass;
  if (pct >= 90) {
    title = '🏆 ممتاز! متفوق حقيقي';
    sub = `أجبت صح على ${score} من ${total} سؤال — نتيجة رائعة جداً`;
    motivate = '⭐ أنت على الطريق الصحيح لاجتياز امتحان الكفايات بتفوق! استمر في هذا المستوى.';
    motivateClass = 'gold';
  } else if (pct >= 70) {
    title = '👍 جيد جداً';
    sub = `أجبت صح على ${score} من ${total} سؤال — أداء جيد`;
    motivate = '💪 نتيجة جيدة! راجع الأسئلة التي أخطأت فيها وستصل لمستوى ممتاز.';
    motivateClass = 'silver';
  } else {
    title = '📖 تحتاج مراجعة أكثر';
    sub = `أجبت صح على ${score} من ${total} سؤال — راجع المواد وحاول مرة ثانية`;
    motivate = '🌱 لا تيأس! راجع الشرح في كل سؤال أخطأت فيه — ستجد التحسن في المرة القادمة.';
    motivateClass = 'bronze';
  }

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = sub;
  const mEl = document.getElementById('motivateMsg');
  mEl.textContent = motivate;
  mEl.className = 'motivate ' + motivateClass;

  // Review
  const letters = ['أ', 'ب', 'ج', 'د'];
  const reviewHtml = answered.map((a, i) => `
    <div class="review-item ${a.isCorrect ? 'correct-r' : 'wrong-r'}">
      <div class="review-q">${i + 1}. ${a.q}</div>
      <div class="review-ans">
        ${a.isCorrect
          ? `<span class="cr">✅ إجابتك صحيحة: (${letters[a.chosen]}) ${a.opts[a.chosen]}</span>`
          : `<span class="wr">❌ إجابتك: (${letters[a.chosen]}) ${a.opts[a.chosen]}</span> &nbsp;|&nbsp; <span class="cr">✅ الصحيح: (${letters[a.correct]}) ${a.opts[a.correct]}</span>`
        }
      </div>
    </div>
  `).join('');
  document.getElementById('reviewList').innerHTML = reviewHtml;
}

function retryExam() {
  if (lastExamSections) {
    selectedSections = new Set(lastExamSections);
  }
  startExam();
}

function goHome() {
  showScreen('homeScreen');
}

// ============================================================
// INIT
// ============================================================
renderSectionCards();
</script>
</body>
</html>
